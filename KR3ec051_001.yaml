body:
  text: 卷一補劑溫中人身一小天地耳天地不外陰陽五行以為健順人身不外水火氣血以為長養蓋人稟賦無偏則水以附火火以生水水火既足則氣血得資而無虧缺不平之憾矣惟其稟有不同賦有各異則或水衰而致血有所虧火衰而致氣有所歉故必假以培補俾偏者不偏而氣血水火自爾安養而無病矣第其病有淺深症有輕重則於補劑之中又當分其氣味以求庶於臨症免惑如補之有宜於先天真火者其藥必燥必裂是為補火之味補有宜於先天真水者其藥必滋必潤是為滋水之味補有宜於水火之中而不敢用偏勝之味者其藥必溫必潤是為溫腎之味補有宜於氣血之中而不敢用一偏之藥者其藥必甘必溫是為溫中之味補有宜於氣血之中而不敢用過補之藥者其藥必平必淡是為平補之味合是諸補以分則於補劑之義已得其概又何必過為分別云又按萬物惟溫則生故補以溫為正也萬物以土為母甘屬土故補又以甘為貴也土虧則物無所載故補脾氣之缺陷無有過於白朮補肝氣之虛損無有過於雞肉補肺氣之痿弱無有過於參耆補心血之缺欠無有過於當歸是皆得味之甘而不失其補味之正也其次補脾之味則有如牛肉大棗飴糖蜂蜜龍眼荔枝鯽魚皆屬甘溫氣雖較與白朮稍純然蜂蜜飴糖則兼補肺而潤燥龍眼則兼補心以安神荔枝則兼補營以益血惟有牛肉則能補脾以固中大棗則能補脾以助胃鯽魚則能補土以制水也且繡嘗即補脾以思其土之卑監而不平者不得不藉白朮以為培補若使土乾而燥能無滋而潤乎是有宜於山藥人乳黃精豬肉之屬是也土濕而凝能無燥而爽乎是有宜於白蔻砂仁之屬是也土潤而滑能無澀而固乎是有宜於蓮子芡實肉蔻之屬是也土鬱而結能無疏而醒乎是有宜於木香甘松藿香菖蒲胡荽大蒜之屬是也土浸而傾能無滲而利乎是有宜於茯苓扁豆山藥鯽魚之屬是也土鬱而蒸能無清而利乎是有宜於薏苡仁木瓜白蘚皮蚯蚓紫貝皂白二礬商陸郁李之屬是也土寒而凍能無溫而散乎是有宜於乾薑附子之屬是也土敦而阜能無通而泄乎是有宜於硝黃枳實之屬是也土崩而解能無升而舉乎是有宜於參耆甘草之屬是也凡此皆屬補脾之味然終不若甘溫補脾之為正耳人參山草補肺氣以生陰人參專入肺兼入脾性稟中和不寒不燥形狀似人氣冠群草能回肺中元氣於垂絕之鄉馮楚瞻曰人參能回陽氣於垂絕卻虛邪於俄頃李時珍曰人參年深浸漸長成者根如人形有神故謂之人參神草參字從浸亦浸漸之義參即浸字從世因字文繁遂以參星字代從簡便爾繡按其說亦是第世畏乎其參者每以參為助火助氣凡遇傷寒發熱及勞役內傷發熱等症發熱內傷外感皆有惟察脈見浮數有力為外熱沉大有力為內熱脈而沉細有力為實脈而浮大無力為虛熱而脈盛為傷熱為實熱而脈浮為傷暑為虛熱而能言有力者為實熱而懶言無力者為虛熱而口乾酷飲冷水者屬實熱而口乾微飲湯者屬虛熱而久按益熱是裡熱徹表為實熱而久按不熱是里陽浮表為虛熱而火烙時常不減頭足身體一樣為實熱而乍作乍止頭熱不烙足冷為虛熱而無汗二便閉塞為實熱而有汗二便通調為虛熱而見有里症為裡熱熱而見有表症為表熱熱而時當秋冬收斂閉藏多實熱而時當春夏升發浮散多虛畏之不啻鳩毒以為內既發熱復以助火助熱之藥入而投之不更使熱益甚乎詎知參以補虛非以填實其在外感正氣堅強參與耆朮附桂同投誠為助火彌熾若使元氣素虛邪匿不出正宜用參相佐如古參蘇飲敗毒散小柴胡湯白虎加人參湯石膏竹葉湯黃龍湯皆用人參納入領邪外出喻嘉言曰傷寒宜用人參其辨不可不明蓋人受外感之邪必先汗以驅之惟元氣壯者外邪始乘藥勢以出若素弱之人藥雖外行氣從中餒輕者半出不出重者反隨元氣縮入發熱無休矣所以體虛之人必用人參三五七分入表藥中少助元氣以為驅邪之主使邪氣得藥一湧而出全非補養衰弱之意也矧有並非外感止因勞役發熱而可置參而不用乎夫參之所以能益人者以其力能補虛耳果其虛而短氣虛而泄瀉虛而驚恐虛而倦怠虛而自汗虛而眩暈虛而飽悶食滯等症固當用參填補即使虛而嗽血虛而淋閉虛而下血失血與夫虛而喘滿煩燥口渴便結等症又何可不以虛治而不用以參乎況書有云參同升麻則可以瀉肺火同茯苓則可以瀉腎火同麥冬則可以生脈同黃耆甘草則可以退熱出元素是參更為瀉火之劑則參曷為不用惟在虛實二字早於平昔分辨明確則用自不見誤耳治病要著潔古謂其喘嗽不用以其痰實氣壅之故若使腎虛氣短喘促豈能禁而不用乎仲景謂其肺寒而嗽勿用以其寒束熱邪壅滯在肺之故若使自汗惡寒而嗽豈能禁而不用乎東垣謂其久病鬱熱在肺勿用以其火鬱於內不宜用補之故若使肺虛火旺氣短汗出豈能禁而不用乎丹溪謂其諸痛不宜驟用以其邪氣方銳不可用補之故若使裡虛吐利及久病胃弱與虛痛喜按之類豈可禁而不用乎節齋謂其陰虛火旺吐血勿用以其血虛火亢之故若使自汗氣短肢寒脈虛豈可禁而不用乎夫虛實二字最宜相較言聞曰凡人面白麵黃面青黧悴者皆脾肺腎氣不足可用也面赤面黑者氣壯神強不可用也脈之浮而芤濡虛大遲緩無力沉而遲澀弱細結代無力者皆虛而不足可用也若弦長緊實滑數有力者皆火鬱內實不可用也果其氣衰火熄則參雖同附桂可投如其火旺氣促則參即同知柏切忌至於陰氣稍虛陽氣更弱陰不受火熏蒸者則可用參為君陰氣稍衰陽氣更弱而火稍見其盛者則可用參為佐蓋陽有生陰之功陰無益陽之理參雖號為補陽助氣而亦可以滋陰生血耳是以古人補血用四物而必兼參同用者義實基此杲曰古人血脫者益氣蓋血不自生須得生陽氣之藥乃生陽生則陰長血乃旺也若單用補血藥血無由而生矣素問言無陽則陰無以生無陰則陽無以化故補氣須用人參血虛者亦須用之非若黃耆性稟純陽陰氣絕少而於火盛血燥不宜沙參甘淡性寒功專瀉肺而補絕少玄參苦鹹寒滑色黑入腎止治腎經無根之火攻於咽喉不能於氣有益葳蕤甘平雖能補中益氣而質潤味淡止能潤肺止嗽兼治風濕仍非肺分氣藥耳故書載參益土生金明目開心益智添精助神定驚止悸正氣得補邪火自退解渴除煩氣補則火不浮而煩自除氣補則津上升而渴自止通經生脈氣補則血隨氣以行而脈自至破積消痰氣運則食自化而積可破氣旺則水可利而痰自消發熱自汗氣補而陽得固多夢紛紜氣補而神克聚嘔噦反胃虛咳喘促氣補而肺與胃克安久病滑泄氣補而清得上升淋瀝脹滿氣補而濁得下降中暑中風氣補而邪得外解一切氣虛血損之症氣補而血得內固皆所必用至云參畏靈脂而亦有參同用以治月閉是畏而不畏也參惡皂莢而亦有參同用以名交泰丸是惡而不惡也參反藜蘆而亦有參同用以取湧越是蓋藉此以激其怒雖反而不反也然非深於醫者不能以知其奧耳出言聞氏但參本溫積溫亦能成熱故陰虛火亢咳嗽喘逆者為切忌焉參以黃潤緊實似人者佳上黨雖為參產道地然民久置不採時珍曰上黨今潞州也民以人參為地方害不復採取今所用者皆是遼參今有所云黨參者皆是假物時珍曰偽者皆以沙參薺苨桔梗採根造作亂之沙參體虛無心而味淡薺苨體虛無心桔梗體堅有心而味苦人參體實而味甘微帶苦其次百濟所出力薄上黨又其次高麗遼東所出力薄百濟用皆忌鐵久留經年須用淋過灶灰曬乾及或炒米同參納入瓷器收藏參鬚性主下泄與紫菀當歸之尾破血意義相同滑脫則忌參蘆功主上湧氣虛火炎亦忌但體虛痰壅用之可代瓜蒂山西太行新出黨參其性止能清肺並無補益與於久經封禁真正之黨參絕不相同另有義詳黨參論內所當並考參觀黃耆山草補肺氣實腠理黃耆專入肺兼入脾味甘性溫質輕皮黃肉白故能入肺補氣入表實衛為補氣諸藥之最是以有耆之稱且著其功曰生用則能固表無汗能發有汗能收是明指其表實則邪可逐故見無汗能發表固則氣不外泄故見有汗能止耳又著其功曰熟則生血生肌排膿內托是蓋指其氣足則血與肉皆生毒化膿成而為瘡瘍聖藥矣至於痘瘡不起陽虛無熱機曰保元湯用黃耆原出東垣治慢驚土衰火旺之法今藉此加減治痘以其內固營血外護衛氣滋助陰陽作為膿水其症雖異其理則同故去白芍加生薑改名曰保元湯炙黃耆三錢人參二錢炙甘草一錢生薑一片水煎服之書言於耆最宜皆是取其質輕達表功專實衛色黃入脾色白入肺而能升氣於表又言力能補腎以治崩帶淋濁是蓋取其補中升氣則腎受蔭而崩帶淋濁自止然與人參比較則參氣味甘平陽兼有陰耆則秉性純陽而陰氣絕少蓋一宜於中虛而泄瀉痞滿倦怠可除一更宜於表虛而自汗亡陽潰瘍不起可治且一宜於水虧而氣不得宣發一更宜於火衰而氣不得上達之為異耳黃耆書言性畏防風其功益大蓋謂能以助耆達表相畏而更相依是以如斯若使陽盛陰虛上焦熱甚下焦虛寒肝氣不和肺脈洪大者則並戒其勿用矣出山西黎城大而肥潤箭直良瘦小色黑堅硬不軟者服之令人胸滿震亨曰宜服三拗湯以瀉茯苓為使惡龜甲白蘚皮反藜蘆畏五靈脂防風血虛肺燥捶扁蜜炙發表生用氣虛肺寒酒炒腎虛氣薄鹽湯蒸潤切片用當歸芳草當歸專入心辛甘溫潤諸書載為入心生血上品緣脈為血府諸脈皆屬於心心無血養則脈不通血無氣附則血滯而不行當歸氣味辛甘既不慮其過散復不慮其過緩得其溫中之潤陰中之陽故能通心而血生號為血中氣藥故凡一切血症陰虛陽無所附而見血枯血燥血閉血脫等症則當用此主治按當歸頭則止血上行身則養血中守尾則破血下流全則活血不走出東垣古方合白芍芎藭地黃同用名為四物湯總劑蓋謂得芎以為長養生髮之機地黃以為滋補化源之自白芍以為救陰斂陽之本則血始能以生張景岳曰治血之劑古人多以四物為主然亦有宜與不宜者蓋補血行血無如當歸但當歸之性動而滑凡因火動血者忌之因火而嗽因濕而滑者皆忌之行血散血無如川芎然川芎之性升而散凡火帶血上者忌之氣虛多汗火不歸元者皆忌之生血涼血無如生地斂血清血無如芍藥然二物皆涼凡陽虛者非宜也脾弱者非宜也脈弱身涼多嘔便溏者皆非宜也故凡用四物以治血者不可不察若血虛而氣不固則當佐以人參黃耆血熱佐以條芩梔連血積佐以大黃牽牛與夫營虛而表不解則當佐以柴葛麻桂衛熱而表不斂則當佐以大黃隨其病之所向以為出入加減要使血滯能通血虛能補血枯能潤血亂能撫俾血與氣附氣與血固而不致散亂而無所歸耳書命其名曰歸即是此意是以氣逆而見咳逆上氣者則當用此以和血血和而氣則降矣寒鬱而見瘧痢腰腹頭痛者則當用此以散寒寒散而血則和矣血虛而見風痓無汗者則當用此以養血血養而風則散矣他如瘡瘍癰疽而見痛苦異常肌肉失養而見皮膚不潤並衝脈為病而見氣逆裡急帶脈為病而見腹痛腰如坐水衝脈起於腎下出於氣街俠臍上行至胸中上頄顙滲諸陽灌諸精下行入足灌諸絡為十二經脈之海主血帶脈橫圍於腰如束帶總約諸脈亦何莫不因血虛氣無所附之意得此則排膿痛止癰消毒去膚澤皮潤而無枯槁不榮之患矣然此味辛則散氣虛火盛者切忌味甘則壅脾胃虛寒者則忌體潤性滑大腸泄瀉者則忌不可不熟晰而明辨耳至書既言當歸入心而又曰入肝入脾無非因其血補而肝與脾皆有統藏之意脾統血肝藏血秦產秦州汶州所出頭圓尾多色紫氣香肥潤名馬尾當歸其性力柔善補川產尾粗堅枯名鑱頭當歸其性力剛善攻只宜發散收貯曬乾乘熱紙封甕內宜用酒洗畏菖蒲海藻生薑惡濕面白朮山草補脾氣燥脾濕白朮專入脾緣何專補脾氣蓋以脾苦濕急食苦以燥之脾欲緩急食甘以緩之內經白朮味苦而甘既能燥濕實脾復能緩脾生津濕燥則脾實脾緩則津生且其性最溫服則能以健食消穀為脾臟補氣第一要藥也五臟各有陰陽白朮專補脾陽故曰補氣書言無汗能發有汗能收通溺止泄消痰治腫止熱化癖安胎胎氣繫於脾脾虛則蒂無所附故易落止嘔聲物俱有為嘔有物無聲為吐東垣云生薑半夏皆可以治表實氣壅若虛嘔穀氣不行當以參朮補胃推揚穀氣而已功效甚多總因脾濕則汗不止脾健則汗易發凡水濕諸邪靡不因其脾健而自除吐瀉及胎不安胃之上口為賁門水穀於此而入胃之下口為幽門水穀之滓穢自此而入小腸又自小腸下一十六曲水穀始下小腸下口闌門水穀自此泌別凡穢為濁入於大腸水之清入於胱膀如水穀不分清濁不別則皆入於大腸而成李士材云脾士強者自能勝濕無濕則不泄濕多成於五泄若土虛不能制濕則風寒與熱皆得干而為病亦靡不因其脾健而悉平矣故同枳實則能治痞同黃芩則能安胎同澤瀉則能利水同乾薑桂心則能消飲祛癖同地黃為丸則能以治血瀉萎黃同半夏丁香薑汁則可以治小兒久瀉同牡蠣石斛麥麩則可以治脾虛盜汗然血燥無濕腎間動氣築築燥渴便閉者忌服謂其燥腎閉氣則其氣益築劉涓子云癰疽忌白朮以其燥腎而閉氣故反生膿作痛也凡臟皆屬陰世人但知白朮能健脾寧知脾虛而無濕邪者用之反燥脾家津液是損脾陰也何補之有此最易誤故特表而出之又寒濕過甚水滿中宮者亦忌謂其水氣未決苦不勝水甘徒滋壅必待腎陽培補水氣漸消腎氣安位術始可投猶洪水沖堤必待水退方可培土御水此又不得不稍變換於中也凡土虧水泛必俟水勢稍退方進理中等藥蓋補脾之藥不一白朮專補脾陽仲淳曰白朮稟純陽之土氣除邪之功勝而益陰之效虧故病屬陰虛血少精不足內熱骨蒸口乾唇燥咳嗽吐痰吐血鼻衄齒衄便秘滯下者法咸忌之生則較熟性更鮮補不滯膩能治風寒濕痹及散腰臍間血並衝脈為病逆氣裡急之功非若山藥止補脾臟之陰甘草止緩脾中之氣而不散於上下俾血可生燥症全無蒼朮氣味過烈散多於補人參一味沖和燥氣悉化補脾而更補肺所當分別而異視者也出浙江於潛地者為於潛術最佳米泔浸借穀氣和脾壁土拌炒借土氣助脾入清燥藥蜜水炒借潤制燥入滋陰藥人乳拌用借乳入血制燥入清脹藥麩皮拌炒用借麩入中龍眼夷果補心脾氣血龍眼專入心脾氣味甘溫多有似於大棗但此甘味更重潤氣尤多於補氣之中溫則補氣又更存有補血之力潤則補血故書載能益脾長智脾益則智長養心保血血保則心養為心脾要藥是以心思勞傷而見健忘怔忡驚悸暨腸風下血便血症不一端然大要血清而色鮮另作一派濺出遠射四散如篩其腹不痛是為腸風無疑便血而見腹痛則為熱毒下注不痛則為濕毒下注痛而喜手謹按則為寒毒下注並血而見鮮紅為熱瘀淡為寒瘀晦為積鮮紫為燥為結血如雞肝爛肉絞痛為蠱與夫症見面色痿黃大便不實聲短氣息噁心嘔吐六脈沉遲浮大無力為虛神氣不爽脈數能食腸紅下泄腹痛便秘為實而究不越氣失所統陰不隨陽而血自不歸附耳俱可用此為治蓋血雖屬心生而亦賴脾以統思慮而氣既耗則非甘者不能以補思慮而神更損則非潤者不能以濟龍眼甘潤兼有既能補脾固氣復能保血不耗則神氣自爾長養而無驚悸健忘之病矣按古歸脾湯有用龍眼肉以治心脾傷損義實基此非若大棗力專補脾氣味雖甘其性稍燥而無甘潤和柔以至於極之妙也至書有言久服令人輕身不老百邪俱闢止是神智長養之謂蠱毒可除三蟲可殺止是氣血充足而蠱不食之謂但此味甘體潤凡中滿氣壅腸滑泄利為大忌耳桂產者佳粵東者性熱不堪入藥大棗五果補脾胃中氣血大棗專入脾胃味甘氣溫色赤肉潤為補脾胃要藥經曰里不足者以甘補之形不足者溫之以氣大棗甘能補中溫能益氣脾胃既補則十二經脈自通九竅利九竅口耳鼻目前後二陰四肢和也正氣足則神自安故凡心腹邪氣心下懸急者得此則調得補則氣力強腸胃清身中不足及病見腸澼者用此則安甘能解毒故於百藥中得甘則協且於補藥中風寒發散內用為嚮導則能於脾助其升發之氣仲景治奔豚用大棗滋土以平腎治水飲脅痛用十棗益土以勝水不似白朮性燥不潤專於脾氣則補山藥性平不燥專於脾陰有益之為異耳但多食損齒齒屬腎土燥剋水及氣實中滿切忌甘令中滿大建中湯減餳棗與甘草同例北產肥潤者良金華南棗亦佳殺烏附忌蔥魚同食荔枝夷果入脾助氣入肝益血養營荔枝專入肝脾味甘而酸氣溫故能入脾助氣甘入脾入肝益血養營酸入肝然於血虛火衰則宜若使病非虛弱及素火盛服之反致助火發熱而有衄血齒痛之病矣李時珍曰荔枝氣味純陽其性畏熱鮮者食多即齦腫口痛或衄血也病齒䘌及火病人忌之開寶本草言其性平蘇氏卻謂多食無傷皆謬說也按物類相感志云食荔枝多則醉以殼浸水飲之即解此即食物不消還以本物消之之意至核味甘氣溫專入肝腎散滯闢寒雙核形似睪丸尤治㿗疝卵腫以其形類相似有感而通之義也治疝氣如斗用荔枝炒黑與茴香青皮各炒為末用酒送下痘瘡不起用殼煎湯以服蓋取殼性溫補內托之意然要皆屬性燥用當酌症所宜非若龍眼性主溫和而資益甚多也出建產者良飴糖造釀溫脾潤肺飴糖專入脾肺氣味甘溫據書言能補脾潤肺化痰止嗽並仲景建中湯用此以為補中緩脾蓋以米麥本屬脾胃之谷而飴糖即屬穀麥所造凡脾虛而肺不潤者用此氣味甘緩以補脾氣之不足成無己曰脾欲緩急食甘以緩之膠飴之甘以緩之也兼因甘潤以制肺燥之有餘是以脾虛而痰不化固可用此以除痰脾虛而嗽不止固可用此以除嗽即中虛而邪不解亦得用此以發表中虛而煩渴時見亦得用此以除煩止渴寒食大麥一升水七升煎五升入赤餳二合渴即飲之他如草烏毒中其性橫烈固可用此以為甘緩芒刺誤吞痛楚異常更可用此以為柔軟然糖經煉成濕而且熱其在氣虛痰盛中虛火發固可用此濕除若使中滿氣逆實火實痰非惟治痰且更動痰非惟治火且更生火震亨曰飴糖屬土而成於火火發濕中之熱寇氏謂其動風言未而遺本矣至於小兒多食尤易損齒生蟲蟲喜甘齒屬腎土補而水克不可不慎牽白者不入藥用雞肉原禽補肝火動肝風雞肉專入肝補虛溫中載之本經不為不是然雞屬巽而動風巽生風外應乎木內通乎肝得陽氣之最早故先寅而鳴宗奭曰雞鳴於五更日至巽位感動其氣然也鳴必鼓翅火動風生之象時珍曰禮記云天產作陽地產作陰雞卵生而地產羽不能飛雖為陽精實屬風木是陽中之陰也故能生熱動風風火相扇乃成中風風火易動而易散人之陽事不力者不宜食雞是以昔人有利婦人不利男子之說而東南之人肝氣易動則生火生痰病邪得之為有助也故陰虛火盛者不宜食雞食則風火益助矣脾胃虛弱者不宜食雞食則肝邪益甚而脾益敗矣味者不察既犯陰虛火動脾虛不食兩症又不撙節口腹反執補虛溫中之說殊為可惜至於婦人小產胎動尤不宜食食則並氣益動而血益損脾益虛而胎益墮惟有烏骨雞別是一種獨得水木之精性專走肝腎血分補血益陰為補虛除癆祛熱生津止渴及下痢噤口帶下崩中要藥時珍曰烏色屬水牝象屬陰故烏雌所治皆血分之病各從其類也如古方有用烏骨雞丸以治婦人百病取其補虛益陰鬼擊卒死用熱血以塗心下即蘇肘後用烏雞冠血瀝口中令咽仍破此雞拓心下冷乃棄之道邊妙雞冠位處至高精華所聚凡年久雄雞色赤尤為陽氣充盛故可刺血以治中惡驚悸陰不勝陽及或中風口眼喎斜用血塗其頰上即正咸能走血透肌故主之雞血和酒調服可以使痘即發對口毒瘡可用血塗即散風勢善行以毒攻毒中蜈蚣毒舌脹出口可用冠血浸舌並咽即消取其物性之有畏惡而得制伏其效甚眾至於雄雞肝味甘微苦而溫何書載治陰痿不起千金方用雞肝三具並菟絲子一斤為末雀卵和丸如小豆大每服五六十丸酒下及小兒疳積眼目不明並肝經實熱虛熱實熱用雄雞軟肝並胡黃連白芙蓉花肉豆蔻為末化服虛熱用雞肝同明雄黃桑白皮雞內金為末酒蒸去藥食皆以取其肝以入肝氣類相感之意雞屎白性寒不溫用之以治鼓脹普濟方云治鼓脹旦食不能暮食由脾虛不能制水水反勝土水穀不運氣不宣流故令中滿其脈沉實而滑宜雞矢醴主之何大英云諸腹脹大皆屬於熱精氣不得滲入膀胱別走於腑溢於皮裡膜外故成脹滿小便短澀雞矢性寒利小便誠萬金不傳之寶也用臘月乾雞矢白半斤袋盛以酒醅一斗漬七日溫服三杯日三或為末服二錢亦可石淋古今驗錄用雞矢白日中半乾炒香為末以酸漿飲服方寸匙日二次當下石出瘢痕外臺以豬脂三升飼烏雞一隻三日取矢同白芷當歸各一兩煎十沸去渣入鷹矢白半兩調敷風痹千金方用臘月烏雞矢一升炒黃為末絹袋盛漬三升酒中頻頻溫服令醉亦以取其消導利濕清熱除風之義惟雞子性稟生化最初之氣兼清濁而為體味甘氣寒性專除熱療火為風熱癇痓及傷寒少陰咽痛必用之藥卵清微寒性專治熱解毒為目痛赤痛煩滿咳逆小兒下泄婦人難產胞衣不出癰疽敷腫必用之藥卵黃微溫性專利產安胎但多食則滯鼎曰勿多食令人腹中有聲動風氣和蔥蒜食之氣短同韭子食成風痛共鱉肉食損人共獺肉食成遁屍同兔肉食成泄痢妊婦以雞子鯉魚同食令兒生瘡同糯米食令兒生蟲他如卵殼研末磨障除翳及或敷下疳瘡蓋以取其蛻脫之義傷寒勞復用此熬令黃黑為末熱湯調服亦以取其風性發散之意肫內黃皮性專清穀除熱止煩通溺並卵中白皮能散久咳結氣皆以取其性氣上行下入之妙然要雞中具有溫性則能動火助風具有寒性則能清熱利濕具有平性則能益陰秘陽用雞而在於肝則可通肝以治疳用雞而在於肫於屎則可入腑以消食用雞而在於抱出皮殼則可入目以磨翳而仍不越乎巽木風動以為之主故能直入厥陰而不岐耳凡血虛筋攣及陰虛火起骨蒸服此大忌諸雞惟烏骨烏肉白毛最良牛肉畜補脾固中牛肉專入脾本屬土若屬黃牛色猶得正治能補土固中土居中益氣止渴氣益則津生渴止功與黃耆無異故三瘧久病日服黃牛湯能令日漸輕強而無腫脹之病其效可知即丹溪倒倉法治停痰積血膠聚於腸胃迴腸曲折之處發為癱瘓癆瘵蠱脹膈噎非丸散所能及者用此因瀉為補借補為瀉踵其曲折如洪水泛漲陳朽順流而下沉疴悉去大有再造之功中年後行一二次亦卻疾養壽之一助朱震亨倒倉論曰腸胃為積穀之室故謂之倉倒者推陳以致新也胃屬土受物而不能自運七情五味有傷中宮停痰積血互相糾纏發為癱瘓為癆瘵為蠱脹成形成質為窠為臼以生百病而中宮愆和自非丸散所能去也此方出自西域異人其法用黃肥牡牛肉二十斤長流水煮成糜去滓濾取液再熬成琥珀色取之每飲一鍾隨飲至數十鍾寒月溫飲病在上則令吐在下則令利在中則令吐而利在人活變吐利後渴即服其小便一二碗亦可盪滌余垢睡二日乃食淡粥養半月即精神強健沉疴悉去也須斷房事半年牛肉五年而安此為補中之劑非若汗吐下藥能以傷人亦奇方也但病非腸胃者不得遽行是法牛有黃牛水牛之分故黃牛性溫而水牛性平白水牛可治反胃吐食腸結不通牛乳味甘微寒亦治脾胃枯槁噎膈反胃噎膈形類甚多然大要皆屬精枯澤竭氣逆上攻所致故食不能入喉入膈而自下也且人臟腑虧損津竭氣逆渾身痰窒用以辛香燥膈劫痰未嘗不快然旋劫旋生旋燥旋阻痰愈且盛津液見枯清道厭會無不阻塞雖水與飲類可以入喉不逆而堅硬食物每至厭會即返曰噎至膈阻絕吐出曰膈況腎主五液二便與膀胱一表一里腎水既槁陽火偏勝煎熬津液三陽熱結前後閉塞口既不通必反於上直犯清道上衝吸門咽喉所食多噎不下故經有言三陽結謂之膈朱震亨曰反胃噎膈大便燥結宜牛乳羊乳時時咽之兼服四物湯為上策不可服人乳人乳有五味之毒七情之火也牛肉病獨肝黑身白頭者切忌同豬肉食則生寸白蟲鯽魚魚補土製水消腫鯽魚專入脾胃大腸氣味甘溫諸魚性多屬火惟鯽魚則性屬土土能制水故書載有和胃實腸行水之功凡腸風下血膈氣吐食俱可用此投治且性與厚朴反樸則泄氣鯽則益氣也至於生搗可塗痰核乳癰堅腫以豬油煎灰服可治腸癰合赤小豆煮汁食則消水腫炙油則治婦人陰瘡同白礬燒研則治腸痢血痢入綠礬泥固煅則治反胃吐食與胡蒜煨則治膈氣痞滿皆以借其制水之意但煅不可去鱗以鱗有止血之功也烏背者味美忌麥冬芥菜沙糖豬肝蜂蜜卵生蜂白蜜和胃潤肺通結赤蜜性涼降火蜂房清熱軟堅散結解腸胃毒蜜專入脾肺兼入腸胃本花木精英春生露氣噓得釀而成生則性涼清發熟則性溫補中為至純至粹之味凡人五臟不足燥結不解營衛不調三焦失職心腹急痛肌肉瘡瘍咳嗽熱痢眼目眩花形色枯槁無不借其潤色以投如仲景治陽明燥結大便不解用蜜煎導乘熱納入穀道取其能通結燥而不傷脾胃也滋補藥俱用白蜜為丸取其和胃潤肺也至於赤蜜食之使人心煩以其味酸者故惟降火藥用之白蜜雖補脾肺然性涼質潤若脾氣不實腎氣虛滑及濕熱痰滯胸痞不寬者咸須忌之白如膏者良李時珍曰凡試蜜以燒紅火箸插入提出起氣是真起煙是偽用銀石器每蜜一斤入水四兩桑火慢熬掠去浮沫至滴水成珠用忌蔥鮮萵苣同食蜂房味苦鹹辛氣平有毒為清熱軟堅散結要藥是以驚癇蠱毒癰疽瘰癧痔痢風毒等症得此則除時珍曰蜂露房陽明藥也外科齒科及他病用之者亦皆取其以毒攻毒殺蟲之功耳以其辛能散結苦能泄熱咸能軟堅且取其氣類相從以毒攻毒之義也有同亂髮蛇皮三物合燒灰酒服治惡瘡附骨癰根在臟腑歷節腫出疔腫惡脈諸毒者又以煎水漱齒止風蟲疼痛洗乳癰蜂疔惡瘡者皆以取其攻毒散邪殺蟲之意並得陰露之寒及蛻脫之義耳但癰疽潰後禁用去外粗皮酒淨炒用平補精不足而以事味投補是虧已在於精而補不當用以平劑矣氣不足而以輕清投補是虧已在於氣而補亦不當用以平劑矣惟於補氣而於血有損補血而於氣有窒補上而於下有礙補下而於上有虧其症似虛非虛似實非實則不得不擇甘潤和平之劑以進如葳蕤人乳是補肺陰之至平者也山藥黃精羊肉豬肉甘草是補脾陰之至平者也柏子合歡皮阿膠是補心陰之至平者也冬青子桑寄生桑螵蛸狗脊是補肝腎陰之至平者也燕窩鴿肉鴨肉是補精氣之至平者也但阿膠人乳則令肝腎與肺而皆潤合歡則令脾陰五臟而皆安山藥則令肺腎而俱固桑螵蛸則能利水以交心至於倉米扁豆一能養胃以除煩一能舒脾以利脾皆為輕平最和之味余則兼苦兼辛兼淡平雖不失而氣味夾雜未可概作平補論耳葳蕤山草補肺陰止嗽兼祛風濕葳蕤專入肺兼入肝脾腎一名玉竹味甘性平質潤據書載能補肺陰及入肝脾腎以祛風濕與人參地黃稱為補劑上品如本經所論以治中風暴熱等病別錄所論以治心腹結氣虛熱腰痛莖中寒目痛眥爛淚出甄權所論以治內虛不足去虛癆客熱頭痛不安千金以治風溫自汗身重語言難出時珍以治寒瘧痁瘧不足皆以葳蕤為主並云可以當參其說未嘗不是但此氣平力薄既與人參力厚不若復與地黃味濃不合即使用至斤許未有奇功較之人參之補元地黃之滋陰不啻天淵矣矧可用此當參以挽垂絕之傾乎況書載云祛風除濕不無疏泄於補更云不及曷云可稱上劑耶肥白者良似黃精而差小黃白多須竹刀刮去皮節發散用生補劑用蜜水拌飯上蒸熟用黃精山草補脾陰黃精專入脾兼入肺腎書極稱羨謂其氣平味甘治能補中益五臟補脾胃潤心肺填精補助筋骨除風濕下三蟲且得坤土之精粹久服不飢其言極是時珍曰黃精受戊己之淳氣故為真黃宮之勝品土者萬物之母土得其養則水火既濟木金交合而諸邪自去百病不生矣但其所述逃婢一事云其服此能飛不無可疑究其黃精氣味止是入脾補陰若使挾有痰濕則食反更助痰況此未經火煅食則喉舌皆痹何至服能成仙若使事果屬實則人參更得天地中和之粹又曷云不克成仙耶細繹是情殊覺謊謬因並記之根紫花黃葉如竹葉者是俗名山生薑九蒸九曬用甘草山草緩中氣不足甘草專入脾味甘性平質中外赤肉黃生寒熟熱昔人言其有火能瀉是因火性急迫用此甘味以緩火勢且取生用性寒以瀉焚爍害耳至書有云炙用補脾是能緩其中氣不足調和諸藥不爭王好古曰五味之用苦泄辛散酸收咸斂甘上行而發而本草言甘草下氣何也蓋味甘主中有升降浮沉可上可下可外可內有和有緩有補有泄居中之道盡矣張仲景附子理中湯用甘草恐其僭上也調胃承氣湯用甘草恐其速下也皆緩之之意小柴胡湯有柴胡黃芩之寒人參半夏之溫而用甘草者則有調和之意建中湯用甘草以補中而緩脾急鳳髓丹用甘草以緩腎急而生元氣也乃甘補之意也故入和劑則補益入涼劑則瀉熱入汗劑則解肌入峻劑則緩正氣入潤劑則養血並能解諸藥毒頌曰按孫思邈千金方論云甘草解百藥毒如湯沃雪有中烏頭巴豆毒甘草入腹即定驗如反掌方稱大豆汁解百藥毒予每試之不效加入甘草為甘豆湯其驗乃奇也及兒胎毒以致尊為國老然使脾胃虛寒及或挾有水氣脹滿等症服此最屬不宜未可云其補脾而凡脾胃虛寒皆可得而服也若使滿屬虛致則甘又能瀉滿不可不知王好古曰甘者令人中滿中滿者勿食甘甘緩而壅氣非中滿所宜也凡不滿而用炙甘草為之補若中滿而用生甘草為之瀉能引甘藥直至滿所甘味入脾歸其所喜此升降浮沉之理也經云以甘補之以甘瀉之以甘緩之是矣梢止莖中澀痛氣行於下節消癰疽焮腫及除胸熱節行節處功各有宜但用宜取大而且結至書所載甘反大戟芫花甘遂又云亦有並用不悖惟深達精微者始可知之如古治痰癖有用十棗湯加甘草東垣治結核與海藻同用丹溪治癆瘵蓮心飲與芫花同用皆以反其下勢之銳桑寄生寓木補肝腎除風濕強筋骨桑寄生專入肝腎感桑精氣而生味苦而甘性平而和不寒不熱號為補腎補血要劑緣腎主骨發主血苦入腎腎得補則筋骨有力不致痿痹而痠痛矣甘補血血得補則發受其灌蔭而不枯脫落矣故凡內而腰痛筋骨篤疾胎墮外而金瘡肌膚風濕何一不藉此以為主治乎第出桑樹生者真須自採或連桑葉者乃可用和莖葉細銼陰乾忌火服則其效如神若雜樹所出性氣不同恐反有害柏子仁香木養心血柏子仁專入心辛甘平潤考書俱言四臟皆補究之止屬心藥耳蓋香雖能補脾而實可以通竅而入心潤雖可以補肝而益腎而實可以寧神而定智甘雖足以和胃而固中而實足以益血而神守是以風濕可除驚癇可療邪魅可闢皮膚可澤惟見神恬氣適耳聰目明而無枯槁燥澀之患矣然性多潤滑凡仁皆潤陰寒泄瀉者切忌氣多香泄體虛火盛者亦忌若云不飢不老延年輕身雖出經典仍當活視毋為書執蒸熟曝乾自裂入藥炒研去油用畏菊花冬青子灌木冬青子補肝強筋補腎健骨女貞子補腎水滑腸胃枸骨子補腰膝理失血冬青專入肝腎女貞枸骨載之本草已屬不同如冬青即今俗呼凍青樹者女貞即今俗呼蠟樹者枸骨即今俗呼貓兒刺者冬青女貞花繁子盛累累滿樹冬月鸛鵒喜食木肌皆白葉厚而柔長綠色面青背淡形色相似但女貞則葉長四五寸子黑色冬青則葉微團子紅色之為異耳今人不知女貞即屬蠟樹僅以女貞茂盛呼為冬青致令兩物同名枸骨樹若女貞肌白葉長青翠而厚葉有五刺子若冬青緋紅以致混將是物亦列女貞項下究之三物合論在冬青苦甘而涼諸書雖言補肝強筋補腎健骨簡集方冬至日取凍青樹子鹽酒浸一夜九蒸九曬瓶收每日空心酒吞七十粒臥時再服而補仍兼有清女貞氣味苦平按書稱為補虛上品可以滋水黑髮如古方之用旱蓮草桑椹子同入以治虛損然亦須審脾氣堅厚稍涉虛寒必致作泄枸骨氣味苦平按書有言能補腰膝及治勞傷失血用枸骨數斤去刺入紅棗二三斤熬膏蜜收亦是補水培精之味但性多陰不燥用以陰虛則宜而於陽虛有礙枝葉可以淋汁煎膏以塗白癜風脂亦可以為黐黏雀三藥氣味不同至就其子紅黑以推大約色紅則能入肝補血色黑則能入腎滋水色紅則能入血理血故於失血血瘀有效色黑則能補精化血故於烏須黑髮有功然色紅而潤其性陰兼有陽色黑而潤其性純陰不雜故書有言女貞補中安臟而又議其陰寒至極凡此似同而異在人平昔細為考覈免至臨岐亡羊耳冬日採佳酒浸蒸潤曬乾用合歡皮喬木補脾陰緩心氣合歡專入脾兼入心因何命名謂其服之臟腑安養令人歡欣怡悅故以歡名第此味甘氣平服之雖能入脾補陰朱震亨曰合歡屬土補陰之功長肌肉續筋骨概可見矣入心緩氣而令五臟安和神氣自暢及單用煎湯而治肺癰唾濁韋宙獨行方合阿膠煎湯而治肺痿吐血皆驗與白蠟熬膏而為長肉生肌續筋接骨之藥然氣緩力微用之非止錢許可以奏效故必重用久服方有補益怡悅心志之效矣若使急病而求治即歡悅其能之乎合歡即合昏木植於庭除干似梧桐枝甚柔弱葉似皂角極細繁密葉則夜合者是去粗皮炒用陳倉米造釀養胃除煩陳倉米專入胃兼入心脾即米多年陳積於倉而未用者也時珍曰廩米北人多用粟南人多用粳及秈並水浸蒸曬為之亦有火燒過治成者入倉陳久皆氣過色變故古人謂之紅粟紅腐陳陳相因也凡米存積未久則性仍舊未革煮汁則膠黏不爽食亦壅滯不消至於熱病將愈胃氣未復猶忌食物戀膈熱與食鬱而煩以生必得沖淡甘平以為調劑則胃乃適陳米津液既枯氣味亦變服此正能養胃除濕祛煩是以古人載此既有煮汁養胃之功復有祛濕除煩之力一切惡瘡百藥不效者用此作飯成團火煅存性麻油膩粉調敷可知沖淡和平力雖稍遜而功則大未可忽也若以無病之時而用此日為飽飯則又未見其有克合者矣山藥柔滑補脾陰山藥專入脾兼入肺腎本屬食物古人用入湯劑謂其補脾益氣氣益由於陰補非正說也除熱然究色白入肺味甘入脾氣雖溫而卻平為補脾肺之陰時珍曰按吳綬云山藥入手足太陰二經補其不足清其虛熱是以能潤皮毛長肌肉與面同食不能益人詵曰惟和麵作䬪飥則動氣為不能制面毒也不似黃耆性溫能補肺陽白朮苦燥能補脾陽也且其性澀汪昂曰性澀故治遣精泄瀉而諸傢俱未言澀能治遺精不禁味甘兼咸又能益腎強陰故六味地黃丸用此以佐地黃然性雖陰而滯不甚故能滲濕以止泄瀉生搗敷癰瘡消腫硬亦是補陰退熱之意至云補陽消腫補氣除滯理雖可通語涉牽混似非正說至入湯劑以治火虛危症難圖近功必多用之方愈以其秉性和緩故耳入滋陰藥中宜生用入補脾內宜炒黃用淮產色白而堅者良建產雖白不佳扁豆菽豆補脾除濕扁豆專入脾如何補脾蓋緣脾喜甘扁豆得味之甘故能於脾而有益也脾得香而能舒扁豆稟氣芬芳故能於脾而克舒也脾苦濕而喜燥扁豆得性之溫故能於脾而克燥也脾土既實則水道自通三焦不混而太陰暑濕之邪指太陰暑濕言自爾克消安能復藏於脾而有渴瀉之病乎但多食壅滯凡仁皆滯不可不知子粗圓色白者佳入藥連皮炒研用亦有浸去皮及生用者鴨肉水禽補虛除癆逐痰利水鴨肉專入脾胃兼入肺腎氣味甘溫逼火而生唼水而長未出卵時先得火氣故不憚冰雪偏喜淫雨而尾臎膻濁最甚故群雌一被其氣皆得化生之機不待鷀尾之遍也溫中補虛扶陽利水時珍曰鴨水禽也治水利小便宜用青頭雄鴨取水木發生之象是其本性此主性溫者而言也有言其性微冷能入肺腎血分滋陰補虛除癆止嗽化痰利水消腫為要葛可久治久虛發熱咳嗽吐痰咳血火乘金位者用黑嘴白鴨一隻取血入溫酒量飲使直入肺經以酒補之將鴨干撏去毛脅下開竅去腸拭淨入大棗肉二升參苓平胃散末一升縛定用沙甕一個置鴨在內以炭火慢煨將陳酒一瓶作三次入之酒干為度取起食鴨及棗頻作取愈服之陰虛亦不見燥陽虛亦不見冷非其性平烏能若是乎但雌則微溫而雄則微冷不可不辨若黑骨白毛者為虛癆聖藥亦金水相生之義耳老者良血解金銀丹石砒霜百毒及中惡溺死者卵甘鹹微寒能滋陰除心腹膈熱炒鹽藏食佳鴿肉原禽補精益氣兼除瘡疥鴿肉專入肺腎味鹹氣平性稟金水故能入腎入肺為久患虛羸要藥凡人肺腎受傷多緣精虧氣弱精愈損者則氣益祛氣愈祛者則精益虛精無氣不行氣無精不附服此味鹹溫平則精既見其有補而氣益見其有益也此為甘平溫咸之品其性不涼不燥故於治虛之外更能兼理瘡疥嘉祐凡一切皮膚惡瘡及瘢風瘰癧瘍風等症煮熟酒服無不咸宜並闢諸般藥毒誠虛癆患疥之良劑補精與氣之要藥也但鴿形色甚多時珍曰鴿性淫而易合故名惟白者最良卵能預解痘毒用白鴿卵一對入竹筒封置廁中半月以卵和辰砂三錢丸綠豆大每服三十丸三豆飲下毒從大小便出也屎亦能殺瘵蠱虛癆家咸多畜之阿膠畜入肝補血通潤心肺與腎阿膠專入肝兼入肺腎心味甘氣平質潤專入肝經養血何書又言除風化痰蓋以血因熱燥則風自生阿膠得阿井純陰之濟水又得純黑補陰之驢皮宗奭曰驢皮煎膠取其發散皮膚之外也用烏者取烏色屬水以制熱則生風之義如烏卵烏雞之類皆然氣味俱陰既入肝經養血復入腎經滋水水補而熱自制故風自爾不生藏器曰諸膠皆主風止泄補虛而驢皮主風為最又膠潤而不燥膠性既能潤肺復能趨下降濁使痰不至上逆耳至於痔漏腸風衄血血淋下痢痢因熱成暨經枯崩帶胎動癰腫治克有效亦是因血枯燥伏熱而成故能得滋而解此為血分養血潤燥養肺除熱要劑不似首烏功專入肝補血祛風烏須黑髮而於肺經潤燥定喘則未及鹿膠性專溫督與沖以益其血而於肺經清熱止嗽則未有龜膠力補至陰通達於任退熱除蒸而於陰中之陽未克有補古人云阿膠養神人參益氣正謂此也以黑光帶綠至夏不軟者良削炒成珠或麵炒蛤粉炒去痰蒲黃炒止血或酒化水化為用以山藥為使惡大黃牛膠功與阿膠相似陳自明云補虛用牛皮膠去風用驢皮膠時珍曰阿膠難得真牛皮膠亦可權用其性味皆平補宜於虛熱若鹿角膠則性味熱補非虛熱者所宜不可不詳辨也治能養血祛風然總不如阿膠養血治風之為最耳羊肉畜入脾補陰豐體澤膚羊肉專入脾氣味甘溫東垣載能補形此一句已盡羊肉大概矣復於十劑方中又云補可去弱人參羊肉之屬是明指參補氣而補形端在羊肉又何疑哉夫氣屬陽血屬陰體輕而燥者屬陽體重而潤者屬陰羊肉氣味雖溫然體潤肉肥其於肌膚血液則易及李杲曰凡味同羊肉者皆補血虛若使泥於書載壯陽補氣健力等說及以陽生陰長之理牽引混指其何以清眉目而別治用哉況據書載羊肝羊膽皆指屬寒而能明目以祛翳時珍曰肝開竅於目膽汁減則目暗目者肝之外候膽之精華也故諸膽皆治目病臘月取羯羊膽十餘枚以蜜裝滿紙套籠住懸檐下待霜出掃下點之神效名二百味草花膏以羊食百草蜂採百花也羊骨則止補骨燒灰擦牙則止固腎羊精羊𦚠則止潤膚澤肌羊血則止解砒霜諸毒外臺云凡服丹石人忌食羊血十年一食前功盡亡此物能制丹砂水銀輕粉生銀硼砂砒霜硫黃乳石鐘乳空青曾青雲母石陽起石孔公孽等毒羊乳則止潤燥消渴羊須則止敷疳療瘡而於氣血未有補豈有羊肉一味功專入肺補氣而於形血精液竟不補及者乎但其氣薄於血則雖口服甘肥而血不生血薄於氣則雖日服參耆而氣不長於此不可不知反半夏菖蒲忌銅器同蕎麥豆醬食發痼疾同醋食傷人心燕窩原禽補胃潤肺滋腎燕窩專入肺脾腎書中稱為食物上品及為補虛除癆之用考之本草不收方書罕用蓋謂此物由於鳥銜海粉作窩懸於石崖得陽和風日之氣而成者也海粉本屬寒咸得鳥銜於風高之處而為甘平洵可入肺生氣肺處至高之處入腎滋水鹹入腎入胃補中甘入脾胃俾其補不致燥潤不致滯而為藥中至平至美之味者也是以虛癆藥石難進咳吐紅痰每兼水糖煮食用此往往獲效義由於此然使火勢急迫則又當用至陰重劑以為拯救不可恃此輕淡以為扶衰救命之本而致委靡自失耳蠟卵生蜜蠟入胃絕痢入肝活血蟲蠟生肌活血蠟專入肝脾本有二一出於蜂蜜之滓而成即蜜凝結之粗者也其蠟有黃有白一出於樹之蠟其蠟由木之蟲而得故又名蟲白蠟白蠟有二二者氣味不同性亦微別如蜜蠟味淡性平其蠟本由蜜成蜜本潤物則蠟亦潤故能主潤臟腑經絡而有絕續補傷生肌之妙甄權治孕婦胎動下血不絕欲死以雞子大一枚煎三五沸投美酒半升立瘥蠟止存蜜粗粕其性最澀故又能止瀉絕痢仲景治痢有調氣飲千金治痢有膠蠟湯華佗治下痢食即吐用白蠟方寸匙雞子黃一枚石蜜同苦酒發灰黃連末各半雞子殼先煎蜜蠟苦酒雞子四味令勻乃納連末灰髮熬至可丸乃止二日服盡神效今人以情不投而曰嚼蠟即味淡之意也又凡蕩除下焦之藥以此裹丸亦其免傷上部之意蜜蠟之用如此至於蟲蠟系生蠟樹所產蠟樹屬金性最堅強蟲食其葉而成味甘氣溫按甘益血補中溫能通經活絡故書載能止痛生肌補虛絕續與桑螵蛸同有補虛之意可為外科聖藥是以鄭贊寰云汪御章尿血用白蠟加於涼血滋腎藥中遂愈又書云用此合合歡皮同入長肉膏中神效又治下疳服之未成即消已成即斂以半兩入鯽魚腹中煮食治腸紅神效則知蟲蠟亦皆生肌活血之味但蜜蠟味甘淡澀微溫蟲蠟則味甘不淡而溫也蜜蠟因有澀性可以止瀉治痢蟲蠟澀性差減而痢則鮮用也蜜蠟本於蜂蜜之氣僅得甘之餘氣而成而所主在胃蟲蠟得樹收斂堅強之氣而所治專在筋肉骨血也二者微似之中恍惚之際不可不知補火按李時珍云命門為藏精系胞之物其體非脂非肉白膜裹之在脊骨第七節兩腎中此火下通二腎上通心肺貫腦為生命之源相火之主精氣之府人物皆有生人生物俱由此出又按汪昂謂人無此火則神機滅息生氣消亡趙養葵謂火可以水折惟水中之火不可以水折故必擇其同氣招引歸宇則火始不上浮而下降矣此火之所由補也第世止知附桂為補火之最硫黃為火之精越外毫不計及更不知其附桂因何相需必用詎知火衰氣寒而厥則必用以附子火衰血寒腹痛則必用以肉桂火衰寒結不解則必用以硫黃火衰冷痹精遺則必用以仙茅火衰疝瘕偏墜則必用以胡巴火衰氣逆不歸則必用以沉香火衰腎泄不固則必用以補骨脂火衰陽痿血瘀則必用以陽起石火衰風冷麻痹則必用以淫羊藿火衰風濕瘡癢則必用以蛇床子火衰臟寒蠱生則必用以川椒火衰氣逆呃起則必用以丁香火衰精涎不攝則必用以益智至於陽不通督須用鹿茸以補之火不交心須用遠志以通之水竅不開須用鐘乳石以利之氣虛喘乏須用蛤蚧以御之精滑不禁須用阿芙蓉以澀之皆當隨症酌與不可概用若使水火併衰及或氣陷不固陰精獨脫尤當切禁否則禍人反掌附子毒草補命火逐冷厥附子專入命門味辛大熱純陽有毒其性走而不守好古曰其性走而不守非若乾薑止而不行通行十二經無所不至為補先天命門真火第一要劑凡一切沉寒痼冷之症用此無不奏效吳綬曰附子乃陰症要藥凡傷寒傳變三陰及中寒夾陰雖身大熱而脈沉者必用之或厥冷腹痛脈沉細甚則唇青囊縮者急須用之有退陰回陽之力起死回生之功近世陰症傷寒往往疑似不敢用附子直待陰極陽竭而用之已遲矣且夾陰傷寒內外皆陰陽氣頓衰必須急用人參以益其原佐以附子溫經散寒舍此不用將何以救之故書皆載能治寒毒厥逆書曰陰陽不相順接謂之厥又曰厥者盡也逆者亂也即血氣敗亂之謂也凡厥有陽有陰但察傷寒初起頭痛發熱惡寒後則四肢厥冷乍溫大便燥實譫語發渴揚手擲足不惡寒但惡熱脈來沉滑而數重按有力是為陽厥宜用承氣白虎等湯以治若初起並無身熱頭痛便惡寒四肢厥逆直過肘膝不溫唇與爪甲青黑欲引衣倦臥二便清利不渴或腹痛泄利清穀或凜凜面如刀刮或口吐涎沫或乾嘔呃逆脈來沉細無力方謂陰厥宜用附子理中湯四逆湯以治呃逆嘔噦寒呃症不一端有誤服寒涼水飲停心而致氣逆而呃有陽氣衰微內寒迫其相火上衝而呃有偶食生冷陽氣不得舒發而呃有陰寒直中於胃而致氣不克舒而呃有吐利後胃氣虛寒而呃者經曰病深者必發噦屬於胃中虛寒者居多膈噎脾泄食至喉即返是槁在於吸間厭會其症謂噎食下胃脘須臾吐出是槁在於賁門胃之上口其症謂膈食下良久吐出是槁在於幽門胃之下口其症謂之反胃歷考諸書皆以噎膈為有火反胃為無火而士材又謂但察脈大有力嘔吐酸臭當作熱治脈小無力嘔吐清水當作寒醫色之黃白而枯者為虛寒色之紅赤而澤者為實熱能合色脈庶乎無誤汪昂云脾泄命火不足冷痢寒瀉霍亂轉筋拘攣風痹癥瘕積聚督脈為病脊強而厥小兒慢驚痘瘡灰白癰疽不斂皆屬於寒者其入補氣藥中則追失散之元陽入發散藥中則能開腠理以逐在表之風寒入溫暖藥內則能以祛在裡之寒濕虞摶獨書所云入補血藥則能以滋不足之真陰緣陰與陽相為依附補陽即所以滋陰若使水虧火盛用以辛熱純陽不更使火益盛而水益虧乎好古曰非身涼而四肢厥逆者不可僭用服附子以補火必防涸水故崔氏八味丸中用此以為補陰嚮導使陰從陽復然丹溪謂其雄悍無補而且殺人其言似謬荊府都昌王體瘦而冷無他病日以附子煎湯飲兼嚼硫黃如此數歲靳州衛張百戶平生服鹿茸附子藥至八十歲康健倍常宋張杲醫說載趙知府耽酒色每日煎乾姜熟附湯吞硫黃金液丹百粒乃能健啖否則倦弱不支壽至九十他人服一粒即為害若此數人者皆其臟腑稟賦之偏服之有益無害不可以常理概論也但陰極似陽服之不宜熱投時珍曰陰寒在下虛陽上浮治之以寒則陰氣益甚而病增治之以熱則拒格而不納熱藥冷飲下咽之後冷體既消熱性便發而病氣隨愈不違其情而致火益此反治之妙也發散附子須生如四逆湯生附配乾薑之類用補附子宜熟如仲景麻黃附子細辛湯熟附配麻黃之類以西川彰明赤水產者為最皮黑體圓底平八角重三兩者良水浸麵裹煨令發拆乘熱切片反半夏烏頭即附子之母性輕逐風不似附子性重逐寒烏附尖能吐風痰以治癲癇取其直達病所常山吐瘧痰積飲在於心下瓜蒂吐熱痰在膈木鱉子引吐熱毒從痰外出萊菔子吐氣痰在膈參蘆吐虛痰烏附尖藜蘆吐風痰天雄細長獨夥無附其身大於附子其尖向下能補下焦命門陽虛然辛熱走竄止屬主治風寒濕痹之品側子連生附側宜於發散四肢故治手足風濕諸痹其功皆與附子補散差殊畏人參黃耆甘草防風犀角綠豆童便反貝母半夏栝蔞白芨白薟中其毒者黃連犀角甘草節煎湯解黃土水亦解仙茅山草補火散寒除痹暖精仙茅專入命門辛熱微毒據書皆載功專補火助陽暖精凡下元虛弱陽衰精冷失溺無子並腹冷不食冷痹不行靡不服之有效以其精為火宅火衰則精與血皆衰而精自爾厥逆不溫溺亦自爾失候不禁矣此與附桂硫黃胡巴破故紙淫羊藿蛇床子遠志同為一例但附子則能以除火衰寒厥肉桂則能以通血分寒滯胡巴則能以除火衰寒疝淫羊藿則能以除火衰風冷蛇床子則能以祛火衰寒濕硫黃則能以除火衰寒結破故紙則能以理火衰腎瀉遠志則能以除火衰怔忡雖其所補則同而效各有攸建未可云其補火而不分其主治於其中也故凡火衰病見用之不離附桂余則視症酌增然亦須視稟賦素怯則宜沈括筆談云夏文莊公稟賦異於人但睡則身冷如逝者既覺須令人溫之良久乃能動常服仙茅鍾乳硫黃莫知紀極此稟賦素怯則宜若相火熾盛服之反能動火為害叵測張果老說云一人中仙茅毒舌脹出口漸大與肩齊因以小刀剺之隨破隨合剺至百數始有血一點出曰可救矣煮大黃朴硝服之無害也然川產者少偽充者多不可不辨以竹刀刮切糯米泔浸去赤汁酒拌濕蒸勿犯鐵器胡巴隰草補火逐冷除疝胡蘆巴專入命門苦溫純陽亦能入腎補命故書載暖丹田壯元陽治腎臟虛冷並疝瘕冷氣小腸偏墜寒濕腳氣時珍曰胡蘆巴右腎命門藥也元陽不足冷氣潛伏不能歸元者宜之宋惠民和劑局方有胡蘆巴丸治大人小兒小腸奔豚偏墜及小腹有形如卵上下走痛不可忍者用胡蘆巴八錢茴香六錢巴戟去心川烏頭炮去皮各二錢楝實去核四錢吳茱萸五錢並炒為末酒糊丸梧子大每服十五丸鹽酒下功與仙茅附子硫黃恍惚相似然其力則終遜於附子硫黃故補火仍須兼以附硫茴香吳茱萸等藥同投方能有效系海外胡蘿子四聲音相近故名酒浸曝乾炒用淫羊藿山草補火逐冷散風淫羊藿專入命門兼入肝腎辛香甘溫諸書皆載能治男子絕陽不興女子絕陰不產且能治冷風勞氣四肢麻木不仁腰膝無力時珍曰淫羊藿味甘氣香性溫不寒能益精氣乃手足陽明三焦命門藥也真陽不足者宜之蓋因氣味甘溫則能補火助陽兼有辛香則冷可除而風可散耳至云久服無子恐其陽旺多欲精氣耗散無他故也弘景曰淫羊一日百合蓋食此藿所致去枝羊脂拌炒山藥為使得酒良蛇床子芳草補火燥濕宣風蛇床子專入命門辛苦性溫功能入腎補命祛風燥濕故凡命門火衰而致風濕內淫病見陰痿蛇床子五味子菟絲子等分為末蜜丸酒下囊濕及女子陰戶蟲蝕蛇床子一兩白礬二錢煎湯頻洗子臟虛寒取蛇床子仁為末入白粉少許和勻如棗綿裹納之產門不開暨腰痠體痹帶下脫肛脫肛以蛇床子甘草為末服並以蛇床末敷與夫一切風濕瘡疥等病蛇床子一兩輕粉四錢為細末油調抹服之則陽莖舉關節利腰背強手足遂瘡疥掃至於大瘋身癢難當作湯浴洗產後陰脫不收用此絹袋熨收但性溫燥凡命門火熾及下部有熱者切忌惡丹皮貝母巴豆去皮殼取仁微炒遠志山草補火通心遠志專入腎辛甘而溫入足少陰腎經氣分強志益精凡夢遺善忘喉痹失音小便赤澀因於腎水衰薄而致者宜用是藥以補蓋精與志皆藏於腎腎氣充則九竅利智慧生耳目聰明邪氣不能為害腎氣不足則志氣衰不能上通於心故迷惑善忘時珍曰遠志入足少陰腎經非心經藥也其功專於強志益精治善忘蓋精與志皆腎經之所藏也腎精不足則志氣衰不能上通於心故迷惑善忘不能蟄閉封藏故精氣不固也昔人治喉痹失音作痛火衰喉痹遠志末吹之涎出為度非取其通腎氣而開竅乎一切癰疽背發從七情憂鬱而得單煎酒服其渣外敷投之皆愈非苦以泄之辛以散之之意乎小便赤濁用遠志甘草茯神益智為丸棗湯服效非取遠志歸陰以為嚮導之藥乎但一切陰虛火旺便濁遺精喉痹癰腫慎勿妄用去心用甘草水浸一宿曝乾焙乾用斆曰凡使須去心否則令人煩悶苗名小草亦能利竅兼散少陰風氣之結也畏珍珠藜蘆得茯苓龍骨良肉桂香木補命火除血分寒滯肉桂專入命門肝氣味純陽辛甘大熱直透肝腎血分大補命門相火相火即兩腎中之真火先天之脾氣也人非此火不能有生故水穀入胃全在此為蒸腐益陽治陰趙養葵云益火之原以消陰翳八味地黃丸是也凡沉寒痼冷營衛風寒陽虛自汗腹中冷痛咳逆結氣脾虛惡食濕盛泄瀉時珍治寒痹風濕陰盛失血瀉痢驚癇皆取辛溫散結之力也古方治小兒驚癇及泄痢病宜五苓散以瀉丙火滲土濕內有桂抑肝風而扶脾土引利水藥入膀胱也血脈不通死胎不下肉桂辛散能通子宮而破血調經目赤腫痛因寒因滯而得者用此治無不效蓋因氣味甘辛其色紫赤有鼓舞血氣之能性體純陽有招導引誘之力昔人云此體氣輕揚既能峻補命門復能竄上達表以通營衛的解非若附子氣味雖辛復兼微苦自上達下止固真陽而不兼入後天之用耳故凡病患寒逆既宜溫中及因氣血不和欲其鼓舞痘瘡不起必用則不必用附子惟以峻補血氣之內加以肉桂以為佐使如十全大補人參養營之類用此即是此意今人勿細體會徒以附桂均屬辛溫任意妄投不細明別豈衛生救本辨藥者所應爾爾歟但精虧血少肝盛火起者切忌桂出嶺南色紫肉厚體松皮嫩辛甘者佳得人參良忌生蔥石脂銼入藥勿見火沉香香木補火降氣歸腎沉香專入命門兼入脾辛苦性溫體重色黑落水不浮故書載能下氣墜痰氣香能散故書載能入脾調中色黑體陽故書載能補火暖精壯陽是以心腹疼痛噤口毒痢症癖邪惡冷風麻痹氣痢氣淋冷字氣字宜審審其病因屬虛屬寒俱可用此調治蓋此溫而不燥行而不泄同藿香香附則治諸虛寒熱並婦人強忍入房或過忍尿以致胞轉不通同丁香肉桂則治胃虛呃逆同紫蘇白豆蔻則治胃冷嘔吐同茯苓人參則治心神不足同川椒肉桂則治命門火衰同肉蓯蓉麻仁則治大腸虛秘古方四磨飲沉香化氣丸滾痰丸用之取其降泄也沉香降氣散用之取其散結導氣也黑錫丸用之取其納氣歸元也但降多升少氣虛下陷者切忌色黑中實沉水者良斆曰沉於水下者為上半沉者次之不可見火香甜者性平辛辣者熱入湯劑磨汁用入丸散紙裹置懷中待燥碾之忌火硫黃石石硫黃大補命門相火兼通寒閉不解石硫黃專入命門玄壽先生曰硫是礬之液礬是鐵之精磁石是鐵之母故鐵砂磁石制入硫黃立成紫粉味酸有毒權曰有大毒以黑錫湯解之大熱純陽號為火精時珍曰凡產石硫黃處必有溫泉作硫黃氣蓋人一身全賴命門真火周布始能上貫心肝以主雲雨中及脾胃以蒸水穀下司開閣以送二便旁達四肢以應動作李時珍曰命門為藏精系胞之物其體非脂非肉白膜裹之在脊骨第七節兩腎中央繫著於脊下通二腎上通心肺貫腦為生命之源相火之主精氣之府人物皆有之生人生物皆由此出即經所謂七節之旁中有小心是也以相能代心君行事故曰小心也此火既衰陽微陰盛內寒先生外寒後中厥氣逆胸旁及於胃胃為腎關外寒斬關直入由是無熱惡寒手足厥逆二便凝結醫以朴硝攻下豬澤滲利則二便不通而凝結益甚是猶層冰不解非不補火消陰疏陽通胃則寒莫去而結莫消書云命門火衰服附桂不能補者須服硫黃補之按硫黃純陽與大黃一寒一熱並號將軍凡陽氣暴絕陰毒傷寒久患寒瀉脾胃虛寒命欲垂盡者須用此主之又治老人一切風秘冷秘氣秘熱藥多秘唯硫黃暖而能通寒藥多泄惟黃連肥腸而止瀉為補虛助陽聖藥且能外殺瘡疥一切蟲蠱惡毒並小兒慢驚婦人陰蝕皆能有效但必製造得宜始可以服余用法制另詳雜症求真方內凡遇一切虛癆中寒冷痢冷痛四肢厥逆並面赤戴陽六脈無力或細數無倫煩燥欲臥井中口苦咽乾漱水而不欲咽審屬虛火上浮陽被陰格者服無不效王好古曰如太白丹來復丹皆用硫黃佐以硝石至陽佐以至陰與仲景白通湯佐以人尿豬膽汁大意相同所以治內傷生冷外冒暑熱霍亂諸病能去格拒之寒兼有伏陽不得不爾如無伏陽只是陰虛更不必以陰藥佐之今人不曉病機一見秘結不解不分寒熱輒用承氣以投詎知寒熱不同冰炭迥異用之無益適以致害可不慎歟但火極似水症見寒厥不細審認輒作寒治遽用此藥其害匪淺孫升談圃云硫黃神仙藥也每歲三伏日餌百粒去臟腑積滯有驗但硫黃伏生於石下陽氣溶液凝結而就其性大熱火煉服之多發背疽方勺泊宅編云金液丹乃硫黃煉成純陽之物有痼冷者所宜今夏至人多服之反為大患韓退之作文戒服食而晚年服硫黃而死可不戒乎夏英公有冷病服鍾乳硫黃莫之紀極竟以壽終此其稟受與人異也番舶色黃堅如石者良土硫黃辛熱腥臭止可入瘡藥不可服餌硫黃用大腸煮制其法不佳陽起石石補火逐寒宣淤起陽陽起石專入命門即雲母根也雖大雪遍境此山獨無稟純陽之氣以生味鹹氣溫無毒能補命門相火凡因火衰寒氣內停宿血留滯而見陰痿精滑子宮虛冷腰膝冷痹水腫癥瘕服此即能有效以其性稟純陽者故耳是以育龜丸用此以為嗣續宗祧之基陽起石合石龍子蛤蚧生犀角生附子草烏頭乳香沒藥血竭細辛黑芝麻五倍子為末生鱔魚血為丸硃砂為衣每日空心酒下百丸不可以房術論也功雖類於硫黃但硫黃太熱號為火精此則其力稍遜而於陽之不能起者克起陽起之號於是而名出齊州雲頭雨腳鷺鷀毛色白滋潤者良火煅醋淬七次研粉水飛用宗奭曰石藥冷熱皆有毒亦宜斟酌桑螵蛸為使惡澤瀉菌桂雷丸石葵蛇皮畏菟絲忌羊血不入湯劑石鐘乳石鎮陽歸陰通竅利乳石鐘乳專入胃大腸即鵝管石者是也味辛而甘氣溫質重故凡咳氣上逆腳弱冷痛虛滑遺精陽事不舉者服此立能有效以其氣不歸元墜堅鎮虛得此火不上浮氣不下脫而病俱可以愈耳且以辛溫之力又兼色白故能通竅利乳昔人取名鍾乳即是此意但金石性悍服之陽氣暴充形體壯盛飲食倍進得此肆淫則精竭火爍發為癰疽淋濁害不勝言即古有焚香透膈散用雄黃佛耳草款冬花安置香爐以煙吹入人喉以治胸膈勞嗽痞滿之病然暫用則可久用恐損人氣出洞穴中石液凝成下垂如冰柱通中輕薄如鵝鴒管碎之如爪甲光明者真煉合各如本方蛇床為使惡牡丹畏紫石英忌參朮羊血蔥蒜胡荽鹿茸獸鹿茸溫補真陽以通督井麋茸溫補腎水以助血鹿茸專入命門督兼入肝甘鹹氣溫稟純陽之質含發生之氣號為山獸性淫而遊山夏至得陰氣而角解陰生陽退之象也至於大於鹿者為麋麋是澤獸居陰性淫而遊澤冬至得陽氣而角解陽生陰退之象也陰陽相反如斯故鹿氣味純陽其茸能於右腎補其精氣不足大為補精暖血之劑是以書載能補髓養血強筋健骨凡腰腎虛冷遺精崩帶等症服皆有效麋雖屬陰而茸又屬陰中之陽故能入於左腎補其血液不足且諸茸皆發督脈之背鹿鼻常反向尾能通督脈其華在角取以補命門補精補氣皆以養陽也督為腎臟外垣外垣既固腎氣內充命門相火不致妄動血氣精津得以凝聚故鹿茸又云能補督脈之真陽麋茸能補督脈陰中之陽不可不細為明辨耳但鹿茸與麋世罕能辨大抵其質粗壯腦骨堅厚毛色蒼黧而雜白毛者則為麋茸形質差瘦腦骨差薄毛色黃澤而兼白毛者則為鹿茸麋鹿雖分有二然總不外填補精髓堅強筋骨長養氣血而為補肝滋腎之要藥也鹿一牡常御百牝是腎氣有餘而足於精者也故有助陽扶陰之妙鹿角初生長二三寸分岐如鞍紅如瑪瑙破之如朽木者良酥塗微炙用茸有小白蟲視之不見鼻嗅恐蟲入鼻鰕無鱗魚補火助風動氣鰕專入心肝肺味最甘席品所尚然性善跳躍風火易動是以書載小兒切勿妄食恐其發瘡動氣也陰虛火動者尤忌以其性易涸陰也惟乳汁不下及風痰不吐與製藥壯陽為差宜耳時珍曰同豬肉食令人多唾海馬種亦鰕屬雌雄勿離首類馬身似鰕浮於水面亦主下胎催產及佐房術之用也蛤蚧龍補命門相火溫肺氣喘乏蛤蚧專入命門兼入肺絕與蛤蜊不類生於廣南身長七八寸首如蟾蜍背綠色斑頭圓肉滿鱗小而厚鳴則上下相呼雌雄相應情洽乃交兩相抱負自墜於地往捕劈之至死不開大助命門相火故書載為房術要藥且色白入肺功兼人參羊肉之用故用能治虛損痿弱消渴喘嗽肺痿吐沫等症專取交合肺腎諸氣入藥去頭留尾酥炙口含少許雖疾走而氣不喘則知益氣之功為莫大焉但市多以龍子混冒舉世亦不深辨如龍子則剖開而身多赤斑皮專助陽火雖治陽痿性少止澀蛤蚧則纏束多對通身白鱗兼溫肺氣故肺虛喘乏最宜外感喘嗽勿用其藥不論牝牡皆可即非相抱時捕之功用亦同但其藥力在尾見人捕之輒自斷尾尾不全者不效去頭足因毒在眼須去其頭洗去鱗內不淨乃肉毛酥炙或蜜炙或酒浸焙用雄蠶蛾卵生入腎補火益精雄蠶蛾專入命門即二蠶所出之雄者也味鹹性溫其性最淫出繭便媾諸書皆載能起陰痿益精強志敏於生育交接不倦並敷諸瘡滅瘢止尿血暖腎蓋取其性淫助陽鹹溫入腎之功耳是以千金方治丈夫陰痿不起用此一夜每服一丸以蠶蛾二升去翅足微火灼黃為末蜜丸如梧桐子大酒下以菖蒲止之但此止為陽痿求嗣而見若使陰虛火盛而用此為淫戲之術則陰愈竭而火益盛欲不速斃其可得乎故古補方多不具載恐人藉此以為斫喪之具也取未交雄者佳蠶退紙燒灰可敷走馬牙瘡蠶退紙灰入麝和蜜敷走馬牙疳加白礬妙並治邪祟發狂悲泣滋水馮楚瞻曰天一生水故腎為萬物之源乃人身之寶也奈人自伐其源則本不固而勞熱作矣熱則精血枯竭憔悴羸弱腰痛足酸自汗盜汗發熱咳嗽頭暈目眩耳鳴耳聾遺精便血消渴淋瀝失音喉瘡舌燥等症靡不因是悉形非不滋水鎮火無以制其炎爍之勢繡按滋水之藥品類甚多然終不若地黃為正蓋地黃性溫而潤色黑體沉可以入腎滋陰以救先天之精至於氣味稍寒能佐地黃以除骨蒸痞瘧之症者則有龜板龜膠膠則較板而更勝矣佐地黃補肌澤膚以除枯竭之症者則有人乳豬肉肉則較乳而有別矣佐地黃以通便燥之症者則有火麻胡麻胡麻則較火麻而益血矣至於水虧而目不明則須佐以枸杞水虧而水不利胎不下則有佐於冬葵子榆白皮水虧而風濕不除則有佐於桑寄生水虧而心腎不交則有佐於桑螵蛸龜板水虧而陰痿不起則有佐於楮實水虧而筋骨不健則有佐於冬青子水虧而精氣不足則有佐於燕窩水虧而血熱吐衄則有佐於乾地水虧而堅不軟則有佐於食鹽水虧而虛怯不鎮則有佐於磁石水虧而氣不收及血不行則有佐於牛膝水虧而噎隔不食則有治於黑鉛但黑鉛為水之精凡服地黃而不得補者須用黑鉛鎮壓俾水退歸北位則於水有補然必火勝水涸方敢用此以為佐若使水火併衰則又當佐性溫以暖腎臟否則害人不輕乾地黃隰草涼血滋陰乾地黃即生地黃之乾者也專入腎併入心脾味苦而甘性陰而寒考諸長洲張璐謂其心紫入心中黃入脾皮黑歸腎味厚氣薄內專涼血滋陰外潤皮膚索澤病人虛而有熱者咸宜用之無熱須用熟地戴原禮曰陰微陽盛相火熾強來乘陰位日漸煎熬陰虛火旺之症宜地黃以滋陰退陽同人參茯苓石蜜名瓊玉膏治虛勞咳嗽唾血專補肺陰同天麥門冬熟地人參名固本丸治老人精血枯槁兼固腎本於固本丸中加枸杞煎膏名集靈膏治虛羸喘咳乏力諸臟兼固其瓊玉膏須用鮮者搗汁桑火熬膏散中寓止與乾者無異固本丸集靈膏並用乾者而集靈變丸作膏較之固本差勝易簡方曰男子多陰虛宜熟地黃女子多血熱宜生地黃因人酌施虞摶云生地黃涼血而胃氣弱者恐妨食熟地黃補血而痰飲多者恐泥膈妨食泥膈兩症最宜計較何後人臨症全不於此問及或言生地黃酒炒則不妨胃熟地黃薑製則不泥膈然須詳病人元氣病氣之淺深而用之治病須明臟氣為要若產後惡食泄瀉小腹結痛虛勞脾胃薄弱大便不實胸腹多痰氣道不利升降窒塞者咸須遠之以其有損胃氣故耳浙產者專於涼血潤燥病人元氣本虧因熱邪閉結而舌乾焦黑大小便秘不勝攻下者用此於清熱藥中通其秘結最佳以其有潤燥之功而無滋潤之患也愚按本經地黃雖列上品而實性稟陰柔與鄉愿不異譬諸宵人內藏隱隙外示優容描畫陰藥形勢殆盡是以舉世名家靡不藉為滋陰上品止血神丹歷今弊仍不改雖或用非其宜得以稍清旺氣服之仍得暫安非若人參之性稟陽明象類君子有過必知陽藥性劣於病不合便知是以師家斂手不敢用病家緘口不敢嘗故寧用以地黃門冬陰柔最甚之屬以至於死不覺用陰藥殺人人多不覺故寧以陰為主張璐所論如此然非深究病情通達世故洞悉藥品亦安有討論而如斯乎生於江浙者陽氣力微生於北方者純陰力大生於懷慶肥大菊花心者良酒製則上行外行薑製則不泥膈惡貝母畏蕪荑忌萊菔蔥蒜銅鐵器得酒門冬丹皮當歸良冬葵子隰草冬葵子潤燥利竅滑胎冬葵子專入胃大小腸甘寒淡滑潤燥利竅通營活衛消腫利水凡婦人難產不下專取一味炒香為末芎歸湯下三錢則易生芎歸力專行血取其晨夕向日轉動靈活耳婦人乳房脹痛同砂仁等分為末熱酒服三錢其腫即消砂仁溫胃消脹且能破五腫利小便並臟腑寒熱羸瘦同榆皮等分煎服亦效十劑方云滑可去著冬葵子榆白皮之屬是也故澀則去著宜滑劑以利之經冬至春作子者名冬葵子春葵子亦滑不堪入藥蜀葵赤者治血燥白者治氣燥亦治血淋皆取其寒潤滑利之功川牛膝隰草引入下部經絡血分牛膝專入肝腎苦酸而平按據諸書雖載酒蒸溫補肝腎強健筋骨凡足痿筋攣陰痿失溺久瘧下痢傷中少氣治皆有效又載生用則能活血破瘀消腫治痛通淋引藥下行淋屬熱至其莖痛不可忍手按熱如火爍血出鮮紅不黯淋出如砂如石臍下妨悶煩燥熱渴六脈沉數有力淋屬虛致其莖多不見痛即痛或喜手按或於溺後才痛稍久則止或登廁小便澀痛大便牽痛面色痿黃飲食少思語言懶怯六脈虛浮無力淋屬虛實兼致其莖或見痛極六脈弦數而按不甚有力飲食少思而神不見昏倦溺即滴點不斷而出則無砂石膏血脈即虛軟無力而血反見鮮潤腹即脹硬不消而氣短結牛膝雖淋症要藥然亦須審虛實權衡不可盡以牛膝治也然味薄氣厚性沉炙滑用於下部經絡血分舒氣則可若使肺分氣薄遺脫泄瀉則又當知忌戒不可因其氣虛而概用之時珍曰牛膝乃足厥陰少陰所主之病大抵得酒則能補肝腎生用則能去惡血二者而已其治腰膝骨痛足痿陰消失溺久瘧傷中少氣諸病非取其補肝腎之功歟其治癥瘕心腹諸痛癰腫惡瘡金瘡折傷喉齒淋痛尿血經候胎產諸病非取其去惡血之功歟出於川者性味形質雖與續斷相似服之可無精滑之弊然肝主司疏泄腎主閉藏此則疏泄獨具而鮮固蟄書云益腎殊覺未是杜牛膝氣味更涼嚼之味甘而不苦主治多是解毒破血瀉熱吐痰如溺閉症見氣喘面赤有斑用杜牛膝濃煎膏飲下血一桶小便通而愈又不省人事絞汁入好酒灌之即蘇以醋拌渣敷項下驚風痰瘧服汁能吐痰涎喉痹用杜牛膝搗汁和米醋半盞用雞翅毛蘸攪喉中以通其氣較之川牛膝微覺有別牛膝出西川及懷慶府長大肥潤者良下行生用入滋補藥酒蒸惡龜甲畏白前忌牛肉枸杞灌木滋腎水滑腸胃枸杞專入腎兼入肝甘寒性潤據書皆載祛風明目強筋健骨補精壯陽然究因於腎水虧損服此甘潤陰從陽長水至風熄故能明目強筋是明指為滋水之味故書又載能治消渴時珍曰子則甘平而潤性滋而補不能退熱止能補腎潤肺生精益氣此乃平補之藥所謂精不足者補之以味也今人因見色赤妄謂枸杞補陽其失遠矣豈有甘潤氣寒之品而尚可言補陽耶若以色赤為補陽則紅花紫草其色更赤何以不言補陽而曰活血嗚呼醫道不明總由看書辨藥不細體會者故耳試以虛寒服此不惟陽不能補且更見有滑脫泄瀉之弊矣可不慎歟出甘州紅潤少核者良根名地骨皮另詳於後楮實灌木滋腎陰過服骨痿楮實專入腎書言味甘氣寒雖於諸臟陰血有補得此顏色潤筋骨壯腰膝健肌肉充水腫消以致陰痿起陽氣助是明指其陽旺陰弱得此陰血有補故能使陽不勝而助非雲陽痿由於陽衰得此可以助陽也若以純陰之品可以補陽則於理甚不合矣況書又云骨鯁可用楮實煎湯以服及紙燒灰存性調服以治血崩血暈脾胃虛人禁用久服令人骨痿豈非性屬陰寒虛則受其益過則增其害之意乎軟骨之說未嘗不是取浸水中不浮者酒蒸用榆白皮喬木潤燥利竅滑腸赤榆皮榆白皮專入胃大小腸與冬葵子性皆滑利味亦相同故五淋腫滿及胎產不下皆宜服此以治詵曰高昌人多搗白皮為末和菜菹食甚美令人能食仙家長服服丹石人亦服之取利關節故也但榆有二種曰赤曰白白榆皮服能止喘除咳而使人睡較之赤榆皮之除邪氣稍有不同然其滑利則一若脾胃虛寒服之恐損真耳李時珍曰本經所謂久服輕身不飢蘇頌所謂榆粉多食不損人者恐非確論也胡麻麻麥稻潤燥滑腸去風解毒胡麻本經名巨勝子千金名烏麻子即黑芝麻專入脾肺兼入肝腎本屬潤品故書載能填精益髓又屬味甘故書載能補血暖脾耐飢抱朴子云用上黨胡麻三斗淘淨甑蒸令氣遍日乾以水淘去沫再蒸如此九度以湯脫去皮洗淨炒香為末白蜜棗膏為丸服之能令不飢凡因血枯而見二便艱澀鬚髮不烏風濕內乘發為瘡疥千金方用烏麻丸九蒸九曬研末棗膏為丸服之能令白髮反黑聖惠方熱淋莖痛用烏麻子蔓荊子各五合炒黃緋袋盛以井花水三升每食煎服一錢河間曰胡麻入肝益血風藥中不可闕並小兒痘疹變黑歸腎錢氏用赤芝麻湯送百祥丸見有燥象者宜以甘緩滑利之味以投若使下元不固而見便溏陽痿精滑白帶皆所忌用麻油甘寒滑胎利腸凡胞衣不下用蜜同煎溫服暨血熱癰腫惡瘡癬疥用此煎膏以治涼血解毒止痛生肌皮肉俱黑者良時珍曰胡麻取油以白者為勝服食以黑者為良胡地者尤妙取其黑色入通於腎而能潤燥也赤者狀如老茄子殼厚油少但所食爾不堪入藥出於胡種大宛者尤佳火麻仁麻麥稻潤燥滑腸火麻仁專入脾胃大腸即今作布火麻之麻所產之子也與胡麻之麻絕不相似味甘性平按書皆載緩脾利腸潤燥如傷寒陽明胃熱汗多便閉治多用此蓋以胃府燥結非此不解汪昂曰胃熱汗多便難三者皆燥也汗出愈多則津枯而大便愈燥仲景治脾約有麻仁丸成無己曰脾欲緩急食甘以緩之麻仁之甘以緩脾潤燥張子和曰諸燥皆三陽病更能止渴通乳及婦人難產老人血虛產後便秘最宜弘景曰麻子中仁合丸藥並釀酒大善但性滑利許學士云產後汗多則大便秘難於用藥惟麻子粥最穩不惟產後可服凡老人諸虛風秘皆得力也至云初服作瀉其說固是久服能令肥健有補中益氣之功亦是燥除血補而氣自益之意若云寬能益氣則又滋人岐惑矣但性生走熟守生用破血利小便搗汁治產難胎衣不下熟用治崩中不止入藥微炒研用入丸湯泡去殼取帛包煮沸湯中浸至冷出之垂井中一夜勿著水次日日中曝乾挼出殼簸揚取仁畏茯苓白薇牡蠣黑鉛金補水之精墜痰降氣黑鉛專入腎甘寒稟北方極陰之氣為水中之金金丹之母八石之祖專主下降力能入腎補水功有過於地黃是以昔人有云水精之說凡一切水虧火熾而見噎膈反胃嘔吐眩暈痰氣上逆等症服此立能見效但必煅製得宜不令滲入壓膀胱以致又生他變時珍曰吳巡檢病不得溲臥則微通立則不能涓滴遍用通利藥不效唐與正問其平日自制黑錫丹常服因悟曰此必結砂時硫飛去鉛不死鉛砂入膀胱臥則偏重猶可溲立則正塞水道故不通取金液丹三百粒分為十服煎瞿麥湯下鉛得硫氣則化累累水道下病遂愈如局方黑錫丹宣明補真丹皆用黑鉛納入無非取其補陰退陽之意至云能以解毒殺蟲亦是水歸火伏陰陽互根而毒斯化而蟲自殺然金石之藥與人血氣無情用之最宜合病鉛粉一名胡粉系黑鉛煅煉變黑為白本草云鉛乃五金之祖故有五金狴犴追魂使者之稱言其能伏五金而死八石也雌黃乃金之苗而中有鉛氣是黃金之祖矣銀坑有鉛是白金之祖矣信鉛雜銅是赤金之祖矣與錫同氣是青金之祖矣硃砂伏於鉛而死於硫硫戀於鉛而伏於硇鐵戀於磁而死於鉛雄戀於鉛而死於五知故金公變化最多一變而成胡粉再變而成黃丹三變而成密陀僧四變而為白霜氣味辛寒體用與鉛相似但有豆粉蛤粉同入故止入氣而不入血其功專能止痛生肌膏藥每取為用且力能化蠱殺蟲金匱甘草粉蜜湯用此以為除蠱殺蟲藥也鉛丹即名黃丹系用黑鉛硝黃鹽礬煅煉而成故味兼咸而走血其性亦能殺蟲解熱墜痰祛積且更拔毒去瘀長肉生肌膏藥每取為用目暴赤痛鉛丹調貼太陽立效豬肉畜豐體澤膚多食生痰動風豬肉專入脾胃味雖雋永食之能潤腸胃生津液豐肌體澤皮膚時珍為補肉補形之要味然性屬陰物別錄云豬肉閉血脈弱筋骨虛人不可久食陶弘景曰豬為用最多惟肉不可食孫思邈曰久食令人少子發宿疾筋骨碎痛乏氣孟詵曰久食殺藥動風發痰韓𢘅曰凡肉皆補惟豬肉無補凡人臟氣純陽火盛水衰服則以水濟火血脈周流自有豐體澤膚之妙若使臟體純陰少食或未見損多食必有阻滯痿弱生痰動風作濕之虞耳時珍曰惟多食則助熱生痰動風作濕況風寒初感血脈有礙其於豬肉固不可食久病初愈血復其於豬肉更不宜食時珍曰傷風寒及病初起人為大忌耳雖曰先王教民畜彘為先非是厲民又胡不聞大易之頤有云宜節飲食之說乎汪昂云傷寒忌之者以其補肌固表油膩纏黏風邪不能解散也病初愈忌之者以腸胃久枯難受肥濃厚味也又按豬肉生痰惟風痰寒痰濕痰忌之若老人燥痰乾咳更須肥濃以滋潤之不可執泥於豬肉生痰之說也豬之為用最多其在心血氣味鹹平合以硃砂能治驚癇癲疾取其心以入心血以通血之意肝血合以夜明沙作丸能治雀目夜不能睹肝藏血其竅在目用入取肝入肝意肺合薏苡能治肺虛咳嗽肺以入肺肚合黃連等藥為丸能令脾胃堅強食醫心鏡云仲景豬肚黃連丸治消渴用雄豬肚一枚入黃連末五兩栝蔞根白粱米各四兩知母三兩麥門冬二兩縫定蒸熟搗丸如梧子大每服三十丸米飲下時珍曰豬水畜而屬胃土故方藥用之補虛以胃治胃豬腎氣味鹹冷不能補腎精氣止可借為腎經引導時珍曰豬腎性寒不能補命門精氣方藥所用借其引導而已別錄謂理腎氣通膀胱理字通字最為有理腎有虛熱者宜之若腎氣虛寒者非所宜矣今人不達此理往往食豬腎為補不可不審腸合黃連為丸以服能治腸風臟毒奇效方膽汁味苦氣寒質滑潤燥瀉肝和陰用灌穀道以治大便不通且能明目殺疳沐發光澤成無己曰仲景以豬膽汁和醋灌穀道中通大便神效蓋酸苦益陰潤燥而瀉便也治少陰下利不止厥逆無脈乾嘔煩者以白通湯加豬膽汁主之若調寒熱之逆者冷熱必行則熱物冷服下嗌之後冷體既消熱性便發故病氣自愈此所以和人尿豬膽鹹苦之物於白通熱劑之中使其氣相從而無拒格之患也豬脬能治夢中遺溺疝氣墜痛陰囊濕癢玉莖生瘡時珍曰豬胞所主皆下焦病亦以類從耳蘄有一妓病轉脬小便不通腹脹如鼓數月垂死一醫用豬脬吹脹以翎管安上插入陰孔捻脬氣吹入即大尿而愈此法載在羅天益衛生寶鑑中知者頗少亦機巧妙術也豬脂氣味甘寒力能涼血潤燥行水散血解毒殺蟲利腸滑產止咳豬乳氣味甘鹹而寒能治小兒驚癇時珍曰小兒體屬純陽其驚癇亦生於風熱豬乳氣寒以寒治熱謂之正治豬蹄同通草煮湯能通乳汁然總視其物之氣質以治人身之病耳肉反黃連桔梗烏梅犯必瀉痢龜板龜鱉滋腎通心龜板專入腎兼入心甘鹹微寒稟北方之氣而生乃陰中至陰之物入足少陰腎經兼龜性有神故能入心以通腎遠志補火以通心陽龜板補水以通心陰凡心虛血弱而見勞熱骨蒸蒸及於骨必得至陰骨藥以治腰腳痠疼老瘧痞塊老瘧必有痞塊癥瘕崩漏瀉痢五漏難產小兒囟門不合等症骨症必藉骨理服此皆能見效時珍云龜鹿靈而壽龜首常藏向腹能通任脈任脈行腹故取其腹以通心補腎補血皆養陰也鹿鼻常反向尾能通督脈督脈行背故取其角以補命補精補氣皆養陽也龜性治與鱉甲相類但鱉甲色青應木走肝益腎以除熱龜甲色黑應水通心入腎以滋陰然皆至陰大寒多用必傷脾土龜大自死者良酥炙煅灰用惡人參龜尿以豬鬃鬃毛刺龜鼻其尿即出走竅透骨染鬚髮治啞聲若寒痰塞肺聲啞者忌服服板不宜中濕中濕則板末變為癥瘕龜膠龜鱉滋陰功勝龜板專治勞熱骨蒸龜膠專入腎經板煎就氣味益陰故本草載板不如膠之說以板炙酥煅用氣味尚淡猶茸力能補陽茸經水熬成膠其性亦緩者故耳故補陽分之陽督脈用膠不如用茸補陰分之陰任脈用板不如用膠然必審屬陽臟於陰果屬虧損凡屬微溫不敢雜投得此濃雲密雨以為頓解則陽得隨陰化而陽不致獨旺否則陰虛仍以熟地為要服之陰既得滋而陽仍得隨陰而不絕也是以古人滋陰多以地黃為率而龜板龜膠止以勞熱骨蒸為用其意實基此矣使不分辨明晰僅以此屬至陰任意妄投其不損陽敗中者鮮矣因並記之用自死敗龜得陰全氣洗淨搗碎浸三日用桑火熬二晝夜其膏始成今人熬膠止在釜中煎一晝夜曷能成膠桑螵蛸卵生滋腎利水交心桑螵蛸專入肝腎膀胱即桑枝上螳螂子也一生九十九子用一枚便傷百命勿輕用之稟秋金之陰氣得桑木之津液味鹹甘氣平無毒入足少陰腎足太陽膀胱蓋人以腎為根本男子腎經虛損則五臟氣微或陰痿夢寐失精遺溺螵蛸鹹味屬水內舍於腎腎得之而陰氣生長故能愈諸疾及益精生子腎與膀胱為表裡腎得所養則膀胱自固氣化則能出故利水道通淋也宗奭治小便數用桑螵蛸遠志龍骨菖蒲人參茯神當歸龜甲醋炙各一兩為末臥時人參湯調下而愈女子疝瘕血閉腰痛皆肝腎二經為病咸能入血軟堅是以主之甘能補中故主傷中益氣腎足則水自上升克與心交故能養神也至書既言功專收澀又言利便能澀能利義由是矣產桑樹者佳斆曰雜樹上生者名螺螺宗奭曰如無桑上者即用他樹者以炙桑白皮佐之桑白皮行水以接螵蛸就腎經也酒炒用畏旋覆花其子之母名螳螂主治小兒驚搐並出箭鏃入肉時珍曰古方風藥多用螵蛸則螳螂治風同一理也又醫林集要出箭鏃用螳螂一個巴豆半個同研敷傷處微癢且忍極癢乃撼拔之以黃連貫眾湯洗拭石灰敷之人乳人補陰潤燥澤膚人乳專入肝腎肺氣味甘潤按據諸書有言此為陰血所化生於脾胃攝於衝任未受孕則下為月水既受孕則留而養胎已產則變赤為白上為乳汁以養小兒乃造化之玄微也服之益氣血補腦髓所謂以人補人也弘景曰張漢蒼年老無齒常服人乳故年百歲余身肥如瓠若大人服之則能止渴澤膚潤燥且目得血能視凡赤澀多淚可用黃連浸點宗奭曰上則為乳汁下則為月水故知乳汁則血也用以點眼豈不相宜實為補虛潤燥要劑取無病婦人乳水時珍曰人乳無定性其人和平飲食沖淡其乳必平其人暴躁飲酒食辛或有火性其乳必熱凡服乳須熱飲若曬暴為粉入藥尤佳南史載宋何尚之積年勞病飲婦人乳而瘥又言穰城老人年二百四十歲惟飲曾孫婦乳也頓如攤粉皮法取用名為乳丹丸但臟寒胃弱作泄者不宜多服有孕之乳謂之忌奶小兒飲之多成吐瀉疳鬾之病最為有毒也溫腎腎虛而在於火則當用辛用熱腎虛而在於水則當用甘用潤至於水火併衰則藥有難兼施惟取其性溫潤與性微溫力專入腎者以為之補則於水火併虧之體自得溫潤調攝之宜矣按地黃體潤不溫因於火日蒸曬而溫實為補水溫腎要劑其藥自屬不易然有肝腎虛損氣血凝滯不用杜仲牛膝續斷以通而偏用肉桂陽起石以燥風濕內淫不用巴戟天狗脊以溫而偏用淫羊藿蛇床子以燥便結不解不用蓯蓉肉鎖陽以溫而偏用火麻枸杞冬葵子以潤遺精滑脫不用菟絲子覆盆子山茱萸胡桃肉𧴪𧴪葡萄等藥以收而偏用粟殼牡蠣等藥以進軟堅行血不用海狗腎溫暖以潤而偏用食鹽青鹽鹹寒以投補精益血不用麋茸鹿膠犬肉紫河車何首烏等藥以溫而偏用硫黃沉香以勝鬼疰蠱毒不用獺肝溫暖以驅而偏用川椒烏梅以制凡此非失於燥而致陰有所劫即失於寒而致火有所害豈溫暖腎臟之謂哉噫誤矣熟地黃隰草能滋腎熟地黃專入腎兼入肝甘而微溫味厚氣薄專補腎臟真水兼培黃庭后土土厚載物諸臟皆受其蔭故又曰能補五臟之真陰熟地功力甚巨在景岳謂其真陰虧損有為發熱為頭痛為焦渴為喉痹為嗽痰為喘氣或脾腎寒逆為嘔吐亦有不宜用地黃者或虛火載血於口鼻或水泛於皮膚或陰虛而泄利陽浮而狂躁或陰脫而仆地陰虛而神散者非熟地之守不足以聚之守以制散陰虛而火升者非熟地之重不足以降之重以制升陰虛而燥動者非熟地之靜不足以鎮之靜以制動陰虛而剛急者非熟地之甘不足以緩之緩以制急陰虛而水邪上沸者舍熟地何以自制水以引水舍熟地何以歸元陰虛而精血俱損脂膏殘薄者舍熟地何以厚腸胃厚以滋薄且猶有最玄最妙者則熟地兼散劑能發汗以汗化於血陰以化陽而無陰不作汗也熟地兼濕劑能回陽以陽生於下引陽歸陰而無陰不回也然而陽性速故人參少用亦可成功陰性緩熟地非多難以奏效而今人有畏其滯膩者則崔氏何以用於腎氣丸而治痰浮痰本於腎有畏其滑泄者則仲景何以用於八味丸而醫腎泄泄因腎氣不固故謂腎泄有謂陽能生陰陰不能生陽者則陰陽之理原自互根無陰則陽無以化彼此相須缺一不可無陽則陰無以生無陰則陽無以化內經曰精化為氣得非陰亦生陽乎景岳尚論熟地最為明確獨中所論脾胃寒逆為嘔可用地黃以治是亦千慮之一失耳夫既脾胃虛寒則脾與胃已受寒累正宜用以辛熱以為掃除如太陽既至堅冰自解乃復墜以霜雪投以陰劑不更使寒滋甚乎余讀景岳全書見其所論語語透闢字字箴規可為法守獨於所論地黃有宜脾腎虛寒尚有未及雖曰熟地性溫寒從溫散然寒至上逆為嘔則寒已甚豈有熟地之溫而可令寒外散乎但或陽勝陰微陽藉陰化偶有感冒用此雜於溫散之中或有見效若真純陰無火厥氣上逆而嘔則此又為深忌至於制用地黃宜用好酒砂仁末同入久蒸久曝使其轉苦為甘變紫為黑方能直入腎經耳汪昂云地黃性寒得酒與火與日則溫性滯得砂仁則利氣且能引入丹田六味丸用之為君尺脈弱者加桂附所謂益火之原以消陰翳也尺脈旺者加知柏所謂壯水之主以制陽光也出懷慶肥大者佳何首烏蔓草養血益肝何首烏專入肝兼入腎諸書皆言滋水補腎黑髮輕身備極讚賞時珍曰何首烏足厥陰少陰藥也白者入氣分赤者入血分腎主閉藏肝主疏泄此物氣溫味苦澀苦補腎溫補肝能收斂精氣所以能養血益肝固精益腎健筋骨烏鬚髮為滋補良藥不寒不燥功在地黃天門冬諸藥之上氣血太和則風虛癰腫瘰癧諸疾可知矣與地黃功力相似獨馮兆張辯論甚晰其言首烏苦澀微溫陰不甚滯陽不甚燥得天地中和之氣熟地首烏雖俱補陰然地黃稟仲冬之氣以生蒸雖至黑則專入腎而滋天一之真水矣其兼補肝者因滋腎而勞及也首烏稟春氣以生而為風木之化入通於肝為陰中之陽藥後天之陽故專入肝經以為益血祛風之用血活則風散其兼補腎者亦因補肝而兼及也一為峻補先天真陰之藥故其功可立救孤陽亢烈之危一系調補後天營血之需以為常服長養精神卻病調元之餌先天后天之陰不同奏功之緩急輕重亦有大異也的解況名夜合又名能嗣則補血之中尚有化陽之力豈若地黃功專滋水氣薄味厚而為濁中濁者堅強骨髓之用乎斯言論極透闢直冠先賢未有不可忽視以大如拳五瓣者良有赤雄白雌二種凡使赤白各半泔浸竹刀刮皮切片用黑豆與首烏拌勻鋪柳甑入砂鍋九蒸九曬茯苓為使忌豬肉無鱗魚萊菔蔥蒜鐵器李翱著何首烏傳云何首烏者順州南河縣人祖名能嗣父名延秀能嗣年五十八無妻忽見是藥以服因思人道娶妻連生數子延秀服之延壽百六十歲延秀生首烏首烏服藥亦生數子年百三十歲發猶黑李安期與首烏鄉里親善竊得方服其壽亦長遂序其事傳之又邵康節進七寶美髯丹其方用赤白首烏各一斤黑豆拌九蒸曬茯苓半斤乳拌當歸枸杞菟絲各半斤俱酒浸牛膝半斤酒浸同首烏第七次蒸至第九次破故紙四兩用黑芝麻炒蜜丸忌鐵器是方以首烏為君猶六味以地黃為君之意相同汪昂謂人或以首烏加入六味丸中是合兩方為一方一藥有二君殊非制方本意其說甚是肉蓯蓉山草滋腎潤燥肉蓯蓉專入腎兼入大腸甘酸鹹溫體潤色黑諸書既言峻補精血又言力能興陽助火是明因其氣溫力專滋陰得此陽隨陰附而陽自見興耳惟其力能滋補故凡癥瘕積塊得此而堅即消惟其滋補而陽得助故凡遺精莖痛寒熱時作亦得因是而除若謂火衰至極用此甘潤之品同於附桂力能補陽其失遠矣況此既言補陰而補陰又以蓯蓉為名是明因其功力不驟氣專潤燥是亦宜於便閉而不宜於胃虛之人也謂之滋陰則可謂之補火正未必然長大如臂重至斤許有松子鱗甲者良酒浸刷去浮甲劈除內筋膜酒蒸半日酥炙用忌鐵器鎖陽山草補陰潤燥功同肉蓯蓉鎖陽專入腎兼入大腸輟耕錄云鎖陽生韃靼田地野馬或與蛇龍遺精入地久之發起如筍上豐下儉鱗甲櫛比筋脈連絡絕類男陽即玉蓯蓉之類本與蓯蓉同為一類甘鹹性溫潤燥養筋凡陰氣虛損精血衰敗大便燥結治可用此以啖並代蓯蓉煮粥彌佳則知其性雖溫其體仍潤未可云為命門火衰必用之藥也故書有載大便不燥結者勿用益知性屬陰類即有云可補陽亦不過云其陰補而陽自興之意豈真性等附桂而為燥熱之藥哉但古表著藥功多有隔一隔二立說以致茫若觀火究之細從藥之氣味形質考求則孰陰孰陽自爾立見又奚必沾沾於書治功是求者乎狀類男陽用宜酥炙菟絲子蔓草溫腎補肝止遺固脫菟絲專入肝腎兼入脾辛甘溫平質黏溫而不燥補而不滯得天地中和之氣故書稱為補髓添精強筋健骨止遺固泄暖腰溫膝明目祛風血補則風祛為補肝腎脾氣要劑合補骨脂杜仲用之最為得宜但杜仲補骨脂氣味辛溫性專趨下不似菟絲氣味甘平而不重降耳老學庵筆記云族弟服菟絲子發疽汪昂闢其或感他毒不得歸咎菟絲若服之而見陽強不痿其便燥結小水赤澀者以性主補故也但菟絲子最難得真賣者有以水犀草子種出形象絕似藥肆所賈多屬此物然服之亦有微功酒浸煮爛作餅曝乾山藥為使巴戟天山草溫補腎陰兼祛風濕巴戟天專入腎辛甘微溫據書稱為補腎要劑能治五癆七傷強陰益精以其體潤故耳好古曰巴戟腎經血分藥也權曰病人虛損加而用之然氣味辛溫又能祛風除濕故凡腰膝疼痛風氣腳氣水腫等症服之更為有益宗奭曰有人嗜酒日須五七杯後患腳氣甚危或教以巴戟半兩糯米同炒米微轉色去米不用大黃一兩銼炒同為末熟蜜丸溫水服仍禁酒愈觀守真地黃飲子用此以治風邪義實基此未可專作補陰論也川產中雖色紫微有白糝粉色而理小暗者真根如連珠擊破中紫而鮮潔者偽又山葎根似巴戟但色白人多以醋煮亂之去心酒浸焙用覆盆子為使惡丹參續斷隰草溫腎補肝以散筋骨血氣凝滯續斷專入肝腎因何以續為名蓋緣其味苦其性溫能入腎經以補骨又緣其味辛能入肝經以補筋辛能散風風除而筋活味兼甘又入中州以補虛甘味不多補不甚專凡跌撲折傷癰腫暨筋骨曲節血氣滯之處服此即能消散續斷力實消散止痛生肌且審其味澀故能止血治漏並縮小便固精安胎下部血分寒滯者宜此久服能氣力倍增血氣不滯筋斷復續故曰續斷實疏通疏通二字貼切氣血筋骨第一藥也第因氣薄而見精脫胎動溺血失血等症則又深忌以性下流者故耳功與地黃牛膝杜仲巴戟相等但有溫補細微之別不可不知川產者良狀如雞腳皮黃皺節節斷者真去里硬筋酒浸用地黃為使每見今人氣虛血脫醫用牛膝補骨脂杜仲續斷安胎殊屬可駭杜仲喬木溫補肝氣達於下部筋骨氣血杜仲專入肝辛甘微溫諸書皆言能補腰脊為筋骨氣血之需以其色紫入肝為肝經氣藥蓋肝主筋腎主骨腎充則骨強肝充則筋健屈伸利用皆屬於筋故入肝而補腎子能令母實也且性辛溫能除陰癢去囊濕痿痹癰軟必需腳氣疼痛必用按龐元英談藪一少年新娶後得腳軟病且疼甚醫作腳氣治不效路鈐孫琳診之用杜仲一味寸斷片拆每以一兩用半酒半水一大盞煎服三日能行又三日全愈琳曰此乃腎虛非腳氣也杜仲能治腰膝痛以酒行之則為效容易矣胎滑夢遺切要若使遺精有痛用此益見精脫不已以其氣味辛溫能助肝腎旺氣也胎因氣虛而血不固用此益見血脫不止以其氣不上升反引下降也功與牛膝地黃續斷相佐而成但杜仲性補肝腎能直達下部筋骨氣血不似牛膝達下走於經絡血分之中熟地滋補肝腎竟入筋骨精髓之內續斷調補筋骨在於曲節氣血之間之為異耳獨怪今世安胎不審氣有虛實輒以杜仲牛膝續斷等藥引血下行在腎經虛寒者固可用此溫補以固胎元如古方之治三四月即墜者於兩月前以杜仲八兩糯米煎湯浸透炒斷絲續斷二兩酒浸山藥六兩為末糊丸或棗肉為丸米飲下固腎托胎之類繡見今時醫士不審虛實用此安胎甚多殊為可惜若氣陷不升血隨氣脫而胎不固者用此則氣益陷不升其血必致愈脫無已故凡用藥治病須察脈症虛實及於上下之處有宜不宜以為審用若徒守其一曲胎動症類甚多若不細心揣摩安得不守一曲以應無窮之變非惟無益且以增害不通醫士多犯是弊可惜可惜出漢中厚潤者良去粗皮銼或酥或酒或蜜以炙或姜或鹽或酒以炒在人隨症活變耳惡黑參今醫止守備要以求藥性若備要論有遺漏便不他求可惜覆盆子蔓草溫腎澀精固脫覆盆子專入腎甘酸微溫性稟中和功能溫腎而不燥固精而不凝李士材曰強腎無燥熱之偏固精無凝澀之害金玉之品也故服陰痿能強肌膚能澤臟腑能和鬚髮不白女子服之多孕既有補益之功復多收斂之義名為覆盆子者服之能使溺盆皆覆也但真甚少藥肆多以樹莓代充酒浸色紅者是真否即屬假去蒂淘淨搗餅用時酒拌蒸同車前五味菟絲蒺藜子為五子衍宗丸治男子精氣虧乏中年無子加入巴戟天膃肭臍補骨脂鹿茸白膠山茱萸肉蓯蓉治陽虛陰痿臨房不舉精寒精薄宜去蒂酒煮用狗脊山草溫補肝腎以除風濕狗脊專入肝腎味苦甘平微溫何書既言補血滋水又曰去濕除風能使腳弱腰痛失溺周痹俱治周痹因於風寒濕邪在於血脈上下寒凝汁沫排於分肉而痛即內經所謂內不在臟腑外未發於皮獨居分肉之間真氣不能周故曰周痹是明因其味苦苦則能以燥濕又因其味甘甘則能以益血又因其氣溫溫則能以補腎養氣蓋濕除而氣自周氣周而溺不失血補而筋自強筋強而風不作是補而能走之藥也故凡一切骨節諸疾有此藥味燥入則機關自強而俯仰亦利非若巴戟性兼辛散能於風濕則直除耳去毛有黃毛如狗形故曰金毛狗脊切片酒蒸萆薢為使熬膏良胡桃肉山果溫補命門澀精固氣胡桃專入命門兼入肺大腸味甘氣熱皮澀肉潤汁黑諸書皆言能通命火助相火利三焦溫肺潤腸補氣養血斂氣定喘澀精固腎與補骨脂一水一火大補下焦有同氣相生之妙韓𢘅曰破故紙屬火能使心胞之火相通胡桃屬水主潤血養血血屬陰惡燥故油以潤之佐破故紙有木火相生之妙故古有云黃柏無知母破故紙無胡桃猶水母之無鰕也時珍曰命門氣與腎通藏精血而惡燥若腎命不燥精氣內充則飲食自健肌膚光澤腸膚潤而血脈通此胡桃佐補藥有令人肥健能食潤肌黑髮固精治燥調血之功也命門既通則三焦利故上通於肺而虛寒喘嗽者宜之下通於腎而腰腳虛痛者宜之內而心腹諸痛可止外而瘡腫之毒可散矣洪氏夷堅志止言胡桃治痰嗽能斂肺蓋不知其為命門三焦之藥也若使多食則能動風脫人眉毛志曰多食動風脫人眉穎曰多食生痰動腎火同錢細嚼則即與銅俱化與甘蔗同嚼則蔗渣消融蓋因味甘則三焦可利汁黑則能入腎通命皮澀則氣可斂而喘可定肉潤則肺得滋而腸可補氣熱則食不敢多而有動風脫毛火鑠消融化銅之弊耳是以瘡腫鼠瘻痰核取其用能通郁解結惟肺有熱痰既命門火熾者切忌時珍曰胡桃性熱能入腎肺惟虛寒者宜之而痰火積熱者不宜多食耳殼燒灰存性治乳癰皮塗鬚髮皆黑志曰仙方取青皮壓油和詹糖香塗毛髮色如漆也養血去皮用斂澀連皮用靈砂石墜陽交陰鎮納歸腎靈砂專入胃又名神砂系水銀硫黃二物同水火煅煉而成慎微曰用水銀一兩硫黃六銖細研炒作青砂頭後入水火既濟爐抽之如束針紋者成就也時珍曰此以至陽勾至陰脫陰反陽故曰靈砂蓋水銀性秉最陰硫黃性秉純陽同此煎熬合為一氣則火與水交水與火合而無亢騰飛越之弊矣故凡陽邪上浮下不交而至虛煩狂燥寤寐不安精神恍惚者用此墜陽交陰則精神鎮攝而諸病悉去謂之曰靈即見扶危拯急若有神使之意時珍曰硫黃陽精也水銀陰精也以之相配夫婦之道純陰純陽二體合璧故能奪造化之妙而升降陰陽既濟水火為扶危拯急之神丹但不可久服爾蘇東坡言此藥治久患反胃及一切吐逆小兒驚吐其效如神有配合陰陽之妙故也時珍常以陰陽水送之尤妙後人不明辰砂即屬丹砂混以靈砂入於益元散內即滑石六兩甘草一兩加辰砂詎知一神一靈音同字別一水一火天淵各判烏可以此烹煉燥烈之品以代辰州甘寒之味耶市肆與醫妄用如斯附記以俟高明並參鹿膠獸溫補腎陰以通衝任鹿膠專入腎由角煎熬書載補陽益陰強精活血總不出通督脈補命門之用但其性力緩味甘不能如茸之力峻蓋茸有通交陽維之功陽維起於諸陽之會而維持諸陽膠有緣合衝脈之任衝脈起於胞中為諸脈之海膠非藉桂同用以通其陽則不能除寒熱驚癇膠非假龜膠同用不能達任而治羸瘦腰痛任脈行腹部之中行乃陰脈之總司膠非假地黃當歸同投不得引入衝脈而治婦人血閉胎漏至若膠治傷中絕勞即茸所謂能主漏下惡下也膠之能以補中益氣即茸所謂能以益氣強志也膠之能以輕身延年即茸所謂能以生齒不老也然惟平臟服之得宜若使純陰無陽服此反能泥膈先不免有腹脹飽滿之弊矣生角味鹹氣溫茸之粗者為角凡含血之物肉易長筋次之骨最難長故人二十歲骨髓方堅麋鹿角無兩月長至二十餘斤凡骨之生無速於此草木亦不及之頭為諸陽之會鍾於頭角豈與凡血比哉生能散熱行血消腫辟惡以咸氣能入腎軟堅溫能通行散邪熟能益腎補虛強精活血角霜連汁煎乾書載能治脾胃虛寒便泄取其溫而不滯若以煎過膠者代充其膠既去服之奚益鹿胎鹿肉鹿筋力能補陽若麋胎麋肉麋筋則反損陽而傷陰矣不可不慎鹿胎須以色淡形瘦者為是若色深形肥則為麋胎矣若色皎白其胎下唇不若鹿之長於上唇則為獐胎其他獸胎總與鹿胎不侔鹿筋亦須辨骨細者為是若粗即是麋筋不可妄用海狗腎獸溫腎補精行血軟堅海狗腎專入肝胃即膃肭臍系西番獸物足似狗而魚尾時珍曰按唐書云骨貀獸出遼西營州及結骨國一統志云膃肭臍出女真及三佛齊國獸似狐腳高如犬走如飛取其腎漬油名膃肭臍觀此則似狐之說非無也蓋似狐似鹿者其毛色爾似狗者其足形也似魚者其尾形也入藥用外腎而曰臍者連臍取之也今東海亦有味甘而咸其腎即獸之臍投於睡熟犬邊犬即驚跳臘月浸置水內不凍其性之熱殆可見矣故書載治宿血痃癖尫羸症者取其咸能入血軟堅溫能通行消散也用以佐其房術者取鹹溫入腎補虛固精壯陽道也時珍曰精不足者補之以味也大抵與蓯蓉鎖陽之功相近亦可同糯米法面釀酒服此藥雖置器中長年溫潤然能入水不凍大不同於他藥若云功近蓯蓉鎖陽潤雖相若氣實不同不無厚視蓯蓉鎖陽而薄視此物也但脾胃挾有寒濕者亦忌以濕遇濕故耳恐相礙也酒浸紙裹炙香銼搗或於銀器中以酒煎熟合藥用時珍曰以漢椒樟腦同收則不壞獺肝獸山獺莖補火暖精水獺肝補肝腎虛損殺鬼疰蠱毒獺專入肝腎有在山在水之別山獺出廣宜州溪洞性稟純陽其性最淫牝獸知而逃避遇以婦人跳躍來抱牢不可破獺無偶則常抱木而枯故莖可治陽虛陰痿精寒取陰一枚價值數金水獺以水為生水性最靈獺亦多慧性最嗜魚魚之精氣皆聚於肝故獺亦得諸魚之氣而聚於肝者也按肝諸畜皆有定數惟獺一月一葉間有退葉因其漸落復生者故耳獺味性寒惟肝性溫味鹹微毒專入肝腎補虛除勞俾五臟安和邪氣自卻而鬼疰蠱毒因得退除矣葛洪言屍疰屍疰五疰之一病則使人寒熱沉沉默默不知病之所苦無處不惡積月累年淹淹至死後復傳於他人乃至滅門覺有此候惟取獺肝一具陰乾為末水服方寸匙日三以瘥為度如無獺肝獺爪亦可小兒鬼疰及諸魚骨鯁燒灰酒服故仲景治冷勞崔氏治蠱疰皆有獺肝丸之用耳犬肉畜補脾陰溫腎陰犬肉專入脾胃腎味鹹性溫屬土有火故歹人履地雖臥必醒其肉食之能令脾胃溫暖且脾胃溫則五臟皆安故又能補絕傷壯陽道暖腰膝益氣力補血脈厚胃腸實下焦填骨髓也色黃者則於脾益補色黑者則於腎更妙兩腎能助陽事但肉炙食益熱令人消渴妊婦食之令子無聲熱病後及中滿症服更能殺人畏杏仁紫河車人滋補虛損紫河車專入肝腎甘寒性溫雖曰本人血氣所生故能以人補人也凡一切虛勞損極損於肺則見皮聚毛落損於心則見血脈不榮於五臟六腑損於脾則見肌肉消瘦不能飲食損於肝則見筋緩不能收持損於腎則見骨痿不起損在肺則損自上及下是肺先受其損然後及心及脾及肝及腎而遞見也損在精則損由下及上是腎先受其損然後自肝自脾自心自肺而遞及也傷肺自上及下過於胃則不可治傷腎自下而上過於脾則不可治故以得飲食為貴恍惚失志癲癇肌肉羸等症用之極為得宜紫河車稟受精血結孕之餘液得母之氣血居多故能峻補營血如永類鈐方用此合以山藥參苓以補真陰所謂精不足者補之以味也然究皆屬滑腸之品故合天冬麥冬黃柏生地龜板同服則於胃氣有損如吳球創大造丸之類況干食則等肉脯入藥亦鮮奇效且藥補劑甚多在人別為取用慎毋於此戀戀不置也用取初生色紫者良米泔擺淨長流水中久洗去筋膜蒸搗和藥用
