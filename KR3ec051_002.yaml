body:
  text: 卷二收澀溫澀收者收其外散之意澀者澀其下脫之義如發汗過多汗當收矣虛寒上浮陽當收矣久嗽亡津津當收矣此皆收也泄痢不止泄當固矣小便自遺遺當固矣精滑不禁精當固矣固即澀也十劑篇云澀可去脫牡蠣龍骨之屬是也凡人氣血有損或上升而浮下泄而脫非不收斂澀固無以收其亡脫之勢第人病有不同治有各異陽旺者陰必竭故脫多在於陰陰盛者陽必衰故脫多在於陽陽病多燥其藥當用以寒陰病多寒其藥當用以溫此定理耳又按溫以治寒澀以固脫理雖不易然亦須分臟腑以治如蓮子肉豆蔻是治脾胃虛脫之藥也故泄瀉不止者最宜蓮鬚是通心交腎之藥也為心火搖動精脫不固者最佳補骨脂𧴪𧴪葡萄阿芙蓉沒石子沉香芡實石鐘乳胡桃肉靈砂是固腎氣之藥也為精滑腎泄者最妙但補骨脂則兼治腎泄瀉葡萄則兼起陽稀痘阿芙蓉則專固澀收脫沒石子沉香則專降氣歸腎芡實則兼脾濕並理石鐘乳則兼水道皆利胡桃肉則兼腸肺俱潤靈砂則合水火併降也他如菟絲覆盆性雖不澀而氣溫能固木瓜酸中帶澀醒脾收肺有功烏梅斂肺澀腸訶子收脫止瀉清痰降火赤石脂固血久脫治雖不一然要皆屬溫澀固脫藥耳惟有禹餘糧柿蒂性屬澀平與於體寒滑脫之症微有不投所當分別異視肉豆蔻芳草燥脾溫胃澀腸肉豆蔻專入脾胃兼入大腸辛溫氣香兼苦而澀功專燥脾溫胃澀腸時珍曰土愛暖而喜芳香故肉豆蔻之辛溫理脾胃而治吐利行滯治膨消脹凡脾胃虛寒挾痰食而見心腹冷痛泄瀉不止服此氣溫既能除冷消脹復能澀腸止痢若合補骨脂同用則能止腎虛泄也至書所云能補脾氣以其脾胃虛寒服此則溫而脾自健非真具有甘補之意也氣逆而服即下以其脾胃既舒而氣即下非若厚朴枳實之下為最峻也但此止屬溫胃澀腸之品若鬱熱暴注者禁用出嶺南似草蔻外有皺紋內有斑紋糯米粉裹熟去油用忌鐵補骨脂芳草溫腎逐冷澀氣止脫補骨脂即破故紙專入腎辛苦大溫色黑何書皆載能斂神明使心胞之火與命門之火相通因而元陽堅固骨髓充實以其氣溫味苦澀以止脫故也時珍曰按白飛霞方外奇方云破故紙屬火收斂神明能使心胞之火與命門之火相通故元陽堅固骨髓充實澀以止脫也胡桃屬木潤燥養血血屬陰惡燥故油以潤之佐破故紙有水火相生之妙故語云破故紙無胡桃猶水母之無蝦凡五癆五癆曰志癆心癆思癆憂癆瘦癆七傷七傷曰陰寒陰痿裡急精枯精少精清下濕小便數臨事不舉因於火衰而見腰膝冷痛腎冷流精腎虛泄瀉及婦人腎虛胎滑用此最為得宜許叔微學士本事方云補脾不若補腎腎氣虛弱則陽氣衰劣不能熏蒸脾胃脾胃氣寒令人胸膈痞塞不進飲食遲於運化或腹肋虛脹或嘔吐痰涎或腸鳴泄瀉譬如鼎釜中之物無火力雖終日不熟何能消化濟生二神丸用破故紙補腎肉豆蔻補脾二藥雖兼補但無斡旋往往常加木香以順其氣使之斡旋空虛倉廩食廩空虛則受物矣屢用見效不可不知若認症不真或因氣陷氣短而見胎墮應用參耆水衰火盛而見精流泄瀉應用滋潤兼以清利妄用補骨脂止脫則殺人慘於利器矣鹽水炒得胡麻良惡甘草沒石子喬木固腎止脫沒石子專入腎兼入脾胃味苦性溫色黑功專入腎固氣凡夢遺精滑陰痿齒痛腹冷泄瀉瘡口不收陰汗不止一切虛火上浮腎氣不固者取其苦以堅腎溫以暖胃健脾黑以入腎益氣補精俾氣按納丹田不為走泄則諸病自能克愈矣至書所云安神定魄亦是神氣既收不為外浮之意他如燒黑灰煎湯以治陰毒合他藥以染鬚髮為末以擦牙齒皆是賴其收澀之力以為保護耳無他道也但味苦性降多用恐氣過下不可不慎氣虛下陷者忌出外番顆小紋細者佳炒研用蟲蝕成孔者揀去忌銅鐵蓮子水果補脾澀氣蓮子專入脾兼入心腎書載能入心脾腎三經然氣稟清芳味得中和甘溫而澀究皆脾家藥耳中和則上下安養君令臣恭而無不交之患矣馮兆張曰按蓮花出汙泥而不染生生不息節節含藏中含白肉內隱清心根鬚花果葉節皮心皆為良藥稟芬芳之氣合稼穡之味為脾之果脾為中黃所以交媾水火會合金木者也土旺則四臟皆安而蓮之功大矣故書載能補心與腎有蓮子清心飲及通十二經絡血脈即是此意且其味澀則能使氣不走而夢遺崩帶失血等症可理白濁遺精用石蓮肉龍骨益智仁等分為末每服二錢空心飯湯送下味澀則腸胃亦固而無五更洞泄之虞同菟絲子五味子山茱萸山藥車前子肉豆蔻砂仁橘紅芡實人參補骨脂巴戟天治脾腎俱虛五更溏瀉惟大便燥者勿服去心皮蒸熟焙乾用得茯苓山藥白朮枸杞良蓮心味苦性寒能治心熱故産後血竭者最宜石蓮色黑入水則沉入滷則浮煎鹽用此試滷味苦性寒能除噤口熱毒淋濁果因熱成亦可以解然必本於蓮實老於蓮房墜入汙泥經久堅黑如石者方佳若使出自粵東産於樹上大苦大寒不宜入藥蓮鬚水果入腎固精止脫蓮鬚專入心腎甘溫而澀功與蓮子略同但澀性居多服能清心通腎益血固精烏須黑髮止崩住帶如三因固真丸巨勝子丸並皆用之凡欲勤精薄而見滑脫不禁治當用此祕澀但不似龍骨寒澀有收陰定魂安魄之妙牡蠣咸澀微寒兼有化堅解熱之功金櫻徒有止澀之力而無清心通堅之理耳毫釐千里不可不辨在細審玩忌地黃蒜蔥芡實水果利脾濕澀腎氣芡實專入脾腎如何補脾以其味甘之故甘入脾芡實如何固腎以其味澀之故澀固脫惟其味甘補脾故能利濕而使泄瀉腹痛可治補脾同山藥茯苓白朮人參蓮肉薏苡仁扁豆惟其味澀固腎用芡實一味搗末熬金櫻子煎和丸服之補下元益人謂之水陸丹故能閉氣而使遺帶小便不禁皆愈傷損精氣小便遺數精滑用秋石芡實茯苓蓮肉各四兩為末棗和丸梧子大每服三十丸空心鹽湯送下功與山藥相似然山藥之陰本有過於芡實而芡實之澀更有甚於山藥且山藥兼補肺陰而芡實則止於脾腎而不及於肺用或蒸熟搗粉或連殼同服𧴪𧴪葡萄蓏攝精氣歸宿腎葡萄專入腎種類不一此以𧴪𧴪名者因其形似葡萄瑣細不大故以𧴪𧴪名也張璐論之甚詳言此生於漠北南方亦間有之其干類木而系藤木其子生青熟赤干則紫黑氣味甘鹹而溫能攝精氣歸宿腎臟與五味子功用不甚相遠凡藤蔓之類皆屬於筋形類相似有感而通草木之實皆達於臟實則重著下行實則氣重內入故多入臟不獨此味為然此物向供食品不入湯藥故本草不載近時北人以之強腎南人以之稀痘各有攸宜強腎方用𧴪𧴪葡萄人參各一錢火酒浸一宿清晨塗手心摩擦腰脊能助筋力強壯若臥時摩擦腰脊力助陽事堅強服之尤為得力稀痘方用𧴪𧴪葡萄一歲一錢神黃豆一歲一粒杵為細末一晝夜蜜水調服並擦心窩腰眼能助腎祛邪以北地方物專助東南生氣之不足也然秉質素弱宜服反是則不免有助火之害矣阿芙蓉稷粟補火澀精祕氣阿芙蓉專入命門即罌粟花之津液也一名鴉片一名阿片出於天方國罌粟結青苞時午後以大針刺其外或三五處次早津出以竹刀刮取入磁器陰乾用之氣味與粟殼相似而酸澀更甚用阿芙蓉一分糯米飯搗作三丸通治虛寒百病凡瀉痢脫肛久痢虛滑用一二分米飲送下其功勝於粟殼又痘瘡行漿時泄瀉不止用四五釐至一分未有不止但不可多服忌酸醋犯之斷腸及忌蔥蒜漿水奈今有以房術為用無論病症虛實輒為輕投縱欲以致腎火愈熾籲誤矣禹餘糧石體重鎮怯固脫禹餘糧專入大腸兼入心腎甘平性澀質重時珍曰生於池澤者為禹餘糧生於山谷者為太乙餘糧其中水黃濁者為石中黃水其凝結如粉者為餘糧凝干如石者為石中黃性味功用皆同但入藥有精粗之等耳故服食家以黃水為上太乙次之禹餘糧又次之但禹餘糧乃石中黃粉既能澀下固脫復能重以祛怯仲景治傷寒下利不止心下痞硬利在下焦赤石脂禹餘糧丸主之取重以鎮痞硬澀以固脫泄也時珍曰禹餘糧手足陽明血分重劑也其性澀故主下焦前後諸病功與石脂相同而禹余之質重於石脂石脂之溫過於餘糧不可不辨取無砂者良牡丹為使細研淘取汁澄用寒澀病有寒成亦有熱致寒成者固當用溫熱成者自當用寒如五倍子百草煎其味雖曰酸澀而性實寒不溫為收肺虛火浮之味故能去嗽止痢除痰定喘但百草煎則較倍子而鮮收耳牡蠣性專入腎固脫化痰軟堅而性止專入腎而不入肝龍骨入肝斂氣收魂固脫凡夢遺驚悸是其所宜而性不及入腎各有專治兼治之妙耳至於粟殼雖與五倍入肺斂氣澀腸相似而粟殼之寒則較倍子稍輕粟殼之澀則較倍子更甚故寧用粟而不用倍也粳米氣味甘涼固中除煩用亦最妙若在蛤蜊粉氣味鹹冷功專解熱化痰固肺及秦皮性亦苦寒功專入肝除熱入腎澀氣亦宜相其熱甚以行未可輕與龍骨牡蠣粟殼微寒之藥為比也五倍子卵生內服斂肺瀉火除熱止嗽固脫外祛風濕殺蟲五倍子專入肺脾按書既載味酸而澀氣寒能斂肺經浮熱為化痰滲濕降火收澀之劑汪昂述丹溪謂倍子屬金與水噙之善收頑痰解熱毒黃昏咳嗽乃火浮肺中不宜用涼藥宜五倍五味斂而降之醫學綱目云王元圭虛而滑精屢與加味四物湯吞河間祕真丸及真珍粉丸不止後用五倍子一兩茯苓二兩丸服遂愈此則倍子收斂之功敏於龍骨蛤粉也昂按凡用祕澀藥能通而後能祕此方用茯苓倍於五倍一瀉一收是以能盡其妙也又言主於風濕凡風癬癢瘙眼目赤痛用之亦能有效得非又收又散又升又降之味乎詎知火浮肺中無處不形在上則有痰結咳嗽汗出口乾吐衄等症在下則有泄痢五痔下血脫肛膿水濕爛子腸墜下等症溢於皮膚感冒寒邪則必見有風癬癢瘙瘡口不斂攻於眼目則必見有赤腫翳障用此內以治臟則能斂肺止嗽固脫住汗常出自汗睡中出為盜汗用五倍子研末津調填臍中縛定一夜即止也外以治膚熏洗則能祛風除濕殺蟲一切癬瘡用五倍子去蟲白礬燒過各等分為末搽之干則油調藥雖一味而治分內外用各不同非謂既能入肺收斂治黃昏時嗽又能浮溢於表而為驅逐外邪之藥耳書載外感勿用義實基此染須皂物最妙生於鹽膚木上乃小蟲食汁遺種結球於葉間鹽膚木酸寒除痰生津止嗽五倍子蟲食其津液結成故與鹽膚木功同入藥或生或炒用百藥煎卵生斂肺止嗽固脫百藥煎專入肺胃系五倍子末同藥作餅而成者也五倍一斤同桔梗甘草真茶各一兩入酵糟二兩拌和糖罨起發如面其性稍浮味酸澀而帶余甘五倍子性主收斂加以甘桔同制則收中有發緩中有散凡上焦痰嗽熱渴諸病用此含化最宜加以火煅則治下焦血脫腫毒金瘡喉痹口瘡等症用之即效以黑能入下焦故也粟殼稷粟斂肺澀腸固腎御米殼專入肺大腸兼入腎酸澀微寒功專斂肺澀腸固腎凡久瀉久痢肛脫久嗽氣乏並心腹筋骨諸痛者最宜杲曰收澀固氣能入腎故治骨痛尤宜時珍曰泄瀉下痢既久則氣散不固而腸滑肛脫咳嗽諸病既久則氣散不收而肺脹痛劇故俱宜此澀之固之收之斂之但要有輔佐耳若嗽痢初起寒熱未淨用此以為收澀致令邪留不解則殺人如劍可不慎歟震亨曰治嗽多用粟殼不必疑但要先去病根此乃收後藥也治痢亦同凡痢須先散邪行滯豈可據投粟殼龍骨之藥以閉塞腸胃邪氣蓋邪得補愈甚所以變症作而淹延不已也洗去蒂膜或醋炒蜜炒取用得烏梅陳皮良罌中有米極細書言氣味甘寒煮粥能治反胃亦須分臟偏純及病症陰陽虛實以治龍骨龍斂肝氣止脫鎮驚安魄龍骨專入肝腎大腸兼入心陰中之陽鱗蟲之長甘澀微寒功能入肝斂魂不令浮越之氣遊散於外故書載能驚鎮辟邪止汗定喘馮兆張曰龍靈物也靈則能斂邪惡蠱毒魘魅之氣喘逆者氣不歸元也氣得斂攝而歸元則喘逆自止澀可去脫故書載能以治脫肛遺結崩帶瘡口不斂等症功與牡蠣相同但牡蠣咸澀入腎有軟堅化痰清熱之功此屬甘澀入肝有收斂止脫鎮驚安魄之妙如徐之才所謂澀可止脫龍骨牡蠣之屬白地錦紋舐之黏舌者佳時珍曰龍骨本經以為死龍其說似是別録曰生晉地川穀及太山岩水岸上穴中死龍處採無時汪昂曰今人或以古壙灰僞之酒煮火煅用忌魚及鐵畏石膏川椒得人參牛黃良牛黃惡龍骨而龍骨得牛黃更良有以制伏也龍齒入肝收魂安魄凡驚癇癲狂因於肝魂不收者即當用此以療肝藏魂能變化故魂遊不定者治之以龍齒但無止瀉澀精之用牡蠣蚌蛤入腎澀精固氣化痰軟堅牡蠣專入腎兼入肝咸澀微寒功專入腎軟堅化痰散結收澀固脫故瘰癧結核血瘕遺精崩帶咳嗽盜汗遺尿滑泄燥渴溫瘧赤痢等症皆能見效權曰病虛而多熱宜同地黃小草用之好古曰牡蠣入足少陰為軟堅之劑以柴胡引之能去脅下硬以茶引之能消項上結核以大黃引之能消股間腫以地黃為使能益精收澀止小便腎經血分之藥也成無己曰牡蠣之咸以消胸膈之滿以泄水氣使痞者消硬者軟也元素曰壯水之主以鎮陽光則渴飲不思故蛤蠣之類能止渴也然鹹味獨勝走腎斂澀居多久服亦能寒中或生用鹽水煮煅成灰用此本海氣化成純雄無雌故曰牡蠣貝母為使得甘草牛膝遠志蛇床子良惡麻黃辛夷吳茱萸伏硇砂蛤蜊粉蚌蛤解毒化痰止嗽斂寒蛤蜊粉專入腎兼入肺肝即海內水蚌殼煅而為粉也與江海淡水蚌殼不同功與牡蠣相似但此止有斂澀化堅解熱之力時珍曰寒制火而咸潤下故能降焉寒散熱而咸走血故能消焉堅者軟之以咸取其屬水而性潤也濕者燥之以滲取其經火化而利小便也故能消痰止嗽治腫昔宋徽宗寵妃患此李防禦覓得市人海蚌蛤蛤粉少加青黛以淡齏水加麻油數滴調服而愈亦是斂肺清熱之意無他治也昔滁州酒庫攢司陳通患水腫垂死諸醫不治一嫗令以大蒜十個搗如泥入蛤粉丸食前白湯下服盡小便下數桶而愈肉鹹冷解酒熱文蛤背有紫斑紋較此蛤蜊殼稍厚性味主治頗近但此性兼利水止渴除煩並治血熱崩中帶下總以取其寒咸滌飲之義耳成無己曰文蛤之咸走腎以勝水氣如仲景傷寒太陽病用水劫益煩意欲飲水反不渴及金匱渴欲飲水不止反胃吐後渴欲飲水而貪飲者皆用文蛤湯以治海蛤系海內爛殼混雜沙泥火煅為粉亦屬利水消腫止嗽之品然總不類牡蠣功專收澀固脫解熱為事也收斂酸主收故收當以酸為主也然徒以酸為主而不兼審陰陽虛實以治亦非得乎用酸之道矣故酸收之藥其類甚多然大要性寒而收者則有白芍牡蠣粟殼五倍子百藥煎皂白二礬其收兼有澀固而白芍則但主收而不澀耳性溫與澀而收者則有五味木瓜烏梅訶子赤石脂等味但五味則專斂肺歸腎澀精固氣木瓜則專斂肺醒脾烏梅則專斂氣澀腸訶子則專收脫止瀉清痰降火赤石脂則專收脫止血也若在金櫻雖為澀精要劑然徒具有澀力而補性絶少山茱萸溫補肝腎雖為收脫固氣之用而收多於澀不可分別而異施耳白芍芳草入肝血分斂氣白芍專入肝有白有赤白者味酸微寒無毒功專入肝經血分斂氣緣氣屬陽血屬陰陽亢則陰衰陰凝則陽伏血盛於氣則血凝而不行氣盛於血則血燥而益枯血之盛者必賴辛為之散故川芎號為補肝之氣氣之盛者必賴酸為之收故白芍號為斂肝之液收肝之氣而令氣不妄行也至於書載功能益氣除煩斂汗安胎同桂枝則斂風汗同黃耆人參則斂虛汗補癆退熱及治瀉痢後重痞脹脅痛脅為肝膽二經之處用此則能理中瀉火肺脹噯逆癰腫疝瘕鼻衄目澀用此益陰退火而自治溺閉杲曰白芍能益陰滋濕而停津液故小便自利非因通利也何一不由肝氣之過盛而致陰液之不斂耳杲曰四物湯用芍藥大抵酸澀者為收斂停濕之劑故主手足太陰收斂之體元素曰白芍入脾經補中焦乃下利必用之藥蓋瀉利皆太陰病故不可缺此得炙甘草為佐治腹中疼痛夏月少加黃芩惡寒加桂此仲景神方也其用凡六安脾經一也治腹痛二也收胃氣三也止瀉利四也和血脈五也固腠理六也是以書言能補脾肺者因其肝氣既收則水不剋土土安則金亦得所養故脾肺自爾安和之意杲曰經曰損其肝者緩其中即調血也産後不宜妄用者以其氣血既虛芍藥恐伐生氣之意也馮兆張曰産後芍藥佐以薑桂制以酒炒合宜而用有何方之可執哉倘腹痛非因血虛者不可誤用蓋諸腹痛宜辛散而芍藥酸收故耳又曰今人用芍藥則株守前人一定之言每於産後冬月兢兢畏懼及其芩連梔子視為平常要藥凡遇發熱不論虛實輒投致令虛陽浮越惜哉然用之得宜亦又何忌同白朮則補脾同參耆則補氣同歸地則補血同芎藭則瀉肝同甘草止腹痛同黃連止瀉痢同防風發痘疹同薑棗溫經散濕如仲景黑神散芍藥湯非皆産後要藥耶惟在相症明確耳出杭州佳酒炒用惡芒硝石斛畏鱉甲小薊反藜蘆赤芍其義另詳五味子蔓草斂肺歸腎澀精固氣五味專入肺腎味雖有五皮甘肉酸核中苦辛皆咸而酸鹹俱多其性亦溫故書載能斂氣滋水益氣生津補虛明目強陰澀精止嘔除瀉寧嗽定喘除煩止渴消腫解酒收耗散之氣瞳子散大為保肺滋腎要藥成無己曰肺欲收急食酸以收之震亨曰五味大能收肺氣宜其有補腎之功收肺氣非除熱乎補腎非暖水臟乎乃火熱嗽必用之藥好古曰張仲景八味丸用此補腎亦兼述類象形也蓋氣發於胃出於肺若陰虛火起則氣散而不收而煩渴咳嗽遺精汗散等症因之互見故必用以酸鹹則氣始有歸宿而病悉除至云能以除熱者是即氣收而火不外見之意也所云能暖水臟者是即腎因得溫而氣得暖而藏之也但寒邪初冒脈實有火者禁用杲曰有外邪者不可驟用以閉邪氣必先發散而後用之乃良北産紫黑者良入補藥蒸嗽藥生用惡葳蕤酸棗仁灌木收肝膽虛熱不眠酸棗仁專入肝膽兼入脾甘酸而潤仍有生熟之分生則能導虛熱故療肝熱好眠神昏燥倦之症熟則收斂津液故療膽虛不眠煩渴虛汗之症志曰按五代史後唐刊石藥驗云酸棗仁睡多生使不得睡炒熟陶云食之醒睡而經云療不得眠蓋其子肉味酸食之使不思睡核中仁服之療不得眠正如麻黃髮汗根節止汗也本肝膽二經要藥因其氣香味甘故又能舒太陰之脾時珍曰今人專以為心家藥殊昧此理按肝虛則陰傷而心煩而魂不能藏肝藏魂是以不得眠也故凡傷寒虛煩多汗及虛人盜汗皆炒熟用之取其收斂肝脾之津液也如心多驚悸用酸棗仁一兩炒香搗為散每服二錢竹葉湯調下又溫膽湯或加棗仁金匱治虛勞虛煩用酸棗仁湯棗仁三升甘草一兩炙知母茯苓芎藭各二兩深師加生薑二兩此補肝之劑歸脾湯用以滋營氣亦以營氣得養則肝自藏魂而彌安血自歸脾而臥見矣其曰膽熱好眠可療因其膽被熱淫神志昏冒故似好眠其症仍兼煩燥用此同茶療熱熱療則神清氣爽又安有好眠之弊乎汪昂曰溫膽湯治不眠內用二陳加竹茹枳實涼味乃涼肺瀉胃之熱以溫膽之寒也其以溫膽名湯者以膽欲不寒不燥常溫為候耳但仁性多潤滑泄最忌縱使香能舒脾難免潤不受滑矣附記以補書所未及炒研用炒久則油香不香碎久則氣味俱失便難見功惡防己金櫻子灌木收澀脾腎與肺精氣金櫻子專入腎脾肺形如黃罌生者酸澀熟者甘澀用當用其將熟之際得微酸甘澀之妙取其澀可止脫甘可補中酸可收陰故能善理夢遺崩帶遺尿且能安魂定魄補精益氣壯筋健骨此雖收澀佳劑然無故熬膏頻服而令經絡隧道阻滯非惟無益反致增害震亨曰經絡隧道以通暢為平和而昧者取澀性為快熬金櫻膏為煎食之自作不靖咎將誰屬諸凡藥品須當審顧不可不知似榴而小黃赤有刺取半黃者熟則純甘去刺核熬膏甘多澀少訶子喬木收脫止泄仍降痰火除滑訶子專入大腸胃味苦酸澀氣溫無毒雖有收脫止瀉之功然苦味居多服反使氣下泄故書載能消痰降火止喘定逆杲曰肺苦氣上逆急食苦以泄之以酸補之訶子苦重瀉氣酸輕不能補肺故嗽藥中不用且於虛人不宜獨用震亨曰訶子下氣以其味苦而性急氣實者宜之若氣虛者似難輕服如補肺則必同於人參補脾則必同於白朮斂肺則必同於五味下氣則必同於橘皮至於嗽痢初起用最切忌以其止有劫截之功耳東垣云嗽藥不用者非矣但咳嗽未久者不可驟服此能調胃和中亦能消膨去脹使中自和用非脾胃虛弱於中實有補也波斯國人行舟遇大魚涎滑數里舟不能行投以訶子其滑即化番船今多用此以防不虞則其化涎消痰概可見矣第性兼收澀外邪未除其切禁焉出番船及嶺南色黑肉厚者良酒蒸去核用肉但生清肺行氣熟溫胃固腸山茱萸灌木溫補肝腎澀精固氣山茱萸專入肝腎味酸性溫而澀何書載縮小便祕精氣以其味酸酸主收性澀澀固脫得此則精與氣不滑又云能暖腰膝及風寒濕痹肝虛則風入肝寒則寒與濕易犯鼻塞目黃肝虛邪客則目黃以其氣溫克補得此能入肝腎二經氣分者故耳馮兆張曰溫暖之劑方有益於元陽故四時之令春生而秋殺也萬物之性喜暖而惡寒肝腎居至陰之地非陽和之氣則陰何以生乎山茱正入二經氣溫而主補味酸而主斂故精氣益而腰膝強也且澀本屬收閉何書載使九竅皆通耳鳴耳聾皆治亦是因其精氣充足則九竅自利又曷為澀而不通乎好古曰滑則氣脫澀劑所以收之仲景八味丸用之為君其性可知矣繡按別録甄權皆云服能發汗多是服此精氣足而汗自發之意亦非誤文但令後人費解耳去核用惡桔梗防風防己赤石脂石入大腸血分固脫赤石脂專入大腸與禹余粟殼皆屬收澀固脫之劑但粟殼體輕微寒其功止入氣分斂肺此則甘溫質重色赤能入下焦血分固脫及兼潰瀉收口長肉生肌也時珍曰張仲景用桃花湯治下痢便膿血取赤石脂之重澀入下焦血分而固脫乾薑之辛溫暖下焦氣分而補虛粳米之甘溫佐石脂乾薑而潤腸胃也禹余甘平性澀其重過於石脂此則功專主澀其曰鎮墜終遜禹余之力耳是以石脂之溫則能益氣生肌石脂之酸則能止血固下至云能以明目益精亦是精血既脫得此固斂始見目明而精益矣催生下胎亦是味兼辛溫化其惡血惡血去則胞與胎自無阻耳故曰固腸有收斂之能下胎不無推蕩之峻細膩黏舌者良時珍曰石脂雖五種而性味主治不甚相遠赤入血分白入氣分研粉水飛用惡芫花畏大黃木瓜山果醒脾胃筋骨之濕收脾肺耗散之氣木瓜專入脾肺兼入肝酸澀而溫止屬收斂之品何書載著其功曰理脾舒筋斂肺緣暑濕傷人揮霍撩亂吐瀉交作未有不纍脾胃而傷元氣損營衛而敗筋骨木瓜性味酸澀既於濕熱可疏復於耗損可斂時珍曰木瓜所主吐利轉筋腳氣本皆脾胃固非肝病也肝雖主筋而轉筋則由濕熱寒濕之邪襲傷脾胃所致故轉筋必起於足腓腓及宗筋皆屬陽明木瓜治轉筋非益筋也理脾而伐肝也土病則金衰而木盛故用酸溫以收脾肺之耗散而藉其轉筋以平肝邪乃土中瀉木以助金也木平則土得令而金受蔭矣故能於脾有補於筋可舒於肺可斂豈真脾肺虛弱可為常用之味哉然使食之太過則又損齒與骨及犯癃閉針經云多食酸令人癃酸入於胃其氣澀以收兩焦之氣不能出入流入胃中下去膀胱胞薄以軟得酸則縮卷約而不通故水道不利而癃澀也劉仲海曰食蜜煎木瓜三五枚同伴數人皆病淋疾以問天益天益曰此食酸所致也但奪食則已陰之所生本在五味陰之所營傷在五味五味太過皆能傷人不獨酸也鄭奠一曰豫治舉舟人病溺不得出醫用通利藥罔效迎豫視之聞四面皆木瓜香笑謂諸人曰撤去此物溺即出矣盡傾其物溺如舊以其收澀甚而伐肝極奈人僅知理腳濕熱傷於足者用此可理如昔有患足痹者赴舟見舟中一袋以足倚之比及登岸足已善步詢袋中何物乃木瓜也若寒濕傷於足者用此酸澀雖曰利濕而於寒不克除恐非利濕佳劑耳而不審其虛實妄投殊為可惜陳者良忌鐵烏梅五草入肝斂氣澀腸烏梅專入肺腸兼入肝膽酸澀而溫似有類於木瓜但此入肺則收成無己曰肺欲收急食酸以收之入腸則澀腸垢已出肘後用烏梅肉二十個水一盞煎六分食前服血崩不止用烏梅肉七枚燒存性研末米飲服之日二次莊肅公痢血用烏梅胡黃連灶下土等分為末茶調服亦效蓋血得酸則斂得寒則止得茗則澀故也入筋與骨則軟酸入筋入蟲則伏蟲得酸則伏入於死肌惡肉惡痣則除鬼遺方用烏梅肉燒存性研敷惡肉上一夜立盡聖惠用烏梅和蜜作餅貼者其力緩簡便方云起臂生一疽膿潰百日方愈中有惡肉突起用此方試之一日夜去其大半再上一日而平乃知世有奇方刺入肉中則拔故於久瀉久痢氣逆煩滿反胃骨蒸無不因其收澀之性而使下脫上逆皆治且於癰毒可敷已潰未潰可用此燒灰存性為末入輕粉少許香油調塗四圍中風牙關緊閉可開取肉擦牙齦涎出即開以酸能入筋骨以軟蛔蟲上攻眩僕可治仲景有烏梅治蛔上攻眩僕口渴可止時珍曰人之舌下有四竅兩竅通膽液故食梅則津生者類相感應也素問云味過於酸肝氣以泄又云酸走筋筋病無多食酸不然物之味酸者多矣何獨梅能生津耶寧不為酸澀收斂之一驗乎不似木瓜功專疏泄脾胃筋骨濕熱收斂脾肺耗散之元而於他症則不及也白梅由於鹽漬味鹹則能軟堅通大便亦用若牙關緊閉白梅尤良死肉黑痣白梅用之更捷食梅齒酸者嚼胡桃即解衣有黴點者梅葉煎湯洗之搗洗葛衣亦佳但肝喜散惡收久服酸味亦伐生氣生氣者陽氣也且於諸症初起切忌鎮虛虛則空而不實非有實以鎮之則易覆矣虛則輕而易敗非有實以投之則易墜矣故重墜之藥亦為治病者所必需也然用金石諸藥以治而不審其氣味以別亦非治病通活之妙故有熱者宜以涼鎮如代赭石珍珠之治心肝二經熱驚辰砂之清心熱磁石之治腎水虛怯龍骨龍齒之治肝氣虛浮是也有寒者宜以熱鎮如雲母石之能溫中去怯硫黃之能補火除寒通便定驚是也寒熱俱有者宜以平鎮如禹餘糧金銀薄鐵粉密陀僧之屬是也但禹餘糧則兼止脫固泄金銀薄則兼除熱祛風鐵粉則兼療狂消癰皆借金性平木密陀僧則兼除積消熱滌痰也其一鎮墜而藥品氣味治用各自有別其不容紊如此然要病有外邪不可輕投寒邪得鎮而愈固耳金銀薄金平肝鎮怯金專入肝稟剛健之性最能殺人惟作薄乃無傷耳銀薄亦然二薄性皆辛平其治俱屬除邪殺毒解熱驅煩安魂定魄養心和血止癲除狂療驚祛風幼科鎮心丸衣以為飾皆取金能平木重以鎮怯之意云耳風熱多生於肝肝屬木故得金為之制魂魄飛揚者其神散而不收必得重為之鎮但銀薄色白入氣金薄色黃入血差各有別畏錫水銀遇鉛則碎五金皆畏入丸為衣入湯劑水煮用鐵粉金入肝平木重墜鎮驚療狂鐵粉專入肝氣辛性平煅時砧上打落者名鐵落如塵飛起者名鐵精器物生衣者名鐵鏽鹽醋浸出者名鐵華刮取細搗為粉本草云鐵受太陽之氣始生之初滷石産焉一百五十年而成磁石二百年孕而成鐵又二百年不經採煉而成銅銅復化為白金白金化為黃金是鐵與金銀同為一氣今取磁石碎之內有鐵片可驗矣諸書所著治功止載定驚療狂消癰解毒數效即其所云定驚療狂亦止就鐵重墜之意起見故云可以定療豈真救本求源之治哉暫用則可久用鮮效且諸草藥切忌時珍曰凡諸草藥皆忌鐵器而補腎藥尤忌否則反消腎上肝傷氣母氣愈虛矣畏磁石皂莢皂莢木作薪則釜裂煅赤醋沃七次用磁石石補腎水鎮怯磁石專入腎即俗㶸石磁為鐵母磁石二百年孕而成鐵故見鐵即能以引是以有磁之說也磁石味辛而咸微寒無毒得沖和之氣能入腎鎮陰使陰氣龍火不得上升故千金磁朱丸用此以治耳鳴嘈嘈耳屬腎竅腎虛瞳神散大瞳人屬腎謂有磁以鎮養真精使神水不得外移硃砂入心鎮養心血使邪火不得上侵耳目腎受蔭矣且磁入腎腎主骨磁味辛辛主散磁味鹹咸軟堅磁質重重鎮怯故凡周痹風濕而見肢體痠痛驚癇腫核誤吞針鐵金瘡血出者亦何莫不用此以為調治吞針系線服下引上即出昔徐之才十劑篇云重可去怯磁石鐵粉之屬是也故怯則氣浮宜重劑以鎮之然亦不可與鐵同用色黑能吸鐵者真火煅醋淬碾末水飛用柴胡為使殺鐵消金惡牡丹莽草畏黃石脂代赭石石入心肝二經涼血解熱鎮驚代赭石專入心肝味苦而甘氣寒無毒凡因血分屬熱崩帶瀉痢胎動産難噎膈痞硬驚癇金瘡等症治之即能有效仲景治傷寒汗吐下後心下痞硬噫氣不除者旋覆代赭湯主之用旋覆花三兩代赭石一兩人參三兩生薑五兩甘草三兩半夏半升大棗十二枚水一斗煮六升去渣再煎三升溫服一升日三服噎膈病亦用此以其體有鎮怯之能甘有和血之力寒有勝熱之義專入心肝二經血分涼血解熱鎮怯祛毒色赤入血但小兒慢驚虛症甚多及陽虛陰痿下部虛寒者忌之以其沉降而乏生髮之功耳書載能治慢驚其說似非實症不得謂慢虛症當從溫理不可不辨擊碎有乳孔者真火煅醋淬三次研細水飛用乾薑為使畏雄附雲母石石溫中鎮怯雲母專入脾兼入肝肺生於泰山山谷氣味甘平而溫諸書皆言達肌溫肉安臟定魄補中絶續故凡死肌敗肉惡毒陰疽及車船眩暈痰飲頭痛皆當用此調治以其溫有陽和之力重有鎮攝之能故能使之辟邪而鎮怯也局方雲母膏治一切癰毒仲景治牝瘧多寒千金方治久痢帶下小便淋疾及一切惡瘡深師治痰飲頭痛何德揚治婦人難産溫酒調服三錢入口即下金刃傷敷之止血最速且無腐爛之虞陰疽陽癰亦多用之皆取助陽之力但書有言久服身輕尸解不過極為讚揚且因是物經時不焦入土不腐故云服可長生其說即出本經豈真事哉但此性屬助陽陰虛火炎者勿服以色白光瑩者良雲母石有五色使澤瀉惡羊肉密陀僧金燥濕除熱消痰祛積鎮怯密陀僧專入脾系出銀坑之中真者難得今用多屬傾銀爐底味辛而咸氣平小毒大率多屬祛濕除熱消積滌痰鎮陰之品故書載能絶瘧除痢安驚定魄止血散腫消積殺蟲及療腫毒敷凍瘡桐油調敷解狐臭漿水洗淨油調密陀僧塗之以一錢用熱蒸餅一個切開滲末夾之染鬚髮非其痰祛熱清濕除重鎮軟堅則病曷克去乎時珍曰密陀僧感鉛銀之氣其性重墜下沉直走下焦故能墜痰止吐消積定驚治瘧痢止消渴療瘡腫洪邁夷堅志云驚氣入心絡喑不能語者用密陀僧末一匙茶調服即愈但此出於銷銀爐里則有銅氣雜入不堪入藥且只可以外敷不可以作服餌也若入藥須煮一伏時
