body:
  text: 卷三散劑散寒凡病傷於七情者宜補傷於六淫者宜散宜清傷於七情者宜補則補自有輕重之分先天后天之別傷於六淫者宜散則散自有經絡之殊邪氣之異如輕而淺者其邪止在皮毛尚謂之感其散不敢過峻若至次第傳變則邪已在於經其散似非輕劑可愈逮至愈傳愈深則邪已入不毛其邪應從下奪又非散劑所可愈矣是以邪之本乎風者其散必謂之驅以風善行數變不驅不足御其奔迅逃竄之勢也邪之本於寒者其散止謂之散以寒凝結不解不散不足啓其冰伏否塞之象也邪之得於霧露陰寒之濕者其邪本自上受則散當從上解而不得以下施邪之漸鬱而成熱者其散當用甘平辛平而不可用辛燥至於邪留於膈欲上不上欲下不下則當因高而越其吐之也必宜邪固於中流連不解則當從中以散其溫之也必便若使邪輕而感有不得用峻劣之藥者又不得不用平淡以進俾邪盡從輕散而不致有損傷之變此用散之概也又按陰盛則陽微陽勝則陰弱凡受陰寒肅殺之氣者自不得不用辛熱以治惟是邪初在表而表尚有表中之表以為區別如邪初由皮毛而入太陽其症必合肺經並見故藥必先用以麻黃以發太陽膀胱之寒及或佐以杏仁生薑入肺並或止用桔梗紫蘇蔥管黨參入肺之味以進但杏仁則專入肺散寒下氣止喘生薑則專入肺辟惡止嘔蔥管則專入肺發汗解肌桔梗則專入肺開提肺中風寒載藥上浮黨參本於防風桔梗偽造則其氣味亦即等於防風桔梗以疏肺氣至於細辛蔓荊雖與諸藥同為散寒之品然細辛則宣腎經風寒蔓荊則除筋骨寒濕及發頭面風寒皆非太陽膀胱專藥及手太陰肺經藥耳他如白蔻蓽茇良薑乾薑川椒紅豆蔻氣味辛熱並薰香氣味辛平與馬兜鈴紫白石英冬花百部氣味辛溫雖於肺經則治然終非屬入肺專品所當分別而異視者也麻黃隰草發寒入太陽膀胱無汗麻黃專入膀胱兼入肺辛溫微苦中空而浮入足太陽膀胱足太陽為六經外藩總經絡而統營衛其經之脈起目眥上腦下項循肩挾脊抵腰行於身後故凡寒入是經其症必見頭痛發熱惡寒腰脊卒強無汗脈則尺寸俱緊是為傷寒若汗自出不止及脈不緊不浮其症或不惡寒而止惡風是為傷風兼入手太陰肺麻黃空虛似肺故亦兼入肺經仲景用此以治寒入太陽無汗其意甚深蓋緣津液為汗汗即血也在營則為血在衛則為汗寒傷營營血內澀不能外通於衛衛氣固密津液不行故無汗發熱而惡寒方用麻黃甘草同桂枝引出營分之邪達之肌表佐以杏仁泄肺而利氣是麻黃雖太陽發汗重劑實散肺經火鬱之邪其在十劑有曰輕可去實葛根麻黃之屬是也弘景曰麻黃療傷寒解肌第一藥時珍曰麻黃乃肺經專藥故治肺病多用之張仲景治傷寒無汗用麻黃有汗用桂枝未有究其精微者時珍常思津液為汗汗即血也在營則為血在衛則為汗夫寒傷營營血內澀不能外通於衛衛氣閉固津液不行故無汗發熱而惡寒夫風傷衛衛氣外泄不能內護於營營氣虛弱津液不固故有汗發熱而惡風然風寒之邪皆由皮毛而入皮毛者肺之合也肺主衛氣包羅一身天之象也是證雖屬乎太陽而肺實受邪氣其症時兼面赤怫鬱咳嗽有痰喘而胸滿諸症非肺病乎蓋皮毛外閉則邪熱內攻而肺氣膹郁故用麻黃甘草同桂枝引出營分之邪達之肌表佐以杏仁泄肺而利氣汗後無大熱而喘者加以石膏朱肱活人書夏至加石膏知母者是泄肺火之藥是則麻黃湯雖太陽發汗重劑實為發散肺經火鬱之藥也腠理不密則津液外泄而肺氣自虛虛則補其母故用桂枝同甘草外散風邪以救表內伐肝木以防脾佐以芍藥泄木而固脾泄東所以補西也使以薑棗行脾之津液而和營衛也下後微喘者加厚朴杏仁以利肺氣也汗後脈沉遲者加人參以益肺氣也朱肱加黃芩為陽旦湯以泄肺熱也皆是脾肺之藥是則桂枝雖太陽解肌輕劑實為理脾救肺之藥也此千古未發之祕旨愚因表而出之又少陰病發熱脈沉有麻黃附子細辛湯麻黃附子甘草湯少陰與太陽為表裡趙嗣真所謂熟附配麻黃補中有發也是以風寒鬱肺而見咳逆上氣痰哮氣喘則並載其能治但用此之法則在佐使之間或兼氣藥以助力人參可得衛中之汗或兼營藥以助液當歸可得營中之汗或兼溫藥以助陽附子可除寒凝之寒毒或兼寒藥以助陰黃芩石膏知母可解炎熱之瘟邪此實傷寒陰瘧第一要藥至或有載不宜多用及夏月不宜用者蓋因過用則汗多亡陽自汗表虛則耗人元氣張仲景曰陽盛陰虛者不可發汗尺脈遲者不可發汗咽燥喉乾者不可發汗咳而小便利若失小便者不可發汗下利雖有表症不可發汗淋家不可發汗衄血亡血家不可發汗瘡家雖身疼痛不可發汗少陰病脈沉細數不可發汗少陰病但厥無汗不可發汗脈動數微弱不可發汗脈沉遲不可發汗汗家不可發汗腹中上下左右有動氣不可發汗夏月陽氣外泄不宜再發以奪元氣耳然果春夏值有深寒內入則又何不可用之有至於手少陰心之風熱斑疹足厥陰之風痛目痛審其腠理堅閉病應用散亦當審實以投功與桂枝柴胡葛根芍藥同為一類但桂枝則解太陽風邪傷衛王好古曰心主營為血肺主衛為氣故麻黃為手太陰肺之藥桂枝為手少陰心之藥葛根則解陽明肌熱口渴時珍曰麻黃太陽經藥兼入肺經肺主皮毛葛根陽明經藥兼入脾經柴胡則發少陽陽邪寒熱往來此則能發太陽陰邪傷營不可不細辨也發汗用莖去節止汗須用根節並蛤粉粟米等分為末袋盛撲之時珍曰麻黃髮汗之氣駛不能御而根節止汗效如影響物理之妙不可測度如此自汗有風濕傷風風溫氣虛血虛脾虛陰虛胃熱痰飲中暑亡陽柔痓諸症皆可隨症加而用之當歸六黃湯加麻黃根治盜汗尤捷蓋其性能行周身肌表故能引諸藥外至衛分而固腠理也本草但知撲之之法而不知服餌之功尤良也宣明五氣篇曰心為汗則知汗出於心經脈別論曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝體搖勞倦汗出於脾本病篇曰醉飽行房汗出於脾厚朴白薇為使惡辛夷石葦細辛山草宜散腎經風寒細辛專入腎兼入肝膽味辛而厚氣溫而烈為足少陰腎溫經主藥凡風寒邪入至陰而見本經頭痛太陽頭痛在腦後陽明頭痛在額少陽頭痛在兩角厥陰頭痛在巔頂少陰頭痛在腦齒腰脊俱強口瘡喉痹鼻淵齒𧈟水停心下口吐涎沫成無己曰水停心下不行則腎氣燥宜辛以潤之細辛之辛以行水氣而潤燥耳聾鼻癰倒睫便澀者並宜用此調治或用獨活為使俾在表之陽邪可表而在裡之伏邪可除故書載能通關利竅破痰下乳行血發汗仲景治少陰症反發熱麻黃附子細辛湯以發少陰之汗且走腎者必兼肝與膽膽虛驚癇及風眼淚下者得此辛散宣通而令淚收驚除至書所云服能入腎潤燥非是火盛水衰陰被陽涸而成實因陰盛陽衰火屈於水而致也遇此辛以除寒溫以燥濕則陰得解而不凝矣豈剛燥不撓之謂也乎時珍曰氣之厚者能發陽中之陽也辛溫能散故諸風寒風濕頭痛痰飲胸中滯氣驚癇者宜用之口瘡喉痹𧈟齒諸痛用之者取其能散浮熱亦火鬱則發之之義也辛能泄肺故風寒咳嗽上氣者宜用之辛能散燥故通少陰及耳竅便澀者宜用之世之論藥性者每鮮如此體會但知就燥論燥而致固執不通獨不思經有云腎苦燥急食辛以潤之乎然味厚性烈所用止宜數分過則氣塞命傾承曰細辛多則氣悶塞不通者死雖死無傷近年開平獄中嘗治此不可不知若血虛頭痛者尤宜戒焉産華陰者真時珍曰葉似小葵柔莖細根直而色紫味極辛者細辛也杜衡鬼督郵徐長卿皆可亂之去雙葉者用雙葉服之害人惡黃耆山茱萸畏硝石滑石反藜蘆紫蘇芳草疏肺寒氣內客紫蘇專入肺兼入心脾背面俱紫辛溫香竄五月端午採用凡風寒偶傷氣閉不利心膨氣脹並暑濕泄瀉熱閉血衄崩淋喉腥口臭俱可用此調治取其辛能入氣紫能入血香能透外溫可暖中使其一身舒暢故命其名曰蘇蘇與穌同是以時珍謂其同橘皮砂仁則能行氣安胎同藿香烏藥則能快氣止痛同麻黃葛根則能發汗解肌同芎藭當歸則能和營散血同木瓜厚朴則能散濕解暑同桔梗枳殼則能利膈寬中同杏子蔔子則能消痰定喘要皆疏肺利氣之品雖其氣味淺薄難以奏效但久服亦能泄人真氣虛寒泄瀉尤忌即安胎和胃藥中用之不過取其辛香暫調胃寒氣滯之症豈可概用久用以陷虛虛之禍耶宗奭曰紫蘇氣味香散今人朝暮飲紫蘇湯無益醫家謂芳草致豪貴之疾者此有一焉若脾胃寒人多致滑泄往往不覺梗下氣稍緩子降氣最速務本新書云凡地畔近道可種蘇以遮六畜收子打油燃燈甚明弘景曰蘇子下氣與橘皮相宜與橘紅同為除喘定嗽消痰順氣之藥葉發汗散寒梗順氣安胎子降氣開鬱消痰定喘表弱氣虛者忌用葉腸滑氣虛者忌用子但性主疏泄氣虛陰虛喘逆者並禁宜橘皮忌鯉魚子炒研用桔梗山草開提肺中風寒載藥上行桔梗專入肺兼入心胃辛苦而平按書既載能引諸藥上行又載能以下氣其義何居蓋緣人之臟腑胸膈本貴通利一有寒邪阻塞則氣血不通其在於肺則或為不利而見痰壅喘促鼻塞其在陽明胃則或風熱相搏而見齒痛其在少陰腎則因寒蔽火鬱而見目赤喉痹咽痛久而火鬱於肺則見口瘡肺癰乾咳火鬱上焦則見胸膈刺痛肺火移郁大腸則見下痢腹痛腹滿腸鳴總皆寒入於肺閉其竅道一語透盡諸病根源則清不得上行濁因不得下降耳桔梗味苦氣平質浮色白系開提肺氣之聖藥可為諸藥舟楫載之上浮能引苦泄峻下之劑至於至高之分成功俾清氣既得上升則濁氣自克下降降氣之説理根於是是以好古加味甘桔無不因症加藥如失音則加訶子聲不出加半夏上氣加陳皮涎嗽加知母貝母咳渴加五味酒毒加葛根少氣加人參嘔加半夏生薑吐膿血加紫苑肺萎加阿膠胸膈不快加枳殼痞滿加枳實目赤加梔子大黃面腫加茯苓膚痛加黃耆發斑加荊防疫癘加牛蒡大黃不得眠加梔子總不離乎桔梗以為開提時珍曰朱肱活人書治胸中痞滿不痛用桔梗枳殼取其通肺利膈下氣也張仲景傷寒論治寒實結胸用桔梗貝母巴豆取其溫中消穀破積也又治肺癰唾膿用桔梗甘草取其苦辛清肺甘溫瀉火又能排膿血補內漏也其治少陰症三四日咽痛亦用桔梗甘草取其苦辛散寒甘平除熱合而用之能除寒熱也後人易名甘桔湯通治咽喉口舌諸病宋仁宗加荊芥防風連翹遂名如聖湯極言其驗也奈世僅知此屬上升而不知其下行其失遠矣但痘疹下部不起勿用以其性升之故久嗽不宜妄用以其通陽泄氣之故陰虛不宜妄用以其拔火上乘之故其蘆能吐膈上風熱痰實生研末水調服探吐去浮皮泔浸微炒用畏龍膽草白芨忌豬肉黨參山草宣肺寒清肺熱人參而有上黨之號專入肺蓋緣隋文帝時上黨有人宅後去宅一里許見參異常掘得人參一如人體云又上黨人參根頗纖長根下垂有及一尺余者或十岐者其價與銀相等遼東高麗百濟諸參均莫及焉李時珍云上黨潞州也民以人參為地方害不復採取今所用者皆是遼參觀此則知諸參惟上黨為最美而上黨既不可採豈復別有黨參之謂哉近因遼參價貴而世好奇居異乃以山西太行山出之苗及以防風桔梗薺苨偽造相繼混行詎知參有不同性有各異防風桔梗乃屬表散風寒傷氣之味人參甘溫乃屬補肺益氣之味即山西太行山新出之黨考之張璐亦謂甘平清肺並非等於真正黨參確有補益今人但見參貴而即以此代參不亦大相徑庭乎且余嘗見虛弱之症亟當人參峻補以救垂絶而醫猥用黨參替代以致病卒不起並令豪貴之家朝夕代茶以致肺受剝削病潛滋長此皆誤用之害人但習而不察耳附記以為世之粗工妄用黨參戒生薑葷辛發表除寒止嘔生薑專入肺氣味辛竄走而不守據書開載主治甚多然總髮表除寒開鬱散氣辟惡除邪數端而已薑性意義一索盡貫其曰傷寒頭痛傷風鼻塞可用者以其主有宣散通肺之力也辛主散咳逆口噦而必用者以其具有開提散郁之義也孫真人云薑為嘔家聖藥蓋辛以散之嘔乃氣逆不散此藥行陽而散氣也或問生薑辛溫入肺何以云入胃口曰俗以心下為胃口者非矣咽門之下受有形之物及胃之系便是胃口與肺系同行故能入肺而開胃口也水氣濕瀉血痹而必用者以其具有逐陰行陽除濕開導之力也血痹衝心不下生薑五兩水八升煮服他如凍耳可擦辛以散寒狐臭可療薑汁頻擦力能祛寒闢穢諸毒可解凡半夏南星菌菌野禽諸毒可解亦何莫不由宣發之力以為闢除時珍曰薑辛而不葷去邪辟惡生啖熟食醋醬糟鹽蜜煎調和無不宜之可蔬可和可果可藥其利溥矣夫辛入肺肺旺則一身之氣皆為吾用中焦之元氣充而足脾胃出納之令壯而行邪氣不能容矣凡中風中暑中氣中毒中酒食厥痰厥尸厥冷厥霍亂昏暈一切暴病得之必救暴病方宜方廣心云凡一切卒暴之症用薑汁與童便服立可解救以薑能開痰下氣童便降火也早能含薑不犯霧露之氣薑能除濕及山嵐不正之邪皆能以正神明而闢穢惡真藥中之神聖也但積熱患目及因熱成痔者切忌時珍曰食薑久積熱患目及病痔人多食兼酒其發甚速癰瘡人多食則生惡肉此皆昔人所未言者也至書有言夜主闔而薑不宜食秋主收而薑不宜食與孕婦食薑而令兒指象形此雖就其時令及以物類相感立説然亦未可盡拘薑皮辛涼和脾利水消腫取其皮以行皮之義秦皮為使惡黃連黃芩夜明沙相感志云糟薑瓶內入蟬蛻雖老薑無筋亦物性有所伏耶蔥葷辛入肺宣寒發汗解肌蔥葉專入肺兼入肝生辛而散熟甘而溫外實中空能入肺經發汗解肌以通上下之陽活人書治傷寒頭痛如破用連須蔥白湯仲景治少陰病下利清穀裡寒外熱厥逆脈微用白通湯若白色赤者四逆湯加蔥白皆取以通陽氣故書號為肺菜其力則能明目利耳通便中空則通及治傷寒頭痛時疾熱狂陰毒腹痛之謂因辛則邪外散又氣通則血活氣為血帥血隨氣活故書又載能止諸般血出不調如赤白痢有用蔥煮粥食以治折傷血出有用蔥火煨研封止痛無瘢胎動有用蔥豉阿膠以安且氣通則毒解故書又言能治諸般惡毒如魚肉蚯蚓猘犬藥毒之類即是以思則知氣血之凝聚是即寒氣之未散寒氣之既散是即血氣之既理又安有毒氣不解而云是藥之莫治乎陽春一回草木甲坼其勢然也故蔥號為菜伯又曰和事草其意在斯取白連須用亦有用青者弘景曰蔥有寒熱白冷青熱傷寒湯中不得用青也但過食亦損鬚髮以辛劫陰故及有虛氣上衝汗出不止之弊以辛散氣故同蜜食如何殺人以蜜性最脹蔥性最發同蔥則脹益發而不可解矣不死何待思邈曰正月食生蔥令人面上起遊風生蔥同蜜食作下利燒蔥同蜜食壅氣殺人同棗食亦令人病其義可以例推因並記之驅風風為陽邪寒為陰邪風屬陽其性多動而變寒屬陰其性多靜而守故論病而至於風則症變遷而莫御論藥而至於風則其藥亦變遷而莫定矣如肝屬風病發於風則多由肝見症乃有風不在肝而偏在於肌肉之表症見惡風自汗之當用桂枝以解其肌風在太陽膀胱症見遊風攻頭之當用以羌活症見一身骨痛之當用以防風症見風攻巔頂之當用以藁本者有如斯矣且有風在少陰腎經症見伏風攻頭之當用以獨活症見口乾而渴之當用以細辛與風在骨髓症見痰迷竅閉之當用以冰片風在皮膚骨髓症見驚瘓疥癩之當用以白花蛇風在關節症見九竅皆閉之當用以麝香症見風濕痹痛之當用以茵芋風在經絡症見瘡瘍癰腫之當用以山甲症見痰涎壅塞之當用以皂角風在十二經絡症見頑痹冷痛之當用以威靈仙風在腸胃症見惡瘡腫毒之當用以肥皂風在陽明胃經症見頭面諸疾之當用以白附白芷者又如此矣更有風熱在肺症見鼻塞鼻淵之當用以辛夷症見目翳眩暈之當用以甘菊症見惡寒發熱無汗而喘之當用以杏仁症見癰腫瘡毒之當用以牛蒡症見喘嗽體腫之當用以白前者又如此矣至於風已在肝而症又挾有濕則如秦艽既除腸胃濕熱又散肝經風邪浮萍既入肝經散風復利脾經之濕海桐皮以療風濕諸痛豨蘞草以治麻木痛冷蒼耳子以治皮膚瘡癬通身周痹巴戟狗脊寄生以強筋骨之類而葳蕤萆薢茵芋白芷白附之偕風濕而治可類推矣風已在肝而症見有熱成則如全蠍之治胎風發搐鉤藤之治驚癇瘛瘲蟬蛻之治皮膚癮疹薄荷之治咽喉口齒石南葉之能逐熱堅腎決明子木賊蕤仁之治風熱目翳之類而辛夷冰片牛蒡之偕風熱以理又可想矣風病在肝而症見有痰氣則如南星之散經絡風痰天麻之治肝經氣鬱虛風川芎之散肝經氣鬱之類而麝香之偕痰氣並理又可思矣風病在肝而症見有風毒則有如蛇蛻之能殺蠱辟惡蜈蚣之能散瘀療結之類而山甲草烏牛蒡肥皂之偕風毒以理又其餘矣風病在肝而更見有寒濕之症則有宜於蔓荊殭蠶五加皮烏尖附之類但其功用治效則有殊矣風病在肝而症見有骨痿不堅之症則有宜於虎骨虎膠之類但其氣味緩急則有間矣至於風病在肝而症見有肌膚燥熱則不得不用荊芥以達其膚而疏其血風病在肝而症見有瘡疥目赤則不得不用蒺藜以散其風而逐其瘀風病在肝而症見有濕熱燥癢則不得不用蕪荑以泄其濕要皆隨症審酌以定其趨但其理道無窮變化靡盡其中旨趣在於平昔細為體會有非倉卒急迫所能得其精微也羌活山草散足太陽膀胱遊風頭痛兼治風濕相搏骨節痛羌活專入膀胱兼入肝腎按大明曰獨活是羌活母也則知羌活即為獨活之子又按時珍言羌活獨活是一物二種正如川芎撫芎蒼朮白朮之義辛苦性溫味薄氣雄功專上升凡病因於太陽膀胱而見風遊於頭發為頭痛經曰身半以上風受之也身半以下濕受之也故風多達巔頂並循經脊強而厥發為剛痓柔痓足太陽之脈行於身背凡傷寒無汗為剛痓傷風有汗為柔痓痓症皆是風寒干於太陽故見脊強並當用此調治痓症宜同獨活調治頭痛宜同川芎調治若血虛見痓忌用且能兼入足少陰腎足厥陰肝而使肌表八風之邪並周身風濕相搏百節之痛皆能卻亂反正而治無不愈者也蓋羌活獨活雖皆治風之品張介賓曰風之為病最多誤治者在不明其表裡耳蓋外風者八方之所中也內風者五臟之本病也八風自外而入必先有發熱惡寒頭疼身熱等症五風由內而病則絶無外症而忽病如風其由內傷可知也內傷者由於七情故多陰虛凡臟氣受傷脾病者病在肢體或多痰飲腎病者或在骨髓或在二陰心病者或在血脈或在神志肺病者或在營衛或在聲音肝病者或在筋爪或在血脈此五臟之類風未有不由陰虛而然者人知陰虛有一而不知陰虛有二如陰中之水虛則病在精血陰中之火虛則病在神氣蓋陽衰則氣去故神志為之昏亂非火虛乎陰虧則形壞故肢體為之廢弛非水虛乎今以神離形壞之症乃不求水火之源而猶以風治鮮不危矣試以天道言之其象亦然凡旱則多燥燥則風生是風木之化從乎燥燥則陰虛之候也故凡治類風者專宜培補真陰以救根本則風燥自除矣甚至有元氣素虧卒然仆倒上無痰下失禁瞑目昏沉此厥竭之症尤與風邪無涉設非大劑參附安望其復真氣於將絶之頃哉倘不察其表裡又不能辨其虛實但以風之為名多用風藥不知風藥皆燥燥復傷陰風藥皆散散復招風以內傷作外感以不足為有餘是促人之死也而此專治太陽之邪上攻於頭旁及周身肌表不似獨活專理下焦風濕病在足少陰腎氣分而不連及太陽經也但羌活性雄力非柔懦凡血虛頭痛及遍身肢節痛者皆非所宜傷氣損血獨活山草搜足少陰腎伏風頭痛並兩足濕痹獨活專入腎辛苦微溫比之羌活其性稍緩凡因風乾足少陰腎經伏而不出發為頭痛痛在腦齒則能善搜而治矣以故兩足濕痹不能動履非此莫痊風勝濕故二活兼勝濕風毒齒痛腎主骨齒者骨之餘頭眩目暈非此莫攻肘後方用獨活煮酒熱漱之緣此有風不動無風反搖故名獨搖草搖者動活之意故名獨活因其所勝而為制也且有風自必有濕故羌則療水濕遊風而獨則療水濕伏風也羌之氣清行氣而發散營衛之邪獨之氣濁行血而溫養營衛之氣羌有發表之功表之表獨有助表之力表之裡羌行上焦而上理土屬氣故云羌活入氣則遊風頭痛風濕骨節疼痛可治獨行下焦而下理下屬血故云獨活入血則伏風頭痛兩足濕痹可治二活雖屬治風而用各有別不可不細審耳去皮焙用蠡實為使防風山草有膀胱上焦筋骨風邪仍為風藥通用防風專入膀胱兼入脾胃味甘微溫雖入足太陽膀胱以治上焦風邪頭痛目眩脊痛項強周身盡痛之才曰得蔥白能行周身然亦能入脾胃二經杲曰若補胃非此引用不能行以為去風除濕凡風藥皆能勝濕蓋此等於卑賤卒伍任主使喚能循諸經之藥以為追隨故同解毒藥則能除濕掃瘡同補氣藥則能取汗升舉或同黃耆芍藥以止汗或合黃耆固表為玉屏風散實為風藥潤劑比之二活則質稍輕氣亦稍平凡屬風藥皆可通用但血虛痓急頭痛不因風寒泄瀉不因寒濕陰虛盜汗陽虛自汗火升發嗽者則並當知所禁矣凡表藥多有損於臟腑氣血出北地黃潤者佳泗風車風不堪入藥上部用身下部用梢畏萆薢惡乾薑白蘞芫花殺附子毒荊芥芳草散肝肌膚氣分風邪仍兼血分疏泄荊芥專入肝辛苦而溫芳香而散氣味輕揚故能入肝經氣分驅散風邪凡風在於皮裡膜外而見肌膚灼熱頭目昏眩咽喉不利身背疼痛者用此治無不效時珍曰其治風也賈丞相稱為再生丹許學土謂有神聖功戴院使許為産後要藥蕭存敬呼為一捻金陳無擇隱為舉卿古拜散夫豈無故而得此隆譽哉不似防風氣不輕揚驅風之必入人骨肉也是以宣散風邪用以防風之必兼用荊芥者以其能入肌膚宣散故耳且既入於肝經風木之臟則肝即屬藏血之地故又能以通利血脈俾吐衄腸風崩痢産後血暈瘡毒癰腫血熱等症靡不藉其輕揚以為宣泄之具寧於風木之臟既於其氣而理者復不於血而治乎本入肝經氣分兼入肝經血分玩古方産後血暈風起血去過多則風自內生故常有崩暈之患不待外風襲之也有用荊芥為末同酒及或童便調治崩中不止有用炒黑荊芥以治於此可見其概矣連穗用治血須炒黑穗在於巔故善升發黑能勝赤故必炒黑反魚蟹河豚驢肉川芎藭芳草散肝氣祛肝風芎藭專入肝兼入心包膽辛溫升浮為肝膽心包血分中氣藥故凡肝因風鬱而見腹痛脅痛血痢寒痹筋攣目淚及癰疽一切等症治皆能痊癰從六腑生疽自五臟成皆屬血氣阻滯所致緣人一身血氣周流無有阻滯則百病不生若使寒濕內搏則血滯而不行為不及其毒為陰熱濕內搏則血急而妄沸為太過其毒為陽氣鬱於血則當行氣以散血血鬱於氣則當活血以通氣行氣必用芎歸以血得歸則補而血可活且血之氣又更得芎而助也況川芎上行頭目元素曰川芎其用有四為少陽引經一也諸經頭痛二也助清陽之氣三也去濕氣在頭四也下行血海其辛最能散邪血因風鬱得芎入而血自活血活而風自滅又何有毒有痹有痛有郁而致病變多端哉是以四物用之以散肝經之風頭痛必用以除其鬱杲曰頭痛必用川芎如不愈加各引經藥太陽羌活陽明白芷少陽柴胡太陰蒼朮厥陰吳茱萸少陰細辛是也然氣味辛竄能泄真氣單服久服令人暴亡時珍曰芎藭肝經藥也若單服既久則辛喜歸肺肺氣偏勝金來賊木肝必受邪久則偏絶豈不夭亡驗胎法云婦人過經三月用芎數錢為末空心熱湯調一匙服腹中微動者是胎不動者是經閉蜀産大塊里白不油辛甘者良江南産者為撫芎秦産為西芎白芷為使畏黃連硝石滑石惡黃耆山茱萸白芷芳草散足陽明胃經風濕白芷專入胃兼入肺大腸色白味辛氣溫力厚通竅行表為足陽明胃經祛風散濕主藥故能治陽明一切頭面諸疾陽明之脈起於鼻絡於目故病多屬頭面如頭目昏痛王璆百一選方云王定國病風頭痛至都梁求明醫楊介治之連進三丸即時病失懇求其方則用香白芷一味洗曬為末煉蜜丸彈子大每嚼一丸以茶清或荊芥湯化下遂命名都梁丸眉稜骨痛丹溪纂要屬治風熱與痰白芷片芩酒炒等分為末每服二錢茶清下暨牙齦骨痛用香白芷一錢硃砂五分為末蜜丸頻用擦牙或以白芷吳茱萸等分浸水漱涎面黑瘢疵者是也且其風熱乘肺上爍於腦滲為淵涕移於大腸變為血崩血閉腸風痔瘻癰疽風與濕熱發於皮膚變為瘡瘍燥癢皆能溫散解托而使腠理之風悉去留結之癰腫潛消誠祛風上達散濕之要劑也好古曰同辛夷細辛用治鼻病入內托散用長肌肉宗奭曰藥性論言白芷能蝕膿今人用治帶下腸有敗膿淋露不已腥穢殊甚遂致臍腹冷痛皆由敗膿所致須此排膿白芷一兩單葉紅蜀葵二兩白芍藥白枯礬各半兩為末以蠟化丸梧子大每空心米飲下俟膿盡以他藥補之又解蛇毒昔臨川有人被蝮傷即昏死一臂如股少頃遍身皮脹黃黑色一道人以新汲水調香白芷末一斤灌之覺臍中搰搰然黃水自口出腥穢逆人良久消縮如故云以麥冬湯調尤妙仍以末搽之然其性升散血熱有虛火者禁用色白氣香者佳或微炒用當歸為使惡旋覆花薄荷芳草疏肝氣風及熱內淫薄荷專入肝兼入肺氣味辛涼功專入肝與肺故書皆載辛能發散而於頭痛頭風發熱惡寒則宜辛能通氣而於心腹惡氣痰結則治涼能清熱而於咽喉口齒眼耳癮疹瘡疥驚熱骨蒸衄血則妙是以古方逍遙用此以為開鬱散氣之具小兒驚癇用此以為宣風向導之能腸風血痢用此以為疏氣清利之法辛能散涼能清然亦不敢多用所用不過二三分而止恐其有泄真元耳氣虛食之令人虛汗不止陰虛火甚食之令人動消渴病蘇産氣芳者良貓傷用汁塗之最妙陸農師曰薄荷貓之酒也犬虎之酒也桑椹鳩之酒也茵草魚之酒也蒿本芳草治風犯太陽巔頂頭痛藁本專入膀胱兼入奇督據書載屬辛溫氣雄能治太陽膀胱風犯巔頂腦後俱痛號為是經要藥凡治巔頂頭痛必兼防風酒炒升柴同入且復言治脊強而厥督與太陽之脈並行於背並婦人疝瘕急迫腫痛此雖病屬下見及系太陽膀胱本經寒濕所致然非風邪內犯則病曷形藁本氣味辛溫性雖上行而亦下達非謂用此以治太陽巔頂頭齒頰痛功止上建而於脊強而厥竟不循經下行也且據書言能治胃風泄瀉霍翁曰風客於胃飲以蒿本湯而止蓋藁本能治風濕耳又治粉刺酒渣同白芷作面脂亦是風乾太陽連纍而及治則與之俱治豈但治風頭痛而已哉或謂其性頗有類於芎藭皆能以治頭痛然一主於肝膽雖行頭目而不及於巔頂一主太陽及督雖其上下皆通而不兼及肝膽之為異耳但春夏溫熱頭痛及血虛火炎頭痛者切忌根紫色似芎藭而輕虛氣香味麻惡䕡茹畏青葙子白附子毒草散足陽明胃經冷風白附子專入胃時珍曰因與附子相似故得此名實非附子類也辛甘有毒性燥而升為風藥中之陽草東垣謂其純陽能引藥勢上行於面為陽明經要藥又按諸書皆載能治頭面遊風斑疵陽明之脈行於頭面故用此作脂消斑及中風不語諸風冷氣血痹冷疼陰下虛癢皆當用此調治玩此藥非性燥何以可治冷氣虛癢設非冷氣冷癢又曷可用燥烈之藥以治乎是以陰虛類中並小兒脾虛慢驚皆不宜用以其氣味辛烈者故耳辛能散氣燥能劫陰此與白芷同為一類但白芷則兼肌濕同理而不專及陽明風邪此則專散陽明風冷而於濕邪則未及耳此藥久無真者今惟涼州生形如草烏頭之小者長寸許乾者皺紋有節入藥妙用天麻山草宣散肝經氣鬱虛風天麻專入肝辛平微溫無毒性升屬陽為肝家氣分定風藥蓋諸風眩掉皆屬肝木肝鬱不能榮筋故見頭旋眼黑語言不遂等症天麻乃辛平之味能於肝經通脈強筋疏痰利氣辛而不燥得氣之平則肝虛風作自爾克治故又名為定風草若久服則遍身發出紅斑是驅風之驗也是以小兒驚癇亦用此味以治若使肝虛在血症見口乾便閉及犯類中等症者切不宜服以其辛能燥血者故耳血燥須用養血之劑則風不除而自去矣古云治風先治血血行風自滅根類黃瓜莖名赤箭有風不動無風反搖明亮結實者佳濕紙包裹熟切片酒浸一宿焙用天南星毒草主散經絡風痰天南星專入肝脾肺味辛而麻氣溫而燥性緊而毒惟其味辛則凡中風不語岐伯云中風大法有四一偏枯半身不遂也二風痱四肢不收也三風癔奄忽不知人也四風痹諸風類痹狀也及或破傷風瘀玉真散治破傷風刀傷撲傷如神用南星防風等分為末如破傷風用藥敷瘡口溫酒調下打傷至死童便調灌二錢連進三服必活故書載能克治以其辛能散風故也惟其性燥則凡稠痰固結筋脈拘攣得以能通以其燥能除濕而痰自去也惟其性緊則凡疝瘕結核胎産難下水腫不消得以攻逐以其性緊急迫而堅自去也性雖有類半夏然半夏專走腸胃故嘔逆泄瀉得之以為嚮導南星專走經絡故中風麻痹亦得以之為嚮導半夏辛而能散仍有內守之意南星辛而能散決無有守之性其性烈於半夏也南星專主經絡風痰半夏專主腸胃濕痰功雖同而用有別也但陰虛燥疾服之為切忌耳血虛風中急宜養血滋陰固本若徒用南星等藥驅風逐痰誤矣根似半夏看如虎掌者良以礬湯或皂角汁浸三晝夜暴用或酒浸一宿蒸竹刀切開至不麻乃止或薑渣黃泥和包煨熟用造麴法以薑汁礬湯和南星末作小餅子安籃內楮葉包蓋待上黃衣乃曬收之火炮則毒性緩膽制味苦性涼得牛膽則不燥其法臘月取黃牛膽汁和南星末納入膽中風乾年久者彌佳能解小兒風痰熱滯故治小兒急驚最宜畏附子乾薑防風得防風則不麻威靈仙蔓草治十二經風濕冷氣威靈仙專入膀胱兼入腸胃諸經辛鹹氣溫其性善走能宣疏五臟十二經絡凡一切風寒濕熱而見頭風頑痹癥瘕積聚黃疸浮腫大小腸祕風濕痰氣腰膝腿腳冷痛等症麻屬氣虛木屬濕痰死血腫屬濕痛屬熱痛風新病屬寒久病屬熱此死法耳未可以盡病情也仍須分其臟氣偏純以定臟寒則痛多根寒致其痛必喜手按縱脈堅實有力止是寒氣奔迫未可為痛為實為熱臟熱則麻與木與痛與腫皆屬熱候且有實脈實症可證其痛手不可按不得謂麻必屬氣虛也臟寒初病固寒久病亦寒故有屢用附桂方愈不得謂久必屬熱也臟熱初病固見熱蒸久病亦見熱成如溫熱等症初終皆用清涼不得謂初必屬寒候總在識病根源相症明確方無有誤此繡之管見有如此也得此辛能散邪溫能泄水苦能破堅服此性極快利通經達絡無處不到誠風藥中之善走者也先時商州有人手足久廢得遇新羅僧而愈索藥乃知是威靈仙也是以威喻其性靈喻其效仙喻其神耳氣壯者服之神效若氣弱服此則能泄真氣矣凡辛皆散氣劫陰不獨威靈仙是也和砂仁沙糖煎治諸骨哽根叢須數百條長者二尺余色深黑為鐵腳威靈仙良忌茗麵湯白蒺藜隰草白蒺藜滋補肝腎兼散風邪逐瘀沙苑蒺藜益精強腎白蒺藜專入肝腎兼入肺質輕色白辛苦微溫按據諸書雖載溫能補腎可治精遺溺失暨腰疼勞傷等症然總宣散肝經風邪凡因風盛而見目赤腫翳並遍身白癜瘙癢難當者服此治無不效且此味辛入肺兼苦入腎則凡癥瘕結聚喉痹乳癰暨胎産不下服此力能破郁宣結蓋肝雖藏血之經而血非可留之物若竟認此作補而不審兼苦泄辛散以明其治其失靡輕緣此可升質輕可降味苦可散味辛可補微溫故服涼劑則宜連刺有刺生搗用補劑則宜去刺酒拌蒸若沙苑蒺藜質細色緑似腎功專入腎故書載能益精強腎風家用三角蒺藜補腎用沙苑蒺藜亦須炒用但不辛香宣散耳蒺藜根燒灰能治齒動決明子隰草入肝驅風散熱明目決明子專入肝氣稟清陽味鹹苦甘微寒無毒能入肝經除風散熱凡人目淚不收眼痛不止多屬風熱內淫以致血不上行治當即為驅逐按此苦能泄熱咸能軟堅甘能補血力薄氣浮又能升散風邪故為治目收淚止痛要藥並可作枕以治頭風但此服之太過搜風至甚反招風害故必合以蒺藜甘菊枸杞生地女貞實槐實穀精草相為補助則功更勝謂之決明即是此意狀如馬蹄俗呼馬蹄決明搗碎用惡大麻仁草烏頭毒草祛惡風頑痰頑毒草烏頭專入肝兼入脾辛苦大熱按書論此惟長洲張璐辨之明晰言此與射罔乃至毒之物草烏系野所生狀類川烏亦名烏啄薑汁炒或豆腐煮熬膏名射罔敷箭獸見血立死非若川烏頭附子之比自非風頑急疾不可輕投此藥止能搜風勝濕開頑痰治頑瘡以毒攻毒而已本經治惡風洗汗出但能去惡風而不能回陽散寒可知昔人病風癬服草烏頭木鱉子藥過多甫入腹遂麻痹不救烏附五種主治攸分附子大壯元陽雖偏下焦而周身內外無所不至天雄峻溫不減於附而無頃刻回陽之功川烏專搜風濕痛痹卻少溫經之力側子善行四末不入臟腑草烏悍烈僅堪外治此烏附之同類異性者至於烏啄稟氣不純服食遠之可也茵芋毒草治關節風濕痹痛茵芋專入肝腎本屬毒物味辛而苦氣溫有毒據書所述治症多是風濕為用如治風癇則有茵芋丸治風痹則有茵芋酒治産後風則有茵芋膏凡風濕痹症多用茵芋與石南莽草同為一類莽草辛溫有毒能治頭風癰腫乳癰疝瘕其葉煎湯熱含能治牙蟲喉痹若云能療虛羸寒熱恐莫及耳因虛當兼補虛出彭城海鹽莖赤葉如石榴而短厚者佳取莖葉陰乾炙用桂枝香木入衛表以除風邪桂枝專入肌表兼入心肝系肉桂枝梢其體輕其味辛其色赤故入心有升無降故能入肺而利氣入膀胱化氣而利水且能橫行於臂調和營衛治痛風脅風痛風其在靈樞謂之賊風素問謂之痹症金匱謂之歷節後世又更其名曰白虎歷節且有別名曰箭風箭袋然總謂之行痹其症則有因風因濕因寒因痰因瘀因虛之異須用桂枝以為嚮導脅風本屬於肝凡治脅風之症當用桂枝入肝以平止煩出汗驅風散邪為解肌第一要藥時珍曰麻黃遍徹皮毛桂枝透達營衛故書皆言無汗能發有汗能收然其汗之能發止是因其衛實營虛陰被陽湊故用桂枝以調其營營調則衛氣自和而風邪莫容遂自汗而解非若麻黃能開腠理以發其汗也其汗之能收止因衛受風傷不能內護於營營氣虛弱津液不固故有汗發熱而惡風其用桂枝湯為治取其內有芍藥入營以收陰外有桂枝入衛以除邪則汗自克見止非云桂枝能閉其汗孔昧者不察桂枝發汗止汗是何意義徒以順口虛喝其失遠矣經曰脈浮緊發熱無汗者不可與脈緊為傷寒與之則表益實而汗愈難出矣傷寒例曰桂枝下咽陽盛則斃承氣入胃陰盛以亡周揚俊曰風既傷衛則衛氣疏不能內護於營而汗自出矣汗者血之液也苟非用血藥以桂枝和營散邪以芍藥護營固里則不但外邪不出且入而為里患矣然後知和營則外邪出外邪出則衛自密更不必用固表之藥而汗自止矣王好古曰或問桂枝止煩出汗仲景治傷寒發汗數處皆用桂枝湯又曰無汗不得用桂枝汗多者桂枝甘草湯此又能閉汗也二義相通否乎曰仲景云太陽病發熱汗出者此為營弱衛強陰虛陽必湊之故用桂枝發其汗此則調其營氣則衛氣自和風邪無所容遂自汗而解非若麻黃能開腠理發出其汗也汗多用桂枝者以之調和營衛則邪從汗出而汗自止非桂枝能閉汗孔也辛夷香木散肺中風熱辛夷專入肺辛溫氣浮功專入肺解散風熱緣人鼻氣通天肺竅開鼻鼻主肺風熱移於腦則鼻多濁涕而淵風寒客於腦則鼻塞經曰腦滲為涕膽液不澄則為濁涕如泉不已故曰鼻淵鼻淵不盡外感在長洲張璐指為陽明伏火會稽景嶽指為督火發海鹽楚瞻指為腎經虧損要在相症施治並頭痛面皯目眩齒痛九竅不利皆是風熱上攻是宜用此芳香上竄頭目兼逐陽分風邪則諸症自愈但辛香走竄血虛火熾及偶感風寒不聞香臭者其並禁焉時珍曰鼻氣通於天天者頭也肺也肺開竅於鼻而陽明胃脈環鼻而上行腦為元神之府而鼻為命門之竅人之中氣不足清陽不升則頭為之傾九竅為之不利辛夷之辛溫走氣而入肺其體輕浮能助胃中清陽上行通於天所以能溫中治頭面目鼻九竅之病汪昂曰吾鄉金正希先生嘗語余曰人之記性皆在腦中小兒善忘者腦未滿也老人健忘者腦漸空也凡人外見一物必有一形留影留於腦中昂思今人每記憶往事必閉目上瞪而思索之此即凝神於腦之意也不經先生道破人皆習焉而不察矣即木筆花去外皮毛微炒惡石脂畏黃耆菖蒲蒲黃黃連石膏冰片香木除骨髓內伏風邪自內出外冰片專入骨髓辛香氣竄無往不達汪昂曰豫幼時曾問家叔建侯云薑性如何叔曰體熱而用涼蓋味辛者多熱然風熱者必藉辛以散之風熱散則涼矣此即本草所云冰片性寒之義同未有發明之者能治一切風濕不留內在引火熱之氣自外而出然必風病在骨髓者宜之若風在血脈肌肉間用之反能引風直入骨髓如油入面故凡外入風邪變而為熱仍自外解得宜若使火自內生而用此為攻逐其失遠矣昔王綸云世人誤以冰片為寒不知辛散性甚似涼耳諸香氣皆屬陽豈有香之至極而尚可云寒者乎是以驚癇痰迷癇有挾熱挾痰挾火挾驚挾風挾氣及精衰血耗氣薄之異風果入骨病應是治火鬱不散九竅不通如耳聾鼻瘜喉痹舌出骨痛齒痛之類治應是行目赤膚翳冰片外點正屬劫藥如薑末燒酒洗眼之意若誤認為寒而朝夕常點遂致積熱入目而增昏障之害故曰眼不點不瞎者此也審屬風寒病應外解用乳調點以拔火邪從治法也他如瘡瘍癰腫熱鬱不散亦當用此發達或令入油煎膏或研末吹摻然瘡毒能出不可多用則真氣立耗而有亡陽之弊矣更有目病陰虛不宜入點出南番老杉脂白如冰作梅花片者良但市人每以樟腦代充海桐皮喬木散肝中風濕海桐皮專入肝辛苦而溫能入肝經血分祛風除濕及行經絡以達病所是以腰膝腳痛能療腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣腳氣不腫者為乾腳氣腫者為濕腳氣赤白瀉痢能止蠱牙風痛煎湯漱之能愈疳蝕疥瘡磨汁塗之能消目赤膚翳浸水洗之能退一皆風祛濕散之力用者須審病自外至則可若風自內成未可妄用須隨症酌治可耳皂角喬木宣導風痰竅塞皂角專入肝肺大腸辛鹹性燥功專通竅驅風故凡風邪內入而見牙關緊閉口噤不語胸滿喉痹腹蠱胎結風癩痰喘腫滿堅瘕囊結等症用此吹之導之則通上下之竅煎之服之則治風痰喘滿塗之擦之則能散腫消毒以去面上風氣熏之蒸之則通大便祕結燒煙燻之則治臁瘡濕毒中風不省人事不可滴水入喉入則涎水系於心絡而不去即成廢人宜掐人中用皂角末或半夏末吹入鼻中有嚏則生無嚏則死不開再用開關散擦牙熏鼻法熏鼻及以蘇合香丸牛黃丸至寶丹之類相其寒熱選用如寒閉牙關則當用以蘇合香丸熱閉牙關則當用以牛黃丸但此止可施於中臟閉症然種類甚多形如豬牙名為牙皂較之大皂稍有不同大皂則治濕痰更優牙皂則治風痰更勝也一種皂角刺氣味辛溫功治略同但其鋒鋭直透患處潰散癰疽及妒乳風癘惡瘡經曰風盛為癘癘者惡也脈主血血熱而殺癘之氣襲之則血脈凝泣衛氣不行其氣不清故謂之癘須用此直達病所出風毒於營血中皂子治大便燥結煅存性用以辛能潤之之義由結本非火結故辛則能以潤之也惡麥冬畏人參苦參皂角以肥厚多脂者良炙酥燒灰用肥皂氣味辛溫亦治風溫及敷無名腫毒去垢膩澡身盥面必用肥皂莢喬木除風濕去腸胃垢膩肥皂莢專入腸胃生於六陽之盛成於秋金之月氣味平溫有毒不減皂莢皂刺之性凡因腸胃素有垢膩穢惡發於外則為瘰癧惡瘡腫毒泄於下則為腸風下痢膿血俱可用此以除以其力能滌垢除膩潔臟淨府故也是以癡病勝金丹用此湧發不使砒性留於腸胃瘰癧用此去核和藥為丸以追其毒治瘰癧用肥皂去核入斑蝥在內扎緊蒸去斑蝥加入貝母天花粉玄參甘草牛蒡子連翹為丸白湯下以腹痛為效且能澡身洗面及療無名癰腫集成云惡瘡用生肥皂火煅存性用油膩粉調敷奇瘍惡毒用生肥皂去子弦及筋搗爛釅醋和敷立效其子亦治大腸風祕及頭面黴瘡有效黴瘡用核同豬胰子金銀花皂角刺芭蕉根雪裡紅五加皮土茯苓皂莢子白殭蠶木瓜蟬蛻白蘚皮又臘梨頭瘡用皂去核填入沙糖並巴豆二枚扎定鹽泥固煅存性再入檳榔輕粉六七分研勻香油調搽先以湯洗淨拭乾乃搽一宿見效但其仁須炒研為用庶於腎氣不傷虎骨獸入肝搜風補骨壯筋虎骨專入肝味辛微熱號為西方之獸通氣於金風從虎虎嘯風生風屬木虎屬金木為金制故可入骨搜風按五味惟辛為散而骨又能入骨散風故書載能強筋健骨定痛辟邪能治風痹拘攣疼痛驚悸癲癇犬咬骨鯁然虎之一身節節氣力皆出前足故膝脛為勝而前左脛尤良以臥必用左脛為枕也虎死而脛矻立不僕是骨勝於他骨百倍借其氣之有餘以補其力之不足其功自爾立見若腰脊痛者當用脊骨骨以黃潤為是若中箭藥其骨必有微黑不可入藥虎睛能治狂邪酒浸炙乾用虎肚能治反胃吐食汪昂云虎肚丸止有宜於食膈若寒膈氣膈痰膈恐難見功虎爪尤主辟邪殺鬼虎牙尤治犬咬用骨捶碎去髓塗酥或酒或醋炙各隨方法入藥山甲龍獸通經達絡破肺氣行肝血山甲專入肝肺胃鹹寒善竄其性穴山而居寓水而食惟其善竄所以通經達絡無處不到且能入肝與胃而治驚啼悲傷大腸蟻瘻弘景曰山甲能陸能水日中出岸張開鱗甲如死狀誘蟻入甲即閉而入水開甲蟻皆浮出因接而食之汪昂曰有婦人項下忽腫一塊漸延至頸偶刺破出水一碗瘡久不合此蟻漏也緣飯中誤食蟻得之外治瘡瘍癰腫下乳發痘之需諺云穿山甲王不留婦人吃了乳長流總因善走之功而為行氣破血之藥耳劉伯溫多能鄙事云凡油籠滲漏剝山甲裡面肉靨投入自至漏處補住又永州記云此物不可於堤岸殺之恐血入土則堤岸滲漏觀此性之走竄可知故或燒灰敷毒即消同五積散加全蠍蔥薑煎服則治風濕冷痹而見上下強直痛不可忍同木香自然銅搗末酒調以治乳癰腫同蝟皮豆蔻仁為末湯下以治氣痔來膿及破水濕瘧邪並察患在某處即以某處之甲用之尤臻奇效尾腳力更勝然總破氣敗血其力峻猛虛人切戒投服如鼉而短似鯉有足或生或燒炙醋炙童便炙油煎土炒隨方用麝香獸逐風逐滯開關利竅麝香專入經絡肌肉辛溫芳烈開關利竅無處不到如邪氣著人淹閉不起則關竅閉塞登時眼翻手握僵仆昏地故必用此辛香自內達外則毫毛骨節俱開而邪始從外出是以邪鬼精魅三蟲諸毒皆能治也諸風諸氣閉之關竅而不用此驅除則病安祛但不可過為用耳麝香氣味香竄用以開關利竅必其脈症俱實方可用耳如嚴用和所謂中風宜用是為實中風邪者設法若非中類中寧堪用乎東垣云風在骨髓者宜用若風在肌肉用之為引風入骨如油入面故用自屬不合耳非云嚴氏是而李氏非也總在臨症能分虛實及識病之淺深耳至於婦人難産墮胎尤善小兒驚癇客忤鎮心安神鼻塞不聞香臭服此即開目疾內翳點此即除痔漏惡瘡面黑斑疹暨鼠咬蟲傷成瘡用麝封固即愈痘瘡聞之則靨服之即發藥之辛香雖同冰片然冰片入口貼肉即冷稍頃熱性即發不似麝香香氣栗烈入耳與肉而不冷耳欲辨真假須於火炭上有油滾出而成焦黑者此即肉類屬真若假則化白灰而為木類也杲曰麝香入脾治肉牛黃入肝治筋冰片入腎治骨研用凡使麝香用當門子尤妙忌蒜不可近鼻防蟲入腦麝見人捕而剔其香為生香最佳剔處草木皆黃但市人或插荔枝核以偽之白花蛇龍搜風定搐白花蛇專入肝腎何以名為搜風定搐之品不知蛇善數蛻如風之善行數變此蛇性竄尤急又食石南藤其藤辛苦治風故能內走臟腑外徹皮膚透骨搜風截驚定搐並治風濕癱瘓筋脈弛縱坦然不舉謂癱氣血渙散不用為瘓大瘋疥癩若陰虛血少內熱生風者非其所宜凡用蛇同糯米並曲造酒服酒時切忌見風並於開壇時須避其氣免致面目浮腫以其峻厲之氣先有犯其清道也癘風用大楓子仁服此而無效者以其大楓子氣燥傷血服此血益受傷也出衢州龍頭虎口黑質白花脅有二十四方勝腹有念珠斑尾有佛指甲雖死而眼光不枯他産則否頭尾有毒各去三寸亦有單用頭尾者酒浸三日去盡皮骨大蛇一條只得淨肉四兩烏梢蛇性善不噬物無毒功用亦同眼光至死不枯以尾細能穿錢者佳重七錢至一兩者為上十兩至一鎰者中大者力減去頭與皮骨酒煮或酥炙用蛇蛻龍驅風辟惡殺蠱解毒蛇蛻專入肝兼行皮膚味甘而咸氣平無毒凡治小兒驚癇風毒等症無不用此為主蓋此具有四能一則性善辟惡而凡邪魅蠱毒者不敢近以其飲風吸露氣極清虛故也二則性能驅風而凡驚癇癲僕偏正頭風喉舌諸疾者皆能除以其性極走竄力能驅風故也三則性能殺蠱而凡惡毒痔漏疥癬無不用之即效以其此屬毒物以毒攻毒故也四則能去皮膚之疾而凡眼目翳膜胎衣不下得此即為解脫以其氣以類聚即從其類以除也色白如銀者佳皂次水洗淨或酒或醋或蜜浸炙黃或燒灰存性或鹽泥固煅各隨本方全蠍卵生散肝血分風熱治胎風發搐全蠍專入肝味辛而甘氣溫有毒色青屬木故專入肝祛風諸風眩掉皆屬於肝凡小兒胎風發搐大人半邊不遂口眼喎斜語言蹇澀手足抽掣瘧疾寒熱耳聾帶下皆因外風內客無不用之故方書有用蠍尾膏以治胎風發搐內用蠍梢二十一枚入麝香少許屢效又用牽正散以治口眼喎斜用全蠍同白附殭蠶為末酒服甚效又有同羌活柴胡當歸生地名丁香柴胡湯以治月事不調寒熱帶下亦許蠍以散血分之風熱耳但帶下非風非熱不用並一切內虛似風等症切忌全用去足焙或用尾尾力尤緊形緊小者良忌蝸牛被蠍傷者塗蝸牛即解蜈蚣濕生入肝祛風通瘀散熱解毒蜈蚣專入肝本屬毒物性善啖蛇故治蛇症毒者無越是物蜈蚣本能刺蛇且其性善走竄故瘟疫鬼怪得此則療又其味辛辛則能以散風故凡小兒驚癇風搐臍風噤口得此入肝則治炙末豬乳調治又其性溫溫則能以療結故凡瘀血墮胎心腹寒熱結聚得此則祛至於瘰癧便毒等症書載能以調治如趾甲內有惡肉突出俗名雞眼睛用蜈蚣焙乾為末敷上以南星末醋調敷圍四處亦是以毒攻毒之意耳赤足黑頭者佳火煨用畏蜘蛛蜒蚰蜘蛛蜒蚰之路蜈蚣不敢經過觸著即死被蜈蚣咬者但捕蜘蛛置咬處自吸其毒蜘蛛放水中吐而活之雞屎桑皮鹽中蜈蚣毒以桑汁鹽蒜塗之即愈蟬蛻化生輕虛入肝散風蟬蛻專入肝兼入皮膚止一蟲殼味甘氣寒如何主治甚多蓋蟬本木餘氣所化飲風露而不食其言能治肝經風熱者因體氣輕虛而味甘寒之意也其言能治婦人生子不下及退翳膜侵睛胬肉滿眥者因其性有善脫之意也其言能治皮膚瘡疥癮疹者以其所取在殼之意也皮以治皮意時珍曰治皮瘡瘍風熱當用蟬蛻治臟腑經絡當用蟬身各從其類也其言能治中風不語者以其蟬聲清響之意也聲以通聲其言能治小兒夜啼者以其晝鳴夜息之意也古人立藥治病何在不有義存惟在人細自審用耳色黑而大者良入藥洗去泥土翅足漿水煮曬乾用攻毒全用散濕經曰半身以上風受之也半身以下濕受之也然有濕不下受而濕偏從上感則濕又當上治蓋濕無風不行如風在上其濕從風以至者則為風濕是風是濕非散不愈也濕值於寒寒氣凜冽其濕由寒至者則為寒濕是寒是濕亦非由散不除也且有好食生冷留滯腸胃合於兩露感冒留結不解隨氣勝復變為寒熱以致頭重如裹皮肉筋脈皆為濕痹則不得不從開發以泄其勢然散濕之藥不一有止就濕而言散者如蒼朮之屬是也有因風濕而言散者如白芷羌活獨活防風寄生葳蕤秦艽巴戟狗脊靈仙海桐皮豨蘞草蒼耳子萆薢茵芋之屬是也有就寒濕而言散者如五加皮天雄蔓荊子殭蠶細辛之屬是也有兼風熱而言散者如蕪荑之屬是也有就熱濕而言散者如香薷之屬是也有就痰濕而言散者如半夏之屬是也至濕而在胸腹症見痞滿宜用川朴以散之濕在肌肉症見膚腫宜用排草以洗之濕在腸胃挾風而見拘攣痹痛宜用秦艽以除之濕在筋骨而見頭面不利宜用蔓荊子以治之此皆就表就上受濕論治故以散名若使濕從下受及已內入為患則又另有滲濕瀉濕諸法而非斯藥所可統而歸之也蒼朮山草升陽散濕發汗除郁蒼朮專入脾甘苦辛烈氣溫無毒雖有升陽散郁發汗除濕楊氏家驗方男子婦人因食生熟物留滯腸胃遂至生蟲久則好食生米否則終日不樂及至憔悴萎黃飲食不思用蒼朮一味為丸而愈益昌伶人劉清嘯一娼名曰花翠年逾笄病此惠民局監趙尹以此治之兩旬而愈蓋生米留滯腸胃受濕則谷不磨而成此疾故用蒼朮去濕暖胃消穀燥痰許叔微本事方云豫患飲癖三十年遍求名醫不效自揣必有癖囊如水之有科臼不盈科不行但清者可行而濁者停滯無路以決之故積至五七日必嘔而去脾土惡濕而水則流濕莫如燥脾以去濕崇土以填科臼乃悉屏諸藥只以蒼朮一味同棗肉為丸忌桃李雀肉而疾除辟惡時珍曰陶隱居言術能除惡氣彌災診故今病疫及歲旦人家往往燒蒼朮以辟邪氣夷堅志載江西一士人為陰氣所侵或曰君必當暴泄但多服平胃散為良中有蒼朮能去闢也治腫之功然甘味少而辛苦重不似白朮性稟中和直固清陽中氣之為妙耳故同香附則為散鬱而氣平蒼朮能徑入諸經疏泄陽明之濕通行斂澀香附乃陰中快氣之藥一升一降故郁散而平同黃柏則能治下部濕熱黃柏味苦苦勝熱故可以去濕中之熱蒼朮性燥燥勝濕故可以去熱中之濕兩者相需妙用故其方呼為二妙同大棗則能治脅下飲澼用棗始能固中也同二陳加白朮升柴則能以治脾濕下流腸風帶濁帶濁有寒有熱有痰有氣有風有濕各異須要審症辨用然必稟體肥盛多濕者始宜若形瘦多火切忌至云服能輕身長生不過因其濕去之謂豈真能入仙境之地哉本草多有長生不老之説欺世惑民以致藥品真義不出耳出茅山堅小有硃砂點者良糯米泔浸焙乾同芝麻炒以制其燥防風地榆為使厚朴喬木散脾胃濕滿厚朴專入脾胃辛苦書言同枳實大黃即承氣湯則於實滿能瀉同蒼朮橘皮即平胃散則於濕滿能除同解利藥則於傷寒頭痛可治同瀉痢藥則於腸胃能厚大抵氣辛則散故於濕滿則宜味苦則降故於實滿則下經曰太陰所至為中滿又曰諸濕腫滿皆屬於脾諸脹腹大皆屬於熱又曰清氣在下則生飧泄濁氣在上則生䐜脹治宜察其腹滿而痛者屬實腹滿不痛者屬虛腹滿不減按之愈痛者屬實腹滿時減按之不痛者屬虛腹滿而見散漫不實兼有倦怠噯氣飽悶等症則為胃氣有虧腹滿而見光亮不暗按則汨汨有聲及無燥渴等症則為水邪內結腹滿而見大便不堅時結時溏溏則稍減結則漸加小便清利甚則渾白如泔其脈緩大而滯氣日益甚則為氣虛不攝但腹滿屬熱者少而屬寒者多今人治脹非屬牽牛商陸利水通道即屬厚朴枳實破氣通結殊為可惜今人不解誤以書載厚朴溫中益氣及厚腸胃數語不論虛實輒投詎知實則於氣有益虛則於氣無損乎實則腸胃可厚虛則腸胃不薄乎震亨曰習以成俗皆謂之補哀哉至云破血殺蟲亦是氣行而血自通味苦而蟲則殺之意凡書表藥功能總是由藥氣味勘出非是別藥著治以自逞其意見也朴即榛樹皮以肉厚紫色者良去粗皮薑汁炒用即乾薑為使意惡澤瀉硝石寒水石忌豆犯之動氣秦艽山草除腸胃濕熱兼除肝膽風邪止痹除痛秦艽專入腸胃兼入肝膽苦多於辛性平微溫凡人感冒風寒與濕則身體痠痛肢節煩疼拘攣不遂如風勝則為行痹痹兼三氣皆有茲止就其勝者而言寒勝則為痛痹濕勝則為著痹痹在於骨則體重痹在於脈則血澀痹在於筋則拘攣痹在於肉則不仁痹在於皮則膚寒至於手足痠疼寒熱俱有則為陽明之濕潮熱骨蒸則為陽明之熱推而疸黃便澀腸風瀉血口噤牙痛上齦屬胃下齦屬大腸秦艽能除風濕牙痛亦何莫不由陽明濕熱與風所成用此苦多於辛以燥陽明濕邪辛兼以苦以除肝膽風熱實為祛風除濕之劑風除則潤故秦艽為風藥中潤劑濕去則補故秦艽為散藥中補劑聖惠方治急癆煩熱身體痠疼用秦艽柴胡一兩甘草五錢為末每服三錢白湯調下治小兒骨蒸潮熱減食瘦弱用秦艽炙甘草各一兩每用一二錢水煎服之加薄荷葉五錢然久痛虛羸血氣失養下體虛寒痠疼枯瘦小便利者咸非所宜形作羅紋相交長大黃白左紋者良右紋勿用菖蒲為使畏牛乳蔓荊子灌木散筋骨間寒濕除頭面風寒蔓荊子專入膀胱兼入胃肝辛苦微溫書言主治太陽膀胱兼理足陽明胃足厥陰肝緣太陽本屬寒水之經因風邪內客而致巔頂頭痛腦鳴太陽脈絡於腦肝屬風臟風既內犯則風必挾肝木上侵而致淚出不止目為肝竅筋藉血養則血亦被風犯而致筋亦不榮齒亦不堅矣齒者骨之餘上齦屬足陽明因下齦屬手陽明大腸風熱上攻則痛有風自必有濕濕與風搏則胃亦受濕纍而致肉痹筋攣由是三氣風寒濕交合則九竅口鼻耳目二陰蔽塞而病斯劇蔓荊體輕而浮故既可治筋骨間寒熱而令濕痹拘急斯去氣升而散復能祛風除寒而令頭面虛風之症悉治且使九竅皆利白蟲能殺是亦風寒濕熱俱除之一驗耳但氣虛血虛等症用此禍必旋踵不可不知去膜酒蒸炒或打碎用惡烏頭石膏散熱熱自外生者宜表宜散熱自內生者宜清宜瀉熱自外生而未盡至於內者宜表宜散熱自內成而全無表症者宜攻宜下凡人感冒風寒審其邪未深入即當急撤其表俾熱仍從表解不得謂熱已成有清無散而不用表外出也第熱之論乎散者其法不一有止就熱以言散者如升麻之升諸陽引熱外出乾葛之升陽明胃氣引熱外出柴胡之升少陽膽熱外出淡豆豉之升膈熱外出夏枯草之散肝熱外出野菊花之散肝肺熱外出也有合風熱以言散者如辛夷能散肺經風熱冰片能散骨蒸風熱木賊能散肝膽風熱蕤仁決明子爐甘石薄荷能散肝經風熱也有合濕熱而言散者如蕪荑能散皮膚骨節濕熱香薷能散肺胃心濕熱是也有就風火熱毒而言散者如蟾蜍蟾酥之能升拔風火熱毒外出是也有就血熱而言散者如石灰能散骨肉皮膚血熱穀精草能散肝經血熱也至於熱結為痰有藉吐散如木鱉則能引其熱痰成毒結於胸膈而出瓜蒂則能引其熱痰結於肺膈而出膽礬則能引其風熱之痰亦結在膈而出也若使表症既罷內症已備則又另有法在似無庸於瑣贅升麻山草升陽散熱升麻專入脾胃兼入肺大腸似與葛根一類但此辛甘微苦能引蔥白入肺發散風寒出汗引石膏能治陽明頂巔頭痛齒痛引參耆能入脾胃補脾且同柴胡能引歸耆白朮甘溫之藥以補衛氣之散而實其表並治一切風陷下痢後重裡急症不一端有應用承氣大下者有應用升柴上升者要在辨症明確以識升降之宜耳不得概以升舉為事也久泄經曰清氣在下則生飧泄脫肛足寒陰痿暨蠱毒精鬼陽升則陰散與一切風熱斑疹斑疹有虛有實須審兼症以治汪昂曰成朵如錦紋者為斑隱隱見紅點者為疹蓋胃熱失下衝入少陽則助相火而成斑衝入少陰則助君火而成疹瘡毒靡不隨手輒應以升其陽而散其熱俾邪盡從外解而濁自克下降故又曰能以解毒不似葛根功專入胃升津解肌而不能引諸藥以實衛氣也但升麻佐於葛根則入陽明升津解肌有效同柴胡升氣則柴能升少陽肝經之陽升麻能升陽明胃經之陽一左一右相需而成時珍曰大抵人年五十以後其氣消者多長者少降者多升者少秋冬之令多而春夏之令少若稟受弱而有諸般陽虛等症者並宜以升陽等藥活法治之但陰火動及氣虛汗出切忌朱肱活人書言犀角地黃湯如無犀角可用升麻以代意在引藥以入陽明耳朱二允言犀角地黃湯不宜用升麻以代犀角意在升麻能引陰血上湧二者見解俱是但須察其病氣淺深臟氣偏純以明治之得失里白外黑緊實者良名鬼臉升麻細削皮青緑色謂雞骨升麻去須蘆蒸曝用入補劑蜜水炒用葛根蔓草入胃升陽解肌退熱生津葛根專入胃兼入脾辛甘性平輕揚升發能入足揚明胃經鼓其胃氣上行生津止渴汪昂曰風藥多燥葛根獨能止渴者以其能升胃氣入肺而生津耳兼入脾經開腠發汗脾主肌肉解肌退熱緣傷寒太陽病罷傳入陽明則頭循經而痛胃被寒蔽而氣不得上升入肺則渴胃主肌肉氣不宣通則熱故當用此以治俾其氣升津生肌解熱退因其體輕故解肌因其氣升故生津而無復傳之勢矣時珍曰本草十劑云輕可去實麻黃葛根之屬蓋麻黃乃太陽經藥兼入肺經肺主皮毛葛根乃陽明經藥兼入脾經脾主肌肉所以二味藥皆輕揚發散而所入迥然不同也繡曰麻黃入肺而不入脾因其中空象肺之故葛根入脾而不入肺因其體輕蔓延周身通達象肌之故但葛根一味必其於頭額俠之處陽明經行於面額痛如刀劈方謂邪傳陽明其藥可用張元素曰頭顱痛如刀破乃陽明中風可用葛根蔥白湯若使未入陽明又是引邪內入不可用也即邪在於太陽而略見於陽明則以方來之陽明為重故必用葛根以絶其路仲景治太陽陽明合病桂枝湯加葛根麻黃又有葛根黃芩黃連解肌湯是用以斷太陽陽明之路非太陽藥也若使陽明症備而止兼有太陽則又以未罷之太陽為重故又不用葛根且陽明主肌肉者也而用乾葛大開肌肉則津液盡從外泄恐胃愈燥而陰立亡至於疹痘未發則可用此升提酒醉則可用此解酲火鬱則可用此升散但亦須審中病輒止如丹溪云治瘧無汗要有汗散邪為主帶補有汗要無汗扶正為主帶散若陽瘧有汗加參耆以斂之無汗加芩葛蒼朮以發之不可過用以致胃氣有傷也如丹溪云斑疹已見紅點不可更服升葛湯恐表虛反增斑爛柴胡山草入足少陽膽升陽解熱和表柴胡專入膽味苦微辛氣平微寒據書載治傷寒熱傳足少陽膽緣膽為清淨之府無出無入邪入是經正在表裡之界汗吐與下當禁惟宜和解故仲景之治傷寒邪入少陽而見寒熱往來脅痛耳聾少陽衛於身側其脈循脅通耳邪由陽明而傳少陽故必口苦咽乾脅痛耳聾寒熱往來脈則尺寸俱弦婦人熱入血室用之以泄其邪沖為血海血海即血室也凡沖男女皆有惟婦人所主在血故病多犯於此柴胡在表可解經邪在裡可解血熱胎前産後小兒痘疹五疳羸熱諸瘧先寒後熱謂寒瘧先熱後寒謂溫瘧但熱不寒謂疸瘧亦謂溫瘧寒多熱少謂牡瘧並癰疽瘡瘍咸宜用之喻嘉言曰其寒熱所主之往來適在少陽所主之地偏陰則多寒偏陽則多熱即其純熱無寒而為疸瘧溫瘧純寒無熱而為牡瘧要皆自少陽而造其極補偏救弊亦必返還少陽之界陰陽兩協於和而後愈也施汗吐下之法以治實熱施和溫之法以治虛寒無非欲致其和平耳瘧邪如傀儡少陽則提傀儡之線索操縱進退一惟少陽主張寧不恢恢乎有餘刃耶汪昂曰瘧之不離乎少陽猶咳之不離肺也若病在太陽用之太早猶引賊入門病在陰經用之則重傷其表必得邪至少陽而藥始可用矣李士材曰瘧非少陽經慎用至云能治五癆必其諸臟諸腑其癆挾有實熱者暫可用此解散實熱是外邪內鬱而實真虛而挾實熱亦當酌其所宜雖引清陽之氣左旋上行然升中有散若無歸耆同投其散滋甚虛熱不可寒血衰火毒者不可燥豈容誤哉識此三弊則用柴胡不致有誤宗奭曰經驗方中治勞熱青蒿煎用柴胡止合宜爾服之無不效熱去即須急止若或無熱得此愈甚雖至死人亦不怨目擊甚多日華子又謂補五癆七傷藥性論亦謂治癆乏羸瘦若此等病苟無實熱醫者執而用之不死何待時珍曰冠氏不分臟腑經絡有熱無熱乃謂柴胡不治勞乏一概擯斥殊非通論兼之性滑善通凡溏泄大便者當善用之熱結不通者當佐當歸黃芩以投差無誤耳是以陰虛火炎骨蒸勞熱腎虛泄瀉書載不應服解散宜北柴胡虛熱宜海陽軟柴胡為良酒炒用半夏為使惡皂莢畏女菀藜蘆時珍曰行手足少陽以黃芩為佐行手足厥陰以黃連為佐香薷芳草宣散三伏濕熱香薷專入脾胃心氣味香竄似屬性溫並非沉寒然香氣既除涼氣即生所以菀蒸濕熱得此則上下通達而無鬱滯之患搏結之陽邪得此則煩熱頓解而無固結之弊矣是以用為清熱利水要劑然必審屬陽臟其症果屬陽結而無虧弱之症者氣虧血弱用此差為得宜若使稟賦素虧飲食不節其症有似燥渴而見吐瀉不止者用此等於代茶寧無誤乎時珍曰世醫治暑病以香薷散為首藥然暑有乘涼飲冷致陽氣為陰邪所遏遂病頭痛發熱惡寒煩躁口渴或吐或瀉或霍亂者宜用此藥以發越陽氣散水和脾若飲食不節勞役作喪之人傷暑大熱大渴汗泄如雨煩燥喘促或瀉或吐者乃勞倦內傷之症必用東垣清暑益氣湯人參白虎湯之類以瀉火益元可也若用香薷之藥是重虛其表而又濟之以熱矣蓋香薷乃夏月解表之藥如冬月之用麻黃氣虛者尤不可多服而今人不知暑傷元氣不拘有病無病概用代茶謂能闢暑真癡人説夢也今人但知暑即是熱熱即是暑暑為陰症熱為陽症經曰氣盛身寒得之傷寒氣虛身熱得之傷暑故中暑宜溫散中熱宜清涼暑熱混為一氣而不知暑屬何形熱屬何象暑陰熱陽暑何因是而名熱何因是而號暑何因何體氣而至體陰召暑熱何因何體氣而召體陽召熱暑何用於香薷不宜氣虛傷暑再加香薷散氣是益虛矣熱何用於香薷則效熱因邪郁散邪而熱自除其中旨趣在人領會未可為粗心人道也陳者良宜冷服時珍曰熱服令人瀉淡豆豉造釀升散膈上熱邪淡豆豉專入心肺本於黑豆蒸罯而成按其味苦氣寒陳藏器曰豆性平炒熟熱煮食寒作豉冷似屬苦降下行之味而無升引上行之力也然經火蒸罯味雖苦而氣則馨氣雖寒而質則浮能升能散故得蔥則發汗得鹽則引吐得酒則治風得韭則治痢得蒜則止血炒熟又能止汗是以邪在上而見煩燥頭痛滿悶懊憹不眠發斑嘔逆者合於梔子則能引邪上吐不致陷入而成內結之症也然必江右制者方堪入藥按古制豉法用黑大豆水浸一宿淘淨蒸熟攤勻蒿覆候上黃衣取曬簸淨水拌乾溼得所安甕中築實桑葉蓋厚泥封曬七日取出曝一時又水拌入甕如此七次再蒸去火氣甕收用吐散邪在表宜散在裡宜攻在上宜吐在中下宜下反是則悖矣昔人謂邪在上因其高而越之又曰在上者湧而吐之是也但吐亦須分其所因所治以為辨別如常山蜀漆是吐積飲在於心下者也藜蘆皂白二礬桔梗蘆皂角是吐風痰在於膈者也生萊蔔子是吐氣痰在於膈者也烏尖附是吐濕痰在於膈者也胡桐淚是吐腎胃熱痰上攻於膈而見者也梔子瓜蒂是吐熱痰聚結於膈而成者也砒石是吐寒痰在於膈者也至於膈有熱毒則有木鱉青木香以引之痰涎不上則有燒鹽以湧之但吐藥最峻過用恐於元氣有損況砒石木鱉尤屬惡毒妄用必致生變不可不慎常山毒草吐心下瘧痰積飲常山專入心下辛苦而寒有毒功專引吐行水為除瘧疾老痰積飲要藥蓋瘧無不挾痰挾熱以成然亦有風痰寒熱食氣之分風痰宜於星烏寒痰宜於薑附熱痰宜於貝母食痰宜於楂曲氣痰宜於烏藥痰在膈上經絡非吐不解痰在四肢皮裡膜外非薑汁竹瀝不達痰在脅下非白芥子不除痰在骨節眼黑步艱非萆薢苦參不祛痰在手臂肩背痠痛非導痰加薑黃木香桂枝不和痰在腸胃實結非用下藥不愈治須分其陰陽虛實表裡以定如瘧果因傷寒寒熱及時氣溫疫而致黃涎聚於胸中心下牢固不解則當用此引吐然亦須在發散表邪及提出陽分之後而用之其用又當審其所見部位及藥佐使以治如常山得甘草則吐水在上焦者宜之得烏梅山甲則入肝水在脅下者宜之得大黃則利水邪熱交結而成內實者宜之得小麥竹葉則入心得秫米麻黃則入肺得龍骨附子則入腎得草果檳榔則入脾然此陰毒之草其性悍暴雖有破瘴逐飲之能而亦終損真氣所以仲景治瘧方中從無及此經曰太陰在泉濕勝所淫民病積飲又曰歲土太過雨濕流行甚則飲發蓋飲有五流於肺為支飲於肝為懸飲於心為伏飲於經絡為溢飲於腸胃為痰飲而夏傷於暑秋必疸瘧及瘧在三陰元氣虛寒人則常山等藥皆為戈戟或問吐藥甚多何以瘧疾必用常山蜀漆蓋以常山性兼逐疫瘧疾本於濕疫故於常山蜀漆則宜猶之瓜蒂烏附尖萊蔔子藜蘆皆為吐劑而瓜蒂則止宜於熱痰烏尖附則止宜於濕痰萊蔔子則止宜於氣痰藜蘆則止宜於風痰也酒浸炒用根即蜀漆功用略同但苗性輕揚其於上焦邪結治之更宜藜蘆毒草吐風痰在膈藜蘆專入肺胃能反五參細辛芍藥及一服即吐其義何居蓋緣苦雖屬降而亦善湧藜蘆辛少苦多故能入口即吐是以風痰膈結而見咳逆上氣者當用是藥以投使其膈部之邪悉從上出也但此宜作散劑以投散可達上切勿湯藥以服儒門事親云一婦病風癇初一二年一作後漸日作甚至一日數作求死而已值歲大飢採百草食見野草若蔥採蒸飽食覺不安吐膠涎數日約一二斗汗出如洗甚昏困後遂輕健如常人以所食是蔥訪人乃憨蔥苗即藜蘆是已時珍曰我朝荊和王妃劉氏年七十中風不省牙關緊閉先考太醫吏目月池翁診視藥不能入不獲已打去一齒濃煎藜蘆湯灌之少頃噫氣遂吐痰而蘇藥勿瞑眩厥疾勿瘳誠然至於腸澼泄痢如何書載克治亦是因吐除其實積積去而利與澼亦可止矣吐雖等於常山瓜蒂烏附尖萊蔔子但常山則吐瘧痰瓜蒂則吐熱痰烏附尖則吐濕痰亦吐風痰此則專吐風痰者也況此氣善通頂治喉痹及鼻中息肉為末吹效然亦並非得已即有中蠱等毒及或老痰積塊止可借其宣泄切勿沾口以自損其津液耳取根去頭用黃連為使反細辛芍藥諸參惡大黃畏蔥白服蔥湯吐即止木鱉子蔓草木鱉子引吐熱毒從痰外出番木鱉引吐熱涎逆流而上木鱉專入外科外治本有二種一名土鱉有殼一名番木鱉無殼木鱉味苦居多甘辛略帶諸書皆言性溫以其味辛者故耳究之性屬大寒狗食即斃人若誤用中寒口噤多致不救常有因病錯用而斃者矣故其功用多從外治如腫毒乳癰痔漏腫痛喉痹用此醋漱於喉間引痰吐出以解熱毒不可咽下或同硃砂艾葉捲筒熏疥殺蠱最效或用麻油熬擦癬亦可總不可入湯劑以致寒毒內攻耳番鱉即馬錢子功與木鱉大同而寒烈之性尤甚所治熱病喉痹亦止可同山豆根青木香磨汁內含使其痰涎引吐逆流而上不可咽下斑瘡入眼可用番木鱉半個輕粉冰片麝香為末左目吹右耳右目吹左耳日吹二次即住狗性大熱用此大寒內激使之相反立見斃耳止入外科治療用時除油胡桐淚香木胡桐淚專入胃兼入腎苦鹹大寒專治咽喉熱痛齒𧈟風疳瘰癧結核緣此熱盛於內上攻口齒發為諸病非不用此味苦則蟲莫制用此味鹹則堅莫除用此大寒則熱莫解經曰熱淫於內治以鹹寒又曰在高者因而越之可知大熱大毒必用大苦大寒以為引吐方能以除頌曰古方稀用今治口齒家為最要之物正俗所云有病病當之者是耳但此不宜多服恐其引吐不休結如小石片者佳時珍曰石淚入地受滷氣故其性寒能除熱其味鹹能入骨軟堅木淚狀如膏油系樹脂流出者甜瓜蒂蓏吐熱痰在膈甜瓜蒂專入脾肺胃即俗名苦丁香是也味苦氣寒有毒蓋此氣味純陰功專湧泄凡因熱痰聚膈而見面目浮腫咳逆上氣皮膚水氣黃疸濕熱諸症則當用此調治或兼他藥同入湧吐如仲景合赤小豆之酸甘以吐胸中寒邪金匱瓜蒂湯以治中暍無汗之類胸中者清陽之府諸邪入胸皆阻陽氣不得宣達以致胸滿痞硬斯非汗下可施惟以瓜蒂極苦赤小豆味酸相須相益能除胸中實邪為吐劑中第一品也若不因其高而越則為喘為嗽勢所必至但非實熱實症不可輕用萊蔔子葷辛萊蔔子生吐風痰炒熟下氣定喘蔔根生用消痰除血熟用生痰助濕萊蔔子專入脾肺氣味甚辛生用研汁能吐風痰有倒牆推壁之功迅利莫御若醋研敷則癰腫立消炒熟則下氣定喘消食寬膨一生一熟性氣懸殊蔔根性亦類子生升熟降但生則克血消痰治痢汪昂云夏月食其菜數斤則不患痢秋月以菜葉攤屋瓦上任霜雪打壓至春收之煎湯飲治痢得效熟則生痰助濕以故火傷垂絶用生萊蔔汁灌之即蘇方人避難入石洞中賊燒煙燻之口含萊蔔一塊煙不能毒嚼汁擂水飲之亦可打撲損傷青紫搗爛罯之即散煨熟擦摩凍瘃二三日即和偏頭風取近蒂青色半寸許搗汁滴鼻孔左痛滴右右痛滴左左右俱痛兩鼻皆滴滴後少傾日滴一次不過六七日永不再發欲令鬚髮白者以生地黃汁一升合生萊蔔汁飲之即白傷血之驗可徵也生地黃涼血萊蔔汁破氣鬚髮安得不白是以人服何首烏地黃者切忌萊蔔犯之惟用生薑以制小兒瘤疒贅遊風塗之即愈並能消面毒腐積腐漿見蘿苩不成並解附子毒但其性總屬耗氣傷血故脾胃虛寒食不化者為切忌焉子炒用膽礬石吐風痰涎在膈膽礬專入肝膽兼入肺脾又名石膽産於銅坑之中得銅精氣而成味酸而辛氣寒而澀功專入膽湧吐風熱痰涎使之上出蓋五味惟辛為散惟酸為收五性惟寒勝熱風熱盛於少陽結為痰垢汗之氣橫而不解下之沉寒而益甚凡因濕熱淫火提出病要見為陰蝕崩淋寒熱風痰毒氣結聚牢固見為咽齒喉痹乳蛾風熱痰垢結聚見為咳逆癇痓目痛難忍及金瘡不愈諸毒內閉膠結見為蟲痛牙疳種種等症服此力能湧吐上出去其膠痰化其結聚則諸症悉除故古人之治喉痹乳蛾用米醋煮真鴨嘴膽礬為末醋調探吐膠痰即瘥又治紫白癜風同牡蠣生研醋調摩之即愈又治胃脘蟲痛以茶清調膽礬末吐之即除又治馬牙疳紅棗去核入膽礬煅赤研末敷之追出痰涎即效百蟲入耳用膽礬和醋灌即出諸症皆因風熱在膈按此功專湧吐何書又言酸寒能收不知書言收斂乃是取辛收其熱毒上湧而出非以收其入內而不宣散出表之意也以散為收凡書所論藥性每有以收為散以散作補不為剖析明白多有意義難明以致用之者之誤耳磨鐵作銅色者真形似空青鴨色為上市人各以醋澡青礬偽之畏桂芫花辛夷白薇凡用吐法宜先少服不湧漸加之仍以雞羽撩之不出以齏投之不吐再投且投且探無不吐者吐至瞑眩慎勿驚疑但飲冷水新水立解強者可一吐而安弱者作三次吐之吐之次日頓快其邪已盡不快則邪之引之未盡也吐後忌飽食酸鹹硬物乾物肥油之物並忌房室悲憂溫散熱氣久積於中自當清涼以解寒氣久滯於內更當辛溫以除故溫散之味實為中虛寒滯所必用也然中界乎上下之間則治固當以中為主而上下亦止因中而及是以溫以守內而不凝散以行外而不滯溫散並施而病不致稍留於中而莫御矣第不分辨明晰則治多有牽混不清如縮砂密木香香附乾薑半夏胡椒吳茱萸使君子麥芽松脂皆為溫中行氣快滯之味然縮砂密則止暖胃快滯木香則止疏肝醒脾香附米則止開鬱行結活血通經半夏則止開痰逐濕乾薑則止溫中散寒胡椒則止溫胃逐痰除冷吳茱萸則止逐肝經寒氣上逆腸胃使君子則止燥胃殺蟲麥芽則止消穀磨食松脂則止祛風燥濕而有不相兼及者也至於溫中而兼及上則有如蓽茇之散胸腹寒逆藿香之醒脾辟惡寬胸止嘔菖蒲之通心開竅醒脾逐痰玄胡索之行血中氣滯氣中血滯安息香之通活氣血各有專司自得之妙溫中而兼及下則有如益智之燥濕逐冷溫腎縮泉蛇床子之補火宣風燥濕蒺藜之祛肝腎風邪大小茴之逐肝腎沉寒痼冷各有主治獨得之趣溫中而兼通外則有草果之溫胃逐寒闢瘴闢瘧蘇合香樟腦大蒜山奈甘松排草之通竅逐邪殺鬼白檀香之逐冷除逆以引胃氣上升良薑紅豆蔻之溫胃散寒艾葉之除肝經沉寒痼冷以回陽氣將絶胡椒之通心脾小腹辟惡發痘煙草之通氣爽滯闢瘴除惡白芥子之除脅下及皮裡膜外之風痰石灰之燥血止血散血烏藥之治氣逆胸腹不快各有其應如響之捷溫中而至通上徹下則有如丁香之泄肺暖胃燥腎止厄川椒之補火溫臟除寒殺蟲各有氣味相投之宜若使溫中獨見於上則有如草豆蔻之逐胃口上之風寒止當心之疼痛薰草之通氣散寒辟惡止痛其效俱不容掩且溫中而獨見於上下則有如薤之通肺除痹通腸止痢其效又屬不泯其一溫中而氣味各殊治效各別有不相同如此然繡竊謂溫中之味其氣兼浮而升則其散必甚溫中之味其氣必沉而降則其散甚微溫中其氣既浮而又表裡皆徹則其散更甚而不可以解矣是以丁香白蔻之降與於草豆蔻白檀之升絶不相同即與縮砂密之散木香之降亦且絶不相似良薑氣味過散故止可逐外寒內入而不可與乾薑溫內同比藿香氣味稍薄故止可除臭惡嘔逆而不可與木香快滯並議烏藥徹上徹下治氣甚於香附故為中風中氣所必需薤白氣味辛竄行氣遠駕木香故為胸痹腸滯所必用凡此是溫是散皆有義理錯綜在人細為體會可耳草豆蔻芳草逐胃口上風寒止當心疼痛草豆蔻專入脾胃辛熱香散功與肉蔻相似但此辛熱燥濕除寒性兼有澀不似肉蔻澀性居多能止大腸滑脫不休也又功與草果相同但此止逐風寒客在胃口之上症見當心疼痛不似草果辛熱浮散專治瘴癘寒瘧也故凡濕鬱成病而見胃脘作疼服之最為有效若使鬱熱內成及陰虛血燥者服之為大忌耳時珍曰草豆蔻治病取其辛熱浮散能入太陰陽明除寒燥濕開鬱化食之力而已南地卑下山嵐煙瘴飲啖酸鹹脾胃常多寒濕鬱滯之病故食療必用與之相宜然過多亦能助脾熱傷肺損目或云與知母同用治瘴瘧寒熱助其一陰一陽無偏勝之害蓋草果治太陰獨勝之寒知母治陽明獨勝之火也閩産名草蔻如龍眼而微長皮黃白薄而稜峭仁如砂仁而辛香氣和滇廣所産名草果如訶子皮黑厚而稜密子粗而辛臭雖是一物微有不同草果其義另詳麵裹煨熟取仁忌鐵器草果芳草溫胃逐寒治瘴癘寒瘧草果專入胃與草豆蔻諸書皆載氣味相同功效無別服之皆能溫胃逐寒然此氣味浮散出自漢廣凡冒巔霧不正瘴瘧服之直入病所而皆有效故合常山用則能以截久瘧同知母用則能以除瘴癘寒熱義詳草豆蔻同橘半用則能以除膈上痰同楂曲用則能以解面濕魚肉若使非由瘋瘴或因濕熱而見瘀滯與傷暑而見暴注溲赤口乾者則並禁焉忌鐵使君子蔓草溫脾燥胃殺蟲除積使君子專入脾胃味甘氣溫功專補脾殺蟲除積凡人症患五疳便濁瀉痢腹蟲皆脾胃虛弱因而乳停食滯濕熱瘀塞而成服此氣味甘溫以助脾胃則積滯消濕熱散水道利而前症盡除矣時珍曰凡殺蟲之藥多是苦辛獨使君子棐子而殺蟲亦異也每月上旬蟲頭向上中旬蟲頭向中下旬蟲頭向下於上旬空心服此數枚則蟲皆死而出也但忌熱茶同服則令人作瀉矣出閩蜀五瓣有稜內仁如棐亦可煨食久則油黑不可用白豆蔻芳草宜散肺分寒滯溫暖脾胃白豆蔻專入肺脾胃兼入大腸本與縮砂密一類氣味既同功亦莫別然此另有一種清爽妙氣上入肺經氣分而為肺家散氣要藥且其辛溫香竄流行三焦溫暖脾胃而使寒濕膨脹虛瘧吐逆反胃腹痛並翳膜必白睛見有白翳方用目眥紅筋等症悉除不似縮砂密辛溫香竄兼苦功專和胃醒脾調中而於肺腎他部則止兼而及之也是以肺胃有火及肺胃氣薄切忌故凡用藥治病最宜審諒氣味分別形質以為考求不可一毫忽略竟無分別於其間耳縮砂密芳草溫脾暖胃快滯縮砂專入脾胃兼入肺腎大小腸膀胱辛溫而澀故書號為醒脾調胃要藥然亦兼入肺腎大小腸膀胱是以同檀香白豆蔻則能入肺同人參益智則能入脾同黃柏茯苓則能入腎同赤石脂則能入大小腸其言醒脾調胃快氣調中則於腹痛痞脹有功痛有喜按拒按之別若使痛喜手按多屬脾胃虛寒治須用此否則切禁痞有因寒因熱因暑因濕因痰因氣因血因食之別亦須審其兼症兼脈以求不可盡以砂仁為治也入大腸則於赤白瀉痢有效入肺則於咳嗽上氣克理瀉痢由於寒濕者宜用熱濕者勿用至云止痛安胎並咽喉口齒浮熱能消亦是中和氣順之意胎挾寒滯者始宜熱屬虛浮者方用若因實熱而云胎氣不和水衰而見咽喉口齒燥結者服之豈能是乎故虛實二字不可不細辨而詳察耳出嶺南研碎用木香芳草疏肝醒脾泄滯和胃木香專入肝脾味辛而苦下氣寬中為三焦氣分要藥然三焦則又以中為要故凡脾胃虛寒凝滯而見吐瀉停食肝虛寒入而見氣鬱氣逆服此辛香味苦則能下氣而寬中矣中寬則上下皆通是以號為三焦宣滯要劑宗奭曰木香專泄快胸腹間滯寒冷氣他則次之得橘皮肉豆蔻生薑相佐使絶佳效尤速好古曰本草云生氣劣氣不足補也通壅氣導一切氣破也安胎健脾胃補也除痃癖症塊破也其不同如此潔古張氏但言調氣不言補也至書所云能升能降能散能補非云升類升柴降同沉香不過因其氣鬱不升得此氣克上達耳況此苦多辛少言降有餘言升不足言散則可言補不及一不審顧任書混投非其事矣番船上來形如枯骨味苦黏舌者良名青木香非今所用馬兜鈴根者是也今用皆廣木香土木香入理氣藥磨汁生用若實大腸麵煨熟用今醫妄以西香代木香治痢殊謬香附米芳草入肝開鬱散滯活血通經香附米專入肝膽兼入肺辛苦香燥據書備極讚賞能入肝膽二經開鬱郁有痰鬱火鬱氣鬱血鬱濕鬱食鬱散滯活血通經兼行諸經氣分張子和謂聖人嗇氣如持至寶庸人役物反傷太和又曰氣本一也因有所觸而怒喜悲恐寒熱驚思勞九氣於焉而分蓋怒則氣上喜則氣緩恐則氣下寒則氣收熱則氣泄驚則氣亂思則氣結勞則氣耗此九氣之至也須分虛實以治凡霍亂吐逆泄瀉崩漏經候須詳病症用藥如將行而痛者屬氣之滯屬實行後而痛者屬氣與血俱虛痛而喜按者屬虛痛而拒按者屬實痛而喜按血淡者屬虛痛而拒按色紫者屬實大抵崩漏多因氣虛血熱而成故須涼血補氣為要三焦不利等症上焦如霧中焦如漚下焦如瀆治皆有效又云生則上行胸膈外達皮膚熟則下走肝腎外徹腰足炒黑則止血分補虛鹽水浸炒則入血分潤燥青鹽炒則補腎氣酒浸炒則行經絡醋浸炒則消積聚薑汁炒則化痰飲得參朮則補氣得歸地則補血得木香則疏滯和中得檀香則理氣醒脾得沉香則升降諸氣得川芎蒼朮則總解諸郁得梔子黃連則能降火熱得茯苓則交濟心腎得茴香補骨脂則引氣歸元得三稜莪朮則消磨積塊得厚朴半夏則決壅消脹得紫蘇蔥白則解散邪氣得艾葉則暖子宮乃氣病之總司大抵婦人多郁氣行則鬱解故服之尤效非云宜於婦人不宜於男子也時珍曰婦人以血用事氣行則無疾老人精枯血閉惟氣是資小兒氣日充則形乃固大凡病則氣滯而餒故香附於氣分為君舉世所罕知臣以參耆佐以甘草治虛怯甚速也按此專屬開鬱散氣與木香行氣貌同實異木香氣味苦劣故通氣甚捷此則苦而不甚故解鬱居多且性和於木香故可加減出入以為行氣通劑否則宜此而不宜彼耳但氣多香燥陰虛氣薄禁用或酒或童便或鹽水浸炒各隨本方制用忌鐵蓽茇芳草散胸腹寒逆蓽茇專入胃兼入脾膀胱氣味辛熱凡一切風寒內積逆於胸膈而見噁心嘔吐陽明胃府見於下部而見腸鳴冷痢水瀉太陽膀胱經發於頭面而見齒牙頭痛鼻淵陽明胃經停於肚腹而見中滿痞塞疼痛太陰經俱可用此投治以其氣味辛溫則寒自爾見除其曰鼻淵頭痛涕膿而臭者為淵涕清而不臭者為鼽鼻淵有肉痛極而不下垂者為息肉下垂而不痛者為鼻痔亦是取其辛熱能入陽明以散浮熱之意是以病患偏頭痛風須先口含溫水隨左右以此末吹鼻最效牙疼必同乾薑細辛調治亦取能以除寒之意熱痛石膏牙硝風痛皂角殭蠶峰房二烏蟲痛石灰雄黃總之氣味既辛則凡病屬寒起皆可以投然亦泄人真氣不可任意多服以致喘咳目昏腸虛下重喪其真氣也艾葉隰草除沉寒痼冷起陽氣將絶艾葉專入肝脾兼入腎辛苦性溫其氣芳烈純陽故可用以取火服之則走肝脾與腎能除沉寒痼冷凡一切病因寒濕而見血衄崩帶腹痛冷痢霍亂轉筋胎動腰痛氣鬱經水不調子宮虛冷蟲動瘡疥者諸症俱就寒濕論服之能立見效故治亦就寒濕起見若其陽氣將絶之候灸之即能回陽且能通諸經以治百病百病亦就寒濕論汪昂曰艾用火炎則氣下入藥則熱氣上衝故古方有同阿膠以治虛痢及胎前後下血同香附制丸以調經血而溫子宮兼除心腹諸痛同乾薑以蜜為丸以除冷惡鬼邪諸氣亦寒濕陰氣同白礬為末以治瘡疥又以熟艾布兜以治寒濕腳氣及老人臍腹畏冷用絹裹以擦風瘙癮疹皆取辛溫則散之義若使症非寒濕而用是藥燥烈以治其失匪輕每見今人安胎不審寒熱虛實輒用艾葉以投殊為荒謬是以書載氣虛血熱者禁用包盡多少病症取蘄州艾陳者良揉搗如綿謂之熟艾灸火用婦人丸散醋煮搗餅再為末用煎服生用生用則溫熟用則熱苦酒香附為使大茴香葷辛除肝經絡沉寒痼冷大茴香專入肝兼入腎膀胱小腸古作蘹香也辛甘性熱據書所載功專入肝燥腎凡一切沉寒痼冷而見霍亂㿗疝陰腫腰痛及乾溼腳氣並肝經虛火從左上衝頭面者用之服皆有效有腫謂濕腳氣無腫謂乾腳氣蓋茴香與肉桂吳茱萸皆屬厥陰燥藥但萸則走腸胃桂則能入肝腎此則體輕能入經絡也必得鹽引入腎發出陰邪故能治疝有效若挾陽邪者休用按疝有血氣寒水筋狐㿗七種之分其病亦有寒熱虛實不同所當分症施治疝有病發於肝而見症於腎以肝脈絡陰器故也茴香能散厥陰經絡陰邪故多用此施治余按茴香形類不一據書所載有言大如麥粒輕而有細稜者名大茴出寧夏市中鮮有他處小者名小茴自番舶來實八瓣者名八角香今市所用大茴皆屬八角而寧夏之茴未見余細嚼審八角茴味其香雖有其味甚甘其性溫而不烈較之吳茱萸艾葉等味更屬不同若似八角大茴甘多之味甘多則滯而謂能除沉寒痼冷似於理屬有礙似應用寧夏茴為勝管見如斯未知有合後之同志否鹽水炒用得酒良小茴香葷辛功遜大茴小茴專入肝胃又入腎膀胱小腸形如粟米辛香氣溫與寧夏大茴功同入肝燥腎溫胃但其性力稍緩不似大茴性熱仍看症候緩急分別用之耳時珍曰小茴性平理氣開胃夏月祛蠅闢臭食料宜之大茴性熱多食傷目發瘡食料不宜過用酒炒鹽水炒各隨病症活用益智芳草溫胃逐冷溫腎縮泉益智專入脾胃兼入腎氣味辛熱功專燥脾溫胃及斂脾腎氣逆藏納歸源氣逆因寒而起故以益志散寒為斂非收斂之斂也故又號為補心補命之劑是以胃冷而見涎唾則用此以收攝涎唾由於胃冷收攝亦是溫胃不當作甘補收斂看脾虛而見不食脾虛亦是脾寒不食不可作中空宜補看則用此溫理只是散寒逐冷腎氣不溫而見小便不縮則用此鹽炒與烏藥等分為末酒煮山藥粉為丸鹽湯下名縮泉丸以投以溫為縮與夫心腎不足而見夢遺崩帶則用此以為祕精固氣以溫為固非以收澀為固也若因熱成氣虛而見崩濁夢遺等症者則非所宜今人不審寒熱虛實妄用益智固精味甚此雖類於縮砂密同為溫胃但縮砂密多有快滯之功此則止有逐冷之力不可不分別而審用耳出嶺南形如棗核者鹽炒用山奈芳草暖胃辟惡山奈專入胃氣味芳香功能暖胃辟惡凡因邪氣而見心腹冷痛寒濕霍亂暨風蟲牙痛用此治無不效仁存方用山奈為末鋪紙上卷作筒燒燈吹滅乘熱和藥吹入鼻內痛即止攝生方用肥皂一個去穰入山奈甘松各三分花椒食鹽不拘多少填滿面包煅紅取研日用擦牙漱去以其氣味芬芳得此則能溫胃辟惡耳水云録治婦人頭屑用山奈甘松香零陵香一錢樟腦二分滑石半兩為末夜擦旦篦去若使諸症概非濕穢不得妄用出廣東根葉與生薑同合諸香藥用甘松芳草醒脾開鬱辟邪除惡甘松專入脾甘溫無毒考書俱載芳香升竄功能醒脾開鬱凡因惡氣卒中而見心腹痛滿風疳齒𧈟者可同白芷並附子並用聖濟總録治風疳蟲牙蝕肉至盡用甘松膩粉各二錢半蘆薈半兩豬腎一對切炙為末夜漱口後貼之有涎吐出若腳氣膝腫煎湯淋洗惟寒濕則宜熱濕者休用此雖有類山奈但山奈氣多辛竄此則甘多於辛故書載能入脾開鬱也出涼州葉如茅根緊密者佳此屬草部與松木松香不同良薑芳草溫胃散寒除泄良薑專入胃氣味辛熱治無他屬凡因客寒客寒為外至寒邪積於胃脘而見食積不消絞痛殆甚暨霍亂瀉痢吐惡噎膈瘴瘧冷癖皆能溫胃卻病故同薑附則能入胃散寒同香附則能除寒祛郁若傷暑泄瀉實熱腹痛切忌此雖與乾薑性同但乾薑經炮經制則能以去內寒此則辛散之極故能以闢外寒之氣也心口痛方云凡男女心口一點痛者乃胃脘有滯或有蟲也多因怒極受寒而起遂致終身俗言心氣痛者非也用高良薑酒洗七次同香附子醋洗七次焙研各記收之因寒加薑末為君附末佐之因怒附末為君薑末佐之寒怒兼有平用以米飲入生薑汁一匙鹽一捻服之宜止子名紅豆蔻氣味辛甘而溫炒過入藥亦是散寒燥濕補火醒脾溫肺之味且善解酒余並治風寒牙痛與良薑性同然有火服之傷目致衄不可不知乾薑葷辛溫中散寒乾薑專入胃其味本辛炮製則苦大熱無毒守而不走凡胃中虛冷元陽欲絶合以附子同投則能回陽立效故書則有附子無薑不熱之句與仲景四逆白通薑附湯皆用之元素曰乾薑氣薄味厚半沉半浮可升可降陽中之陰也又曰大辛大熱陽中之陽其用有四通心助陽一也去臟腑沉寒痼冷二也發諸經之寒氣三也治感寒腹痛四也且同五味則能通肺氣而治寒嗽同白朮則能燥濕而補脾同歸芍則能入氣而生血故凡因寒內入而見臟腑痼蔽關節不通經絡阻塞冷痹寒痢反胃膈絶者無不藉此以為拯救除寒炒黑其性更純味變苦鹹力主下走黑又止血辛熱之性雖無而辛涼之性尚在故能去血中之鬱熱而不寒止吐血之妄行而不滯較之別藥徒以黑為能止血為事者功勝十倍矣血寒者可多用血熱者不過三四分為嚮導而已白淨結實者良母薑曬乾為乾薑炒炮為炮薑炒黑為黑薑藿香芳草醒脾止惡宣胸止嘔藿香專入脾胃肺辛香微溫香甜不峻但馨香氣正能助脾醒胃以闢諸惡故凡外來惡氣內侵而見霍亂嘔吐不止者須用此投服如藿香正氣散用此以理脾肺之氣俾正氣通而邪氣除俾其胸開氣寬飲食克進寒去正復故同烏藥順氣散則可以利肺同四君子湯則可健脾以除口臭但因熱作嘔勿服薰香芳草溫氣散寒辟惡止痛薰香專入肺即書所謂零陵香者是也味甘而辛性平無毒按書有言能治心痛惡氣以痛與惡多屬寒聚得此能以散寒故耳又言能除鼻中瘜肉鼻癰以鼻得香則開得臭則閉之意耳至云多服作喘亦能以香能耗氣溫服則氣上應而作喘耳但此服之則少亦有治鼻塞頭風齒痛狐惑下痢等症而香鋪用以作料甚多有婦人用此浸油省頭是亦衆香中之不可缺也矣出湖嶺者佳排草香芳草辟惡宣滯排草氣味芳香專入脾據書載能祛惡闢臭除魅與天時行並宜燒之水腫浮氣風瘧可用生薑芥子煎湯浴洗玩此氣味芳香僅可以辟邪魅鬼惡使之氣不克勝至於水腫浮氣亦須香以通達使之氣伸浮散故止可入外用今婦人用此入油省頭若使作湯以服則經絡遍布雖曰祛邪扶正而正氣或虛則又因香而斫敗矣香散之極故古人制方有宜於外者則即以外為主而內不投有宜於內者則即以內為要而外不行即云諸香有類於斯內亦見用然此補少泄多古人獨於此味別為外治而不內入未必不有意義於其中也石菖蒲水草入心宣氣通竅醒脾逐痰石菖蒲專入心兼入脾骨膀胱辛苦而溫香芳而散諸書尚論未透惟張璐發揮本經最明指此實為心氣不足要劑時珍云高皇御製碑中載之菖蒲氣溫味辛乃手少陰足厥陰之藥心氣不足者用之虛則補其母也肝苦急以辛補之是矣其言能補五臟以心為君主五臟系焉首言治寒濕痹是取其辛溫開發脾氣之力治咳逆上氣者痰濕壅滯之喘咳故宜搜滌若肺胃虛燥之喘咳非菖蒲可治也其開心孔九竅明耳目出聲音總取辛溫利竅之力心孔開九竅利則癰瘡之毒可解腸胃喜溫惡寒腸胃既溫則膀胱之虛寒小便不禁自止久服輕身者除濕之驗也不忘不惑延年益智高壽不老皆補五臟通九竅氣之力也其釋本經如此又言能主肝虛心腹痛霍亂轉筋消伏梁癲癇善通心脾痰濕可知千金治胎動不安半産漏下或搶心下血及産後崩中不止並以菖蒲一味煎服皆取辛能開竅血氣安養之意觀此菖蒲實為宣氣通竅之劑故在楊士瀛亦謂噤口下痢可用石菖蒲加於參苓白朮散內以開其胸則其義益著楊士瀛曰下痢噤口雖是脾虛亦熱氣閉隔心胸所致俗用木香失之溫用山藥失之閉惟參苓白朮散加石菖蒲粳米飲調下或用參苓石蓮肉少入菖蒲服胸次一開自然思食但陽亢陰虛嫠寡失合者禁用以其能動心胞之火耳取一寸九節紫花根瘦者佳去皮微炒用秦艽為使惡麻黃忌飴糖羊肉鐵器半夏毒草主散腸胃濕痰半夏專入脾胃膽兼入心書言辛溫有毒體滑性燥能走能散能燥能潤和胃健脾補肝潤腎數語業已道其主治大要矣第不詳悉注明猶未有解蓋半夏味辛辛則液化而便利故云能潤腎燥也成無己曰半夏辛散行水而潤腎燥蓋燥去濕則水利辛化液則燥潤局方半硫丸治老人虛祕皆取其潤滑也俗以半夏南星為性燥誤矣濕去則土燥痰涎不生非二物之性燥也脾苦濕必得味辛氣溫以為之燥半夏辛溫能於脾中滌痰除垢痰去而脾自健故云能以健脾也王好古曰腎主五液化為五濕在腎為唾在肝為淚在心為汗在肺為涕在脾為痰痰者因咳而動脾之濕也半夏泄痰之標不能泄痰之本泄本者泄腎也咳無形痰有聲無形則潤有聲則燥所以為疏脾濕而潤腎燥之劑也胃為痰氣壅塞則胃不和之極半夏既能溫脾以除痰又合生薑暖胃以除嘔若合柴苓以治少陽寒熱往來則胃更見和諧故云能以和胃也王好古曰俗以半夏為肺藥非也止嘔為足陽明除痰為足太陰柴胡為之使故柴胡湯用之雖云止嘔亦助柴苓主寒熱往來是又為足少陽藥也時珍曰脾無濕不生痰故脾為生痰之源肺為貯痰之器按有聲無痰曰咳蓋傷於肺氣有痰無聲曰嗽蓋動於脾濕也有聲有痰曰咳嗽或因火因風因寒因濕因虛勞因食積宜分症論治大法治嗽當以治痰為先而治痰又以順氣為主宜以半夏燥其濕枳殼橘紅利其氣肺虛加溫斂之藥肺熱加涼瀉之劑他如氣逆能下痰除而氣自下鬱結能開痰除而鬱與結亦開暴死以末吹鼻能救如縊死溺死壓死魘死産死之類不眠以半夏湯通其陰陽得臥素問曰胃不和則臥不安半夏能和胃氣而通陰陽靈樞曰陽氣滿不得入於陰陰氣虛故目不得瞑飲以半夏湯陰陽既通其臥立至又有咳嗽不得眠者左不得眠屬肝脹右不得眠屬肺脹宜清肺胸脹合栝蔞等藥名小陷胸湯以除少陰咽痛生瘡語聲不出合雞子苦酒名苦酒湯以服仲景用此以治少陰咽痛亦何莫非半夏之妙用而為開竅利濕之藥合陳皮茯苓甘草名二陳湯為治痰之總劑寒積佐以乾薑芥子積熱佐以黃芩栝蔞濕痰佐以蒼朮茯苓風痰佐以南星前胡痞痰佐以枳實白朮更看痰所在加導引藥惟燥痰非半夏所能司也已但陰虛火盛熱結胎滑痰湧等症則非所宜不可不慎趙繼宗曰二陳治痰世醫執之內有半夏其性燥烈若風濕食諸痰則相宜至於勞痰失血諸痰用之反能燥血液而加病按古半夏有二禁汗家渴家忌之然亦間有用者圓白而大陳久者良浸七日逐日換水瀝去涎同皂莢白礬薑煮熟半夏畏薑偏用薑以制其毒或七日夜用淨水淘浸以除其涎再用皂莢水浸七日夜同皂莢可治風痰又用灰水淘浸七日夜可治脾胃痰又用白礬水淘浸七日夜可治清水痰又用生薑水淘浸七日夜可治寒痰又用甘草水淘浸七日夜可解其毒及調製藥之性洗淨焙乾用柴胡射干為使畏生薑秦皮龜甲雄黃忌羊血海藻飴糖以甘膩凝滯故忌惡皂莢反烏頭烏頭辛燥悍烈故反其用薑汁浸造名生薑曲礬水煮造兼薑糊入名礬曲同皂角煮造煉膏名皂角曲同白芥子等分煮造有竹瀝三分之名竹瀝曲同麻油浸造炒乾為末造成名麻油曲同黃牛膽與蜜造名牛膽曲同香附蒼朮撫芎和半熬膏造名開鬱曲同芒硝十分之三煮與大黃煎膏造名硝黃曲同海粉雄黃各十分之五煉蜜造名海粉曲同生黃牛肉熬膏名霞天曲並照造麴法草盦七日待生黃衣懸干挂風處至用曲治之症則隨製藥能治病症之性以為治焉如生薑治寒痰皂角治風痰白礬治濕痰牛肉治沉疴痼痰之類煙草香草通氣爽滯闢山嵐瘴毒煙草專入表與胃下咽即能醉人且或醉倒而復蘇其性力之猛殆非他物所能比類者矣景嶽云吸其味則辛而鮮甘審其氣則溫而且熱凡書所述煙草皆言在表則能散陰助陽如山巔惡毒瘴濕而致腠理閉密筋骨痹痛服此可以見效因散故在裡則能開胃和中凡因風寒食滯而致霍亂嘔吐宿食難消膨脹鬱結下陷後墜服此亦克有功因性溫性熱故且其氣一入人口不比常度頃刻而周一身令人通體俱快氣竄善走醒能使人醉醉能使人醒飢能使人飽飽能使人飢以之代酒代茗終身不厭卒不能以妨人其故何耶蓋緣煙性猛人不能勝故下咽即醉醉因氣耗辛散氣理固然也然煙氣易散而人氣隨服陽性留中旋亦生氣雖散仍補此惟陰滯者用之如神陰臟可用若陽盛氣越多燥多火陽臟不可用及氣虛氣短多汗者皆不宜用閩産者佳延胡索山草行心肝血中氣滯氣中血滯延胡索專入心肝氣味辛溫無毒入足厥陰肝手少陰心經能行血中氣滯氣中血滯故凡月水不調月水或先或後多因血氣凝滯心腹卒痛小腹脹痛胎産不下筋縮疝瘕産後血沖血暈跌僕損傷不論是血是氣積而不散者服此力能通達諸症皆屬氣血凝滯以其性溫則於氣血能行能暢味辛則於氣血能潤能散所以理一身上下諸痛往往獨行功多方勺泊宅編云一人病遍體作痛殆不可忍都下醫或云中風中濕腳氣悉不效周離亨言是氣血凝滯所致用延胡索當歸桂心等分為末溫酒服三四錢隨量頻進以止為度遂痛止蓋延胡索能活血化氣第一品藥也其後趙待制霆因導引失節肢體拘攣亦用此數服而愈然此既無益氣之情復少養營之義徒仗辛溫攻凝逐滯虛人當兼補藥同用否則徒損無益氣虛血熱切忌根如半夏肉黃小而堅者良酒炒行血醋炒止血生用破血炒用調血丁香香木泄肺溫胃暖腎止厄丁香專入肺胃腎辛溫純陽細嚼力直下達故書載能泄肺溫胃暖腎非若縮砂密功專溫肺和中木香功專溫脾行滯沉香功專入腎補火而於他臟則止兼而及之也是以亡陽諸症一切嘔噦厄逆反胃並霍亂嘔噦心腹冷疼並痘瘡灰白諸症皆就胃寒論服此逐步開關直入丹田逐步開關四字形容殆盡而使寒去陽復胃開氣縮不致上達而為病矣張璐曰厄逆宜辨寒熱若寒熱不辨用藥立斃凡聲之有力而連續者雖有手足厥逆大便必堅定屬大熱下之則愈萬舉萬全若胃中無實火何以激搏其聲逆上而沖乎其聲低怯而不能上達於咽喉或時鄭聲雖無厥逆定屬虛寒苟非丁附必無生理若胃中稍有陽氣何至聲音低怯不前也蓋胃中有火則有聲無火則聲怯誤以柿蒂蘆根輩治之倉扁不能復生矣此為暖胃補命要劑故逆得溫而逐而厄自可以止若止用此逐滯則木香較此更利但此熱症忌用有雌雄二種雌即雞舌香力大若用雄去丁蓋乳子畏鬱金火白檀香香木逐冷除郁引胃氣上行白檀香專入肺胃脾兼入腎氣味辛溫熏之清爽可愛形容殆盡凡因冷氣上結飲食不進氣逆上吐抑鬱不舒服之能引胃氣上升力並上行且能散風辟邪消腫住痛力主外散功專入脾與肺不似沉香力專主降而能引氣下行也時珍曰楞嚴經云白旃檀塗身能除一切熱惱今西南諸番酋皆用諸香塗身取此義也杜寶大業録云隋有壽禪師妙醫術作五香飲濟人沉香飲檀香飲丁香飲澤蘭飲甘松飲皆以香為主更加別藥有味而止渴兼補益人也但此動火耗氣陰虛火盛者切忌取白潔色白者佳紫色為紫檀氣寒味鹹專入血分蘇合香香木通竅逐邪殺鬼除瘧蘇合香專入諸竅味甘氣溫出於天竺崑崙諸國安南三佛齊亦皆有之治能辟惡殺鬼凡溫瘧蠱毒癇痓並痰積氣厥山嵐瘴濕襲於經絡寒於諸竅者非此不除昔文正公氣羸多病宋真宗面賜藥酒一瓶令空腹飲之可以和氣血闢外邪公飲之大覺安健次日稱謝上曰此蘇合香酒也每酒一斗入蘇合香丸一兩同煮極能調和五臟卻腹中諸疾每冒寒夙興則飲一杯而安按香皆能辟惡除邪此合諸香之氣煎就而成一物其通竅逐邪殺鬼通神除魘絶瘧祛蠱宜其然矣以筋挑起懸絲不斷者真但血燥氣弱勿用安息香香木通心氣活肝血安息香專入心肝系西戎及南海波斯國樹中之脂其香如膠如飴其氣馨其味苦而兼甘其性平按凡香物皆燥惟此香而不燥香物皆烈惟此竄而不烈洵佳品也以之常熏則惡氣悉絶而心肺皆沁神氣通暢故凡傳尸癆瘵霍亂嘔逆蠱毒惡侵夢魘鬼交等症無不用此調治俾其邪辟正復所以蘇合香丸紫雪丹七香丸同沉香木香丁香藿香八角茴香各三錢香附子縮砂密炙甘草各五錢為末蜜丸以治小兒肚痛亦皆用此以其獨得香氣之正也但元氣虛損陰火旺者其切忌焉書言燒之能集鼠者真烏藥香木治氣逆胸腹不快烏藥專入胃腎兼入脾肺膀胱辛溫香竄書載上入脾肺下通腎經如中風中氣膀胱冷結小便頻數反胃吐食泄瀉霍亂女人血氣凝滯小兒蛔蟲外而瘡癤疥癘並凡一切病之屬於氣逆而見胸腹不快者皆宜用此許學士云暴怒傷陽暴喜傷陰憂愁不已氣多厥逆往往得中氣之症不可作中風治時珍曰局方治中風中氣諸症同烏藥順氣散者先疏其氣氣順則風散也嚴用和濟生方治七情鬱結上氣喘急用四磨湯者降中兼升瀉中兼補也其方以人參烏藥沉香檳榔各磨濃汁七分合煎細細咽之朱氏集驗方治虛寒小便頻數縮泉丸用炒益智子等分為丸服者取其通陽明少陰經也功與木香香附同為一類但木香苦溫入脾爽滯每於食積則宜香附辛苦入肝膽二經開鬱散結每於憂鬱則妙此則逆邪橫胸無處不達故用以為胸腹逆邪要藥耳氣行則風自散故不須治風若氣虛內熱而見胸膈不快者非其所宜烏藥止可以除冷氣根有車轂紋形而連珠者良酒浸一宿或煅研用吳茱萸味逐肝寒氣上逆吳茱萸專入肝兼入脾胃腎膀胱辛苦燥熱微毒專入厥陰肝氣分散寒除脹東垣云濁陰不降厥氣上逆甚而脹滿非吳茱萸不可治也多用損人元氣故吞酸吐酸等症俱用繡按吞吐酸水河間丹溪單指屬熱景嶽專指屬寒斯症寒熱俱有在醫於病所見兼症與脈及平昔臟氣偏純審實明辨可耳不可專祖一家治法至如咽喉口舌生瘡以茱萸末醋調貼兩足心一夜便愈者以熱下行也兼入脾胃以除胸中寒冷又脾經血分濕痹令其表裡宣通而無拒閉之患矣又兼入腎而治膀胱受濕陰囊作疝久滑冷瀉陰寒小腹作疼暨腳氣水腫並口舌生瘡除蠱殺蟲諸症皆作陰寒論要皆氣味辛燥所致但走氣動火久服令人目昏發瘡以溫肝經燥血故血虛有火者尤忌陳者良泡去苦烈汁用止嘔黃連水炒治疝鹽水炒治血醋炒惡丹參硝石樟腦香木通竅辟惡樟腦專入關竅性稟龍火辛熱香竄能於水中發火其焰益熾治能通關利竅凡中惡卒死者可用樟木燒煙燻之並能除濕殺蟲置鞋中去腳氣方書每和烏頭為末醋丸彈子大置於足心火烘汗出為效且能薰衣篋闢蛀蟲出韶郡諸山以樟木蒸汁煎煉結成樟腦升打得法能亂冰片川椒味補火溫臟除寒殺蟲川椒專入肺脾腎辛熱純陽時珍曰其味辛而麻其氣溫以熱稟南方之陽受西方之陰無處不達治能上入於肺發汗散寒中入於脾暖胃燥濕消食下入命門補火治氣上逆冷氣上逆凡因火衰寒痼提出諸症根源而見陰衰溲數陰汗精泄並齒動搖目暗經滯癥瘕蛔痛鬼蛀血毒者服此辛熱純陽無不奏效上清訣云凡人吃飯傷飽覺氣上衝心胸痞悶者水吞川椒即散以其能通三焦引正氣下惡氣消宿食也戴元禮云凡人嘔吐服藥不納者必有蛔在膈間蛔聞藥則動動則藥出而蛔不出但於嘔吐藥中加川椒良蓋蛔見椒則頭伏也觀此則仲景蛔厥烏梅丸中用椒亦此義耳按蛔蝕有腹痛面白唇紅時發時止等症可察許叔微云凡人腎氣上逆須以川椒引之歸腎危氏神授丸治傳尸勞用川椒炒出汗米飲送下二斤而愈以其寒去臟溫故能所治皆應此雖與胡椒同為一類但胡椒則止溫胃除寒逐水此則更兼入腎補火殺蟲而於逐水不甚專也出四川肉厚皮皺者是秦産名秦椒味辛過烈閉口者有毒殺人微炒去汗搗去裡面黃殼取紅用得鹽良使杏仁畏款冬防風附子雄黃麻仁涼水子名椒目苦辛專行水道不行穀道能治水蠱除脹定喘及腎虛耳鳴胡椒味溫胃除寒逐水胡椒專入胃辛熱純陽比之蜀椒其熱更甚凡因火衰寒入痰食內滯腸滑冷痢及陰毒腹痛胃寒吐水牙齒浮熱作痛者同鹽火煅擦齒良治皆有效以其寒氣既除而病自可愈也但此止有除寒散邪之力非同附桂終有補火益元之妙況走氣動火陰熱氣薄最其所忌畢茄向陰所生性遜胡椒主治略同松脂香木祛風除濕生肌殺蟲松脂專入肝脾即屬松木津液流於皮乾之中經久結成其液如脂芳香燥結內可祛風除濕去痹外可貼瘡長肉殺蟲緣人風濕內淫則氣血受阻故瘡疥癰腫身重痹痛等症靡不因是而生得此苦以泄熱溫以祛風除濕則病悉愈然必蒸煉得法始堪服食至云久服輕身延年雖出經解未可盡信其亦過為稱譽之意也乎但火實有熱者忌服麥芽造釀專消穀食麥芽專入胃味甘氣溫功專入胃消食又味微咸能軟堅溫主通行其生髮之氣能助胃氣上行以資健運故能消食化谷及治一切宿食冷氣心腹脹滿溫中下氣除煩止霍亂消痰飲破癥結等症然真火不充則精液不溉徒以溫胃之品以為殺蟲之具王好古曰麥芽神麯胃虛人宜服之以伐戊己腐熟水穀李時珍曰無積而服之消人元氣與白朮諸藥消補兼施則無害也雖於逐堅破積偶有見效而精華實失腎氣先損豈胃長服之味也乎是以孕婦勿食恐墜胎元外臺方麥芽一升服下胎神驗薛立齋治一婦人喪子乳脹幾欲成癰單服麥芽一二兩炒煎服立消其破血散氣如此虛者少煎防消腎水故必雜於補劑內用則無慮耳炒用豆蔻砂仁烏梅木瓜芍藥五味為使大蒜葷辛宣竅逐寒辟惡大蒜專入脾胃諸竅時珍曰按孫愐唐韻云張騫使西域始得大蒜胡荽則小蒜乃中土舊有而大蒜出胡地故一名葫氣味辛溫開胃健脾宣竅辟惡為祛寒除濕解暑散痰消腫散毒第一要劑然究皆因味辛則氣可通性溫則寒可闢而諸毒諸惡諸濕諸熱諸積諸暑莫不由此俱除矣是以書云功能破堅化肉殺蟲宗奭曰葫氣極葷置臭肉反能掩臭時珍曰葫蒜其氣熏烈能通五臟達諸竅去寒濕辟邪惡消癰腫化症積肉食此其功也暨用此貼足則鼻衄能止引陽歸陰用此導閉則幽明能通辛以散寒用此敷臍則下焦水氣能消辛能散水用此切片艾灸則癰毒惡毒瘡腫核能起江寧府紫極宮刻石記其事云但是發背及癰疽惡瘡腫核初起有異皆可灸之不計壯數惟要痛者灸至不痛不痛者灸至痛極而止疣贅之類灸之亦便成痂自脫其效如神李迅曰癰疽著灸勝於用藥緣熱毒中隔上下不通必得毒氣發泄然後解散初起便用獨頭大蒜切片灸之三壯一易百壯為率但頭項以上切不可灸恐引氣上行更生大禍也史源曰有灸至八百壯者約艾一篩初壞肉不痛直灸到好肉方痛至夜火焮滿背瘡高阜而熱非艾火出其毒於壞肉之裡則內逼五臟而危矣但其氣熏臭多食恐能生痰動火散氣耗血損目昏神藏器曰初食不利目多食卻明久食令人血清使毛髮白時珍曰久食傷肝損眼今北人嗜蒜宿炕故盲瞽最多亦忌與蜜同食與蜜得蔥益脹意相同薤葷辛通肺氣利腸胃薤專入肺大腸即藠子亦動滑藥耳故書皆載調中助陽散血疏滯定喘安胎利産及治湯火傷損緣薤味辛則散散則能使在上寒滯立消味苦則降降則能使在下寒滯立下氣溫則散散則能使在中寒滯立除體滑則通通則能使久痼寒滯立解是以下痢可除王好古曰下重者氣滯也四逆散加此以泄滯瘀血可散本經治金瘡瘡敗取辛以泄氣溫以長肉也喘急可止是風寒喘急千金方用之水腫可敷是風寒水腫生搗敷之搗汁生飲胸痹刺痛可愈仲景用栝蔞薤白白酒湯胎産可治俱指寒滯而言湯火及中惡卒死可救湯火傷和蜜搗用肘後方治中惡卒死用薤汁灌鼻中韭汁亦可實通氣滑竅助陽佳品也功用有類於韭但韭則止入血行氣及補腎陽此則專通寒滯及兼滑竅之為異耳取白用忌牛肉黃帝云薤不可同牛肉作羹食之成瘕胡荽葷辛通心脾達小腹辟惡發痘胡荽專入心脾辛溫香竄內通心脾小腹外行腠理達四肢散風寒及除一切不正之氣是以發熱頭痛能除穀食停滯俱消痘瘡不齊煎酒噴之即出時珍曰諸瘡皆屬心火營血內攝於脾心脾之氣得芳香則運行得臭惡則壅滯耳直指方云痘疹不快宜用胡荽酒噴之以辟惡氣床帳上下左右皆宜挂之以御汗氣胡臭天癸淫佚之氣一應穢惡所不可無若兒虛弱及天時陰寒宜用此目翳不退塞之鼻中即祛然多食久食損人精神令人多忘能發液臭非同補藥可以常服白芥子葷辛除脅下皮裡膜外風痰白芥子專入肺氣味辛溫書載能治脅下及皮裡膜外之痰非此不達古方控涎丹用之正是此義蓋辛能入肺溫能散表痰在脅下皮裡膜外得此辛溫以為搜剔則內外宣通而無阻隔窠囊留滯之患矣是以咳嗽反胃痹木腳氣筋骨癰毒腫痛因於痰氣阻塞法當用溫用散者無不藉此以為宣通韓懋用三子養親湯以治老人痰氣蓋白芥子主痰下氣寬中紫蘇子主氣定喘止嗽萊蔔子主食開痞降氣各微炒研看病所主為君然此大辛大熱中病即已久服耗損真氣令人眩暈損目若肺熱陰虛火盛者忌之芥菜豁痰利氣主治略同但較北芥子力微有別雄黃石散結行氣殺蟲辟惡雄黃專入胃肝生山之陽得氣之正味辛而苦氣溫有毒凡人陽氣虛則邪易侵陰氣勝則鬼易憑負二氣之精者能破群妖受陽氣之正者能闢幽暗故能治寒熱鼠瘻惡瘡疽痔死肌疥蟲𧈟瘡諸症皆由濕熱侵於肌肉而成服此辛以散結溫以行氣辛溫相合而蟲殺故能搜剔百節中風寒積聚也是以聖惠方之治狐惑雄黃半兩燒於瓶中即止肘後方之治陰腫如斗雄黃礬石各二兩甘草一尺水浸家祕方之消瘧母急救方之治風狗咬傷聖濟之治白禿頭瘡雄黃豬膽汁和敷之何一不用雄黃以為調治虞雍公允文感暑下痢連月不瘥憶壁間有藥方其辭云暑毒在脾濕氣連腳不泄則痢不痢則瘧獨煉雄黃蒸餅和藥別作治療醫家大錯公依方服愈至云能解蛇虺藜蘆等毒以其蛇屬陰物藜屬陰草也宗奭曰焚之蛇皆遠去息肉癖氣能治者以其一屬氣結一屬積滯也目痛能愈者以其肝得辛散之意也明徹不臭者良醋浸入萊蔔汁煮乾用生山陰者名雌黃功用略同劣者名熏黃燒之則臭止可熏瘡疥殺蟲蝨石灰石燥血止血散血石灰專入肝脾稟壯火之烈性非溫柔味非甘緩其治亦屬肌膚骨髓瘡瘍惡毒時行熱氣刀刃金傷痄腮腫毒等症其藥止屬外敷而內竟不用及則知性氣之烈無是過也故書所言能去黑子息肉墮眉者以其火氣未散性能灼物故也書言能主疽瘍疥瘙熱氣惡瘡癩疾死肌附骨疽者以其風熱毒氣浸淫於骨肉皮膚之間得此辛溫以散之也汪昂曰有人腳肚生一瘡久遂成漏百藥不效自度必死一村人見之曰此鱔漏也以石灰溫炮熏洗覺癢即是也洗不數次遂愈書言能蝕惡肉而生新肉者以其燥能化濕而肉自克生新之意也書言能治金瘡者以其性能堅物使不腐壞且血見灰即止之意也時珍曰石灰止血神品也但不可著水著水即爛肉但氣味辛烈其用敷治務必視症酌施如殺痔蟲等症則必用以烏頭炮等為丸敷刀斧傷則必用以牛膽以灰納於膽內陰乾點疣痣去根則必和白糯米蒸透止瀉痢崩帶陰挺則必煎水洗收造酒味酸則必投以少許即解救溺死則必用化過洗灰下襯以滲其水總得燥濕止血散血之味耳風化自裂者良壙灰火毒已出主頑瘡膿水淋漓斂瘡尤妙伏龍肝土調中止血燥濕伏龍肝專入肝脾系灶心赤土因其色赤如肝故以肝名味辛氣溫無毒按土為萬物之母在人臟腑則以脾胃應之故萬物非土不生人身五臟六腑非脾胃不養是以土能補人脾胃伏龍肝經火久熬則土味之甘已轉為辛土氣之和已轉為溫矣凡人中氣不運則是氣是血靡不積聚為殃是瘀是水靡不蔓延作祟書言咳逆反胃腫脹臍瘡可治者以其得此補土燥濕之謂也書言吐衄崩帶尿血遺精腸風可治者以其失血過多中氣必損得此微溫調和血脈也癰腫可消者以其辛散軟堅之意也日華子取其能催生下胞者以其溫中而鎮重下墜也博救方子死腹中水調三錢服要之皆為調中止血燥濕之劑耳研細水飛用平散藥有平補亦有平散補以益虛散以去實虛未甚而以重劑投之其補不能無害實未甚而以重劑散之其散更不能無害矣如散寒麻黃散風桂枝散濕蒼朮散熱升葛散暑香薷散氣烏藥皆非平者也乃有重劑莫投如治風與濕症見疥癬周痹止有宜於蒼耳子症見瘙癢消渴止有宜於蠶沙症見麻木冷痛止有宜於豨蘞症見膚癢水腫止有宜於浮萍症見目翳疳蝕止有宜於爐甘石皆能使其風散濕除又如治風與熱症見目翳遮睛爛弦胞腫止有宜於甘菊蕤仁木賊症見風熱蒸騰腎陰不固止有宜於石南葉皆能使其風熄熱退又如治寒與熱症見咳嗽不止止有宜於冬花症見頭面風痛止有宜於荷葉症見肺熱痰喘聲音不清止有宜於馬兜鈴症見寒燥不潤止有宜於紫白石英症見肝經鬱熱不散止有宜於夏枯草症見風寒濕熱腳氣止有宜於五加皮症見風寒痰濕止有宜於殭蠶皆能使其寒熱悉去至於治氣則又止用橘皮之宣肺燥濕青皮之行肝氣不快神麯之療六氣不消檳榔大腹皮之治胸腹痞脹白芨之散熱毒而兼止血野菊花之散火氣癰毒疔腫瘰癧目痛青木香之除風濕惡毒氣結皆能使其諸氣悉消凡此藥雖輕平而用與病符無不克應未可忽為無益而不用也木賊隰草表散風熱專治目翳木賊專入肝膽味甘微苦氣溫無毒中空輕揚書云形質有類麻黃升散亦頗相似但此氣不辛熱且入足少陽膽足厥陰肝能於二經血分驅散風熱使血上通於目目為肝竅故為去翳明目要劑初非麻黃味辛性燥專開在衛腠理而使身汗大出也是以疝痛脫肛腸風痔漏赤痢崩帶諸血等症審其果因風熱而成者得此則痛止肛收腸固血止而無不治之症矣必審果屬風熱方用至其去翳明目功雖有類穀精能駕甘菊但穀精則去星障甘菊則止調和血藥於障全不能退此則能去翳障也然氣血虧損則用穀精木賊去障又當兼以芍藥熟地滋補肝腎使目得血能視若徒用此二味退障則即加以當歸補助亦惡氣味辛散當歸辛散非其所宜蒼耳子隰草祛肝風除脾濕活血通氣蒼耳子專入肝脾味苦而甘氣溫無毒凡人風濕內淫氣血阻滯肝受風則血阻脾受濕則氣滯則上而腦頂下而足膝內而骨髓外而皮膚靡不病症悉形而致症見疥癬通身周痹四肢拘攣骨節癰腫頂巔風痛疳蟲濕𧈟惡肉死肌疔腫痔漏腰重膝屈按此苦能燥濕溫能通活為祛風療濕之聖藥或作膏如採根葉根名萬應膏或作湯浴自然風除濕祛血活氣行而病即愈但此通頂連腦下達督脈服此最忌豬肉豬肉動風助濕及風邪觸犯則遍身發出赤丹而致病益增甚耳去刺酒拌蒸用豨蘞草隰草散肝經風虛豨蘞草專入肝味苦而辛性寒不濕故書載須蒸曬至九數窮於九加以酒蜜同制則濁陰之氣可除而清香之氣始見是以主治亦止宜於肝腎風濕而見四肢麻木筋骨冷痛腰膝無力風濕瘡瘍等症以其苦能燥濕寒能除熱辛能散風故也若使並非風濕而見腰膝無力等症則又屬於血虛而不可用辛散之味矣然熟用猶可其性不甚傷正若生用不制則又令人作泄不可不知以五月五六月六七月七八月八九月九採者尤佳至云服能益氣止是風濕既除之驗宋張詠表進輕身之説亦是渾同膚廓之語非實詮也宋張詠進豨蘞表云其草金稜銀絲素莖紫核對節而生頗同蒼耳臣契百服眼目清明積至千服鬚髮烏黑筋力輕健效驗多端去粗莖留枝葉花實酒拌蒸曬九次蜜丸搗汁熬膏煉蜜三味收之加以酒治始可投服夏枯草隰草散陰中結熱夏枯草專入肝辛苦微寒按書所論治功多言散結解熱能治一切癭癧濕痹目珠夜痛等症似得以寒清熱之義矣汪昂曰按目珠屬陽故書痛點苦寒藥則效黑珠屬陰故夜痛點苦寒藥反劇時珍曰一男子至夜目珠疼連眉稜骨痛及頭半邊腫痛用黃連膏點之反甚諸藥不效灸厥陰少陽疼隨止半日又作月餘以夏枯草二兩香附二兩甘草四錢為末每服一錢半茶清調服下咽則疼減半至四五服良愈矣何書又言氣稟純陽及補肝血得毋自相矛盾乎詎知氣雖寒而味則辛凡結得辛則散其氣雖寒猶溫故云能以補血也是以一切熱鬱肝經等症得此治無不效以其得藉解散之力耳若屬內火治不宜用又藥何以枯名以其冬生而夏枯也莖葉同用青木香蔓草散毒泄熱青木香專入肺即馬兜鈴根又名土木香者是也味辛而苦微寒無毒諸書皆言可升可降可吐可利凡人感受惡毒而致胸膈不快則可用此上吐以其氣辛而上達也感受風濕而見陰氣上逆則可用此下降以其苦能泄熱也故肘後治蠱毒同酒水煮服使毒從小便出矣惟虛寒切禁以其味辛與苦泄人真氣也禿瘡瘙癢可敷出精義野菊花隰草散火氣消癰毒野菊花專入肺肝一名苦薏為外科癰腫藥也其味辛而且苦大能散火散氣故凡癰毒疔腫瘰癧眼目熱痛婦人瘀血等症無不得此則治以辛能散氣苦能散火者是也是以經驗方治瘰癧未破用根煎酒熱服渣敷自消孫氏治毒方用此連根葉搗爛煎酒熱服取汗以渣敷貼或用蒼耳同入或作湯服或為末酒調自無不可衛生簡易方但胃氣虛弱切勿妄投震亨曰野菊花服之大傷胃氣浮萍水草入肝散風入脾利濕浮萍專入肝脾浮於水上體輕氣浮辛寒古人謂其發汗勝於麻黃下水捷於通草一語括盡浮萍治功故凡風濕內淫癱瘓不舉在外而見肌膚搔癢一身暴熱在內而見水腫不消小便不利用此疏肌通竅俾風從外散濕從下行而癱與瘓其悉除矣至本經載長鬚發者以毛竅利而血脈榮也風去血榮止消渴者以經氣和而津液復也熱去津生勝酒者以陽明通達而能去酒毒也總皆因其體浮故能散風因其氣寒故能勝熱因其産於水上故能以水利水耳用浮萍其背紫色為末蜜丸彈子大空心酒服然必大實大熱方可用此若表虛自汗者其切禁焉燒煙闢蚊亦佳但氣虛切勿近此繡見有一婦人用此闢蚊其兒僅兩周耳因此即斃甘菊隰草祛風養肺滋腎明目甘菊專入肝肺腎生於春長於夏秀於秋得天地之清芳時珍曰菊春生夏茂秋花冬實稟金精之正氣其味辛故能祛風而明目其味甘故能保肺以滋水其味苦故能解熱以除燥凡風熱內熾而致眼目失養翳膜遮睛與頭眩暈惡風濕痹等症服此甘和輕劑以平木補金平木制火補水制火養肺肺養則木平滋腎腎滋則火制俾木平則風熄火降則熱除而病無不愈矣金水二臟藥是以除目翳膜有同枸杞相對蜜丸久服永無目疾以單瓣味甘者入藥景煥牧豎間談云真菊延齡野菊泄人正如黃精益壽鉤吻殺人之意黃入陰分白入陽分紫入血分術及枸杞根桑根白皮為使款冬花隰草疏肺泄寒虛實寒熱通用款冬花專入肺按書既載辛溫純陽又載瀉熱消痰除煩定驚明目治咳逆上氣喘渴暨喉痹肺痿肺癰咳吐膿血等症其藥似屬兩岐詎知所謂純陽者因其氣味上達入陽而不入陰的解且經霜雪而秀故謂其氣純陽所謂能治咳逆者因其咳因寒入得此溫暖以為疏滯則寒自順而下矣溫能散寒所謂能除熱痰而嗽者亦是熱因寒入痰因熱成除寒而熱可清除熱亦在除寒除熱而寒自解肺為清淨之府不容物雜一有外感則氣逆而不伸一有內傷則肺燥而不潤所以在喉則有如癢如梗咳自外入者宜辛宜溫咳自內成者宜滋宜補故外宜於疏散而收斂最忌內則宜於滋養而宣泄非宜款冬氣味辛溫可以疏泄肺郁而水虧火嗽則有宜於冬地勞嗽骨蒸則有宜於丹皮地骨所謂能治肺痿肺癰咳吐膿血者亦是肺虛得此以為溫潤故能服之即止若使血因實致則此斷屬難投況此雖云純陽於火更不克助故辛溫之內仍有和暖之意是以書載可為寒熱虛實通用生河北關中者良世多以枇杷蕊偽揀淨花甘草水浸暴用得紫菀良杏仁為使惡皂莢硝石玄參畏黃耆貝母貝母雖畏得之反良連翹麻黃青葙辛夷馬兜鈴蔓草入肺清熱降氣除寒馬兜鈴專入肺辛苦性寒體輕而虛熟則四開象肺因苦則能入肺降氣因寒則能瀉熱除痰因辛則於寒中帶散故肺熱痰喘聲音不清者服此最宜且其體輕則性上湧故纂要治蛇蟲毒一味濃煎服之探吐其毒即解湯劑用之多作吐至有云服馬兜鈴能補肺陰者取其熱清氣降而肺自安之意錢氏用此同阿膠糯米補肺其功原在糯米阿膠耳豈馬兜鈴之謂哉又云可治腸風痔瘻以肺與大腸為表裡腸胃之熱本於肺臟所移肺清而腸之熱與之俱清耳日華本草治痔瘻腫痛以馬兜鈴於瓶中燒煙燻病處良若肺寒喘嗽失音者切忌去筋膜取子用白芨山草入肺澀血散瘀白芨專入肺味苦而辛性澀而收微寒無毒方書既載功能入肺止血又載能治跌撲折骨湯火灼傷惡瘡癰腫敗疽死肌得非似收不收似澀不澀似止不止乎不知書言功能止血者是因性澀之謂也血出於鼻是由清道而至血出於口是由濁道而來嘔血出於肝吐血出於胃痰帶血出於脾咯血出於心唾血出於腎摘玄雲試血法吐水內浮者肺血也沉者肝血也半浮半沉者心血也服白芨須隨所見以羊肺肝心同服者佳書言能治癰疽損傷者是因味辛能散之謂也此藥澀中有散補中有破故書又載去腐逐瘀生新至云重囚肺有白芨一事因剖而見色猶不變雖云肺葉損壞可以復生然終涉於荒唐未可盡信台州獄吏憫一重囚囚因感之云吾七犯死罪遭刑拷肺皆損傷得一方用白芨末米飲送下其效如神後囚凌遲剖開胸見肺間竅穴皆白芨填補色猶不變也手足皴裂面上黑疱即面瘡並跌打損傷酒調服湯火灼傷油調敷用治亦效紫石英為使惡杏仁反烏頭檳榔夷果治胸膈瘴癘膨脹檳榔專入腸胃辛苦而溫書何言其至高之氣彼獨能瀉使之下行以至於極以其味苦主降性如鐵石之重故爾有墜下之力耳是以無堅不破無脹不消無食不化無痰不行無水不下無氣不除無蟲不殺如陰毛住蝨用此煎水以洗無便不開凡開二便藥內多有用此故凡裡急後重同木香用嵐瘴癘瘧如達原飲治疫用此並水腫腳氣酒醉不醒無不因其苦溫辛澀之性以為開泄行氣破滯之地耳至書所云飽能使之飢醉能使之醒者以其能下氣也飢能使之飽醒能使之醉者以檳榔必用蒟葉裹嚼蒟葉氣味辛溫得此能除中外之氣以散瘴癘之邪也嶺南瘴地多以檳榔代茶然非瘴之地不可常服恐其能泄真氣耳雞心尖長劈之作錦紋者良時珍云嶠南地熱四時出汗人多黃瘠食之則臟氣疏泄一旦病瘴不敢發散攻下豈盡氣候所致檳榔蓋亦為患殆未思耳又朱晦庵檳榔詩云憶昔遊南日初嘗面發紅藥囊知有用茗碗詎能同蠲疾收殊效修真録異功三彭如不避縻爛七非中亦以其治疾殺蟲之功而不滿其代茶之俗也大腹皮夷果散無形胸膈膨脹腹皮專入腸胃時珍曰大腹以形名所以別雞心檳榔弘景曰向陽者為檳榔向陰者為大腹也辛熱性溫比之檳榔大有不同蓋檳榔性苦沉重能泄有形之滯積腹皮其性輕浮故能入腹能散無形之積滯故痞滿膨脹水氣浮腫腳氣壅逆者宜之惟虛脹禁用以其能泄真氣也子似檳榔腹大形扁治功與檳榔同取皮酒洗後以豆汁洗過曬乾煨切用思邈曰鴆鳥多棲其樹故宜洗淨蕤核灌木散肝風熱蕤核專入肝眼科藥也凡眼多因風熱乘肝以致血虛而目不得明故病必見上下眼胞風腫弦爛左右眥熱障胬仁齋曰拘急牽颼瞳青胞白癢而清淚不赤不痛是為風眼烏輪突起胞硬紅腫眵淚濕漿裡熱刺痛是為熱眼眼渾而淚胞腫而軟上壅矇朧酸澀微赤是為氣眼風與熱並則癢而浮赤風與氣搏則癢澀皆沉血熱交聚故生淫膚粟肉紅縷偷針之類氣血不至故有眇視胞垂雀眼盲障之形淡紫而隱紅者為虛熱鮮紅而妒赤者為實熱兩眥呈露生胬肉者此心熱血旺白睛紅膜如傘紙者此氣滯血凝熱滯則瞳人內湧白睛帶赤冷症則瞳仁青緑白睛枯稿眼熱經久復為風熱所乘則赤爛眼中不赤但為痰飲則作疼肝氣不順而挾熱所以羞明熱氣蓄聚而傷飽所以胞合白睛帶赤或紅筋者其熱在肺上胞下胞或目唇間如瘡點者其熱屬脾翳起肺家受熱翳如碎米狀者易散翳如梅花者難消得此溫能散風氣不甚溫寒能勝熱甘能補血俾火退淚止而目疾瘳矣赤筋在翳膜外者得此則宜撥雲膏取下翳膜蕤仁去油五分青鹽一分豬𦚠子五錢共搗二千下如泥鏆收點之又方蕤仁二兩去油入白蓬砂一錢麝香二分研勻收去翳妙不可言湯浸去皮尖劈作兩片芒硝木通通草同煎一伏時取出研膏入藥蕪荑喬木燥脾殺蟲散皮膚骨節濕熱蕪荑專入脾兼入肝味辛而苦時珍曰蕪荑有大小兩種小者即榆莢也揉取仁醞為醬味尤辛人多以外物相和不可不擇去之入藥皆用大蕪荑別有種氣溫無毒功專燥脾去風化食殺蟲緣蟲生於人腹多因濕為之兆滯為之得風為之助寒為之成上侵人咽下蝕人肛或附脅背或隱胸腹大則如鱉小則如錢治法惟當用此煎服兼用暖胃益血理中之類乃可殺之且不獨殺蟲如是即其皮膚骨節濕熱內入留連不解以致穢垢不清得以合其辛散等藥亦能去風除濕而使氣血調和肢節安養而無癱瘓痿痹之候矣奈世僅知掃蟲殺蠱蠱牙作痛以蕪荑仁安蛀孔中及縫中甚效而不知此更散皮膚骨節淫濕其亦未達本經之旨耳形類榆莢陳久氣膻者良五加皮灌木除風寒濕腳氣五加皮專入肝腎今人僅知此能理腳氣而不知其腳氣之病因於氣寒濕三氣而成風勝則筋骨為之拘攣濕勝則筋脈為之緩縱男子陰痿囊濕女子陰癢蟲生小兒腳軟寒濕則血脈為之凝滯筋骨為之疼痛而腳因爾莫行服此辛苦而溫辛則氣順而化痰苦則堅骨骨屬腎而益精溫則祛風肝主風而勝濕凡肌膚之瘀血筋骨之風邪靡不因此而治蓋濕去則骨壯風去則筋強而腳安有不理者乎但此雖屬理腳之劑仍不免有疏泄之虞須於此內參以滋補之藥則用之歷久而不變矣勿謂有五加之説遂信竟為理腳聖藥而置金玉滿車於不問也昔孟綽子董士固相與言云寧得一把五加不用金玉滿車寧得一斤地榆不用明月寶珠時珍曰五加治風濕痿痹壯筋骨其功良深仙家所述雖若過情蓋獎辭多溢亦常理耳莖青節白骨硬皮黃根黑芬香五葉者佳遠志為使惡玄參石南葉灌木祛風逐熱固腎石南葉專入肝味辛而苦按辛則有發散之能苦則具有堅腎之力若使辛苦而熱則云婦人久服思男其理或可信矣然此止屬辛苦而性不熱則治止可以言祛風而補陰之説亦止因苦堅腎而腎不泄因辛散風而陰不受其蹂躪也的解若竟以為補陰滋水則理已屬有礙而尚可云補火以思男者乎醫書類多如此惑人若果有之則凡類於此者何莫不為思男之品而附桂之雄又將置之於何等地矣李時珍亦明醫中人何竟附和而有是言耶訒庵之闢宜其有是汪昂曰按石南葉補陰祛風則有之然味辛不熱不助相火亦未聞邪淫方中用石南葉者別録思男之説殆不可信出關中者炙用五加皮為使惡小薊橘皮山果宣肺氣燥脾濕橘皮專入脾肺兼入大腸味辛而溫治雖專主脾肺時珍曰脾乃元氣之母肺乃攝氣之簽故橘皮為二經氣分藥調中快膈導痰消滯利水破症宣五臟理氣燥濕汪自曰大法治痰以健脾順氣為主潔古曰陳皮枳殼利其氣而痰目下然同補劑則補同瀉劑則瀉同升劑則升同降劑則降各隨所配而得其宜凡補藥澀藥必佐陳皮以利氣且同生薑則能止嘔十劑篇云宣可去壅生薑橘皮之屬是也同半夏則豁痰同杏仁則治大腸氣閉同桃仁則治大腸血閉至其利氣雖有類於青皮但此氣味辛溫則入脾肺而宣壅不如青皮專入肝疏泄而無入脾燥濕入肺理氣之故也諸濕皆屬於脾諸氣皆屬於肺然多服亦能損氣胃氣亦賴痰養不可用此盡攻用補留白下氣消痰除白出聖濟即書所名橘紅今人有以色紅形小如枳實者代充其破氣實甚然亦寓有發表之意以皮治皮意核治疝痛偏墜凡核多入腎而橘核尤入囊核亦物類相感意時珍曰橘核入足厥陰肝與青皮同功故治腰痛㿉疝痛及內㿉卵腫偏墜或硬如石或腫至潰有極核丸用之有效葉散癰腫莫強中為豐城令時得疾凡食已輒胸滿不下百方不效偶家人合橘紅湯因取嘗之似相宜連日飲之一日忽覺胸中有物墜下大驚目瞪自汗如雨須臾腹痛下數塊如鐵彈子臭不可聞自此胸次廓然其疾頓愈蓋脾之冷積也其方用橘皮一斤去穰甘草鹽花各四兩為末煮乾點服名二腎散丹溪變為潤下丸用治痰氣有效惟氣實人服之相宜氣不足者不宜用之也取廣陳久者良陳則烈氣消散故名陳皮與半夏同用名為二陳治火痰童便制寒痰薑汁製治下焦鹽水制核去皮炒用青皮山果行肝氣滯青皮專入肝本於橘生其皮則一何為因青而異蓋猶人當少壯則性燥暴而少柔人當老年則性漸減而不燥青皮未經寒暑燥氣不消故其賦性最劣其色青青屬木木主肝故青獨於肝經則入其味苦故能入肝而下氣杲曰青皮乃足厥陰引經之藥能引食入太陰之倉破滯消堅皆治在下之病然仍兼有辛氣內存故於下中仍兼宣泄柴胡疏上焦肝氣青皮平下焦肝氣陳皮浮而上入脾肺氣分青皮沉而降入肝膽氣分氣味各別如此是以書載力能發汗時珍曰小見消積多用青皮最能發汗破泄削堅除痰消痞並氣鬱久怒久瘧結癖嘉謨曰久瘧熱甚必結癖塊宜多服青皮湯內有青皮疏利肝邪則癖自不結也疝痛疝痛有由足厥陰鬱氣乳腫丹溪曰乳房屬陽明乳頭屬厥陰乳母或因忿怒鬱悶厚味釀積致厥陰之氣不行故竅不得開陽明之血騰沸故熱甚而化膿亦有其子有滯痰膈熱含乳而搖噓氣致生結核者初起便須忍痛揉軟吮令汗透自可消散治法以青皮疏肝滯石膏清胃熱甘草節行濁血栝蔞消腫導毒或加沒藥橘葉金銀花蒲公英皂角少酒若於腫處灸三五壯尤佳久則凹陷名乳岩不可治矣無不奏效但有汗氣虛切忌時珍曰有滯氣則破滯氣無滯氣則損真氣醋炒用時珍曰治之以醋所謂肝欲散急食辛以散之以酸泄之以苦降之也荷葉水果升陽散瘀荷葉專入膽其味雖苦其氣雖平然生水土之下汙穢之中挺然獨立實有長養生髮之氣故昔人謂其色青主屬木其形仰主上行其中空主上發其象震主入膽為東方膽木必用之藥故潔古枳朮丸方用荷葉燒飯為丸取其以為升發脾胃之氣杲曰素問云履端於始序則不愆荷葉生於水土之下汙穢之中挺然獨立其色青其形仰其中空象震卦之體食藥感此氣之化胃氣何由不升乎用此為引可謂遠識合道矣更以燒飯和藥與白朮協力滋養補令胃厚不致內傷其利廣矣東垣清震湯用此以治頭面風痛等症取其以為升發風寒之具清震湯用荷葉一枚升麻蒼朮各五錢煎服聞人規用此以治痘瘡風寒外襲變黑倒靨取其以為溫肌散邪之自聞人規論云痘瘡已出復為風寒外襲則竅閉血凝其點不長或變黑色此為倒靨必身體四肢微厥但溫肌散邪則熱氣復行而斑自出也宜紫貝荷葉散治之蓋荷葉能升發陽氣散瘀血留好血殭蠶能解結滯之氣故也此藥易得而活人甚衆勝於人牙龍腦也證治要訣用此一味燒灰單服以治陽水浮腫取其溫以行水之意至入脾胃須用其蒂謂之荷鼻取其味厚獨勝他處但服荷葉過多令人瘦劣非可常用試觀丹士縮銀用荷葉同煅而銀質頓輕於此可知其概矣神麯造釀散氣調中溫胃化痰逐水消滯神麯專入脾胃辛甘氣溫其物本於白麵杏仁赤小豆青蒿蒼耳紅蓼六味作餅蒸鬱而成造麴法以五月五日六月六日用白麵百斤赤豆未杏仁泥青蒿蒼耳紅蓼汁各三升以配青龍白虎朱雀玄武騰蛇勾陳六神通和作餅罯生黃衣曬收陳久炒用其性六味為一故能散氣調中溫胃化痰逐水消滯小兒補脾輕平等藥醫多用此以為調治養胃丸治脾胃俱虛用神麯六兩麥芽三兩炮乾薑四兩烏梅肉焙四兩為末水下又啓微集云神麯治目病生用能發其生氣熟用能斂其暴氣也蓋取辛不甚散甘不甚壅溫不見燥也然必合以補脾等藥並施則佳若孕婦無積及脾陰不足胃火旺者並勿用耳義與麥芽同也爐甘石石活血脈散風熱爐甘石專入胃系金銀之苗産於金銀坑中造化指南云爐甘石受黃金白銀之氣薰陶三十年方能結成狀如羊腦松似石脂能點赤銅為黃甘辛而澀氣溫無毒其性專入陽明胃蓋五味惟甘為補惟溫為暢是能通和血脈故腫毒得此則消而血自能克止肌亦自克能生也辛溫能散風熱性澀能黏翳膜故凡目翳得此即能撥雲也宣明方爐甘石青礬朴硝等分為末每用一字沸湯化溫洗日三次有用此治下疳陰濕並齒疏陷物者亦此義耳爐甘石火煅醋淬五次一兩孩兒茶三錢為末麻油調敷立愈又集玄方因齒疏物陷用爐甘石煅寒水石等分為末每用少許擦牙忌用銅刷久久自密時珍常用甘石煅飛海螵蛸硼砂等分為細末硃砂依分減半同入點諸目病皆妙煅用童便良白石英石散肺分寒燥不潤白石英專入肺味甘而辛性溫無毒按理似非潤藥濕藥矣而十劑偏指此屬濕劑謂枯則為燥宜用白石英紫石英之屬以濕之不幾令人眩惑乎詎知書之言濕有以濕為濕者有以燥為濕者以濕為濕人易知以燥為濕人難明茲而曰濕是以燥以溫為濕矣從溫濕言石英性本辛溫辛則能以化液溫則能以滋潤故雖辛若濕因辛始濕是以寒燥不潤之症燥從寒字點出明甚得此辛以暢達而滯不致見枯此十劑所以以辛以溫為濕而言也書曰服此可治咳逆胸寒消渴陰痿風痹溺閉肺痿肺癰吐膿吐血等症是亦辛溫潤肺之一驗矣但系石類只可暫用頌論乳石謂乳者陽中之陰石者陰中之陽故陽生十一月後甲子服乳陰生五月後甲子服石然而相反相惡動則為害不淺故乳石之發方治雖多而罕有濟者誠不可輕餌也凡服宜食冬瓜龍葵以壓石氣忌芥菜蔓青蕪夷葵薺苨白如水銀者良紫石英石散肝心血分寒燥不潤紫石英專入肝心即系石英之紫色者故爾別其名曰紫性味俱同而紫即能直入血分不似白石英因其色白功專潤肺止就肺部之病而言之也紫能入血治療凡婦人子戶因於風寒內乘絶孕男子寒熱咳嗽驚悸夢魂不安服此則能鎮魄安神為心肝經溫血要藥時珍曰上能鎮心重以去怯也下能益肝濕以去枯也心生血肝藏血其性緩而補故心神不安肝血不足及女子血海虛寒不孕者宜之別録言其補心氣甄權言其養肺氣殊昧氣陽血陰營衛之別但陰虛火旺者切忌醋煅淬七次研末水飛用畏附子惡黃連殭蠶卵生祛散風寒痰濕殭蠶專入肝兼入肺胃辛寒微溫大率多屬祛風散寒燥濕化痰溫行血脈之品故書載能入肝兼入肺胃以治中風失音頭風齒痛喉痹咽腫是皆風寒內入結而為痰時珍曰殭蠶蠶之病風者也治風化痰散結行經所謂因其氣相感而以意使者也又人指甲軟薄者用此燒煙燻之則厚亦是此義蓋厥陰陽明之藥故又治諸血病瘧病疳病也合薑湯調下以吐假其辛熱之力以除風痰之害耳仁存開關散用白殭蠶炒白礬半生半燒等分為末每以一錢用自然薑汁調灌得吐頑痰立效小兒加薄荷聖惠方用白殭蠶三七枚乳香一分為末每以一錢燒煙熏入喉中涎出即愈王氏博濟如聖散治喉痹用白殭蠶天南星等分生研為末每服一字薑汁調灌即愈後以生薑炙過含之怪症方酒後咳嗽用白殭蠶焙研末茶服效又云能治丹毒瘙癢亦是風與熱熾得此辛平之味拔邪外出則熱自解又云能治瘰癧結核痰瘧血病崩中帶下亦是風木乘肝得此辛溫之味以行血脈則血氣安和而病自消又云能治小兒驚疳膚如鱗甲亦是胎元氣血不足得此辛鹹煎湯除垢則鱗自去膚如鱗甲病名胎垢即是諸症以推則知古之用藥悉從物理勘出豈有他謬奇巧於其中者哉但此非由外感而用是藥則非治耳頭蠶色白條直者良米泔浸一日待桑涎浮出取起焙乾拭淨肉毛口甲搗用惡桑螵蛸茯神茯苓桔梗萆薢蠶沙卵生宣皮膚風濕蠶沙專入肝脾兼入胃即晚蠶所出之屎也玩書所著治功多有祛風除濕之能所述治症多是肢節不遂皮膚頑痹腰膝冷痛冷血瘀血腸鳴消渴爛弦風眼緣蠶食而不飲其食出則氣燥燥則可以勝濕去風凡一切皮膚等疾因於風濕而至者上症俱就風濕而言無不得此以為調治且味辛而兼甘故凡水火相激而見腸鳴得此甘以和之燥熱而見消渴不止得此辛以潤之燥渴仍屬風邪故辛可以得潤是以用此炒黃袋盛浸酒以去風緩不隨皮膚頑痹冠氏曰醇酒三升拌蠶沙五斗蒸熱鋪暖室席上令患冷風氣痹人以患處就臥厚覆取汗不愈間日再作須防昏悶暨爛弦風眼用此油浸塗患即愈汪昂曰目上下胞屬脾脾有風濕則蟲生弦爛用新瓦炙為末少加雄黃麻油調敷又治蛇串瘡有人食烏梢蛇渾身變黑漸生鱗甲見者驚縮鄭奠一令日服晚蠶沙五錢盡一二斗久之乃愈昔史國公用此浸酒色清味美以治風痹義多根此然惟晚者為良早蠶者不堪入藥以飼火烘故有毒也
