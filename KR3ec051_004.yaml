body:
  text: 卷四瀉劑滲濕病之切於人身者非其火之有餘即其水之不足火衰則水益勝水衰則火益熾昔人云火偏盛者補水配火不必去火水偏多者補火配水不必去水譬之天乎此重彼輕其重於一邊者勿補則只補足輕者之一邊也決不鑿去砝馬審是則凡水火偏勝決無鑿去砝馬用瀉之理推是稟體素厚臟氣偏勝並或外邪內入阻遏生機如濕氣流行土受水制在初濕氣內盛能毋滲而泄乎久而水氣橫逆泛流莫御能無決而去乎此水之宜滲宜瀉者然也火氣內熾一火發動眾火劑起沖射搏激莫可名狀此火之不得不瀉者也熱氣內蒸水受煎熬苟不乘勢即解則真陰立槁此又熱之不得不瀉者也至於或熱或火結而為痰或熱或火盈而為氣痰之微者或從滲濕瀉濕之藥以去若使痰甚而湧宜用苦宜苦鹹之藥以降氣之微者或用瀉火瀉熱之藥以消若使氣盛而迫須用苦寒苦劣之藥以下其有稟受素虧邪氣不甚則止酌以平劑以投不可概用苦寒以致胃氣有損又按濕為陰邪凡人坐臥卑地感受濕蒸及或好食生冷遏其元陽鬱而為熱在初受邪未深不必竟用重劑惟取輕淡甘平以滲然滲亦須分其臟腑如扁豆山藥陳倉米茯苓浮萍通草鴨肉鯽魚鯉魚澤蘭是滲脾胃之濕者也但茯苓則兼肺腎以同治通草則止合腎以共理鯽魚則止合腎以皆滲故暑濕熏蒸三焦混亂宜用扁豆以除之胃氣不平煩渴不止宜用倉米以止之脾虛熱泄宜用山藥以滲之水腫不消宜用浮萍以利之淋閉不通宜用通草以開之腸風下血膈氣吐食宜用鯽魚以理之陳氣不化宜用澤蘭以去之虛癆嗽腫宜用鴨肉以平之腫嗽泄瀉宜用茯苓以利之水腫腳氣宜用鯉魚以治之又如榆白皮冬葵子神麯石鐘乳是滲腸胃之濕者也故五淋腫滿胎產不下宜用榆白皮冬葵子以服之乳汁不通宜用石鐘乳以通之又如茯神萱草是滲心經之濕者也故驚悸健忘水濕內塞宜用茯神以利之消渴心煩宜用萱草以釋之他如腎有邪濕症見心氣不交則有桑螵蛸以治之症見楊梅毒結則有土茯苓以導之但土茯苓則兼諸臟之濕同理肺有邪濕汗閉不泄則有姜皮以發之肺氣不降則有通草以通之肝有邪濕而見子腫風癆則用天仙藤以治之至於濕熱稍勝藥非輕劑可治則又另有瀉劑而非斯藥所能盡者也通草蔓草清肺通乳利水通草專入肺胃氣味甘淡體輕色白有類燈心時珍曰有細孔兩頭皆通故名通草即今所謂木通也今之通草乃古之通脫木也頌曰古方所用通皆今之木通其通脫木稀有用者功同入肺引熱下降及利小便通淋治腫杲曰通草瀉肺利小便甘平以緩陰血也與燈草同功宜生用之然燈心質小氣寒則兼降心火此則兼入胃通氣上達而下乳汁之為異耳時珍曰通草色白而氣寒疏淡而體輕況此體大氣輕滲淡殆甚能升能降既可入肺而清熱復能上行而通胃東垣用此以治五種水腫癃閉非取氣寒能降味淡能升之意乎仲景用此合當歸芍藥桂枝細辛大棗甘草名為當歸四逆湯以治傷寒邪入厥陰非取通草以通營衛之意乎但孕婦勿服土茯苓蔓草消水除濕尤解楊梅結毒土茯苓專入胃肝兼入腎腸甘淡氣平功有等於萆薢治能除濕消水去清分濁然此尤解楊梅瘡毒蓋楊梅瘡多由嵐瘴熏蒸與淫穢濕熱之邪交互而成時珍曰楊梅瘡古方不載亦無病者近時起於嶺表傳及四方蓋嶺表風土卑炎嵐瘴熏蒸飲啖辛熱男女淫猥濕熱之邪蓄積既深發為毒瘡遂致互相傳染自南而北遍及海宇然皆淫邪之人病之其症多屬陽明胃厥陰肝而兼及他經蓋相火寄於厥陰肌肉屬於陽明故也如兼少陰太陰則發於咽喉兼太陽少陽發於兩角若用輕粉劫劑毒氣竄入經絡筋骨莫之能出變為筋骨攣拘發為結痛遂成痼疾時珍曰水銀性走而不守加以鹽礬升為輕粉銀硃其性燥烈善逐痰涎涎乃脾之液此物入胃氣歸陽復故涎被劫隨火上升從喉頰齒縫而出故瘡即干痿而愈若服之過劑及用不得法則毒氣竄入經絡筋骨之間莫之能出痰涎既去血液耗涸筋骨失其所養營衛不從筋骨攣痛發為癰毒疳漏久則生蟲為癬手足皴裂遂成痼疾須用此一兩外用金銀花防風木通木瓜白蘚皮各五分皂莢子四分人參當歸各七分日服三劑時珍曰用此能健脾胃去風濕脾胃健則營衛健風濕去則筋骨利故諸症多愈又云此名搜風解毒湯犯輕粉病深者月餘淺者半月即愈忌飲茶酒肉面鹽醋並戒房勞百日渴飲土茯苓湯半月方愈取其濕熱斯除而濁陰得解矣白者良忌茶茯苓寓木滲脾肺濕伐肝胃水邪茯苓專入脾胃兼入肺肝色白入肺味甘入脾味淡滲濕故書皆載上滲脾肺之濕下伐肝腎之邪其氣先升清肺化源後降下降利水凡人病因水濕而見氣逆煩滿心下結痛呃逆嘔吐口苦舌乾水腫淋結憂恚驚恐及小便或澀或多者諸病皆從水濕所生而言服此皆能有效故治亦從水濕生義故入四君則佐參朮以滲脾家之濕入六味則使澤瀉以行腎邪之餘最為利水除濕要藥書曰健脾即水去而脾自健之謂也又曰定魄肺藏魄即水去而魄自安之意也且水既去則小便自開安有癃閉之慮乎水去則內濕已消安有小便多見之謂乎故水去則胸膈自寬而結痛煩滿不作水去則津液自生而口苦舌乾悉去故效亦從水濕既去而見惟水衰精滑小便不禁非由水濕致者切忌恐其走表泄氣故耳苓有赤白之分赤入小腸白入膀胱白微有補赤則止瀉濕熱一氣一血自不容混如此至皮專治水腫膚脹以皮行皮之義凡腫而煩渴便閉溺赤屬陽水有五皮散疏鑿飲不煩渴大便溏小便數不赤澀屬陰水宜實脾飲疏氣飲腰以上腫者宜汗腰以下腫者宜利小便以大塊堅白者良系松根靈氣結成惡白蘞畏地榆秦艽龜甲雄黃忌醋茯神寓木導心痰濕茯神專入心功與茯苓無異但神抱心以生苓則不從心抱故苓則能入脾與腎而神則多入心耳書曰服此開心益智安魂肝藏魂定魄肺藏魄無非入心導其痰濕故能使心與腎交通之謂耳的解心木書名黃松節味苦性溫能治諸筋攣縮偏風喎斜心掣健忘汪昂曰方用心木一兩乳香一錢石器炒研名松節散每服二錢木瓜湯下治一切筋攣疼痛乳香能伸筋木瓜能舒筋也亦是入血滲濕之意取苓有心者是汪昂曰以其抱心故能治心也去皮及中木用鯉魚魚利水消腫鯉魚專入脾氣味甘平每於急流之水跳躍而下是鯉已有治水之功且甘能入脾故書載能下氣利水凡因水氣內停而見咳氣上逆黃疸水腫腳氣等症服此則能以消河間云鯉之治水因其氣以相感猶鶩之治水是以外臺秘要用赤小豆一升水二升煮作三升余攄去渣頓盡服利利盡即愈又治孕婦水腫亦效然性稟六陰陽氣初生故為陰中之陽故多食則能動風發熱也鯉鱗燒灰存性可治產後血滯鯉骨燒灰可療魚骨鯁瀉濕瀉濕與滲濕不同滲濕者受濕無多止用甘平輕淡使水緩滲如水入土逐步滲泄漸漬不驟瀉濕者受濕既多其藥既須甘淡以利又須鹹寒以瀉則濕始從熱解故曰瀉濕然瀉亦須分其臟腑如濕在肺不泄宜用薏苡仁黑牽牛車前子黃芩白薇之類但薏苡仁則治水腫濕痹疝氣熱淋黑牽牛則治腳氣腫滿大小便秘黃芩則治癃閉腸澼寒熱往來車前子則治肝肺濕熱以導膀胱水邪白薇則治淋痹痠痛身熱肢滿之為異耳如濕在於脾胃不瀉宜用木瓜白蘚皮蚯蚓白礬寒水石之類但木瓜則治霍亂泄瀉轉筋濕熱不調白蘚皮則治關竅閉塞溺閉陰腫蚯蚓則治伏熱鬼疰備極熱毒白礬則能酸收湧吐逐熱去沫寒水石則能解熱利水之有別耳如濕在於脾胃不清宜用扁蓄茵陳苦參刺蝟皮之類但扁蓄苦參則除濕熱殺蟲茵陳則除濕熱在胃發黃刺蝟皮則治噎膈反胃之不同耳如濕在心不化宜用燈草木通黃連連翹珍珠苦楝子之類但燈草則治五淋伏熱黃連則治實熱濕蒸木通則治心熱水閉連翹則治癰毒淋結珍珠則治神氣浮游水脹不消苦楝子則治熱鬱狂燥疝瘕蠱毒之有分耳若在小腸濕閉而見淋閉莖痛則有海金沙以除之溺閉腹腫則有赤小豆以利之娠妊水腫則有赤茯苓以導之膀胱濕閉而見水腫風腫則有防己以泄之暑濕內閉則有豬苓以宣之小便頻數則有地膚子以開之水蓄煩渴則有澤瀉以治之實熱熾甚則有黃柏以瀉之暑熱濕利則有滑石以分之他如腎有邪濕症見血瘀溺閉則有宜於琥珀海石矣症見水氣浮腫則有宜於海蛤矣症見痔漏淋渴則有宜於文蛤矣而寒水石苦參之能入腎除濕又自可見肝有邪濕症見驚癇疫瘧則有宜於龍膽矣症見風濕內乘小便痛閉則有宜於萆薢矣而連翹珍珠琥珀之能入肝除濕又自可推凡此皆屬瀉濕之劑也至於水勢澎湃盈科溢川則又另有法在似不必於此瑣贅云澤瀉水草瀉膀胱氣分濕熱澤瀉專入膀胱腎甘淡微寒能入膀胱氣分以瀉腎經火邪功專利水除濕故五苓散用此以除濕熱張仲景治傷寒有大小澤瀉湯五苓散輩皆用澤瀉行利停水為最要藥又治水蓄煩渴小便不利或吐或瀉五苓散主之方用澤瀉故知長於行水八味丸用此以瀉腎經濕火時珍曰地黃丸用茯苓澤瀉者乃取其瀉膀胱之邪氣非接引也古人用補藥必兼瀉邪邪去則補藥得力一闢一闔此乃玄妙後人不知此理專一於補所以久服必有偏勝之害矣汪昂曰六味丸有熟地之溫丹皮之涼山藥之澀茯苓之滲山茱之收澤瀉之瀉補腎而兼補脾有補而必有瀉相和相濟以成平補之功乃平淡之神奇所以為古今不易之良方也即有加減或加紫河車一具或五味麥冬杜仲牛膝之類不過一二味極三四味而止今人或疑澤瀉之瀉而減之多揀本草補藥恣意加入有補無瀉且客倍於主責成不專而六味之功反退處於虛位失制方之本意矣此近世庸師之誤也俾其補不偏勝則補始無礙耳豈曰澤瀉補陰功同於地黃之列哉第其濕熱不除則病症莫測故有消渴嘔吐痰飲腫脹腳氣陰汗尿血泄精種種等症病症皆因濕熱為害用此甘淡微咸以為滲泄精泄安可滲利因於濕熱而成不得不滲利耳則濁氣既降而清氣上行故有耳聰目明之功所謂一除而百病與之俱除也但小便過利則腎水愈虛而目必昏易老云瀉伏水去留垢故明目小便利腎氣虛故目昏此一定之理耳鹽水炒或酒拌忌鐵木通蔓草瀉心經小腸濕熱木通專入心兼入小腸古名通草今之通草即古所名通脫木甘淡輕虛據書開載治效甚多然究不外清火通竅利水數端而已緣人一身上下外無風寒暑濕六淫鬱而為熱內無火氣熏蒸則水道順暢一身安養上自咽喉以迄心胸下自大腹以迄二便而無膈結不通之弊矣東垣曰凡人肺受熱邪津液氣化之源絕肺為水源則泉水斷流源絕則流斷膀胱受濕熱癃閉約束則小便不通濕熱為害朱二允曰火在上則口燥眼赤鼻乾在中則心煩嘔噦在下則淋閉足腫木通藤細有孔兩頭皆通體輕質浮味淡氣滲能瀉君火火退則小便自利心與小腸相表裡便利則諸經火邪皆從心水而下降矣是以行經下乳火不內亢則經調乳通破血除蒸熱除則血破血破則蒸除止煩住痛心熱清則煩除痛止排膿生肌心熱除則氣血得養而肌肉生開關利節心竅通則經絡流行故關節亦通並凡因於濕熱而成者無不藉此以為開導此雖類澤瀉同為滲利但君火動則宜木通相火動則宜澤瀉也惟神氣虧損汗多外出及虛弱孕婦者切忌以性通利故耳車前子隰草清肝肺風熱以道膀胱水邪車前子專入肝肺甘鹹性寒據書皆載能治膀胱濕熱以通水道然余謂膀胱之清由於肝肺之肅凡人瀉利暴作小水不通並濕痹五淋暑熱瀉利難產目赤雖有膀胱水涸不能化陽然亦有為肝肺感受風熱以致水不克生故須用此以清肝肺兼咸下降以清水道聖惠方風熱目暗用車前子宣州黃連各一錢為末食後溫服效又景駐丸治肝腎俱虛眼目昏花或生障翳迎風有淚久服補肝腎增目力車前子熟地黃酒蒸三兩菟絲子酒浸五兩蜜丸時珍曰服此治目須佐他藥如六味地黃丸之用澤瀉也若單用則走泄太過恐非久服之物又歐陽公常得暴下病國醫不能治夫人買市人藥一帖進之而愈方叩其方則車前子一味為末飲服二錢匕云此藥利水而不動氣水道利則清濁分各藏自止矣是以五子衍宗丸用此以為四子之佐五子衍宗丸枸杞菟絲各八兩五味覆盆各四兩車前二兩蜜丸遺泄者車前易蓮子金匱腎氣丸用此以為諸藥之助且此肝肺既清風熱悉去則肺不受熱而化源有自肝不破風而疏泄如常精與溺二竅本不相兼水得氣而通精得火而泄故水去而火益盛精盛而氣益固所謂服此令人有子明醫雜錄云服固精藥日久須服此行房即有子及滲利而不走氣馮兆張曰利膀胱水竅而不及命門精竅故濁陰去而腎愈固熱去而目自明也與茯苓同功者正謂此也但氣虛下陷腎氣虛脫切勿服耳酒蒸搗餅焙研用燈草隰草瀉心火以消水燈草專入心味淡而寒體小氣微諸書皆稱能降心火以其心治心也心火清則肺金肅故書曰清肺心與小腸相表裡則熱盡從小便而出矣且熱去而血亦寧故能止血通淋清上焦伏熱五淋之聖藥也五淋有氣血膏勞石之分燒可治喉痹一方燈心灰二錢蓬砂末一錢吹一方燈心箬葉燒灰吹一方燈心草紅花燒灰酒服及以灰塗乳上則兒飼不夜啼縛把擦癬則蟲從草出浮水可見且能斷根矣氣虛小便不禁者忌服扁蓄隰草除濕熱殺蟲扁蓄專入脾味苦氣平功專利水清熱除濕殺蟲是以小兒鬾病女子陰蝕浸淫瘙癢疽痔諸病無不藉此以為主治耳海上歌云心頭急痛不能當我有仙人海上方扁蓄醋煎通口咽管教時刻便安康以其味苦則熱泄味苦則蟲伏但此止屬標治不能益人勿常用也葉細如竹弱莖蔓引促節有粉三月開細紅花萆薢蔓草祛肝風除胃濕萆薢專入肝胃味苦氣平功專祛風除濕固腎凡人大便燥結小便頻數每於便時痛不可忍者此必大便熱閉積熱腐瘀等物同液乘虛流入小腸故於便時即作痛也楊子建萬金護命方云凡人小便頻數不計度數便時莖內痛不可忍者此疾必先大腑秘熱不通水液只就小腸大腑愈加乾渴甚則渾身熱心燥思涼水如此即重症也此疾本因貪酒色積有餘毒腐物瘀血之類隨虛水入於小腸故便時作痛也此乃小便頻數而痛與淋症澀而痛者不同也宜用萆薢一兩鹽水炒為末每服二錢使水道轉入大腸仍以蔥湯頻洗穀道令氣得通則小便數及痛自減也且水道不清則濕熱不除而肝火愈熾筋骨愈痿萆薢氣味苦平既能入肝祛風時珍曰厥陰主筋屬風陽明主肉屬濕萆薢之功長於去風濕所以能治緩弱痿痹遺濁惡瘡諸病之屬風濕者復能引水歸入大腸以通穀道俾水液澄清而無痛苦之患矣又安有痹痛腰冷膀胱宿水與陰痿失溺痔漏惡瘡之累乎昔人云既有逐水之功復有攝精之力濕熱除則精自不走泄洵不誣耳菝葜土茯苓與萆薢雖不相類而功用不遠白虛軟者良薏苡為使畏大黃柴胡前胡忌茗醋萆薢根細長淺白菝葜根作塊赤黃海金沙隰草利小腸血分濕熱海金沙專入小腸味甘而淡氣寒無毒為主通利小腸血分要藥凡小腸熱閉而見五淋疼痛不止者服之使熱盡從小便而出且於傷寒熱閉而見腹滿狂燥則當於此加梔子朴硝蓬砂投治俾熱亦從小便而出此灶里抽薪之一義也但腎臟真陽不足切忌淘淨取浮者曬乾捻之不沾指者真忌火防己蔓草除濕利水瀉下焦濕熱防己專入膀胱辛苦大寒性險而健善走下行長於除濕通竅利道能瀉下焦血分濕熱及療風水要藥杲曰本草十劑云通可去滯通草防己之屬是也夫防己大苦寒能瀉血中濕熱通其滯塞亦能瀉大便補陰瀉陽比之於人則險而健者也幸災樂禍能首為亂階然善用之亦可敵凶穴險故凡木濕喘嗽熱氣諸癇溫瘧腳氣水腫風腫癰腫惡瘡及濕熱流入十二經以致二陰不通者皆可用此調治若屬腳氣腫痛濕則腫熱則痛如濕則加蒼朮薏苡木瓜熱加黃芩黃柏風加羌活萆薢痰加竹瀝南星痛加香附木香血虛加四物大便秘加桃仁紅花小便秘加牛膝澤瀉痛連臂加桂枝威靈仙痛連脅加膽草隨症通活斯為善矣但此氣味苦寒藥力猛迅若非下焦血分實熱實濕木通甘淡瀉氣分濕熱防己苦寒瀉血分濕熱及非二便果不通利妄用此藥投治其失匪輕不可不知此雖有類黃柏地膚子但黃柏之瀉膀胱濕熱則併入腎瀉火味苦而不辛此則辛苦兼見性險而健故於風水腳氣等症兼理地膚子之瀉膀胱濕熱味苦而甘力稍遜於黃柏此則健險異常有辛無甘而為亂階之首也其一瀉熱與濕而氣味治功各別如此己有二種曰漢曰木治風須用木防己治水須用漢防己漢已根大而虛通心有花紋色黃木己黑點黃腥木強酒洗用惡細辛畏萆薢茵陳隰草治太陽陽明濕熱茵陳專入膀胱胃味苦微寒諸書皆言濕熱伏於陽明胃用此以入太陽膀胱發汗利水俾太陽陽明濕熱之邪盡得於藥而解矣且治傷寒時疾狂熱瘴瘧頭痛頭旋女人疝瘕亦是濕熱為病但黃原有陰陽寒熱之分陽黃者由熱蘊於脾土如苗值於大旱則苗必燥而黃是苗因燥而黃者也太澇則苗必濕而黃是苗因濕而黃者也熱為陽寒為陰故黃亦以陰陽分之陽黃身如橘色汗如柏汁寒黃黃而色晦當細辨別是以仲景立有茵陳蒿湯梔子柏皮湯麻黃連翹赤小豆湯以治陽黃之症又立茵陳附子湯以治陰黃之症茵陳治黃通劑在人審其所因而酌治耳若蓄血發黃則治不在茵陳之列以茵陳本屬氣分藥也於血則不能治矣茵陳本有二種葉細而青蒿者可用若生子如鈴則為山茵陳矣專於殺蟲及治口瘡地膚子隰草瀉膀胱血虛濕熱利小便淋閉地膚子專入膀胱治淋利水清熱功頗類於黃柏但黃柏其味苦烈此則味苦而甘黃柏大瀉膀胱濕熱此則其力稍遜凡小便因熱而見頻數及或不禁用此苦以入陰寒以勝熱而使濕熱盡從小便而出也頻數既謂之熱則不禁當不得以熱名然不禁亦有因於膀胱邪火妄動而致者但頻數不禁出於體旺則為陽火偏勝用以實治則可出於虛衰老弱雖有邪火內熾亦恐真陽不足當為詳慎但虛火偏旺而熱得恣固當用以清利若不佐以補味同入則小水既利而血益虛血虛則熱益生熱生而淋其益甚矣故宜佐以牡蠣山藥五味收澀之劑俾清者清補者補通者通澀者澀滋潤條達而無偏勝為害之弊矣且能以治因熱㿗疝並煎湯以治瘡疥至書所謂益精強陰非是具有補益之能不過因其熱除而即具有堅強之意耳類蠶沙惡螵蛸藏器曰眾病皆起於虛虛而多熱者加地膚子甘草白蘚皮山草瀉脾胃濕熱白蘚皮專入脾胃味苦與咸性寒無毒蓋陽明胃土喜燥惡濕一有邪入則陽被郁不伸而熱生矣有熱自必有濕濕淫則熱益盛而風更乘熱至相依為害以致關節不通九竅不利見為風瘡疥癬毛脫疸黃濕痹便結溺閉陰腫咳逆狂叫飲水種種等症諸症皆就濕熱以論治宜用此苦泄寒咸之味以為開關通竅俾水行熱除風息而症自克平肘後治鼠瘻已破出膿血用白蘚皮煮汁服一升當吐若鼠子也又陳延之治產後中風人虛不可服他藥者一物白蘚皮湯溫服奈世不察猥以此為瘡瘍之外用其亦未達本經主治之意耳然此止可施於脾胃堅實之人若使素屬虛寒切勿妄用根黃白而心實者良取皮用惡桑螵蛸茯苓桔梗萆薢苦參山草清熱除濕殺蟲苦參專入腎兼入脾胃味苦至極古書有云雖在五參之外人參沙參紫參丹參玄參云參亦屬有補然究止屬除濕導熱之品於補其奚濟乎繡按五參除人參可以言補余不得以補名凡味惟甘為正惟溫為補苦參味等黃柏寒類大黃陰似朴硝的解號為極苦極寒用此殺蟲除風治水去疸掃疥治癩開竅通道清痢解疲或云有益若謂於腎有補縱書立有是說亦不過從濕除熱祛之後而言豈真補陰益腎之謂哉況有用此擦牙而更見有腰痛傷腎之症其可謂之補腎者乎素問云五味入胃各歸其所喜攻久則增氣物化之常也氣增而久夭之由也王冰注云入肝為溫入心為熱入肺為清入腎為寒入脾為至陰而兼四氣皆為增其味而益其氣各從本臟之氣用爾故久服黃連苦參而反熱者此其類也氣增不已則臟氣有偏勝偏勝則臟有偏絕故有暴夭是以藥不具五味不備四氣而久服之雖且復勝久必暴夭但人疏忽不能精候耳張從正云凡藥皆毒也雖甘草苦參不可不謂之毒久服則五味各歸其臟必有偏勝氣增之患諸藥皆然學者當觸類而長之可也至脾胃虛寒尤為切忌泔浸去腥氣蒸用玄參為使惡貝母菟絲子漏蘆反藜蘆琥珀寓木清肝腎熱邪利水消瘀琥珀專入心肝兼入小腸腎甘淡性平承曰茯苓生於陰而成於陽琥珀生於陽而成於陰按書雖曰脂入土而成寶合以鎮墜等藥則能安魂定魄色赤能入心肝二經血分合以辛溫等藥則能消瘀破瘕生肌合口其味甘淡上行合以滲利等藥則能治淋通便燥脾補土經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱凡滲藥皆上行而後下降且能明目退翳即退翳之效逐鬼殺魅即安魂魄之效謂是水去熱除安鎮之意但此性屬消磨則於真氣無補氣屬滲利則於本源有耗此惟水盛火衰者用之得宜若使火盛水涸用之不能無慮血瘀而小便不利者宜用血少而小便利者反致燥急之苦松脂入土年久結成或楓脂結成以摩熱拾芥者真市人多煮雞子及青魚膽偽之摩熱亦能拾芥宜辨芥即禾草用柏子仁末入瓦鍋同煮半日搗末用豬苓寓木除膀胱血分濕熱豬苓專入膀胱腎甘淡微苦性平無毒得楓根之餘氣以成形如豬屎故以豬名凡四苓五苓等方並皆用此仲景用茯苓澤瀉白朮與桂名五苓散為治水之總劑方中用以肉桂蓋以膀胱津液賴氣以化則能以出用肉桂辛熱所以化其氣也除桂名四苓散李東垣曰無惡寒症不可用桂周揚俊曰五苓為渴而小便不利者設若不渴則茯苓甘草足矣若但渴則四苓足矣性雖有類澤瀉同入膀胱腎經解熱除濕行竅利水然水消則脾必燥水盡則氣必走澤瀉雖同利水性亦類燥然咸性居多尚有潤存澤雖治火性亦損氣然潤能滋陰尚有補在故豬必合澤瀉以同用則潤燥適均而無偏陂之患矣至於茯苓雖屬滲劑有濕自可以去然茯則入氣而上行此則入血而下降且與澤瀉利水消腫治瘧止痢等藥審屬暑邪濕熱內閉無不藉此以為宣導之需瘧多由暑暑必成瘧古人已云清利小便無若此快以故滋陰藥中止有澤瀉而不用及豬苓正謂此耳故六味丸有澤瀉無豬苓但此專司引水津液易耗久服多致損目凡服利水藥而明目者因除濁氣濕熱而成明也用利水藥而失明者因其走泄真氣也白而實者良去皮用赤小豆菽豆利小腸濕熱赤小豆專入小腸甘酸色赤心之谷也其性下行入陰通小腸而利有形之病故與桑白皮同為利水除濕之劑十劑曰燥可去濕桑白皮赤小豆之屬是也是以水氣內停而見溺閉腹腫手足攣痹癰腫瘡疽非此莫治朱氏集驗方云宋仁宗在東宮時患痄腮命道士贊寧治之取小豆七七粒為末敷之而愈中貴人任承亮後患惡瘡近死尚書郎傅永授以藥立愈叩其方赤小豆也予苦脅疽既至五臟醫以藥治之甚驗承亮曰得非赤小豆耶醫謝曰某用此活三十口願勿復言有僧發背如爛瓜鄰家乳婢用此治之如神但其性最黏敷毒干則難揭入苧根末即不黏此法尤佳且能止濕解酒通胎下乳陳自明予婦食素產後七日乳脈不行服藥無效偶得赤小豆一升煮粥食之當夜遂行至十劑取此為燥亦以水行而燥自生之意並非因其藥性本燥而言也故書又戒多服則令人津液枯槁而燥取緊小而赤黯色者良若半黑半紅為相思子非赤小豆也滑石石降上中下濕熱滑石專入膀胱何以滑名因其性滑而名之也滑石味甘氣寒色白服則能以清熱降火通竅利便生津止渴為足太陽膀胱經藥故凡中暑積熱嘔吐煩渴黃疸水腫腳氣淋閉水熱瀉利吐血衄血諸症腫毒乳汁不通胎產難下服此皆能蕩熱除濕通汁滑胎同甘草為六一散然其開竅利濕不獨盡由小便而下蓋能上開腠理而發表腠理為肺所生是除上中之濕熱下利便溺而行是除中下之濕熱熱去則三焦寧而表裡安濕去則闌門通而陰陽利矣河間益元散六一散或加辰砂用此通治上下表里諸病其意在此滑石既屬滲利如何又言止渴因其濕熱既滲則脾胃中和而渴自止耳故書又載能理脾胃義亦由此白而潤者良石葦為使宜甘草汪昂云凡走泄之劑宜用甘草以佐石燕石石燕專入脾胃肝小腸味甘氣寒出於祁陽西北江畔灘上其形似蚶而小與堅不同功專利竅除濕解熱故凡目翳不開熱淋不利婦人難產等症治當用此無有不效必審諸病果因濕熱而成方用但書所云難產令婦兩手各執一枚其胎即下合之於理似屬誑妄未可盡信磨汁服書言因雷雨自石穴中出隨雨飛墮者非刺蝟皮獸祛腸胃濕熱血瘀刺蝟皮專入腸胃其皮如刺因以刺名其獸屬胃而入胃因以蝟號宗奭曰蝟皮治胃逆開胃氣有功何書載治五痔陰蝕以其濕熱下注得此味辛入腸金屬大腸故能以破其血耳何書又載能治噎膈反胃普濟治反胃用蝟皮燒灰酒服或煮汁或五味淹炙食以蝟屬獸兼味辛苦故能散邪泄熱使其胃氣調和而不上逆故耳但食肉切宜除骨若誤食則令人瘦劣節節漸小也似鼠而圓火褐色攢毛外刺如慄房煅黑存性用瀉水瀉水者因其水勢急迫有非甘淡所可滲苦寒所可瀉正如洪水橫逆迅利莫御必得極辛極苦極咸極寒極陰之品以為決瀆則水始平此瀉水之說所由起也然水在人臟腑本自有分即人用藥以治水勢之急亦自有別如大戟芫花甘遂同為治水之藥矣然大戟則瀉臟腑水濕芫花則通里外水道蕘花則瀉裡外水濕甘遂則瀉經隧水濕也葶藶白前同為入肺治水劑矣然葶藶則合肺中水氣以為治白前則搜肺中風水以為治也商陸入脾行水功用不減大戟故仲景牡蠣澤瀉湯用之海藻海帶昆布氣味相同力專泄熱散結軟堅故瘰癧瘕疝隧道閉塞其必用之螻蛄性急而奇故能消水拔毒田螺性稟至陰故能利水以消脹續隨子有下氣之速凡積聚脹滿諸滯服之立皆有效紫貝有利水道通瘀之能故於水腫蠱毒目翳用之自屬有功至於瞿麥瀉心石葦清肺雖非利水最峻然體虛氣弱用亦增害未可視為利水淺劑而不審實以為用也大戟毒草大瀉臟腑水濕大戟專入肺腎旁行經絡氣味苦寒性秉純陽峻利居首上瀉肺氣下泄腎水兼因味辛旁行經脈無處不到浸水色綠又入肝膽故書皆載能治十二水毒蠱結腹滿急痛等症好古曰大戟與甘遂同為泄水之藥濕勝者苦燥除之也李時珍云凡痰涎為物隨氣升降無處不到入於心則迷竅而癲癇入於肺則竅塞而成咳唾稠黏喘急背冷入於肝則留伏蓄聚而成脅痛乾嘔寒熱往來入於經絡則麻痹疼痛入於筋骨則頸項胸背腰脅手足牽引隱痛三因並以控涎丹主之蓋有大戟能泄臟腑之水濕甘遂能行經隧之水濕白芥子能散皮裡膜外之痰氣要必實症實熱實脈方可以用非實莫用否則瀉肺傷腎害人不淺李時珍曰愚按百祥惟用大戟一味百祥獨瀉腑正實則瀉其子也腎邪實而瀉其肝也潔古老人治痘變黑歸腎症用宣風散代百祥膏亦是瀉子之意蓋毒勝火熾則水益涸風挾火勢則土受虧故津血內竭不能化膿而成青黑干陷之症瀉其風火之毒所以救腎扶脾也若中其毒者惟菖蒲可解杭產色紫者良北產色白者不堪入藥水漿煮去骨用得大棗則不損脾畏菖蒲反甘草苗名澤漆亦行水道主治略同芫花毒草大通里外水道芫花專入脾肺腎味辛而苦氣溫有毒亦反甘草主治頗與大戟甘遂皆能達水飲窠囊隱僻之處然此味苦而辛苦則內泄辛則外搜故凡水隱痰癖皮膚脹滿喘急痛引胸脅咳嗽脹瘧裡外水閉危迫殆甚者用此毒性至緊無不立應飲有痰飲懸飲溢飲支飲伏飲之異李時珍云夫飲有五皆出內啜水漿外受濕氣郁蓄而為留飲流於胸則為支飲令人喘咳寒熱吐沫背寒流於肺則為懸飲令人咳唾痛引缺盆兩脅流於心下則為伏飲令人胸滿嘔吐寒熱眩暈流於腸胃則為痰飲令人腹鳴吐水胸脅支滿或作泄瀉忽肥忽瘦流於經絡則為溢飲令人沉重注痛或作水氣跗踵又水有風水皮水正水黃汗之別如水積胞中堅滿如石則為石水汗如柏汁炙黃名曰黃汗久而不愈則為癰膿又水在肺則咳在胃則嘔在頭則眩在心則悸在背則冷在脅則脹不似甘遂苦寒止泄經隧水濕大戟苦寒止泄臟腑水濕蕘花與此氣味雖屬相同而性較此多寒之有異耳此雖取效甚捷誤用多致夭折不可不慎根名蜀桑止可敷瘡毒魚及搗汁浸線系落痔瘡他不宜用葉似柳花紫碧色葉生花落陳久者良醋煮過水浸暴用反甘草葉可擦膚赤腫作傷蕘花毒草大瀉里結水濕蕘花專入腸胃雖與芫花形色相同而究絕不相似蓋芫花葉尖如柳花紫似荊蕘花苗莖無刺花細色黃至其性味芫花辛苦而溫此則辛苦而寒若論主治則芫花辛溫多有達表行水之力此則氣寒多有入里走泄之效故書載能治利宗奭曰張仲景傷寒論以蕘花治利者取其行水也水去則利止其意如此今用之當斟酌不可過使恐不及也須有是症乃用之然要皆屬破結逐水之品未可分途而別視也但藥肆混收亦可見效以其主治差同故耳苦甘遂毒草大瀉經隧水濕甘遂專入脾胃肺腎膀胱皮赤肉白味苦氣寒有毒其性純陰故書皆載能於腎經及或隧道水氣所結之處奔湧直決使之盡從穀道而出為下水濕第一要藥元素曰水結胸中非此不能除故仲景大陷胸湯用之但有毒不可輕用喻嘉言曰胃為水穀之海五臟六腑之源脾不散胃之水精於肺而病於中肺不能通胃之水道於膀胱而病於上腎不能司胃之關時其蓄泄而病於下以致積水浸淫無所底止水腫有風水皮水正水石水黃汗五種水鬱於心則心煩氣短臥不克安水鬱於肺則虛滿喘咳水鬱於肝則脅下痞滿痛引少腹水鬱於脾則四肢煩悗體重不能衣水鬱於腎則腹痛引背央央腰髀痛楚水腫與氣腫不同水腫其色明潤其皮光薄其腫不速每自下而上按肉如泥腫有分界氣則色蒼黃其皮不薄其腫暴起腫無分界其脹或連胸脅其痛或及臟腑或倏如浮腫或腫自上及下或通身盡腫按則隨起但仲景所論水腫多以外邪為主而內傷兼及究之水為至陰其本在腎腎氣既虛則水無所主而妄行使不溫腎補脾但以行氣利水終非引水歸腎之理猶之土在雨中則為泥必得和風暖日則濕氣轉為陽和自得萬物消長矣故凡因實邪元氣壯實必壯實方可用以甘遂而致隧道阻寒見為水腫蠱脹疝瘕腹痛無不仗此迅利以為開決水道之首如仲景大陷胸湯之類然非症屬有餘只因中氣衰弱小便不通水液妄行脾莫能制誤用泄之之品益虛其虛水雖暫去大命必隨甘草書言與此相反何以二物同用而功偏見亦以甘行而下益急又按劉河間云凡水腫服藥未全消者以甘遂末塗腹繞臍令滿內服甘草水其腫便去二物相反而感應如此非深於斯道者未易語此皮赤肉白根作連珠重實者良麵裹煨熟用用甘草薺苨汁浸三日其水如墨以清為度再麵裹煨瓜蒂為使惡遠志商陸毒草大通水道下行商陸專入脾辛酸苦寒有毒功專入脾行水其性下行最峻有排山倒海之勢功與大戟芫花甘遂相同故凡水腫水脹瘕疝癰腫喉痹不通濕熱蠱毒惡瘡等症服此即能見效喻嘉言曰從來腫脹遍身頭面俱腫者尚易治若只單腹脹則難治遍身俱腫脹者五臟六腑各有見症故瀉肝瀉脾瀉膀胱大小腸間有取效之時單單腹脹久窒而清者不升濁者不降互相結聚牢不可破實因脾胃之衰微所致而瀉脾之藥安敢用乎明乎此則有培養一法補元氣是也則有招納一法宣布五陽是也則有解散一法開鬼門潔淨府是也凡腫傷脾則臍必突傷腎則足底必平傷肺則背肩聳傷肝則唇黑皮腫傷心則缺盆必平及咳嗽失音凡腫先起於腹後散四肢者可治先起四肢後歸於腹者必死如仲景牡蠣澤瀉散之用商陸以治大病後腰以下腫用此急迫以散之也若脾虛水腫因服輕劑未愈遂用苦劣有毒純陰之藥迅迫效雖稍見未幾即發決不可救取花白者良赤者只堪貼臍入麝三分搗貼小便利則腫消嘉謨曰古贊云其味酸辛其形類人療水貼腫其效如神斯言盡之矣黑豆湯浸蒸用得蒜良海藻水草泄熱散結軟堅海藻專入腎書載性反甘草能治項頸一切瘰癧癥瘕疝㿉腹痛曰疝丸痛曰㿉及痰飲腳氣水腫等症其故奚似蓋緣苦能泄結寒能除熱咸能軟堅海藻氣味俱備與甘草本屬不合凡其水因熱成而致隧道閉塞小便不通硬結不解者用此堅軟結泄邪退熱解使熱盡從小便而出而病自無不愈也丹溪治癭氣初起用海藻一兩黃連二兩為末時時舐咽先斷一切厚味至有病非實結最不宜用非獨海藻為然即凡海中諸藥無不如是海帶有似海藻而粗柔韌而長主治無異昆布亦同海藻海帶俱性帶滑且雄凡癭堅如石者非此不除且其下氣最速久服多令人瘦至雲海島人常食以其水土不同故耳皆反甘草略洗去鹹水用偏有同甘草以治瘰癧蓋激之以潰其至耳葶藶隰草瀉肺停水葶藶專入肺兼入胃辛苦大寒性急不減硝黃大瀉肺中水氣膹急下行膀胱故凡積聚癥結伏留熱氣水腫痰壅嗽喘經閉便塞至極等症諸症皆就水氣停肺而言無不當用此調昔本草十劑篇云泄可去閉葶藶大黃之屬但大黃則瀉脾胃陰分血閉葶藶則瀉肺經陽分氣閉葶藶有苦有甜甜者性緩雖瀉而不傷苦者性急既瀉肺而復傷胃故必用以大棗補土以制水但水去則止不可過劑觀金匱所云用葶藶以治頭瘡藥氣入腦殺人其意大可知矣子如黍米微長色黃糯米微炒用得酒良榆皮為使榆皮性亦利水白前山草搜肺中風水白前專入肺甘辛微溫為降氣祛風除痰要藥緣人氣實則痰壅痰壅則風作風與痰氣膠固則肺因爾不寧而有喘嗽喘促體腫之病矣非不用此以泄肺中實痰風邪則氣曷降而嗽曷止是以金匱用以治咳嗽脈沉深師白前湯用此以治久咳上氣深師方體腫短氣脹滿晝夜倚壁不得臥常作水雞聲者白前湯主之白前二兩紫菀半夏各三兩大戟七合煮取溫服禁食羊肉飴糖皆取降肺除痰之意非若白薇氣味鹹寒專泄肺胃燥熱細辛辛熱專發腎中寒邪也此惟實者用之虛者不宜用耳似牛膝粗長堅直易斷者良若短小柔軟能彎者是白薇去頭須甘草水浸一晝夜焙用忌羊肉白前出近道多有形色相同須以此辨之續隨子毒草大瀉胸中濕滯續隨子專入胃即俗所名千金子者是也味辛氣溫有毒諸書皆載下氣最速時珍曰續隨與大戟澤漆甘遂莖葉相似其功長於利水惟在用之得法亦皆要藥也凡積聚脹滿痰飲諸滯等症服之最宜以其以毒攻毒故也氣味形質功用頗有類於大戟澤漆甘遂故書亦載此屬克伐之味若脾胃虛寒泄瀉服之必死黑子疣贅用此搗爛時塗之自落或以煮線系瘤時時扎之漸脫去取色白壓去油用瞿麥隰草大瀉心熱利水瞿麥專入心兼入小腸味苦性寒功專瀉心利水故書載利小便決腫癰去癃閉拔肉刺下胎產除目翳然其氣稟純陽必其小腸氣厚服此疏泄之味病始克除淋症有虛有實如淋果屬熱致其莖痛不可忍手按熱如火爍血出鮮紅不黯淋出如沙如石臍下妨悶煩燥熱渴六脈沉數有力洵為屬熱如其莖中不痛痛喜手按或於溺後攙痛稍久則止或登廁小便澀痛大便牽痛面色萎黃飲食少思語言懶怯六脈虛浮無力是為屬虛若使小腸素虛經云心屬有熱不惟其熱不除則虛而益虛必致變生他症矣妊娠產後小便不利及脾虛水腫均並禁焉惡螵蛸石葦石草清肺熱以利水石葦專入肺苦甘微寒功專清肺行水凡水道不行化源不清以致水道益閉化源不清則水道自閉石葦蔓延石上生葉如皮味苦氣寒苦則氣行而金肅寒則熱除而水利是以勞力傷津伏有熱邪而見小便不通及患背發等症治當用此調治俾肺肅而水通亦淋除而毒去矣去梗及黃毛微炙用生於瓦上名瓦葦亦治淋紫貝蚌蛤利水通道逐蠱下血紫貝專入脾肝即貝子之色赤者也味鹹氣平其物出於雲南白入氣紫入血紫斑而骨白功專利水通道逐蠱下血凡人症患腳氣小兒斑疹目翳五癃水腫蠱毒鬼蛀用此的能解除蓋因咸有軟堅之力腳症濕熱用此得以透骨逐邪貝骨堅硬故能透骨和以諸藥使其蒸蒸作汗次第而解也目翳用此粉點亦以能除濕熱而使血得上營但與貝子相類甚多如砑蠃之類皆能相混分別用之頌曰貝類極多古人以為寶貨而紫貝尤貴後世不用貝錢而藥中亦希使之背上深紫有黑點者良生研細末用田螺蚌蛤清熱利水田螺專入膀胱腸胃味甘大寒產於水田性稟至陰故能引熱下行凡人目患赤痛只取田螺以珍珠末黃連末納入良久取汁點目神效以寒能除熱也且治噤口痢疾用活大田螺二枚搗爛入麝香三分作餅烘熱貼臍間半日熱氣下行即思食矣至治熊產誠小便腹脹如鼓只取田螺一枚鹽匙連殼搗碎敷臍下一寸三分即通並能止渴醒酒以除餘熱此雖止屬外治亦見其性引下行之力耳螻蛄化生攻拔水氣壅腫螻蛄專入腸胃氣味寒咸穴土而居性甚奇特書言將此分為上下左右四截若以上截治腫則腫即見上消下截治腫則腫即見下消左截治腫則腫即見左消右截治腫則腫即見右消又載自腰以上以治則能拔水上行而使二便皆澀自腰以下以治則能使便立下弘景曰自腰以前甚澀能止大小便自腰以後甚利能下大小便婦人難產亦可照此以治而產即解癰腫瘰癧肉刺若生搗汁以塗則刺與腫皆治骨鯁入喉不下末吹即能見愈外此箭簇入肉用此塗貼患處則箭即克見拔又牙齒疼痛用土狗一個舊糟裹定溫紙包煨焦去糟研末傅之立止究其治效總因性善攻穴其性急迫故能如此取效也頌曰今方家治石淋導水用螻蛄七個鹽二兩新瓦上鋪蓋焙乾研末每酒服一錢即愈也味鹹氣寒俗名土狗凡用此藥宜審其體實方可劫取若使體虛氣薄但見書載治功任意妄施其不傷人性命者鮮矣朱震亨曰螻蛄治水甚效但其性急虛人戒之此與蓖麻子等藥同為一類用時須當細審取雄或云用火燒地赤置螻於上任其跳死覆者雄仰者雌也去翅足炒用降痰痰之見病甚多痰之立治不少如痰之在於經者宜散宜升痰之在於上者宜湧宜吐痰之在中在膈不能以散不能以吐者宜降宜下此降之法所由起也第降有在於肺以為治者如栝蔞貝母生白果杏仁土貝母訶子之屬是也有在胸膈以為治者如硼砂礞石兒茶之屬是也有在心肝以為治者如牛黃之屬是也有在肝膽以為治者如全蠍鶴蝨之屬是也有在皮裡膜外以為治者如竹瀝之屬是也有在脾以為治者如密陀僧白礬之屬是也有在腎以為治者如沉香海石之屬是也但貝母則合心肝以為治射干則合心脾以為理皆屬清火清熱降氣下行惟白礬則收逐熱涎或從上湧或自下泄各隨其便至於痰非熱成宜溫宜燥宜收宜引則又在人隨症活潑毋自拘也栝蔞仁蔓草栝蔞仁專入肺兼入脾胃氣味甘寒成無己乃謂味苦其說甚非功專降火下氣墜痰緣肺受火逼則水必停而痰生痰生則肺失養而氣壅故有喘急胸滿咳嗽咽閉口渴之病矣栝蔞性寒味甘寒能除上焦傷寒胸膈鬱結痰氣使之入腸胃而下降震亨曰栝蔞實治胸痹者以其味甘性潤甘能補肺潤能降氣胸中有痰者乃肺受火逼失其降下之令今得甘緩潤下之助則痰自降宜其為治嗽之要藥也且又能洗滌胸膈中垢膩鬱熱為治消渴之神藥故仲景小陷胸湯用此以治邪結在胸又以小柴胡湯用此易半夏以治少陽症見口渴等症然大要取其有清降之力故能使之下行也若謂此能補氣正未必然虛寒瀉利者忌熱利最宜取其以寒降火實圓長如熟柿子扁多脂去油用枸杞為使畏牛膝乾漆惡乾薑反烏頭天花粉蔓草入肺除痰消火止渴天花粉專入肺即栝蔞根也味酸而甘微苦微寒亦同栝蔞能降膈上熱痰兼因味酸又能生津止渴故凡口燥唇乾腫毒癰乳痔漏時熱狂燥便數等症服之立能解除時珍曰栝蔞味甘微苦酸其莖葉味酸酸能生津感召之理故能止渴潤枯微苦降火甘不傷胃昔人言其苦寒似未深察但此較之栝蔞其性稍平不似蔞性急迫而有推牆倒壁之功也至經有言安中絕續似非正說不過云其熱除自安之意痰色清稀者忌服澄粉食大宜水衰有熱人畏惡反同栝蔞貝母山草清肺心痰熱貝母專入肺兼入心辛苦微寒世多用為治痰之藥殊不知痰有因燥因濕之不同痰有風痰寒痰濕痰火痰燥痰虛痰熱痰之別須在臨症細分如果肺因火刑水飲不化鬱而為痰此痰因於燥者也脾胃虛寒水飲停積窒而不通此痰因於濕者也因以燥者非用苦以瀉火辛以散郁寒以折熱莫治因以濕者非用辛以散寒濕以燥濕莫投貝母味苦而辛其性微寒止於心肺燥郁痰食壅盛及虛勞煩熱肺痿肺癰喉痹咯血吐血火刑于肺目眩淋瀝火移小腸癭瘤乳閉難產惡瘡不斂等症服之卒能有效承曰貝母能散心胸郁之氣故詩云言採其商是也作詩者本以不得志而言今用治心中不快多愁郁者殊有功若使因於脾虛而見咳嗽不寧混以貝母妄代其失遠矣蓋一宜半夏一宜貝母況半夏兼治脾肺貝母獨清肺金半夏用其辛貝母用其苦半夏用其溫貝母用其涼半夏性速貝母性緩半夏散寒貝母清熱氣味陰陽大有不同汪昂云故凡風寒濕食諸痰貝母非所宜也彼此誤投為害不淺大者為土貝母大苦大寒如浙江貝母之類清解之功居多小者川貝母味甘微寒滋潤勝於清解不可不辨川產開瓣者良獨瓣不堪入藥去心米拌炒用厚朴白薇為使畏秦艽反烏頭竹瀝苞木清皮裡膜外燥痰竹瀝專入經絡皮裡膜外甘寒而滑治專消風降火潤燥行痰養血益陰凡小兒天吊驚癇陰虛發熱口噤胎產血暈痰在經絡四肢皮裡膜外者服之立能見效蓋瀝之出於竹由血之出於人也極能補陰長於清火補陰亦由火清而致性滑流利走竅逐痰故為中風要藥以中風莫不由於陰虛火旺煎熬津液成痰壅塞氣道不得升降服此流利經絡使痰熱去氣道通而外症愈矣故火燥熱者宜之時珍曰竹瀝性寒而滑大抵因火爍熱而有痰者宜之苦寒濕胃虛腸滑之人服之則反傷腸胃筍性滑利多食瀉人僧家謂之刮腸篦即此義朱氏謂大寒言其功不言其氣殊悖於理謂大寒為氣何害於功若脾胃腸滑寒痰濕痰食積生痰不可用也荊瀝性味相近但氣寒多用荊氣虛熱多用竹丹溪止言虛痰用竹似欠分明薑汁為使但竹類甚多惟取竹肉薄節用機曰將竹截作二尺長劈開以磚兩片對立架竹於上以火炙出其瀝以盤承取筍尖發痘瘡白果山果生用滌痰除垢熟則脹悶欲絕白果專入肺雖屬一物而生熟攸分不可不辨如生食則能降痰解酒消毒殺蟲以漿塗鼻面手足則去渣疱皯𪒟油膩及同汞浣衣則死蟲蝨其花夜開人不得見性陰有小毒故能消毒殺蟲何其力銳氣勝而能使痰與垢之悉除也至其熟用則竟不相同如稍食則可再食則令人氣壅多食則即令人臚脹昏悶昔已有服此過多而竟脹悶欲死者食千枚者死然究其實則生苦未經火革而性得肆其才而不窒熟則經火煅制而氣因爾不伸要皆各有至理並非空為妄談已也礞石石除肝膈上熱痰礞石專入肝稟石中剛猛之性沉墜下降味辛而咸色青氣平功專入肝平木下氣為治驚利痰要藥喻嘉言曰驚風二字乃古人妄鑿空談不知小兒初生以及童幼肌肉筋骨臟腑血脈俱未克長陽則有餘陰則不足故易於生熱熱甚則生風生驚亦所恆有後人不解遂以為奇特之病且謂此病有八候以其搖頭手動也而立抽掣之名以其卒口噤腳攣急也而立目斜亂搐搦之名以其脊強背反也而立角弓反張之名相傳既久不知妄造遇此等症無不以為奇特而不知小兒腠理不密易於感冒風寒病則筋脈牽強因筋脈牽強生出抽掣搐搦角弓反張種種不通名色而用金石等藥鎮墜外邪深入臟腑千中千死間有體堅症輕得愈者又詫為再造奇功遂致各守專門雖日殺數兒而不知其罪矣蓋風木太過脾土受制氣不運化積氣生痰壅塞膈上變生風熱治宜用此重墜下泄則風木氣平而痰積自除今人以王隱君滾痰丸內用礞石通治諸般痰怪症殊為未是滾痰丸礞石焰硝各二兩煅研水飛淨一兩大黃酒蒸八兩黃芩酒洗八兩沉香五錢為末水丸不知痰因熱盛風木挾熱而脾不運故爾痰積如膠如漆用此誠為合劑如其脾胃虛弱食少便溏服此泄利不止小兒服之多成慢症以致束手待斃可不慎歟硝煅水飛研用白礬石逐熱痰下泄上湧白礬專入脾氣味酸寒則其清熱收熱可知何書又言燥痰若於寒字相悖書言能治風痰若於收字澀字相殊不知書之所云能燥痰者非其氣味溫熱而可以燥而即化實以收其燥濕初起使之下墜不使留滯而不解也泄即是收且其酸而兼咸則收澀之中尚有追涎逐降之力非即不燥之燥乎所謂能治風痰者其酸苦湧泄兼因風邪初客合以皂莢等味研服則能使之上湧豈其風熱歷久深入不解而即可以上湧乎是以風痰泄痢崩帶用此以收即愈收諸血脫肛陰挺肝火崩帶風眼痰飲瘡瘍用此以澀即效澀喉痹癰疽蛇傷蠱毒用此酸寒以解即除酸治雖有四然總取其酸澀寒咸為功以為逐熱去涎之味但暫用則可久服則於精血有損宗奭曰損心肺卻水故也水化書紙上干則水不能濡故知其性卻水李迅癰疽方云凡人病癰疽發背不問老少皆宜服黃礬丸服至一兩以上無不作效最止疼痛不動臟腑活人不可勝數用明亮白礬一兩生研以好黃蠟七錢熔化和丸梧子大每服十丸漸加至二十丸熟水送下如未破則內消已破即便合如服金石發瘡以白礬末酒服即效古言服損心肺傷骨義根於是豈正本求源之治歟取潔白光瑩者佳火煅用以火煅地灑水於上布地以盤覆之四面灰擁一日夜礬飛盤上掃收之為礬精未盡者更如前法再以陳苦酒化之名礬華七日可用百日更佳甘草為使畏麻黃惡牡蠣蓬砂石治胸膈熱痰蓬砂專入肝又名鵬砂辛甘微咸氣溫色白質輕功專入上除熱故云能除胸膈熱痰也是以痰嗽喉痹噎膈積聚骨鯁結核眼目翳障口齒諸病凡在胸膈以上者無不可以投治頌曰今醫家用硼砂治咽喉最為要功宗奭曰含化咽津治喉中腫痛膈上痰熱初覺便治不能成喉痹時珍曰硼砂味甘微咸而氣涼色白而質輕故能去胸膈上焦之熱素問云熱淫於內治以鹹寒以甘緩之是也其性能柔五金而去垢膩故治噎膈積聚骨鯁結核惡肉陰㿉用之者取其柔物也治痰熱眼目瘴翳用之者取其去垢也況性能消金豈有垢膩塊積而不可以消導乎第當審實而治勿輕投也出西番者白如明礬出南番者黃如桃膠甘草湯煮化微火炒鬆用牛黃畜清心肝熱痰牛黃專入心肝味苦性涼古人用此解心經熱邪及平肝木通竅利痰定驚及痰涎上壅中風不語等症中風須辨真偽真則外有表症可察偽則內有虛症可尋真則表症見而神志無恙偽則表症既無而精氣全失真則本氣或虧本血或損加以外邪內襲而成偏廢偽則真陰既槁真陽既耗迨其將絕不固而見厥僕真則新邪復喚舊邪而致新舊交感偽則裡虛既甚而更增虛益危真則面赤唇焦牙關緊閉上視強直掉眩煩渴偽則面青或白與黑痰喘昏亂眩暈多汗甚則手足厥逆脫症全具真則陽浮而數陰濡而弱及或浮滑沉滑微虛微數偽則兩尺沉滑微細虛散欲絕及或寸關搏指弦滑洪數又中風開口則心絕手撒則脾絕眼合則肝絕遺尿則腎絕氣喘面黑鼻煤則肺絕用藥始宜辛熱以祛外邪繼宜辛潤甘潤以固血脈緣牛有黃牛之病也牛黃在於心肝膽之間凝結成黃故還以治心肝膽之病取其長於清心化熱故爾用此以除驚痰之根耳至於中風不語必其邪已入臟九竅多滯唇緩便閉舌短耳聾鼻塞目瞀方可投服若使中腑而見四肢不著中經而見口眼喎斜不為開痰順氣養血活血便用此藥投治引邪深入如油入面莫之能出小兒純陽病多胎熱痰熱屬於心肝二經之病命在須臾者用此多有回生之力兒初生未食乳用三五釐合黃連甘草末蜜調呷之最佳惟脾胃虛寒者其切忌之取磨指甲者真牛有黃必多吼喚以盆水承之伺其吐出喝迫即墮水名生黃如雞子黃大重疊可揭殺死自角中得者名角黃心中得者名心黃肝膽中得者名肝膽黃成粒須防駱駝黃以亂得牡丹菖蒲良人參為使惡龍骨龍膽地黃常山瀉熱內經帝曰人傷於寒而傳為熱何也岐伯曰寒氣外凝內郁之理腠理堅緻玄府閉密則氣不宣通濕氣內結中外相薄寒盛熱生觀此則知熱之由作悉皆外邪內入而熱是即本身元陽為邪所遏一步一步而不得泄故爾變而為熱耳然不乘勢以除則熱更有進而相爭之勢所以古人有用三黃石膏及或大小承氣無非使其熱瀉之謂余按熱病用瀉考之方書其藥甚眾然大要在肺則止用以黃芩知母在胃則止用以石膏大黃朴硝在心則止用以黃連山梔連翹木通在肝則止用以青黛龍膽在腎則止用以童便青鹽在脾則止用以石斛白芍此為諸臟瀉熱首劑至於在肺又有他劑以瀉蓋以熱邪初成未盛則或用以百合百部馬兜鈴毒氣兼見則或用以金銀花牛蒡子久嗽肺痿則或用以沙參腳氣兼見則或用以薏苡仁咽瘡痔漏則或用以柿乾柿霜熱挾氣攻則或用以牽牛三焦熱並則或用以梔子煩渴而嘔則或用以竹茹熱而有痰則或用以貝母熱而氣逆不舒則或用以青木香熱而溺閉則或用以車前石葦久嗽兼脫則或用以五倍子百藥煎乳水不通則或用以通草若更兼有血熱則又當用生地紫菀此瀉肺熱之大概也在胃又有他劑以瀉蓋以熱兼血燥犀角宜矣毒盛熱熾綠豆宜矣中虛煩起粳米宜矣暑熱渴生西瓜宜矣時行不正貫眾宜矣疫熱毒盛人中黃金汁雪水宜矣咽瘡痔漏柿蒂柿干宜矣便結不軟玄明粉宜矣乳癰便閉漏蘆宜矣蠱積不消雷丸宜矣熱盛呃逆竹茹蘆根宜矣腸毒不清白頭翁刺蝟皮宜矣口渴不止竹葉宜矣若更兼有血熱則又宜於地榆槐角槐花蘇木三七乾漆此瀉胃熱之大概也而大腸熱結仍不外乎硝黃白頭翁黃芩綠豆蝸牛生地之藥矣在心又有他劑以瀉則或因其溺閉而用瞿麥木通氣逆而用赭石痰閉而用貝母天竺黃暑渴而用西瓜精遺而用蓮鬚抽掣而用鉤藤咳嗽而用百合疝瘕而用川楝與夫血熱而更用以犀角射干童便血餘紅花辰砂紫草生地鬱金桃仁茜草蘇木丹參沒藥蓮藕益母草熊膽等藥又可按味以考求矣此瀉心熱之大概也在肝又有他劑以瀉則如肝經氣逆宜用赭石以鎮之腎氣不固則用石南葉以堅之溺閉不通則用車前子以導之痰閉不醒則用牛黃以開之目翳不明則用秦皮空青蒙花石燕青葙子石決明以治之咳嗽痰逆則用全胡以降之蠱積不消則用蘆薈以殺之濕鬱驚恐宜用琥珀以鎮之神志昏冒宜用棗仁以清之若使熱在於血其藥眾多大約入肝涼血則有赤芍赭石蒲公英青魚膽紅花地榆槐花槐角側柏葉卷柏無名異凌霄花豬尾血紫草夜明砂兔肉旱蓮草茅根蜈蚣山甲琥珀芙蓉花苦酒熊膽之類入肝破血則有莪朮紫貝靈芝紫參益母草蒲黃血竭蓮藕古文錢皂礬歸尾鱉甲貫眾茜草桃仁之類入肝敗血則有三七虻蟲䗪蟲螃蟹瓦楞子水蛭花蕊石之類皆當審實以投此瀉肝熱之大概也而瀉膽熱之味又豈有外空青銅綠銅青熊膽膽礬前胡等藥者乎在腎又有他劑以瀉如龍膽防己為腎熱盛溺閉者所宜用也秋石為腎熱盛虛咳嗽溺閉者所必用也寒水石為腎熱盛口渴水腫者所必用也地骨皮為腎熱盛有汗骨蒸者所必用也食鹽為腎熱盛便閉者所必用也琥珀海石為腎熱盛血瘀溺秘者所必用也若使熱在於血則藥亦不出乎童便地骨皮血餘銀柴胡蒲公英生牛膝旱蓮草赤石脂自然銅古文錢青鹽之類而瀉膀胱熱結其用豬苓澤瀉地膚子茵陳黃柏黃芩龍膽川楝子藥者又可按其症治以考求矣此瀉腎熱之大概也脾熱瀉藥無多惟有脾經血熱考書有用郁李射干紫貝薑黃蓮藕皂礬蚯蚓然亦須辨藥症以治要之治病用藥須當分其臟腑然其是上是下毫微之處未可盡拘如藥既入於肺者未有不入於心入於肝者未有不入於脾入於腎者未有不入於膀胱且藥氣質輕清者上浮重濁者下降豈有浮左而不浮右重此而不重彼者乎但於形色氣味重此比較明確則藥自有圓通之趣又奚必拘拘於毫茫間互為較衡而致局其神智者乎牽牛蔓草入肺瀉氣分濕熱牽牛專入肺兼入大小腸有白有黑白者其性入肺專於上焦氣分除其濕熱故氣逆壅滯及大腸風秘者得此以治黑者其性兼入右腎能於下焦通其遏郁故腫滿腳氣及大小便秘俱得以治但下焦血分濕熱濕自下受宜用苦寒以折牽牛氣味辛辣久嚼雄烈服之最能泄肺若以下焦血病而於氣分有損之藥以為投治是以血病瀉氣不使氣血俱損乎杲曰牽牛少則動大便多則泄下如水乃瀉氣之味其味辛辣久嚼猛烈雄壯所謂苦寒安在哉故腫受濕氣不得施化致大小便不通斯宜用之若濕從下受下焦主血血中之濕宜苦寒之味反以辛藥泄之傷人元氣惟是水氣在肺喘滿腫脹等症暫用以為開泄俾氣自上達下而使二便頓開以快一時時珍曰一宗室夫人年幾六十平生苦腸結病旬日一行甚於生產服養血潤劑則泥膈不快服硝黃通利藥則若罔知如此三十餘年矣時珍診其人體肥膏粱而多憂鬱日吐酸痰盈碗許乃寬又多火病此乃三焦之氣壅滯有升無降津液皆化為痰飲不能下滋腸腑非血燥比也潤劑留滯硝黃徒入血分不能通氣俱為痰阻故無效也乃用牽牛末皂莢膏丸與服即便通利自是但覺腸結一服就順亦不妨食且復精爽也若果下焦虛腫虛字宜審還當佐以沉香補骨脂等味以為調補俾補瀉兼施而無偏陂損泄之害矣時珍曰外甥柳喬素多酒色病下極脹痛二便不通不能坐臥立哭呻吟者七晝夜醫用通利藥不效遣人叩予予思此乃濕熱之邪在精道壅脹隧路病在二陰之間故前阻小便後阻大便病不在大腸膀胱也乃用楝實茴香穿山甲諸藥入牽牛加倍水煎服一服而減三服而平取子淘去浮者舂去皮得木香乾姜良大黃毒草入胃下熱攻滯大黃專入脾胃大苦大寒性沉不降用走不守專入陽明胃府大腸大瀉陽邪內結宿食不消三承氣湯皆有大黃內入仲景治傷寒邪由太陽而入陽明之府者則用調胃承氣取其內有甘草之緩不令有傷胃府之意也治邪由陽明之經直入陽明之府者則用大承氣取其中有枳實之急得以破氣氣之壅也治邪由少陽之經而入陽明之府者則用小承氣取其中無芒硝之咸致令泄下以傷其胃也故凡傷寒邪入胃府而見日晡潮熱陽明旺於申酉譫語斑狂便秘硬痛手不可近喜按屬虛拒按屬實乃瘟熱瘴瘧下痢赤白腹痛裡急黃疸水腫積聚留飲宿食心腹痞滿二便不通與熱結血分一切癥瘕血燥血秘實熱等症用此皆能推陳致新定亂致治故昔人云有將軍之號成無己曰熱淫所勝以苦泄之大黃之苦以盪滌瘀熱下燥結而泄胃強然苦則傷氣寒則傷胃下則亡陰故必邪熱實結宿食不下用之得宜宗奭曰有是證者用之無不效惟在量其虛實而已頌曰梁武帝因發熱欲服大黃姚僧垣曰大黃乃是劫藥至尊年高不可輕用帝勿從幾至委頓梁元帝常有心腹疾諸醫咸謂宜用平藥可漸宣通僧垣曰脈洪而實此有宿妨非用大黃無瘥理帝從之遂愈今醫用一毒藥而攻眾病偶中便謂之神不中不語用藥之失可不戒哉若使病在上脘雖或宿食不消及見發熱只須枳實黃連以消痞熱宿食自通若誤用大黃推蕩不下反致熱結不消為害不淺時珍曰大黃病在五經血分者宜用之若在氣分用之是謂誅伐無過瀉心湯有大黃治心氣不足吐血衄血者乃真心之氣不足而心包肝脾胃之邪火有餘也雖曰瀉心實瀉四經血中之伏火也又仲景治心下痞滿按之軟者用大黃黃連瀉心湯主之此亦瀉脾胃之濕熱非瀉心也病發於陰而反下之則作痞滿乃寒傷營血邪氣乘虛結於上焦胃之上脘在於心故曰瀉心實瀉脾也素問云太陰所致為痞滿又曰濁氣在上則生䐜脹是也病發於陽而反下之則成結胸乃熱邪陷入血分亦在上脘分野仲景大陷胸湯丸皆用大黃亦瀉脾胃血分之邪而降其濁氣也若結胸在氣分則只用小陷胸湯痞滿在氣分則用半夏瀉心湯足矣或曰心氣不足而吐衄何以不用補心而反瀉心震亨曰心陰不足肺與肝俱各受火而病作故黃芩救肺黃連救肝肺者陰之主肝者心之母血之合也肝肺之火既退則陰復其舊矣仲景傷寒論云太陽病外症未解不可下脈浮大不可下惡寒不可下嘔多有陽明症不可下陽明病不能食攻其熱必嘔陽明病應汗反下之此為大逆太陽陽明合病喘而胸滿不可下少陰病陽虛尺脈弱者不可下脈數不可下惡水者不可下頭痛目黃者不可下虛家不可下陽微不可下諸四逆厥者不可下況先輩立藥治病原有成則如大黃芒硝則瀉腸胃之燥熱牽牛甘遂則瀉腸胃之濕熱巴豆硫黃則瀉胃之寒結也雖其所通則一而性實有不同當為分視至於老人虛秘腹脹少食婦人血枯陰虛寒熱脾氣痞積腎虛動氣及陰疽色白不起等症不可妄用以取虛虛之禍川產錦紋者良生用峻熟用純忌進穀食得穀食不能通利黃芩為使連翹隰草解心經熱邪連翹專入心味苦微寒質輕而浮書雖載瀉六經鬱火然其輕清氣浮實為瀉心要劑連翹形像似心但開有瓣心為火主心清則諸臟與之皆清矣然濕熱不除病症百出是以癰毒五淋寒熱鼠瘻瘰癧惡瘡熱結蠱毒等症書載皆能以治汪昂曰凡癰而痛者為實邪腫而不痛為虛邪腫而赤者為熱結腫而不結者為留氣痰飲且經有言諸痛瘡瘍皆屬心火連翹實為瘡家聖藥也然多用胃虛食少脾胃不足者慎之況清而無補癰疽潰後勿服火熱由於虛者忌投前胡山草降肝膽外感風邪痰火實結前胡專入肝膽味苦微寒功專下氣凡因風入肝膽火盛痰結暨氣實哮喘氣有餘便是火咳嗽嘔逆痞膈霍亂及小兒疳氣等症升藥難投須當用此苦泄俾邪去正復不似柴胡性主上升引邪外出而無實痰實氣固結於其中也按二胡均是風藥一升一降用各不同若使兼有外感風邪與痰火實結而用柴胡上升不亦如火益熱乎故必用此下降但症外感絕少只屬陰虛火動並氣不歸元胸脅逆滿者切忌以其苦泄故也皮白肉黑味甘氣香者良半夏為使惡皂莢忌火今有劑片以混當歸片料可恨白薇山草瀉肺燥熱白薇專入肺味苦而咸性寒無毒凡人陰虛火動則內熱生風火氣焚灼身體壯熱支滿痰湧忽不知人與夫汗出血厥痠痛淋閉其在婦人則或廷孔鬱結廷孔婦人溺孔也神無所依而見淋露不淨並血枯熱勝而見虛煩上嘔非不用此苦泄咸降利水使陰氣自上而下則熱何由泄乎是以金匱安中益氣竹皮丸用此以治婦人產中虛煩嘔逆經疏云古方調經種子往往用之益不孕緣於血熱而少其源起於真陰不足陽勝而內熱故營血日枯也益陰清熱則自生旺而有子矣須佐以歸地芍藥杜仲蓯蓉等藥千金葳蕤湯用此以治風溫身熱汗出身重又有白薇芍藥湯以治婦人遺尿白薇芍藥等分酒調服不拘胎前產後皆能補陰平陽而兼行肺以清膀胱上源並非虛寒不禁之比也但胃虛泄瀉陽氣外越者禁用似牛膝而短小柔軟去須酒洗用惡大黃大戟山茱薑棗白蘞蔓草散肝脾濕熱內結白蘞專入肝脾敷腫瘡瘍清熱解毒散結止痛久為外科所用要藥然目赤驚癇溫瘧陰腫滯下淋濁失精金瘡生血凡因濕熱濕毒而成者何一不可以為內科之用如金匱薯蕷丸用此以解風氣百疾蘊蓄張璐曰其湯全以桂枝湯和營散邪合理中湯兼理藥誤君以薯蕷大理脾肺毫不及乎補益腎肝又書載同地膚子則可以治淋濁失精同白芨則可以斂金瘡失血故曰血飲同甘草則可以解狼毒之毒豈盡癰腫解毒而已哉但此味辛入肺主散味苦主降味甘主緩故止可以散結解熱若胃氣虛弱癰疽已潰者均非所宜蔓赤莖有五葉根如卵長有三五枚同窠皮黑肉白代赭石為使反烏頭色赤為赤蘞功用皆同紫菀隰草瀉肺血熱紫菀專入肺辛苦而溫色赤雖入至高之臟仍兼下降故書載入肺金血分辛入肺赤入血能治虛癆咳嗽驚悸吐衄諸血又能通調水道苦可下降以治溺澀便血用此上下皆宜且此辛而不燥潤而不滯李士材比為金玉君子非多用獨用不能速效於肺實為有益然疏泄性多培養力少與桑白皮杏仁同為一類但桑白皮杏仁則瀉肺經氣分此則專瀉血經氣分也故肺虛乾咳禁用乾咳類多血虛不宜再瀉紫色潤軟者良人多以車前旋覆花亂之其藥雖分上中與下然下疏泄尤甚蜜炒用款冬為使白者名女菀入氣分大泄肺氣肘後方用此三分鉛丹一分並酸漿服一刀圭日進三服至二十一日能令面黑轉白過服不宜去頭須蜜水炒用款冬為使惡天雄瞿麥藁本遠志畏茵陳蘆根隰草瀉胃中熱嘔蘆根專入肺胃兼入心治無他奇惟清肺降火是其所能凡人胸中有熱則火升上嘔逆氣不下脾肺熱起則消渴便數甚至不能少忍金匱玉函治心膈氣滯煩悶不下食蘆根五兩銼以水三大盞煮服故必得此苦寒以治則諸症悉除汪昂曰肺為水之上源脾氣散精上歸於肺始能通調水道下輸膀胱腎為水臟而主二便三經有熱則小便數甚至不能少忍火性急速故也蘆中空故入心肺清上焦熱熱解則肺之氣化行而小便復其常道矣且解蝦魚中毒酒毒然此止宜實熱不宜虛寒若誤用之必致見害取逆水土內甘美者效若露出水面者損人去蘆節貫眾山草瀉熱殺蟲闢時行不正貫眾專入肝胃即俗稱為管仲者是也味苦微寒無毒世遇天時行不正之氣人多用此置之水缸使人食之不染且不獨力能解毒凡遇崩中帶下並癥瘕斑痘蟲蠱骨鯁皆可用之蓋以苦能殺蟲寒能散熱故也以諸症皆因熱成昔王璆百一選方言食鯉魚羹為骨所鯁百藥不效或令以貫眾煎濃汁連進一喀而出可見軟堅之功其殆若是之神矣形似狗脊而大汁能制三黃化五金伏鍾乳結沙制汞解毒軟堅青葙子隰草瀉肝經風熱青葙子專入肝即雞冠花子者是也備要又言即草決明味苦微寒無毒入足厥陰肝凡人一身風癢蟲疥得蝕口唇色青青盲翳腫多緣熱盛風熾所致亦有不盡風熱者此則專就風熱言書言服此目疾皆愈唇青即散三蟲皆殺風癢即絕無非因其血熱除寒能勝熱血脈和而病自可愈耳無他義也但瞳子散大者切忌以能助火類雞冠而穗尖長搗用竹茹苞木清肺涼胃解煩除嘔竹茹專入肺胃味甘而淡氣寒而滑凡因邪熱客肺肺金失養而致煩渴不寧膈噎嘔逆惡阻嘔吐吐血衄血等症者皆當服此諸症皆就肺胃熱論蓋味甘則中可安而煩不生味寒則熱得解而氣悉寧又皮入肺上焦溫膽湯用之所以金匱之治產後虛煩嘔逆則有竹皮大丸千金之治產後內虛煩熱短氣則有甘竹茹湯竹茹一升甘草茯苓黃芩各二兩水煎服產後虛煩頭痛短氣悶亂不解則有淡竹茹湯皆有至理內存不可不知取竹刮去外膜取二層如麻縷者良淡竹葉苞木清脾胃涼心止渴除煩竹葉專入胃心體輕氣薄味甘而淡氣寒微毒據書皆載涼心緩脾清痰止渴為治上焦風邪煩熱咳逆喘促嘔噦吐血一切中風驚癇等症杲曰除新久風邪之煩熱止喘逆氣勝之上衝無非因其輕能解上辛能散郁甘能緩脾涼能入心寒能療熱故耳然大要總屬清利之品合以石膏同治則能解除胃熱而不致煩渴不止也葉生竹上故治上焦仲景治傷寒發熱大渴有竹葉石膏湯乃假其辛寒以散陽明之熱邪也竹生一年嫩而有力者良心尤妙天竺黃苞木瀉心熱天竺黃專入心系天竺國之竹精氣結成其粉形如竹節味甘氣寒與竹瀝功用略同皆能逐痰利竅但此涼心去風除熱為小兒驚癇風熱痰湧失音較之竹瀝其性和緩而無寒滑之患也味甘故緩今市肆多骨灰葛粉雜入不可不辨秦皮喬木除肝熱瀉腎氣秦皮專入肝膽腎味苦氣寒色青性澀功專入肝以除熱入腎以澀氣是以因風而見濕痹驚癇目障之症者則當用此苦燥苦降之味以除因脫而見崩帶腸澼下痢之症者則當用此取澀寒氣以固如仲景白頭翁之用秦皮苦澀之類白頭翁黃柏黃連秦皮等分老子云天道貴澀惟澀故補服此不惟泄熱止脫而且益腎有子矣至治赤眼腫痛則合黃連等分頻點並秦皮一味煎湯以洗甚效或加滑石黃連等分出外臺秘要但此氣寒傷胃總不宜於胃虛少食之人耳出西上皮有白點漬水碧色書紙不脫者真大戟為使惡吳茱萸川楝子喬木解鬱熱狂燥疝瘕蠱毒川楝子專入心包小腸膀胱即苦楝子因出於川故以川名又名金鈴子楝實者是也味苦氣寒微毒凡人冬時感冒寒邪至春而發則為溫以致症見狂燥並疝瘕熱被寒束症見囊腫莖強掣引作痛與夫寒熱積聚積由五臟所生聚由六腑所成三蟲內蝕者俱宜用此調治有蟲耗其津液而渴須用此根葉加麝以投以苦主有泄熱之功寒有勝熱之義故能使熱悉除而毒蠱瘕疝亦得因其自心下降由於小便而乃泄矣但人止知此為除疝之味內經七疝曰沖曰㿗曰㿉癃曰狐曰㿉曰瘕曰厥而不知有逐熱解狂之力以至廢而不治即其治疝亦不分其是寒是熱是偏是平與夫偏有錯雜多寡之異其痛亦不分其所痛之處是否自下而上從上而下治病要在辨症惟計古方茴香川楝歷為治疝千古俎豆詎知疝屬於熱則痛必見囊腫莖強其痛亦必從下而上用以川楝納入以為嚮導則熱可除熱疝必用如其疝並非熱其痛自上而下痛引入腹且有厥逆吐涎非用辛溫不能見效若以川楝同入則於理不免岐而二矣寒疝不宜用然古人立方治疝偏以川楝同投其意奚似蓋緣邪有錯雜則治不得不爾若以錯雜之邪而概用以辛燥不更使病相左乎繡嘗語諸同人凡人用藥治病須當明其偏平偏症偏治平症平治錯雜多寡不一之症則即當以錯雜不一以治括盡治病種類昔繡治一族叔字次周陰疝其症是偏不平毫無一症混雜乃有附城一醫必執古方用以川楝繡謂病症不雜何須用是然終謂其古方所用川楝稽書何無一語活動間有指屬反佐亦無一語申明以致矇混不解書不盡言繡只據理投服隨手輒應而不為方所執及閱張璐本經逢原其辨川楝功用分為陰陽二疝及有錯雜之邪必用川楝之說始嘆理道本同而古人則先於我而獲繡益信己所治族叔之病而不敢用川楝者未始不有理存而竟所揆而如一也理終不易否則幾為古方所誤矣故凡疝因熱邪及因蠱蟲內蝕宜於川楝若使脾胃虛寒症屬陰疝則川楝其切忌焉楝以川產為正去皮取肉去核用根有雌雄二種雄根色赤無子大毒忌火雌根白子多微毒可採去青留白單味酒煎投服殺蟲治瘧煎湯洗之可治中蠱即時吐出茴香為使蒙花灌木消肝熱治青盲密蒙花專入肝因冬不凋花開蒙密故以蒙名甘而微寒功專入肝經除熱養營蓋肝開竅於目目得血而能視虛則青盲膚翳熱則赤腫眵淚目中赤脈及小兒痘瘡餘毒疳氣攻眼得此甘能補益寒能除熱肝血足而諸症無不愈矣然味薄於氣佐以養血之藥更有力焉取蜀中產者良酒浸一宿候乾蜜拌蒸曬三次柿蒂山藥斂內鬱熱起柿蒂專入肺胃味苦氣平時珍謂其苦溫似非雖與丁香同為止呃之味然一辛熱而一苦平合用深得寒熱兼濟之妙醫通本草謂濟生方治呃逆專取柿蒂之澀以斂內蘊之熱丁香生薑之辛以散外郁之寒如繫有寒無熱則丁香在所必用不得固執從治必當佐以柿蒂有熱無寒則柿蒂在所必需不得泥以兼濟之必雜以丁香是以古人用藥有合數味而見效者有單用一味而見效者要使藥與病對不致悖謬而枉施耳竹茹蘆根則較柿蒂性涼柿霜專清肺胃之熱能治咽喉口舌瘡痛腸風痔漏然必元氣未離始可投服若虛煩喘嗽切忌柿干同於柿霜但力少緩俱忌蟹梨山果瀉胃肺熱結梨專入肺胃成於秋花皆白得西方金氣之最味苦微酸氣寒無毒功專入肺與胃凡胸中熱結熱嗽痰咳便秘狂煩咽乾喉痛中風因熱反胃不食反胃有因熱成有因寒致不可不辨並湯火傷瘡癰疽目障丹石熱氣一切屬於熱成者惟食梨數枚即能轉重為輕消弭於無事總錄反胃轉食藥物不下用大雪梨一個以丁香十五粒刺入梨內紙裹煨熟聖惠方治小兒風熱昏懵燥悶不能食用消梨三枚切破同粳米煮粥以食時珍曰按類編云一士人狀若有疾厭厭無聊往謁楊吉老診之曰君熱症已極氣血消爍此去三年當以疽死士人不樂而去聞茅山有道士醫術通神而不欲自鳴乃衣僕衣詣山拜之願執薪水之役道士留置弟子中久之以實白道士道士診之笑曰汝便下山但日日吃好梨一顆如生梨已盡則取乾者泡湯食滓飲汁疾自當平士人如其戒經一歲復見吉老見其顏貌腴澤脈息和平驚曰君必遇異人不然豈有痊理士人備告吉老吉老具衣冠望茅山設拜自咎其學之未至此與瑣言之說彷彿觀夫二條則梨之功豈小補哉然惟乳梨鵝梨消梨可食余梨則亦不能去病也然必元氣素實大便素堅方可與食宗奭曰梨多食動脾少則不及病用梨者當斟酌之惟病酒煩渴人食之甚佳終不能卻疾若使元氣虛弱誤啖多致寒中蓋梨是冷利之物服之中益寒冷金瘡乳婦亦忌投服恐血得寒益凝豈可概謂能食而不審而別之乎搗汁熬膏良薑汁蜜制清痰止嗽用萊菔與梨相間收藏則不爛西瓜蓏解心胞胃熱止消渴西瓜專入心胞胃內穰今人遇值三伏天燥不論男婦大小朝夕恣食誠以燥渴之極得此味甘色赤能引心胞之熱下入小腸膀胱而出令其心胸頓冷煩渴冰消故書載治太陽膀胱陽明胃中暍及熱病大渴等病宜投如春溫夏熱等症並有天生白虎湯之譽惟是稟氣素厚遇熱消渴及伏氣發瘟得此如湯潑雪若以脾胃素虛恣服轉渴朝夕恣食必待膈滯上湧或瀉或腫或脹元陽已削方為覺誤悔莫及矣衛生歌云瓜桃生冷宜少食免至秋來成瘧痢又瓜本寒曝之寒氣益聚而寒矣猶之油性本熱經火煎熬則其性稍革而不熱矣因述此以為好食瓜者一箴銅青金瀉肝膽積熱除目翳銅青專入肝膽即俗所云銅綠者是也與空青所產不同銅青氣稟地陰英華外見藉醋結成故味苦酸澀氣寒能入肝膽二經按酸入肝而斂所以能合金瘡止血苦寒能除風熱所以能去膚赤及鼻息肉苦能泄結所以醋蘸喉中則吐風痰而使血氣心痛皆止為散能療喉痹牙疳醋調揩腋下治胡臭薑汁調點爛沿風眼錦囊用真川連三錢杏仁八粒去皮生用生甘草六分膽礬一分銅青三分大元棗一枚水煎乘熱搽眼去疳殺蟲所治皆厥陰之病時珍曰吐痰須觀人之虛實強弱而察其脈乃可投之海石石散上焦積熱軟下焦積塊海石專入肺腎即書所云浮石者是也其石系水沫結成浮於水上故以浮名色白體輕味鹹氣寒時珍曰其質玲瓏肺之象也蓋既有升上之能復有達下之力其曰能治上焦痰熱目翳痘癰者以其氣浮上達之謂也能治諸淋積塊癭瘤者以其咸潤軟堅之意也余琰席上腐談云肝屬木當浮而反沉肺屬金當沉而反浮何也肝實而肺虛也故石入水則沉而南海有浮水之石木入水則浮而南海有沉水之香虛實之反如此至於實則宜投虛則忌服者以其忌有克削之氣也味鹹者良煨過水飛用空青石瀉肝積熱除內外目翳空青專入肝感銅精氣而結故專入肝明目蓋人得水氣之清者為肝血其精英則為膽汁開竅於目血者五臟之英注之為神膽汁充則目明減則目昏銅亦清陽之氣所生其氣之清者為綠猶肝血也其精英為空青之漿猶膽汁也其為治目神藥蓋亦以類相感耳出時珍況人多怒則火起於肝水虛則火起於腎故生內外翳障得此甘酸大寒以除積熱及火兼之以酸則火自斂兼得金以平木故治赤腫青盲其空青所含之漿可取點眼殼亦磨翳要藥書云不怕人間多瞎眼只愁世上無空青但空青中水久則干必須驗其中空內有青綠如朱者即是如無綠青亦可不必拘泥聖濟錄治黑翳覆瞳用空青礬石燒各一兩貝子四枚研細日點石膏石清胃熱解肌發汗石膏專入胃腑兼入脾肺甘辛而淡體重而降其性大寒功專入胃清熱解肌發汗消郁緣傷寒邪入陽明胃府內郁不解則必日晡熱蒸口乾舌焦唇燥堅痛不解神昏譫語氣逆驚喘溺閉渴飲暨中暑自汗胃熱發斑牙痛等症皆當用此調治成無己曰風陽邪也寒陰邪也風喜傷陽寒喜傷陰營衛陰陽為風寒所傷則非輕劑所能獨散必須輕重之劑同散之乃得陰陽之邪俱去營衛之氣俱和是以大青龍湯以石膏為使石膏乃重劑而又專達肌表也以辛能發汗解熱甘能緩脾益氣生津止渴寒能清熱降火故也按石膏是足陽明府藥邪在胃府肺受火制故必用此辛寒以清肺氣所以有白虎之名肺主西方故也杲曰石膏足陽明藥也故仲景治傷寒陽明症身熱目痛口乾不眠以身以前胃之經也胸前肺之室也邪在陽明肺受火制所以有白虎之名但西有肅殺而無生長如不得已而用須中病即止切勿過食以損生氣時珍曰此皆少壯肺胃火盛能食而病者言也若衰暮及氣虛血虛胃弱者恐非所宜況有貌屬熱症里屬陰寒而見斑黃狂燥日晡潮熱便秘等症服之更須斟酌惟細就實明辨詳求其真可也汪昂曰按陰盛格陽陽盛格陰二症至為難辨蓋陰盛極而格陽於外外熱而內寒陽盛極而格陰於外外冷而內熱經所謂重陰必陽重陽必陰重寒則熱重熱則寒也當於小便分之便清者外雖燥熱而中實寒便赤者外雖厥冷而內實熱也再看口中之燥潤及舌胎之淺深胎黃黑者為熱宜白虎湯亦有胎黑屬寒者舌無芒刺口有津液急宜溫之誤投寒劑則殆矣又按熱在胃熱症見斑疹然必色赤如錦紋者為斑隱隱見紅點者為疹斑重而疹輕斑疹亦有陰陽陽症宜石膏又有內傷陰症見斑疹者微紅而稀少此胃氣極虛逼其無根之火遊行於外當補益氣血使中有主則氣不外遊血不外散若作熱治生死反掌醫者宜審取瑩白者良亦名寒水石非鹽精滲入土中結成之寒水石也研細或甘草水飛或火煅各隨本方用雞子為使忌豆鐵青鹽石除腎血分實熱青鹽專入腎兼入心即名戎鹽稟至陰之氣凝結而成不經煎煉生於涯涘之陰其味鹹氣寒無毒能入少陰腎臟以治血分實熱故凡病因腎起而見小便不通胃中瘀赤澀昏及吐血溺血齒舌出血牙齦熱痛暨蠱毒邪氣固結不解者宜以此味投治普濟方治風眼爛弦用戎鹽化水點之仲景金匱方治小便不通用戎鹽彈丸大一枚茯苓半斤白朮二兩水煎服之俾腎補而熱除鹹入而堅軟經曰熱淫於內治以鹹寒正此謂耳出西羌不假煎煅方稜明潤色青者良食鹽石補心潤腎軟堅除熱鹽專入心腎之品類甚多有生海江淮南北生池山西解州生井四川雲南生土戎鹽生階光明鹽生石石鹽生樹水鹽生草蓬鹽之各異然寒氣味則一鹽味鹹氣寒加以皂角末同煎則味又兼微辛五味惟咸潤下故凡大小便閉者得此則通五味惟咸走血故凡血熱血痛者得此則入五味惟鹹入骨故補腎藥必當鹽湯送下而諸骨筋痛藉此則堅骨消筋緩皆因濕熱所致經曰熱淫於內治以鹹寒譬如生肉易潰得鹽性寒咸則能堅久不壞時珍曰腎主骨鹹入骨也五味惟咸潤燥而辛又能泄肺故凡痰飲喘逆得此則降時珍曰吐藥用之者咸引水聚也能取豆腐與此同義五味惟咸軟堅故凡結核積聚得此則消五味惟咸補心故凡病因心起而見喜笑不休則當用此沸飲遏止用鹽煅赤而飲亦水制火之意至於癰腫惡毒眼目暴赤酒醉顛狂湯火急迫凡其因熱而起者無不藉此以寒勝熱主意而使諸症其悉平矣但咸雖能走血多食則血即凝咸雖下趨過咸則反水上吐所以霍亂臭毒頭疼腹痛等症則可引涎上膈而吐之也水腫如何忌食恐其以水助水之意也橫生逆生如何用鹽即便縮入正產千金方用鹽摩產婦腹並塗兒足底仍急爪搔之以其力有上舒之意也水蛭蚯蚓及蠱如何得此即化以其寓有以水濟火之意也孫真人治喉中生肉用綿裹筋頭拄鹽揩之日五六度聖惠方治帝鍾喉風垂長半寸煅食鹽頻點之即消多食如何口渴以其滲去胃中津液也朴硝石消臟腑熱邪固結朴硝專入腸胃兼入腎即皮硝生於鹵地刮取初次煎成為樸由樸再煎為芒其性最陰善於消物故以硝名其味苦而且辛凡五金八石用此俱能消除況人臟腑積聚乎然必熱邪深固閉結不解用以苦鹹以為削伐則藥與病符自不見礙時珍曰硝稟太陰之精水之子也氣寒味寒走血而潤下盪滌三焦腸胃實熱陽強之病乃折治火邪藥也好古曰硝利小便而墮胎然傷寒妊娠可下者用此兼大黃引之直入大腹潤燥耎堅瀉熱而母子俱安經云有故無殞亦無殞也此之謂歟以在下言之則便溺俱陰以前後言之則前氣後血以腎言之總主大小便難溺澀閉結俱為水少火盛成無己曰熱淫於內治以鹹寒佐之以苦故用芒硝大黃相須為用也汪昂曰豐城尉家有貓子死腹中啼叫欲絕醫以硝灌之死子即下後有一牛亦用此法得活如仲景大陷胸湯大承氣湯調胃承氣湯之類雖其用有大黃可以除熱然亦不得不假軟堅之藥耳若使病非實熱及或熱結不堅妄用承氣朴硝等以為消削其不傷人性命幾希唐時臘日賜群臣紫雪紅雪碧雪皆用此硝煉成者通治積熱諸病有神效貴在用者的中爾但朴硝初煎性急芒硝久煎差緩耳大黃為使玄明粉石瀉腸胃實熱玄明粉專入腸胃系芒硝再煎而成其色瑩白辛甘而冷功用等於芒硝皆有軟堅推陳致新之力陳不除則瀉痢不止用宜同大黃推蕩正書所云通因通用之意若熱閉不解亦當用此下奪然煅過多遍其性稍緩不似芒硝其力迅銳服之恐有傷血之虞耳王好古曰玄明粉治陰毒一切非伏陽在內不可用若用治真陰毒殺人甚速時珍曰神農本草言朴硝煉餌服之輕身神仙蓋方士竄入之言後人因此製為玄明粉煅煉多遍佐以甘草去其鹹寒之毒遇有三焦腸胃實熱積滯少年氣壯者量與服之亦有速效若脾胃虛冷及陰虛火動者服之是速其咎矣若佐甘草同投則膈上熱痰胃中實熱腸中宿熱又克見其治矣兼洗眼目消腫繡族兄式和用玄明粉搽眼初覺一二次甚明召繡同搽繡揣眼病非熱不得用是因未允越後族兄屢擦屢壞始信余言不謬忌苦參寒水石石解火熱利水道寒水石專入胃腎又名凝水石又名白水石生於鹵地因鹽精滲入土中年久結聚清瑩有稜而成也味辛而咸氣寒無毒書載能治時行大熱口渴水腫蓋以性稟純陰故也經曰熱淫於內治以鹹寒又曰小熱之氣涼以和之大熱之氣寒以收之服此治熱利水適相宜耳永類方男女轉脬不得小便寒水石二兩滑石一兩葵子一合水煎即利易簡方湯火傷用寒水石燒研敷經驗方小兒丹毒皮膚熱赤用寒水石半兩白土一分為末醋調塗然此止可暫治有餘之邪及敷湯火水傷若虛人熱浮其切忌焉瑩白含之即化者真否即是偽但真者絕少雪水天水解熱消燥雪水專入胃氣稟太陰水極似土雖於冬時置而不問然值傷寒陽毒瘟疫時毒丹毒內熾並盛夏暑熱內淫而見燥熱殆甚者並可用此調治宗奭曰臘雪水大寒之水也故治以上諸病且能以解燒酒諸毒是以書載凡治熱症可用塊置於兩乳之間且云宋徽宗因食冰過甚致病醫士楊介仍以冰煎諸藥以治其源深得用冰義耳因知病因冰起還以冰解之也孩兒茶井清上膈熱痰孩兒茶專入心肺味苦微澀性涼無毒功專清上膈熱化痰生津收濕涼血生肌凡一切口瘡喉痹時行瘟瘴煩燥口渴並一切吐血衄血便血尿血血痢及婦人崩淋經血不止陰疳痔腫者服之立能見效出南番是細茶末入竹筒理土中日久取出搗汁熬成塊小潤澤者上大而枯者次之真偽莫辨氣質莫考用宜慎之熊膽獸涼心平肝熊膽專入心肝兼入脾大腸味苦性寒無毒功專涼心平肝惟其涼心所以能治心痛疰忤熱邪等症惟其平肝所以能治目赤翳障惡瘡痔漏等症且能入脾而治黃疸濕邪入大腸而治久痢疳䘌濕熱並治小兒風痰壅塞發作驚癇要皆除熱涼血而病自愈耳凡此只可作丸勿煎湯通明者佳但以米粒之多點水出運轉如飛者良性善闢塵撲塵水上投膽少許則塵豁然而開又取少許研滴水中掛如線直至水底不散者真鱧魚膽無鱗魚鱧魚肉補脾利水鱧魚膽瀉心脾熱治喉痹鱧魚膽專入心脾即屬烏鱧又名七星魚者是也其物伏土勝水味甘性寒無毒凡人身患十種水氣垂死可用肉與冬瓜蔥白以治且煮湯浴兒可以稀痘楊拱醫方摘要曰除夕黃昏時用大烏魚一尾小者二三尾煮湯浴兒遍身七竅俱到不可嫌腥以清水洗去也若不信但留一手一足不洗遇出痘時則未洗處偏多也此乃異人所傳不可輕易膽味書雖載甘日華曰諸魚膽苦惟此膽甘可食為異也臘月收取然嘗之終苦凡喉痹將死者點入即愈病深者水調灌之亦可石決明蚌蛤入肝除熱磨翳石決明專入肝一名千里光得水中陰氣以生其形如蚌而扁味鹹氣寒無毒入足厥陰肝經除熱為磨翳消障之品緣熱熾則風必生風生則血被風阻而障以起久而固結不解非不用此鹹寒軟堅逐瘀清熱祛風則熱何能祛乎故本事真珠母丸與龍齒同用皆取清散肝經積熱也但此須與養血藥同入方能取效且此氣味鹹平入服消伐過當不無寒中之弊耳亦治骨蒸勞熱五淋汪昂曰能清肝肺故也研細水飛點目能消外瘴痘後眼翳可同穀精草等分細研豬肝蘸食即退七孔九孔者良鹽水煮麵裹煨熟為末水飛惡旋覆珍珠蚌蛤除心肝熱邪及脾腎濕熱珍珠專入心肝兼入脾胃即蚌所生之珠也珠稟太陰精氣而成故中秋無月則蚌即無珠也此藥馮楚瞻辨論最詳謂其功用多入陰經其色光明其體堅硬大小無定要以新完未經鑽綴者為尚味甘微咸氣寒無毒入手少陰心經足厥陰肝經蓋心虛有熱則神氣浮游肝虛有熱則目生翳障目為肝竅除二經之熱故能鎮心明目也耳聾本屬腎虛有熱耳為腎竅甘寒所以主之逆臚者臚脹也胸腹氣逆脹滿以及手足皮膚皆腫也經曰諸濕腫滿皆屬脾土諸滿脹大皆屬於熱此脾虛有熱兼有積滯所致珍珠味甘既能益脾寒能除熱體堅復能磨積消滯故亦主之珠藏於澤則川自媚況塗於面寧不令人潤澤顏色乎至於疔毒癰腫長肉生肌尤臻奇效但體最堅硬研如飛面方堪服食否則傷人臟腑外摻肌肉作疼蚌蛤無陰陽牝牡故珠專一於陰精也金汁人入解胃腑熱毒金汁專入胃系取糞入鐔埋於土內三年取出瑩清如水者是耳味苦氣寒置於土中時久得其土氣最厚故能入胃大解熱毒凡濕熱時行毒勢沖迫勢危莫制者用此灌之下咽稍減以其氣味相投故能直入其巢而破其毒耳的解即初生小兒周時內毒氣方張用此服一二分既能化毒且能免後痘疹此最靈驗但稟體氣寒體瘦色白者不可誤用恐其反奪天真耳不可不審灌花用此最良秋石人滌腎熱秋石專入腎本於人溺因秋露水攪澄曬乾刮取而成故名秋石味鹹氣溫據書載能滋陰潤臟退蒸軟堅治癆止嗽通溺利便澀精固氣且云經火煅煉去其鹹寒轉為溫補溫而不燥潤而不滯清不損元降不敗胃為滋陰降火之聖藥為精火兩衰而用然繡竊謂補處少而清處多溫處少而寒處多溫止由於火煅而非溺中濁氣具有溫補之性也虛勞火重服此似不甚礙以其具有清火之性耳間有微功亦非補中正劑補中惟參耆補火惟附桂滋水惟地茱乃補中正劑耳若使氣薄火衰水泛縱經煅煉終不免有虛虛之禍矣大黃縱經煅煉亦不能以補命門之火以其氣質本寒故也法於秋時取童便每缸用石膏七錢桑攪澄傾去清液如此二三次乃入秋露水攪澄如此數次穢淨咸減以重紙鋪上曬乾刮去在下重濁取輕清為秋石再研入罐鐵盞蓋定鹽泥固濟升打升起盞上者名秋水味淡而香乃秋石之精英也瀉火趙養葵曰真火者立命之本為十二經之主腎無此則不能以作強而伎巧不出矣膀胱無此則三焦之氣不化而水道不行矣脾胃無此則不能腐水穀而五味不出矣肝膽無此則將軍無決斷而謀慮不出矣大小腸無此則變化不行而二便閉矣心無此則神明昏而萬事不應知治病者的宜以命門真火為君主而加意以火之一字觀此則火不宜瀉也明矣而丹溪又言氣有餘便是火使火而果有餘則火亦能為害烏在而不瀉乎惟是火之所發本有其基藥之所主自有其治氣味不明則治罔不差如大黃是瀉脾火之藥故便閉硬痛其必用焉石膏茅根是瀉脾胃之藥口渴燥熱其必用焉黃芩生地是瀉肺火之藥膈熱血燥效各呈焉火盛則痰與氣交窒是有宜於栝蔞花粉火盛則水與氣必阻是有宜於桑白皮火盛則骨必蒸是有宜於地骨皮火盛則三焦之熱皆並是有宜於梔子火盛則肺化源不清是有宜於天冬麥冬火盛則必狂越躁亂是有宜於羚羊角火盛則氣必逆而嗽是有宜於枇杷葉火盛則必挾胃火氣上呃是有宜於竹茹此非同為瀉肺之藥乎黃連犀角是瀉心火之藥也燥熱濕蒸時疫斑黃治各著焉火盛則小腸必燥是有宜於木通燈草火盛則喉必痹而痛是有宜於山豆根火盛則目必翳而障是有宜於熊膽火盛則心必煩燥懊憹是有宜於梔子火盛則口必渴而煩是有宜於竹葉火盛則肺失其養是有宜於麥門冬火盛則血必妄沸是有宜於童便生地火盛則憂鬱時懷是有宜於萱草此非同為瀉心之藥乎至於青黛膽草號為瀉肝之火然必果有實熱實火者方宜若止因火而見抽掣則鉤藤有難廢矣因火而見目障則熊膽其莫除矣因火而見骨蒸則青蒿草其必須矣因火而見驚癇骨痛則羚羊角其必用矣因火而見口舌諸瘡則人中白其必進矣因火而見時疾斑毒喉痹則大青其亟尚矣因火而見寒熱往來則黃芩其必用矣此非同為瀉肝之用乎而膽火之必用以膽草大青青黛者可思若在腎火症見骨蒸勞熱不得不用黃柏症見咽痛不止不得不用玄參症見楊梅惡毒不得不用胡連症見頭目不清痰涎不消不得不用茶茗症見火留骨筋不得不用青蒿草症見無汗骨蒸不得不用地骨皮此非同為瀉腎藥乎而膀胱火起之必用以人中白童便及三焦火起之必用以青蒿草梔子者又自可驗諸火之瀉當分臟腑如此但用而不顧其病症之符臟氣之合則其為禍最速可不深思而長慮乎黃芩山草清上中二焦火熱與濕黃芩專入心脾肺兼入肝大腸膀胱書載味苦入心又載入肺瀉火入脾除濕入大腸以治腸澼腹痛痢為腸澼凡痢有寒有熱痢屬於熱則其形氣堅強脈必滑實有力身則畏熱喜冷不欲衣被渴則恣好冷水愈涼愈快隨飲隨消小便熱赤澀痛不堪下痢純紅痛則便硬拒按並或頭疼身熱筋骨痠痛此其症之實者也痢屬於寒則其形體薄弱顏色清白脈雖緊數而無力無神脈即真弦而中虛似實血則微紅不鮮及或雜有紫紅紫白屋漏水形所下之物或淺黃色淡不甚臭穢痛則不實不堅或喜揉按或喜暖熨或胸腹如飢而不欲食或胃脘作嘔而多吞酸或數至圊欲出不出或口雖渴而不欲飲冷飲冷而不欲咽此其症之虛者也入小腸膀胱以治淋閉且治中焦實火及邪在少陽膽經得此以為清理一藥而上下表里皆治其功力之泛涉殆有難為專主者耳不知內火沖激外邪傳入皆能恣害上如胸膈咽喉下如肚腹二便中如表裡之所陰陽之界無不病症悉形以故腹痛腸澼痢寒熱往來瘧黃疸淋閉胸高氣喘癰疽瘡瘍火嗽喉腥經閉胎漏口渴津枯一皆濕之所淫熱之所侵火之所勝提出濕熱與火為諸病之要黃芩味苦性寒枯而大者輕飄上升以清肺肺清則痰自理矣汪昂曰痰因火動當先降火實而細者沉重下降以利便便利則腸澼自去酒炒則膈熱可除而肝膽火熄生用則實熱堪投而腹痛斯愈時珍曰仲景治少陽症小柴胡湯太陽少陽合病下痢黃芩湯少陽症下後心下滿而不痛瀉心湯並用之蓋黃芩味苦氣寒色黃而綠瀉心火而除脾濕俾金不受胃火上刑故能救肺少陽之症雖曰病在半表半裡為胸脅痞滿實兼心肺上焦之邪心煩喜嘔默默不欲飲食又兼脾胃中焦之症故用黃芩以治手足少陽相火黃芩亦少陽本經藥也楊士瀛直指方云柴胡退熱不及黃芩蓋亦不知柴胡之退熱乃苦以發之散火之標也黃芩之退熱乃寒能勝熱折火之本也且得白朮砂仁以安胎得厚朴黃連以除腹痛得芍藥以治痢得柴胡以治寒熱往來此雖合上與下表裡皆治而究止為上中二焦瀉火除熱與濕之味矣東垣治肺熱身如火燎煩燥引飲而晝盛者宜一味黃芩湯以瀉肺經氣分之火方用黃芩一兩但肺虛腹痛屬寒者切忌時珍曰肺虛不宜者苦寒傷脾胃損其母也黃明者良中虛者為枯芩即片芩內實者名條芩即子芩上行酒炒瀉肝膽火豬膽汁炒山藥龍骨為使畏丹皮丹砂黃連山草大瀉心火實熱黃連專入心兼入腸胃脾大苦大寒據書所載治功備極表著且以別錄中有厚腸胃一語互為傳播以至於今謬尤莫闢貽害無窮詎知黃連止屬瀉心之品除濕之味好古曰黃連苦燥苦入心火就燥瀉心者其實瀉脾也實則瀉其子也即云腸澼能止口乾能除痞滿腹痛能消癰疽瘡瘍能愈肝虛能鎮與夫婦人陰蝕小兒疳積併火眼赤痛吐血衄血諸毒等症無不由此調治亦何莫不因濕熱火退而言豈於濕除火退之外尚有治效之著哉元素曰黃連其用有六瀉心臟火一也去中焦濕熱二也諸瘡必用三也去風濕四也赤眼暴發五也止中部見血六也朱震亨曰下痢胃口熱噤口者用黃連人參煎湯終日呷之如吐再強飲但得一呷下咽便好劉完素曰古方以黃連為治痢之最蓋治痢惟宜辛苦寒藥辛能發散開通鬱結苦能燥濕寒能勝熱使氣宣平而已諸苦寒藥多泄惟黃連黃柏性冷而燥能降火去濕而能瀉痢故治痢以之為君杲曰凡眼暴發赤腫痛不可忍者宜黃連當歸以酒浸煎之宿食不消心下痞滿者須用黃連枳實況此性稟純陰在人腸胃素厚挾有燥濕火熱服之過多尚有偏性為害而致胃陽頓絕生氣澌滅宗奭曰今人多用黃連治痢蓋執以苦燥之義下俚但見腸虛滲泄微似有血便即用之又不顧寒熱多少惟欲盡劑由是多致危困時珍曰黃連大苦大寒之藥用之降火燥濕中病即當止豈可久服使肅殺之令常行而伐其生髮沖和之氣乎秦觀與喬希聖論黃連書云聞公以眼疾餌黃連至十數兩猶不已殆不可也醫經有久服黃連苦參反熱之說此雖大寒其味至苦入胃則先歸於心久而不已心火偏勝則熱乃其理也矧有脾陽素弱因此一言流播而可恃為常服者乎今人一見火熾不論是寒是熱是虛是實輒以取投以致偏勝貽患暗受夭折殊堪嘆惜時珍曰黃連治目及痢為要藥古方治痢香連丸用黃連木香姜連散用乾薑黃連變通散用黃連茱萸薑黃散用黃連生薑治消渴用酒蒸黃連治伏暑用酒煮黃連治下血用黃連大蒜治肝火用黃連茱萸治口瘡用黃連細辛皆是一冷一熱一陰一陽寒熱互用之意而無偏勝之害汪昂曰黃連瀉心火佐以龍膽瀉肝膽火白芍瀉脾火石膏瀉胃火知母瀉腎火黃柏瀉膀胱火木通瀉小腸火黃芩瀉肺火梔子佐之瀉大腸火黃連佐之柴胡瀉肝膽火黃連佐之瀉三焦火黃芩佐之繡按柴胡瀉火止就肝膽邪鬱而言若內實火用此愈增其害矣不可不知出四川瘦小狀類鷹爪連爪連珠者良薑汁炒心火生用虛火醋炒用膽火豬膽汁炒上焦火酒炒中焦火薑汁炒下焦火鹽水炒或童便炒食積火黃土炒濕熱在氣分吳茱萸湯炒在血分乾漆水炒眼赤人乳炒黃芩龍骨為使惡菊花玄參殭蠶白蘚皮畏款冬花牛膝忌豬肉亦有不忌者如臟連丸黃連豬肚丸之類胡黃連山草大瀉臟腑骨髓淫火熱邪胡黃連專入臟腑骨髓出於波斯國近時秦隴南海亦有氣味功用亦同黃連因以連名但此性專達下大伐臟腑骨髓淫火熱邪凡骨髓勞熱五心煩熱三消五痔溫瘧瀉痢惡毒等症皆得以治經曰心移熱於肺為膈消是渴而多飲上消肺熱症也又曰二陽結而為消是多食善飢中消胃熱症也渴而小便數有膏為下消腎熱症也又按經言痔因飽食經脈橫解腸澼為痔又言督脈生病痔漏又按書言痔有牝痔牡痔脈痔腸痔血痔之分皆濕熱下流傷於血分無所施泄則逼肛門而為痔腫故同豬胰以療楊梅惡瘡且同乾薑以治小兒果積同雞肝以治小兒疳眼同烏梅以治小兒血痢同甘草豬胰以治黴瘡又治婦人胎蒸較之黃連治功同而稍異耳但小兒腎臟不足脾胃虛寒者其切忌焉心黑外黃折之塵出如煙者真畏惡同黃連知母山草治肺久伏熱邪以清化知母專入肺兼入腎辛苦微滑能佐黃柏以治膀胱熱邪緣人水腫癃閉本有屬血屬氣之分肺伏熱邪不能生水膀胱絕其化源便秘而渴此當清肺以利水者也熱結膀胱真陰乾涸陽無以化便秘不渴此當清膀胱以導濕者也黃柏氣味純寒雖能下行以除膀胱濕熱但肺金不肅則化源無滋又安能上達於肺而得氣分俱肅乎知母味辛而苦沉中有浮降中有升既能下佐黃柏以泄腎水復能上行以潤心肺汪昂曰黃柏入二經血分故二藥必相須而行俾氣清肺肅而濕熱得解是以昔人有云黃柏無知母猶水母之無蝦誠以見其金水同源子母一義不可或離之義震亨曰小便不通有熱有濕有氣結於下宜清宜燥宜升又有隔二隔三之治如肺不燥但膀胱熱宜瀉膀胱此正治如因肺熱不能生水則清肺此隔二之治如因脾濕不運而津不上升故肺不能生水則燥胃健脾此隔三之治瀉膀胱黃柏知母之類清肺車前茯苓之類燥脾二術之類故書皆言用此在上則能清肺止渴卻頭痛潤心肺解虛煩喘嗽吐血衄血去喉中腥臭在中則能退胃火平消癉在下則能利小水潤大腸去膀胱肝腎濕熱腰腳腫痛並治癆瘵內熱陰火熱淋崩渴等症若謂力能補陰則大謬矣補陰惟地黃為首景岳謂此性最沉寒本無生氣用以清火則可的解用以補陰則何補之有第其陰柔巽順似乎有德猶之小人在朝國家元氣受其剝削而有陰移而莫之覺者是不可不見之真而辨之早也讀此可為妄用知母黃柏一箴得酒良上行酒浸下行鹽水拌忌鐵青黛隰草大瀉肝經鬱火青黛專入肝系藍靛浮沫攪澄掠出取干而成味鹹性寒色青大瀉肝經實火及散肝經火鬱衍義曰一婦患臍腹二陰遍生濕瘡熱癢而痛出黃汗二便澀用鰻鱺松脂黃丹之類塗之熱痛愈甚其婦嗜酒喜食魚蝦發風之物乃用馬齒莧四兩研爛入青黛一兩和塗熱痛皆去仍服八正散而愈此中下焦蓄蘊風熱毒氣若不出當作腸風內痔婦不能禁酒物果仍發痔故凡小兒風熱驚癇疳毒丹熱癰瘡蛇犬等毒金瘡血出噎膈蟲食並天行頭痛瘟疫熱毒發斑吐血咯血痢血等症或應作丸為衣或用為末干滲或同水調敷或入湯同服或作餅子投治如聖餅子治咯血用青黛同杏仁研置柿餅中煨食皆取苦寒之性以散風鬱燥結之義即云功與藍等而止血拔毒之功與治膈化蠱之力似較藍而更勝也和溺白垽冰片吹口疳最妙取嬌碧者水飛淨石灰用藍靛兼有石灰敷瘡殺蟲最奇蠱屬下膈非此不除藍葉與莖即名大青大瀉肝膽實火以祛心胃熱毒故於時疾陽毒發斑喉痹等症最利斑由裡實表虛而得故斑得以透肌斑如疹子者其熱輕斑如錦紋者其熱重斑如紫黑者其熱重而胃爛也古治赤斑煩疼有犀角大青湯藍子止能解毒除疳故於鬼疫蠱毒之症最妙龍膽草山草大瀉肝膽實火兼除腎經濕熱龍膽草專入肝膽兼入膀胱腎大苦大寒性稟純陰大瀉肝膽火邪時珍曰相火寄在肝膽有瀉無補故龍膽之益肝膽之氣正以其能瀉肝膽之邪熱也兼入膀胱腎經除下焦濕熱與防己功用相同故書載治骨間寒熱驚癇蠱膈天行瘟疫熱利疸黃寒濕腳氣腳氣因足傷於寒濕而成但腫而痛者為濕腳氣宜清熱利濕搜風拘攣枯細痛而不腫者名乾腳氣宜養血潤燥咽喉風痹並酒炒同柴胡則治赤睛胬肉汪昂曰目疾初起宜發散忌用涼藥但此苦寒至極馮兆張云其等於嚴冬黯淡慘肅萬草凋殘苦寒伐標宜暫而不宜久如聖世不廢刑罰所以佐德意之無窮苟非氣壯實熱者率爾輕投其敗也必矣甘草水浸暴用小豆貫眾為使惡地黃玄參山草制腎浮游之火攻於咽喉玄參專入腎苦鹹微寒色黑入腎書雖載能壯水以制浮游無根之火攻於咽喉腎脈貫肝膈入肺中循喉嚨系舌本凡腎水虛損相火上炎者多有喉痹咽腫咳嗽吐血等症謂其腎水受傷真陰失守孤陽無根發為火病得此色黑性潤微寒以為節制則陽得陰歸而咽喉不致腫痛而莫已也然此只可暫治以熄其火非若地黃性稟純陰力能溫腎壯水以制陽光即書有言服此玄參可以益精明目消痰除嗽及治一切骨蒸傳屍發斑發斑有陰有陽此止就陽毒言耳懊憹煩渴瘰癧癰疽等症皆是從其浮游火熄起見而言病無不治非真真陰虧損必藉此以為之壯玄參其性微寒故止可以折火不能以滋陰若使病非火起則服此寒滑之味不更使病轉劇乎是以書載脾虛泄瀉服此黑參為大忌耳蒸過焙用勿犯鐵器惡黃耆山茱薑棗反藜蘆射干毒草瀉火清熱解毒散血消痰射干專入心脾肝形如烏羽烏扇又以烏羽烏扇為名辛苦微寒書載瀉火解毒散血消痰然究毒之所胎血之所聚痰之所積又皆因火結聚而成歸到火處為重射干苦能降火寒能勝熱兼因味辛上散俾火降熱除而血與痰與毒與不因之而平矣是以喉痹咽痛結核疝瘕便毒瘧母等症因於老血結於心脾痰涎積於太陰厥陰者肺脾肝無不可以調治如金匱之治咳氣之用射干麻黃治瘧母鱉甲煎丸用烏扇燒過千金之治喉痹用烏扇膏擂汁醋和噙之治便毒之用射干同生姜煎服皆取性主善降功多於上服則必瀉之意若脾胃虛寒切忌泔浸煮熟炒用天冬蔓草消肺火以為化源之自天門冬專入肺甘苦大寒據書載瀉肺火及兼補腎然究止屬苦寒安能滋腎而補水乎的解所云能補水者以肺本清虛涼則氣寧而不擾熱則氣行而不生且肺為腎母肺金失養則腎亦燥而不寧腎氣上攻則肺益燥而受克而凡咳嗽吐衄痰結燥渴肺癰肺痿等症靡不因之畢呈肺癰本於五臟蘊火及胃積熱上蒸與外感風寒內傷營血熱結而成痿則本於津液枯竭不能上輸於肺及風熱傷衛而致氣竭力疲故癰則為陽實而痿則為陰虛癰則邪傷於營故唾有血而無沫而便多下膿垢痿則邪傷於衛故唾有沫而無血而便多下濁沫癰則口中辟辟作燥而渴痿則口中不燥而步武喘鳴衝擊連聲而痰始應癰則胸中隱隱作痛痿則胸中不痛而氣餒不振癰則脈數而實痿則脈數而虛癰則宜表宜下痿則宜滋宜潤治法因於內者從內酌治因於外者從外酌解因於虛者養血補氣保肺因於實者瀉熱豁痰開提升降得此清肅之品以為化源之自則腎未必即補而補腎之基未必不於所清而先具也是以又云補腎但其性滑利脾胃虛寒及無熱而泄者最忌苦泄熱寒勝熱若無熱而泄則不得用取肥大明亮者良去心皮酒蒸用地黃貝母為使惡鯉魚二冬熬膏良丹皮芳草瀉腎血分實熱治無汗骨蒸牡丹皮專入心腎肝辛苦微寒能入手少陰心足少陰腎足厥陰肝以治三經血中伏火時珍曰伏火即陰火也陰火即相火也相火熾則血必枯必燥必滯與火上浮而見為吐為衄汪昂曰血屬陰本靜因相火所逼故越出上竅虛損與風與痰與火相摶而見五癆驚癇瘛瘲瘛則筋急而縮瘲則筋緩而伸或伸或縮手如拽鋸謂之瘛瘲即俗所謂為搐驚則外有所觸心無所主癇則卒然昏僕身軟吐痰時發時止五癆一曰志癆二曰心癆三曰思癆四曰憂癆五曰疫癆瘀結而見瘡瘍癰毒產難並無汗骨蒸陰虛又兼邪郁故見無汗骨蒸用此不特味辛而散血中之實熱且有涼相火之神功世人專以黃柏治相火而不知丹皮之功更勝蓋黃柏惡寒而燥初則傷胃久則敗陽苦燥之性徒存而補陰之功絕少丹皮赤色象離能瀉陰中之火使火退而陰生所以入足少陰而佐滋補之用較之黃柏不啻霄壤矣張元素曰丹皮治無汗之骨蒸地骨皮治有汗之骨蒸神不足者手少陰心志不足者足少陰腎仲景腎氣丸用丹皮治神志不足也內經曰水之精為志故腎藏志火之精為神故心藏神但補性少而泄性多凡虛寒血崩經行過期不盡者為並禁焉赤者利血白者兼補氣酒拌蒸用忌蒜胡荽伏砒黃柏喬木大瀉腎火及除膀胱濕邪黃柏專入腎兼入膀胱昔人同知母用於六味丸中名為知柏八味丸又同知柏各一兩酒洗焙研入桂名為滋腎丸時珍曰知佐黃柏滋陰降火有金水相生之義古云黃柏無知母猶水母之無蝦也蓋黃柏能制命門膀胱陰中之火知母能清肺金滋腎水之化源謂其可滋真陰此說一出而天下翕然宗之以至於今牢不可破詎知黃柏性稟至陰味苦性寒行隆冬肅殺之令故獨入少陰瀉火入膀胱瀉熱好古曰黃芩梔子入肺黃連入心黃柏入腎燥濕所歸各從其類也震亨曰火有二君火者人火也心火也可以濕伏可以水滅可以直折黃連之屬可以制之相火者天火也龍雷之火也陰火也不可以水濕折之當從其性而伏之惟黃柏之屬可以降之凡人病因火亢而見骨蒸勞熱目赤耳鳴消渴便閉及濕熱為病而見諸痿癱瘓癱瘓本有氣虛血虛脾虛腎虛濕痰死血之別但因熱傷血血不養筋而致耎短而拘濕則傷筋筋不束骨而致弛長而痿宜用蒼朮黃柏名二妙散以治水瀉熱利黃疸水腫杲曰長安王善夫病小便不通漸成中滿腹堅如石腳腿裂破出水雙睛凸出飲食不下痛苦莫可名狀治通利小便滲泄之藥服遍矣予診之曰此乃奉養太過膏粱積熱損傷腎水致膀胱久而乾枯涸小便不化火又逆上而為嘔噦難經所謂關則不得小便格則吐逆者遂處以北方大苦寒之劑黃柏知母各一兩酒洗焙研入桂一錢為引為丸每服二百丸少焉前陰如刀刺火燒湧如瀑泉湧出床下成流顧盼之間腫脹消散矣痔血瘍風漏下赤白皆濕熱為病與夫諸痛瘡癢蛔蟲內攻外臺治口舌生瘡用黃柏含之良深師用蜜漬取汁含之吐蛔寇氏衍義治心脾有熱舌頰生瘡用蜜炙黃柏青黛各一分為末入生龍腦一字摻之吐涎越筵散用黃柏細辛等分為末摻或用黃柏乾薑等分亦良但用良藥不效者須察脈症或因中氣不足虛火上炎宜用參朮甘草乾姜附子之類或噙官桂引火歸元診其尺果洪大按之有力可炒黑暫用使其濕熱順流而下陰火因爾潛伏則陰不受煎熬而陰乃得長矣非謂真陰虛損服此即有滋潤之力也發明曰非真能補也腎苦燥急食辛以潤之腎欲堅急食苦以堅之也相火退而腎固則無狂蕩之患矣按腎本屬水虛則熱心本屬火虛則寒故於實熱實火則宜時珍曰東垣丹溪皆以黃柏為滋腎降火要藥上古所未言也蓋氣為陽血為陰邪火煎熬則陰血漸涸故陰虛火動之病須之然必少壯氣盛能食者用之相宜而於虛熱虛火則徒有損而無益時珍曰若中氣不足而邪火熾盛者久服則有寒中之變近時虛損及縱欲求嗣之人用補陰藥往往以此二味為君日日服餌降令太過脾胃受傷真陽暗損精氣不暖致生他病蓋不知此苦寒而滑泄且苦味久服有反從火化之害故葉氏醫學統旨有四物加知母黃柏久服傷胃不能生陰之戒汪昂曰按火有虛火實火燥火濕火相火鬱火之異虛火宜補實火宜瀉燥火宜滋潤鬱火宜升發濕火由濕鬱為熱多病胕腫經所謂諸腹脹大皆屬於熱諸病胕腫皆屬於火是也宜利濕清熱而兼補脾相火寄於肝腎乃龍雷之火非苦寒所能勝宜滋腎養血壯水之主以制陽光又按諸病之中火症為多有本經自病者如忿怒生肝火焦思生心火之類是也有子母相剋者如心火克肺金肝火克脾土之類是也有臟腑相移者如肺火咳嗽久則移熱於大腸而泄瀉心火煩焦久則移熱於小腸而為淋閉之類是也又有別經相移者有數經合病者當從其重者而治之奈今天下人不問虛實竟有為去熱治勞之妙藥而不知陰寒之性能損人氣減人食命門真元之火一見而消亡脾胃運行之職一見而沮喪元氣既虛又用苦寒遏絕生機莫此為甚川產肉厚色深者良生用降實火蜜炙則不傷胃炒黑能止崩帶酒製治上蜜制治中鹽制治下桑白皮灌木瀉肺火利水通氣桑白皮專入肺辛甘性寒善入肺中氣分瀉火利水除痰泄氣緣氣與水與痰止屬病標其氣逆不利與水飲膠結未有不因火結而成羅謙甫曰是瀉肺中火邪非瀉肺氣也火與元氣不兩立火去則氣得安矣久而不治則瘀結便秘喘嗽胸滿唾血口渴水腫臚脹靡不色色而見桑白皮辛甘而寒能於肺中治火利水俾火去而水自消水去而火即滅而氣因爾而治時珍曰桑白皮長於利小水乃實則瀉其子也故肺中有水氣及肺火有餘者宜之十劑云燥可去濕桑白皮赤小豆之屬是也宋醫錢乙治肺氣熱盛咳嗽而後喘面腫身熱瀉白散用桑白皮炒一兩地骨皮焙一兩甘草炒半兩每服一二錢入粳米百粒水煎食後溫服桑白皮地骨皮皆能瀉火從小便去甘草瀉火而緩中粳米清肺而養血此乃瀉肺諸方之準繩也至書有云能補元氣之不足不過云其氣得自安若以甘寒之味可以補氣則當置甘溫於何地乎況本草十劑篇云燥可去濕桑白皮赤小豆之屬是也故濕則為重宜燥劑以除之燥字從濕去重除之後而言勿泥燥熱之燥看但此性寒而裂其裂亦作寒裂雖有甘味不能以制故古人有戒勿多用之條及肺虛火衰水涸風寒作嗽者為切忌焉為線可縫金瘡刮去皮取白或恐瀉氣蜜炙用續斷桂心為使忌鐵桑乃箕木之精其木能開關利水扎把燃火則能去風除痹故煎藥熬膏宜用時珍曰煎藥用桑者取其能利關節除風寒濕痹諸痛也觀靈樞經治寒痹內熱用桂酒法以桑炭炙布巾熨痹處治口僻用馬膏法以桑鉤鉤其口及坐桑灰上皆取此意也又癰疽發背不起發或瘀肉不腐潰及陰瘡瘰癧流注臁瘡頑瘡惡瘡久不愈者用桑木炙法未潰則拔毒止痛已潰則補接陽氣亦取桑通關節去風寒火性暢達出郁毒之意其法以干桑木劈成細片扎作小把燃火吹息炙患處每吹炙片時以瘀肉腐動為度內服補托藥誠良方也桑椹甘涼色黑治能除熱養陰止瀉烏須黑髮月令云四月宜飲桑椹酒能理百種風又椹可以汁熬燒酒藏之經年味力愈佳桑耳散血除瘀破症攻瘕桑葉清肺瀉胃涼血燥濕去風明目聖濟錄治吐血不止晚桑葉焙研涼茶服三錢只一服止後用補肝肺藥千金方治頭髮不長用桑葉麻葉煮泔水沐之七次可長數尺集簡治風眼下淚用臘月不落桑葉煎湯日日溫洗或入芒硝扶桑丸除風濕烏須明目用黑芝麻同桑葉等分為丸震亨曰經霜桑葉研末米飲服止盜汗山梔子灌木治心肺熱邪曲屈下行梔子專入心肺味苦大寒輕飄象肺色赤入心書言能瀉心肺熱邪使之屈曲下從小便而出肺清則氣化行而膀胱津液亦得由氣化而化故曰能利小便究之皆瀉肺心藥耳而三焦之鬱火以解熱厥心痛以平心痛因熱治當用此但丹溪謂心痛久則鬱而成熱此止就其大勢論耳若使痛喜手按及痛喜飲熱湯其痛雖久豈可以作熱治乎仍當以臟之陰陽及今所見之兼症兼脈以分病之是寒是熱藥之宜溫宜涼則得之矣不可以痛久成熱為泥吐衄血淋血痢之病以息梔子止治熱鬱之血耳若經寒而血不歸不可妄用本草匯曰治實火之血順氣為先氣行則血自歸經治虛火之血養正為先氣壯則能自攝血繡竊見今醫士不論寒熱虛實但見病血即作熱治妄用梔連芩柏殊為可惜且能治心煩懊五黃五淋亡血津枯口噤目赤風瘡等症此數語業已道其大要矣然更就其輕清以推則浮而上者其治亦上故能治心肺之火而凡在上而見消渴煩燥懊憹不眠頭痛目赤腫痛等症得此以除煩屬氣燥屬血仲景梔子豉湯用梔子以治肺煩用香豉以治腎燥又用梔子作吐藥以散在膈之邪即經所謂高者因而越之是也故梔豉湯吐虛煩客熱瓜蒂散吐痰食宿食就其味苦而論則苦而下者其治亦下故能瀉肝腎膀胱之火而凡在下而見淋閉便結疸黃疝氣吐衄血痢損傷血瘀等症得此以泄易簡方治衄血不止用山梔子燒灰吹之屢效普濟方治小便不通用梔子仁十四個獨蒜頭一個食鹽少許搗貼臍及囊良久即通怪症奇方治吃飯直出用梔子二十四個微炒去皮水煎服食療本草治下痢鮮血用梔子仁燒灰水服一錢匙繡按此惟實邪實熱則宜耳惟其氣浮故仲景用此以吐上焦之痰滯惟其味苦能降故丹溪用此以降內郁之邪耳但治上宜生治下宜炒宜黑雖其上下皆入而究則由自肺達下故能旁及而皆治者也此惟實邪實熱則宜若使並非實熱概為通用恐不免有損食泄瀉之虞矣生用瀉火炒黑止血薑汁炒止煩嘔內熱用仁表熱用皮地骨皮灌木入肺降火入腎涼血涼骨地骨皮專入肺腎即枸杞根也味甘氣寒雖與丹皮同治骨蒸之劑但丹皮味辛能治無汗骨蒸此屬味甘能治有汗骨蒸且丹皮原屬入血散瘀之品汗者血也無汗而見血瘀則於辛於寒最宜若有汗骨蒸而更用以丹皮辛散不竟使奪汗無血乎經曰熱淫於內瀉以甘寒地骨皮是也按地骨皮入肺降火入腎涼血涼骨凡五內熱淫而見肌肉潮熱二便癃閉胸脅痛楚與夫於頭而見風痛不休外感之風宜散邪內生之風宜清熱熱除而風自熄於表而見潮熱無定是內熏蒸而達於表朱二允曰能退內潮人所知也能退外潮人實不知病或風寒散而未盡作潮往來非柴葛所能治用地骨皮走表又走里之藥消其浮游之邪服之未有不愈者特表而出之於肺而見消渴咳嗽不寧腎火上蒸靡不用此解除今人但知芩連以治上焦之火知柏以治下焦之火而不知地骨皮之甘淡微寒深得補陰退熱之義矣時珍常以青蒿佐此退熱屢有殊功李東垣曰地為陰骨為里皮為表服此既治內熱不生而於表裡浮游之邪無有不愈此為表裡上下皆治之藥而於下為尤切焉但脾胃虛寒者禁服汪昂曰腸滑者忌枸杞子中寒者忌地骨皮掘鮮者同鮮小薊煎濃汁治下疳甚妙甘草水浸用枇杷葉山果瀉肺降氣枇杷葉專入肺味苦氣平諸書皆言瀉肺治嗽緣嗽多由胃氣不和肺氣不順以致火氣痰塞因而咳嗽不已丹溪云氣有餘便是火火起則痰生服此味苦而平則肺金清肅而氣不得上逆而順矣氣順則痰與火皆順痰氣火同為一類而逆者不逆嘔者不嘔咳者不咳渴者不渴是以昔人用此合以款冬花紫菀杏仁桑皮木通等分大黃減半蜜丸以治肺熱火嗽身如火炎令其食後夜臥含化一丸劑未終而病即愈則知此為清肺治火止嗽之要劑也取葉乾重三錢者為氣足拭淨毛以免射肺作咳鹽或姜炙或蜜炙各依方用茶茗味清胃腎火茶茗專入胃腎大者為茗小者為茶茶稟天地至清之氣得春露以培生意克足纖芥滓穢不受味甘氣寒故能入肺清痰利水入心清熱解毒是以垢膩能滌炙爆能解凡一切食積不化屬滯屬濕頭目不清屬熱痰涎不消二便不利消渴不止及一切便血吐血衄血血痢火傷目疾等症服之皆能有效湯液云茶苦寒下行如何是清頭目蒙筌曰熱下降則上自清矣但熱服則宜冷服聚痰多服少睡損神久服瘦人傷精至於空心飲茶既直入腎削火復於脾胃生寒陽臟服之無礙陰臟服之不宜萬不宜服茶之產處甚多有以陽羨名者謂之真岩茶治能降火以清頭目有以臘茶名者以其經冬過臘佐劉寄奴治便血最效有以菘蘿名者是生於徽專於化食有以日鑄名者生於浙紹專於清火有以建茶名者生於閩地專於闢瘴有以苦丁名者產於六合專於止痢有以普洱名者生於滇南專於消食闢瘴止痢至於蒙山世所罕有且有許多偽充真偽莫辨然大要總屬導痰宣滯之品茶與生薑同煎名薑茶散能治赤白痢蓋茶助陰姜助陽合用使其寒熱平調雖一日之利暫快而終身之累斯大損多益少服宜慎矣犀角獸清胃大熱兼涼心血犀角專入胃兼入心苦鹹大寒功專入胃清熱及入心涼血蓋胃為水穀之海無物不受口鼻為陽明之竅凡毒邪必先由於口鼻而入以至及於陽明胃腑時珍曰五臟六腑皆稟氣於胃風邪熱毒必先干之飲食藥物必先入胃犀角為神靈之獸食百草之毒及眾木之棘角尖精力盡聚用此苦寒之性使之專入陽明以清諸熱百毒也熱邪既去心經自明所以狂言妄語熱毒癰腫驚煩目赤吐血衄血蓄血時疫斑黃痘瘡黑陷等症無不由於入胃入心散邪清熱涼血解毒之功也然痘瘡心火初用不無冰伏之虞後用不無引毒入心之患故必慎用始無礙耳至於蠱毒之鄉遇有飲食以犀箸攪之有毒則生白沫無毒則無若云可以發表取汗則必毒熱閉表合以升發等味同投則見魄汗淋漓若微毒單用則不及矣鎊成以熱掌摸之香者真尤須烏而光潤不香者假成器多被蒸煮無力入湯劑磨汁入丸劑銼細納懷中待熱搗之立碎升麻為使忌鹽羚羊角獸專瀉肝火兼清心肺羚羊角專入肝兼入心肺苦鹹大寒功專入肝瀉火兼入心肺二經考書所論主治多屬冗統惟李時珍剖晰甚明言羊火畜也而羚羊則屬木故其角入厥陰肝經甚捷同氣相求也肝主木開竅於目其發病也目暗障翳而羚羊角能平之肝主風在合為筋其發病也小兒驚癇婦人子癇大人中氣搐搦及筋脈攣急歷節掣痛而羚羊角能舒之魂者肝之神也發病則驚駭下寧狂越僻謬魘寐卒死而羚羊角能安之血者肝之臟也發病則瘀滯下注疝痛毒痢瘡腫瘰癧產後血氣而羚羊角能散之相火寄於肝膽在氣為怒病則煩懣氣逆噎塞不通寒熱及傷寒伏熱而羚羊角能降之羚之性靈而筋骨之精在角故又能辟惡而解諸毒碎佛牙而燒煙走蛇虺也本經別錄甚著其功而近俗罕能發揚惜哉時珍之論如此但此雖能清肝及肺若使過用久用則更有伐生之氣耳多兩角一角者勝若一邊有節而疏乃山驢山羊非羚羊也銼研極細或磨用人中白人瀉肝膀胱火人中白專入肝膀胱即溺白垽之物故以白名味鹹氣平能瀉肝經膀胱火邪使之盡從小便而出蓋膀胱系溺白之故道用此正以由其故道耳今人病口舌諸瘡用之有效降火之驗也張杲醫說云李士常苦鼻衄僅存喘息張思順用人中白散即時血止又延陵鎮官魯棠鼻衄如傾白衣變紅頭空空然張潤之用人中白藥治之即止並不再作此皆散血之驗也故可以治癆熱消渴痘瘡倒陷牙疳口瘡等症但僅堪以滌熱清火而不可以言補耳煅研用刮取白新瓦上煅童便人清火降血童便專入膀胱兼入肺胃肝心系孩童津液濁氣滲入膀胱而出味鹹氣寒無毒為除癆熱骨蒸咳嗽吐血婦人產後血衄暈悶絕之聖藥褚澄遺書云降火甚速降血甚神飲溲溺百不一死非真不死甚言功力之優也又言人喉有竅則咳血殺人喉不停物毫髮必咳血既滲入愈滲愈咳愈咳愈滲經云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱故人服小便入胃亦隨脾之氣上歸於肺下通水道而入膀胱乃尋其舊路也故能治肺病引火下行凡人精氣清者為氣濁者為血濁之清者為津液濁之濁者為小便與血同類也故味鹹而走血鹹寒能伏虛熱使火不上炎血不妄溢是以能療諸血證也凡人久嗽失音勞渴煩燥吐衄損傷皮膚皴裂人咬火燒絞腸痧痛難產胞衣不下法當乘熱飲之薛已云予在居庸見覆車被傷七人仆地吟呻俱令灌此皆得無事凡一切傷損不問壯弱及有無瘀血俱宜服此若脅脹或作痛或發熱煩燥口渴惟服此一味勝似他藥他藥雖效恐有瘀血反致誤人童便不動臟腑不傷氣血萬無一失軍中多用此屢試有效蓋熱則尚存真氣其行自速冷則惟有鹹味寒性矣若救陰卻癆必以童便為優蓋取混元之氣清純而不淆雜耳但胃寒食少者切忌今人類用秋石雖亦能入腎除熱但經水澄火煉真元之氣全失其功不及童便多矣況多服久服則咸能走血令血凝氣滯為病矧有陽氣素虛食少腸滑者其可用之為治乎取童子十歲以下相火未動不食葷腥酸鹹者佳去頭尾取中間一節清徹如水者用痰用薑汁瘀用韭汁冬月用湯溫之下氣氣者人身之寶周流一身傾刻無間稍有或乖即為病矣治之者惟有保之養之順之和之使之氣常自若豈有降伐其氣而使不克自由哉然河間謂人五志過極皆為火丹溪謂人氣有餘便是火則是氣過之極亦為人身大患也是以氣之虛者宜補氣之降者宜升氣之閉者宜通氣之郁迫者宜寬氣之郁者宜泄氣之散者宜斂氣之脫者宜固氣之實而堅者則又宜破宜降宜下而已蓋氣之源發於腎統於脾而氣之出由於肺則降之藥每出於肺居多而腎與脾與肝止偶見其一二而已如馬兜鈴非因入肺散寒清熱而降其氣乎蘇子非因入肺寬胸消痰止嗽定喘而下其氣乎杏仁非因入肺開散風寒而下其氣乎枇杷葉非因入肺瀉熱而降其氣乎葶藶非因入肺消水而下其氣乎桑白皮非因入肺瀉火利水而通其氣乎旋覆花非因入肺消痰除結而下其氣乎栝蔞花粉非因入肺消痰清火而下其氣乎續隨子非因入肺而瀉濕中之滯乎枳殼非因入肺寬胸開膈而破其氣乎若在枳實降氣則在胸膈之下三稜破氣則在肝經血分之中赭石則入心肝二經涼血解熱而氣得石以壓而平郁李則入脾中下氣而兼行水破瘀山甲則破癰毒結聚之氣而血亦消蕎麥則消腸中積滯之氣炒熟萊菔子則下肺喘而消脾滯至於沉香補骨脂是引腎真火收納歸宅黑鉛是引腎真水收納歸宅皆能下氣定喘凡此皆屬降劑一有錯誤生死反掌治之者可不熟思而詳辨乎荊三稜芳草破肝經血分之氣三稜專入肝味苦氣平皮黑肉白大破肝經血分之氣故凡一切血瘀氣結瘡硬食停老塊堅積靡不藉此味苦入以血分行其氣滯俾血自氣而下但此若以血藥同投則於血可通以氣藥同入則於氣可治仍須和以補氣健脾之味方良汪昂曰昔有人患症癖死遺言開腹取之得病塊如石文理五色削成刀柄因刈三稜柄消成水繡按其人患癖腹內血塊雖有但云削成刀柄不無誑誕若使專用克伐則胃氣愈虛氣反不行而積增大矣出荊地色黃體重若鯽魚而小者良今世所用皆草三稜醋浸炒或麵裹煨旋覆花隰草下肺氣消痰結旋覆花專入肺大腸即本經所名金沸草者是也其性雖兼辛溫凡陰虛勞嗽風熱燥咳不可誤用用之其嗽必甚究之味苦而咸性主下降凡心脾伏飲脅下脹滿胸上痰結唾如膠漆風氣濕痹皮間死肉服之即能有效更能續筋敷傷筋斷搗汁滴傷處以滓敷上半月即愈時珍曰凡藤蔓之屬象人之筋所以多治筋病旋覆花藤細如筋可啖故能續筋敷傷是以仲景之治傷寒汗下後心下痞堅噫氣不除有旋覆代赭石湯噫氣即噯氣也經曰五氣所病心為噫又曰寒氣客於胃厥逆從下上散復出於胃故為噫噫氣多屬胃氣虛弱三焦失職清無所歸濁無所降然亦有痰有火有食仲景立此方以治傷寒汗下後胃虛內用人參甘草以扶正薑棗以和中旋覆花旋轉陰中阻格之陽升而上達赭石使戀陽留滯之陰降而下行然後參甘大棗可收補虛之功生薑半夏可奏開痞之效並金匱半產漏下有旋覆花湯胡洽治痰飲在兩脅脹滿有旋覆花湯皆取苦能下氣故耳惟其性專主下故書皆載病衰弱大腸虛寒者切忌以其不禁再下故也五月五日採花曬乾去皮蒂蕊殼用杏仁五果散肺氣分風寒下氣除喘杏仁專入肺既有發散風寒之能復有下氣除喘之力緣辛則散邪苦則下氣潤則通秘溫則宣滯行痰杏仁氣味俱備故凡肺經感受風寒而見喘嗽咳逆胸滿便秘煩熱頭痛與夫蠱毒瘡瘍狗毒面毒錫毒金瘡無不可以調治按醫余云索麵豆粉近杏仁則爛是杏仁能消其積也狗咬傷瘡冠氏方用爛嚼杏仁以塗即愈是杏仁能解狗毒也諸瘡腫痛用杏仁去皮研攄取膏入輕粉麻油調搽神效是杏仁能治瘡瘍毒也目中翳遮但瞳子不破聖濟錄用杏仁三升去皮麵裹作三包糖火煨熟去面研爛壓去油每用一錢入銅綠一錢研勻點之是杏仁能治目翳也東垣論杏仁與紫菀均屬宣肺除郁開溺而一主於肺經之血紫菀一主於肺經之氣杏仁杏仁與桃仁俱治便秘而一治其脈浮氣喘便秘於晝而見杏仁一治其脈沉狂發便閉於夜而見桃仁馮楚瞻論杏仁栝蔞均屬除痰而一從腠理中發散以祛故表虛者最忌杏仁一從腸胃中清利以除故里虛者切忌栝蔞諸藥貌雖相同而究實有分辨不可不細審而詳察也但用杏仁以治便秘須用陳皮以佐則氣始通杲曰脈浮者屬氣用杏仁陳皮脈沉者屬血用桃仁陳皮肺與大腸為表裡賁門在胃口之上上主往來魄門即肛門主收納為氣之通道故並用陳皮佐之至書所言久服令人鬚眉發落亦是耗氣之故今人以此混治陰虛喘嗽及於亡血家妄投其亦未明耗氣損血之義也乎去皮尖炒研發散連皮尖研雙仁者殺人得火良惡黃耆黃芩葛根枳殼灌木除胸膈以下滯氣枳殼專入肺胃兼入大腸苦酸微寒功專下氣開胸利肺開胃凡人或因風寒食滯熱積濕停氣鬱而見咳嗽胸滿便閉痰癖癥結嘔逆水腫脅痛瀉痢痔腫腸風濕痹等症治皆能除至書有云枳殼益氣明目似屬誑誕但人臟腑本貴清利清利則氣自益而目自明枳殼體大氣散的解較之枳實功雖稍遜而利氣寬胸謂之益氣非其宜乎王好古曰枳實佐以參朮乾薑則益氣佐以硝黃牽牛則破氣此本經所以言益氣而復言消痞也但多用則能以損胸中至高之氣雖束胎瘦胎亦有進用枳殼之味昔湖陽公主難產方士進瘦胎飲用枳殼四兩甘草二兩五月後日服一錢潔古改以枳朮名束胎丸然必氣實可投若使氣虛而用則不免有虛虛之禍矣寇宗奭謂瘦胎束胎二藥予甚不然蓋孕婦全賴血氣以養胎血氣充實胎乃易生彼公主奉養太過氣實有餘故可服之若概施則誤矣時珍曰八九月胎氣盛壅滯用枳殼蘇梗以順氣胎前無滯則產後無虛也氣弱者大非所宜矣陳者良枳實灌木枳實專入脾胃氣味與枳殼苦酸微寒無異但實小性酷下氣較殼最迅故書載有推牆倒壁之功不似枳殼體大氣散而僅為利肺開胸寬腸之味耳是以氣在胸中則用枳殼氣在胸下則用枳實氣滯則用枳殼氣堅則用枳實雖古有云枳殼治氣枳實治血然氣行則血自通究皆利氣之品而非通血之劑耳故同白朮則可調脾同大黃則可推蕩時珍曰蓋自飛門至魄門皆肺主之三焦相通一氣而已若氣虛痞滿而用枳實枳殼則與抱薪救火者無異矣蕎麥麻麥稻降氣寬腸消積蕎麥專入腸胃味甘性寒治能降氣寬腸消積去穢凡白帶白濁泄痢痘瘡潰爛湯火灼傷氣盛濕熱等症是其所宜且炒焦熱水沖服以治絞腸痧腹痛醋調塗之以治小兒丹毒赤腫亦妙蓋以味甘入腸性寒瀉熱氣動而降能使五臟滓滯皆煉而去也俗言一年沉積在腸胃者即去也若使脾胃虛弱不堪服食食則令人頭眩作面和豬羊肉食食則令人鬚眉脫落又不可合黃魚以食皆是其性動降之故時珍曰蕎麥最降氣寬腸故能煉腸胃滓滯而治濁帶泄痢腹痛上氣之疾氣盛有濕熱者宜之麥稈燒灰淋汁即鹼用化石灰能去靨肉平瀉平瀉者從輕酌瀉之意也凡人臟氣不固或犯實邪不瀉則養虎胎患過瀉則真元有損故僅酌其微苦微寒至平至輕之劑以進如瀉脾胃虛熱不必過用硝黃但取石斛輕淡以瀉脾茅根以瀉胃柿蒂以斂胃蘊熱邪粳米甘米甘涼以固中而已瀉肺不必進用黃芩知母但用沙參清肺火熱百部除肺寒鬱百合清肺餘熱薏苡仁清肺理濕枇杷葉清肺下氣金銀花清肺解毒而已瀉肝不必進用膽草青黛但用鱉甲入肝清血積熱消勞除蒸旱蓮草入肝涼血青蒿草清三焦陰火伏留骨節白芍入肝斂氣鉤藤入肝清熱除風而已瀉心不必黃連山梔但用麥冬清心以寧肺連翹清心以解毒竹葉清心以滌煩萱草清心以醒憂利水鬱金入心以散瘀丹參入心以破血而已瀉腎不必進用黃柏童便知母但用丹皮以除無汗骨蒸地骨皮以除有汗骨蒸而已至於調劑陰陽則或用以陰陽水止嗽消渴解毒則或用以薺苨散瘀行血則或用以蒲黃沒藥苦酒開鬱則或用以木賊蒙花穀精草而已凡此雖屬平劑但用之得宜自有起死回生之力未可忽為淺常已也沙參山草肺火薰蒸沙參專入肺甘苦而淡性寒體輕故能入肺以泄熱及瀉肺火凡久嗽肺萎金受火克者服此最宜蓋以熱氣熏蒸非用甘苦輕淡不能以制焚爍之勢故嗽必藉此止若寒客肺中作嗽切勿妄用以嗽既屬寒成復以寒藥為治不更使寒益甚乎至書有言補肺養肝及益脾腎皆是從肺子母受累推究而出服此肺不受刑子母皆安即肝亦不受累諸臟並見安和耳非真能以補陰也熱在於肺宜用肺熱清而陰不受累故書言人參補五臟之陽沙參補五臟之陰凡書所載藥性補瀉類多如斯不獨沙參為然似人參而體輕鬆白實者良生沙地長大生黃土者瘦小惡防己反藜蘆薏苡仁稷粟清肺熱除脾濕薏苡仁專入肺脾胃書載上清肺熱下理脾濕以其色白入肺性寒瀉熱味甘入脾味淡滲濕故也然此升少降多凡虛火上乘而見肺痿肺癰因熱生濕而見水腫濕痹腳氣疝氣泄痢熱淋並風熱筋急拘攣等症皆能利水而使筋不縱弛筋為厥陰所主而亦藉於陽明胃土以為長養蓋陽明胃土內無濕熱以淫則肺上不熏蒸焦葉而宗筋亦潤宗筋潤則筋骨束而機關利所以痿厥多因肺熱焦葉機關不利而治痿則獨取於陽明故薏苡清熱除濕實為治痿要藥震亨曰寒則筋急熱則筋縮急因於堅強縮因於短促若受濕則弛弛則引長然寒與濕未嘗不挾熱三者皆因於濕然外濕非內濕啟之不能成病故濕之為病因酒而魚肉繼之甘滑陳久燒炙並辛香皆致濕之因也筋急寒熱皆有因熱筋急當用薏苡清熱除濕因寒筋急法當散寒除濕似不宜用薏苡瀉熱之劑汪昂不然衍義之說亦非確論非若白朮氣味苦溫寒性不見號為補脾要藥矣此止清熱利水之味用於湯劑性力和緩須倍他藥若津枯便秘陰寒轉筋及有孕婦女不宜妄用以性專下泄也殺蛔取根同糯米炒熟或鹽湯煮過用麥冬隰草清心肺火麥冬專入心肺有類天冬然麥冬甘味甚多寒性差少天冬所主在肺而麥冬所主則更在肺而在心是以書載功能消痰止嗽治嗽須分外感內傷如外感則聲盛而濁先緩後急日夜無度痰涎稠黏而喘急內傷則聲怯而槁先急後緩或早甚或暮甚清痰小氣而喘乏外感則其發必暴或為寒熱或為氣逆或為鼻塞聲重頭痛輕者脈亦相緩重者脈見弦洪內傷其發有漸或素有勞積虛損日漸以甚其症或為寒熱潮熱或為形容瘦減或兩顴常赤或氣短喉干其脈輕亦微數重必細數弦緊解熱除煩去痿除嘔痿按經言肺熱葉焦皮毛虛弱急薄以著則生為足弱不能以行之症心熱火炎下厥而生脛縱不能任地之症肝熱口苦血乾而成拘攣筋痿之症脾熱胃干而渴肌肉不仁發為肉痿之症腎熱腰脊不舉骨枯髓減發為骨痿之症獨肺熱而葉焦高源化絕而諸臟不得仰肺灌溉故痿獨推於肺而治痿又責重於陽明而又載同人參則能復脈生津名生脈散非合心肺而皆治乎蓋肺朝於百脈脈屬心心燥則肺失養而脈絕心清則氣即充而脈復麥冬氣稟清肅能於心中除煩肺清則水得生而心不煩譬如人當盛暑則燔灼不寧若值秋風一至則炎熱頓解而無燥郁不堪之候矣東垣曰人參甘寒瀉火熱而益元氣麥冬苦寒滋燥金而清水源五味酸溫瀉丙火而補庚金益五臟之氣也至於乳汁不開用此則能通活熱血妄行用此則能即止他如膈上之稠痰得此則消心下之支滿得此則除脾有積熱則化胃有火嘔則止色因血枯即潤嗽久不止即愈誠保肺之津梁清心之指南也但氣寒而虛人禁用肥大者良去心用入滋補藥酒浸地黃車前為使惡款冬畏苦參青葙木耳百部蔓草除肺寒泄腸熱殺蟲止嗽百部專入肺甘苦微溫功專殺蟲能除一切蠱毒及傳屍骨蒸樹木蛀蟲疳積疥癬蟲觸煙即死然亦能治寒嗽及泄肺熱以其氣味甘溫故也李時珍云二冬亦屬治嗽但二冬性寒治熱此則氣溫治寒耳百部雖云微溫而苦過於甘於氣總屬有礙似於虛人不宜苦傷氣不可不知根多成百故以百名取肥實者竹刀劈去心皮酒浸焙用百合柔滑清心肺餘熱百合專入心肺甘淡微寒功有利於肺心而能斂氣養心安神定魄朱二允曰百合之甘斂勝於五味之酸收然究止屬清邪除熱利濕之品因其氣味稍緩且於甘中有收故於心肺最宜而不致與血有礙耳是以餘熱未靖坐臥不安咳嗽不已朱二允曰久嗽之人肺氣必虛虛則宜斂涕淚不收涕淚系肝肺之邪有寒有熱當察其因不可概作熱治但此專就餘熱言經曰肺為涕肝為淚心為汗脾為涎腎為唾胸浮氣脹狀有鬼神用此治其餘孽收其殘虜安養撫卹恩威不驟故能安享無事豈非寧神益氣之謂乎仲景用此以治百合病症義亦由此但初嗽不宜遽用花白者入藥石斛石草入脾除虛熱入腎澀元氣石斛專入脾腎生於石上體瘦不肥色黃如金旁枝如釵甘淡微苦鹹平故能入脾而除虛熱入腎而澀元氣及能堅筋骨強腰膝凡骨痿痹弱囊濕精少小便餘瀝者最宜以其本生於石體堅質硬故能補虛弱強筋助骨也但形瘦無汁味淡難出非經久熬氣味莫泄故止可入平劑或熬膏用之為良以治虛熱補性雖有亦惟在人諒病輕重施用可耳取光潤如金釵股短中實者良長而虛者名水斛不堪入藥去頭根酒浸用惡巴豆畏殭蠶鉤藤蔓草治心熱祛肝風鉤藤專入心肝味甘微苦氣平微寒為手少陰心厥陰肝經要藥緣肝主風心主火風火相煽則風因火而愈熾火亦因風而益盛其在小兒則病必在驚癇瘛瘲眼翻抽掣筋急而縮為瘛筋緩而弛為瘲伸縮不已為瘛瘲俗謂之搐搦是也大人則病必見頭旋目眩婦人則病必見赤白帶下故必用此輕平宣泄認為下降則風靜火熄而驚風熱自爾其克除矣藤類象筋故抽掣病由筋生者必為之用此惟小兒風熱初熱病未見甚者用之得宜若使風火至極勢難驟遏則此輕平疏泄效難克奏又當細審所因用以重劑以為投服則藥始與病當而無病重藥輕之弊矣取藤細多鉤者良鉤尤有力但久煎則無力白茅根山草清胃火消瘀血利水道茅根專入胃肝味甘性寒清熱瀉火消瘀利水凡苦寒之藥未有不傷氣敗胃此藥味甘性純專理血病凡一切吐血衄血血瘀血淋血崩血閉並噦逆喘急煩渴黃疸水腫等症因熱因火而成者服之熱除而血即理火退而氣與水即消矣吐血由於心肝火旺逼而上行與衄血由於肺火所致皆當用此水煎溫服或為末米泔水調服且能解酒毒恐爛五臟用茅根汁飲一升潰癰疽及癤毒諸瘡或用根搗敷或用此煮汁調敷毒等藥或以酒煮亦無不可此藥甘不泥膈寒不傷中為治虛羸客犯中州之劑時珍曰良藥也世人以微而忽之惟事苦寒之劑傷中和之氣烏足知此哉至云能以補中益氣雖出本經然亦不過因其胃熱既除而中氣自復豈真補益之謂哉經解之說似未可信茅以白者為良初生茅針可以生啖甚益小兒功用亦同屋上敗茅止衄敷瘡最妙青蒿隰草清肝腎三焦陰火伏留骨節青蒿專入肝腎三焦性稟芬芳味甘微辛氣寒無毒陰中有陽降中有升能入肝腎三焦血分以療陰火伏留骨節故凡骨蒸勞熱及風毒熱黃久瘧久痢瘙癢惡瘡鬼氣屍疰等症當須服此時珍曰月令通纂言伏內庚日採蒿懸門庭可辟邪冬至元日各服三錢亦良則青蒿之治鬼疰蓋亦有所伏也以其苦有泄熱殺蠱之能陰有退熱除蒸之用辛有升發舒脾之功而又於胃中氣不犯以其得春升之令最早也其形有類山茵陳又能清上虛熱以治目疾且燒灰淋汁點治惡瘡息肉饜瘢生搗可敷金瘡止血止痛但性偏寒不溫雖曰於胃不犯亦止就其血虛有熱服之得宜而言若使脾胃素虛及見泄瀉則於此終屬有忌矣童便浸葉用熬膏良使子勿使葉使根勿使莖萱草隰草清心利水除煩萱草專入心脾何以萱名以其草屬蔚茂值可以解憂詩曰焉得萱草言樹之背苗如蔥葉烹食可以適口即鹿蔥味甘而氣微涼能以去濕利水除熱通淋止渴消煩開胸寬膈令人心平氣和無有憂鬱是以命名時珍曰萱草即今東人採其花曬乾而貨之名為黃花菜又曰萱屬水性下走陰分一名宜男寧無微意存焉但氣味輕淡服之功未即臻不似氣味猛烈藥一入口而即見其有效也山楂山果消食磨肉伐胃戕脾山楂專入脾胃甘酸鹹平何書既言健脾又曰能伐脾胃生化之氣得非自相矛盾乎使明其理以推則知所謂健脾者因其脾有食積用此酸鹹之味以為消磨俾食行而痰消氣破而泄化謂之為健止屬消導之健矣如系冒昧之輩便以補益為名以為用藥進步詎知實而用此輕平消導得此則健虛而用此保無書云伐生之說乎按楂味酸與咸最能消化肉食與麥芽消穀食者絕不相同凡煮老雞硬肉但投楂肉數枚則易爛其消肉積之功可推且人多食則嘈煩易飢服參太過但用山楂即解豈非戕脾伐生之驗歟時珍曰凡脾弱食物不化胸腹酸利脹悶者於每食後嚼二三枚絕佳但不可多用恐反克伐也至於兒枕作痛力能以止痘瘡不起力能以發猶見通瘀運化之速兒枕痛猶於惡露積於太陰故合沙糖調服以行其瘀有大小二種小者入藥去皮核核亦能以化食磨積搗作餅子日乾用時珍曰生食多令人嘈煩易飢損齒齒齲人尤不宜也出北地大者良粳米麻麥稻固中清熱除煩粳米專入脾胃兼入心脾即人常食之米也稟天地中和之氣味甘性平時珍曰北粳涼南粳溫赤粳熱白粳涼晚白粳寒新粳熱陳粳涼凡人嗜生米久成米瘕治之以雞屎白焉人非此物不能養生故性專主脾胃而兼及他臟凡五臟血脈靡不因此而灌溉五臟積液靡不因此而充溢他如周身筋骨肌肉皮膚靡不因此而強健故凡白虎桃花竹葉石膏等湯靡不用此以為固中清熱然米既有早晚之不同復有地土出處之各異穎曰新米乍食動風陳者下氣病人尤宜早米受氣既早性雖溫而質多黏食之反能戀膈脾有濕滯者最忌晚米受氣既遲其性稍涼服之不無稍清而白晚性滯尤覺滋害出於高地則米硬而質潔出於窪處則米潤而性陰然總於中是固諸方用此佐助蓋恐藥性苦寒得此甘緩同入俾胃氣不致頓損而熱與煩亦得與之俱安矣此雖常食之物服之不甚有益而一參以藥投則其力甚巨未可等為泛常而忽視也米醋造釀散瘀解毒下氣消食米醋專入肝本濕熱之氣而成味則酸苦氣溫酸主斂故書多載散瘀解毒下氣消食且同木香磨服則治心腹血氣諸痛以火淬醋入鼻則治產後血暈且合外科藥敷則治癥結痰癖疸黃癰腫暨口嗽以治舌瘡面塗以散損傷積血及殺魚肉菜蕈諸毒時珍曰無非取其酸收之義而又有散瘀解毒之功至醋既酸又云能散癰腫以消則內散潰則外散收處即是散處故耳的解且多食傷筋軟齒收縮太過則筋受傷時珍曰酸屬木脾病毋多食酸酸傷脾肉䐢而唇揭以酸入筋過斂則於筋有傷過酸則木強水弱而於齒多軟宗奭曰食酸齒軟猶造靴皮者須得醋而紋皺故知其性收斂不負酸收之意米造陳久者良鏡源曰米醋煮制四黃丹砂膽礬常山諸藥陰陽水地水調劑陰陽不和陰陽水專入腸胃即湯沸半杯合井冷水半杯而並用之也緣人陰陽不和則吐瀉並作而霍亂不寧斯時病屬倉卒寒熱難分陰陽莫測若使投以偏劑如單服薑湯之類以斃則不免有誤治之失矣惟急用此投治則陰陽克協故借有形調和之質以平無形不和之氣也若使心腹絞痛止有吐瀉之勢而無吐瀉之實者是為乾霍亂即為絞腸痧心腹絞痛不得吐瀉者名乾霍亂吐瀉有物名濕霍亂蓋病在上則吐在下則瀉邪在中則吐瀉並作則又另有法在如古方用鹽熬熱童便調飲極為得治但不可用穀食米湯下咽以致立斃而非此水所能治矣鱉甲龜鱉瀉肝分積熱除勞嗽骨蒸鱉甲專入肝味鹹氣平色青書雖載屬補肝青入肝與龜載屬補腎黑入腎各別然究皆屬除熱削肝之品介蟲皆屬陰寒故能除熱非真滋肝藥也凡厥陰血分積熱而見勞嗽骨蒸寒熱往來溫瘧瘧母及腰腹脅堅血瘕痔核經阻產難瘍癰瘡腫驚癇斑痘等症服此鹹平能以消除諸症皆就陰虛邪入而論故用鱉甲入陰除熱散結若肝虛無熱切忌鱉以七肋九肋者佳以其得陽之數耳其用必取乎肋以肋屬肝故耳但食品中惟鱉叵測如三足兩頭並項強腹赤皆有大毒能以殺人不可不慎
