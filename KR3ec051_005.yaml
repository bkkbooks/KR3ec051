body:
  text: 卷五血劑溫血人身氣以衛外血以營內有氣以統血則血始能灌溉一身而凡目得藉血以視耳得藉血以聽手得藉血以攝掌得藉血以握足得藉血以步者靡不本其氣之所運有血以附氣則氣始能升降出入而凡伎巧能強治節能出水穀能腐謀慮能斷二便能通萬事能應者靡不本其血之所至此有血不可無氣以統而有氣不可無血以附也第血有盛於氣則血泣而不流故有必用溫暖之藥以行之氣勝於血則血燥而不通故有必賴清涼之藥以行之若使氣血並勝挾有積熱而致瘀塊不消根深蒂固經年纍月不愈者則又不得不賴破氣損血之藥以下俾氣血無乖而病自可以愈又按血盛於氣則氣失其所司而血愈寒愈滯故凡用藥治血必得其氣稍厚以為之主而凡味厚氣薄之品自不得以相兼如血有凝於肝症見惡寒戰栗其可不用肉桂以治乎風鬱血閉其可不用川芎以治乎肌膚灼熱吐衄腸風其可不用荊芥以治乎經閉不通其可不用蒼耳子以治乎陰腫崩瘕其可不用海螵蛸以治乎目翳不散其可不用穀精草兔屎以治乎風痹乳阻其可不用王不留行以治乎惡露不淨其可不用大小薊以治乎血暈血滯其可不用沙糖以治乎此肝經血滯之當溫也若使肝經血滯而更見有脾氣不運則伏龍肝似不能離肌肉不生則白蠟似不能捨水腫癥瘕則澤蘭似不能卻蠱毒惡氣則百草霜似不能去子腫不消則天仙藤似不能別胃滯不通則韭菜汁似不可廢血脈不通周身痛痹則酒釀似不能除肌肉不生目翳不開則爐甘石似不能少血脫不固潰瘍肉消則赤石脂似不能削是症有兼脾胃如此且或見有心腹卒痛則延胡索不得不用神氣不暢則安息香不得不急骨碎血瘀則骨碎補不得不進是症有兼心肺者又如此矣若於肝經血滯而更見有鼻衄血脫之不得不用烏墨以止筋骨血瘀之不得不用續斷以通肺痿血痢之不得不用雞蘇以散腎寒血瘀之不得不用陽起石以宣目赤精遺之不得不用白蒺藜以解督脈不通之不得不用鹿茸以溫瘀塊堅硬痃癖尫羸之不得不用海狗腎以軟是症有兼腎經者又如此矣至於心經血滯而症見有痃癖冷痛在書已有桂心可用見有癰瘍痛迫在書已有乳香可除凡此止就溫血大概略為分晰而究其要則又在臨症審脈分別無差庶於用藥治血之理自不致有天淵之隔矣雞蘇山草溫利下焦血分瘀滯雞蘇專入腸胃即龍腦薄荷也又名水蘇生於水旁系野生之物味辛微溫功有類於蘇薄但蘇薄其性稍涼水蘇其性稍溫蘇薄其性主升水蘇其性主降蘇薄多於氣分疏散水蘇多於血分溫利故凡肺氣上逆而見頭風目眩與血瘀血熱而見肺痿血痢吐衄崩淋喉腥口臭邪熱等病者皆當用此宣泄太平和劑局方有龍腦薄荷丸俾熱除血止而病自可以愈矣但表疏汗出其切忌焉方莖中虛似蘇葉而微長齒面皺氣甚辛烈澤蘭芳草蘭草入氣利水除痰澤蘭入肝脾行水和血澤蘭專入肝脾苦甘而辛即今婦人採置發中除垢者是也玩書所論澤蘭與本經蘭草同為一類其生澤旁紫莖素枝赤節緑葉對節生有細齒但蘭草則莖圓節長葉光有岐澤蘭則莖微節方短葉有毛之為異耳二物並於嫩時皆可刈佩以其花葉皆香置於發中能以闢垢省頭故雖呼為香草俗則呼為孩兒菊與于山蘭其花雖香而葉絶無氣者迥不相同時珍曰蘭草澤蘭一類二種雖生水旁下濕處但以莖圓節長而葉光有岐者為蘭草莖微方節短而葉有毛者為澤蘭朱文公離騷辨證云必花葉俱香燥濕不變方可刈佩今之蘭蕙花雖香而葉無氣質弱易萎不可刈佩汪昂曰本經既言澤蘭則非山蘭明矣是離騷之秋蘭當屬本經之澤蘭無疑也吳草蘆曰蘭為醫經上品之藥有枝有莖今所謂蘭無枝無莖因黃山谷稱之遂謬指為離騷之蘭耳蘭草莖圓葉光其性專主入氣雖書載有久服益氣輕身不老膚語然究止屬利水除痰殺蠱辟惡而為消渴良藥即內經所謂數食肥甘傳為消渴治之以蘭以除陳氣是也東垣治消渴生津飲用蘭葉蓋本於此又此草浸油塗發去風垢令香潤史記所謂羅襦襟解微聞香澤者是也澤蘭莖方葉毛雖書載有和血舒脾長養肌肉之妙然究皆屬入脾行水入肝治血之味是以九竅能通關節能利宿食能破月經能調癥瘕能消水腫能散産後血淋腰痛能止吐血衄血目痛風癱癰毒撲損能治時珍曰蘭草澤蘭氣香而溫味辛而散陰中之陽足太陰厥陰經藥也脾喜芳香肝宜辛散脾氣舒則三焦通利而正氣和肝鬱散則營衛流行而病邪解蘭草走氣道澤蘭走血分正如赤白茯苓芍藥補瀉皆不同也觀此則書所云舒脾和血不過因其水消血除之意豈真舒脾和血之味也乎入補氣補血之味同投則消中有補不致損真誠佳品也防己為使根名地筍大小薊隰草破血逐瘀大小薊專入肝雖書載屬甘溫可以養精保血別録然究精之養血之保則又賴於血榮一身周流無滯若使血瘀不消而致見有吐衄唾咯崩漏之症與血積不行而致見有癰疼腫痛之病則精血先已不治安有保養之說乎用此氣味溫和溫不致燥行不過散瘀滯得溫則消瘀塊得行斯活惡露既淨自有生新之能癰腫潛消自有固益之妙保養之說義由此起豈真具有補益之力哉恭曰大小薊皆能破血但小薊力微不如大薊力迅小薊只可退熱涼血若大薊則於退熱之中猶於氣不甚傷也恭曰大薊葉療癰腫而小薊專主血不能消癰也能理血疾不治外科若脾胃虛寒飲食不思泄瀉不止者切勿妄服兩薊相似花如髻大薊莖粗而葉皺小薊莖低而葉不皺皆用莖沙糖蓏甘蔗除熱潤燥沙糖導血通滯白糖溫補脾肺沙糖專入肝本於甘蔗所成甘蔗氣稟沖和味甘氣寒已為除熱潤燥之味其治則能利腸解煩消痰止渴至於沙糖經火煅煉性轉為溫色變為赤與蔗又似有別時珍曰沙糖本草言其性寒蘇恭謂其冷利皆昧此理故能行血化瘀是以産婦血暈多有用此與酒沖服取其得以入血消瘀也小兒丸散用此調服取其溫以通滯也烟草用以解毒亦取其有開導之力也然性溫則消則下故虛熱過服則有損齒消肌之病味甘主緩主壅故痰濕過服則有戀膈脹滿之弊此又不可不深思而熟察耳時珍曰沙糖性溫殊於蔗漿故不宜多食與魚筍之類同食皆不益人今人每用為調和徒取其適口而不言陰受其害也白糖因曬浮結而成種類造法不一體輕味甘色白主治亦頗相似然紫入血而白入氣久食反有熱壅上膈之虞書言能以清熱似非正談時珍曰石蜜糖比之紫沙糖性稍平功用相同入藥勝之然不冷利若久食則助熱損齒生蟲之害也試以口燥之會食此其燥益甚口冷之會食之其冷即除且致轉為燥渴生痰於此可覘大概矣又奚必過為辨論哉穀精草隰草入肝散結通血明目穀精草專入肝兼入胃本谷餘氣而成得天地中和之氣味辛微苦氣溫故能入足厥陰肝及足陽明胃按此辛能散結溫能通達凡一切風火齒痛喉痹血熱瘡瘍痛癢肝虛目翳澀淚雀盲至晚不見並疳疾傷目痘後星障服之立能有效且退翳明目功力駕於白菊而去星明目尤為專劑時珍曰穀精體輕性浮能上行陽明分野凡治目中諸病加而用之甚良明目退翳似在菊花之上也試看望月沙系兔所食此草而成望月沙亦能治眼則知此更為眼家要藥矣取嫩秧花如白星者良王不留行隰草入肝行血不留王不留行專入肝胃在古已命其名謂此雖有王命其性走而不守不能以留其行也又按古書有云穿山甲王不留婦人服之乳常流亦云行血之力也觀此數語已得氣味主治大要矣又著其味曰辛曰甘曰平其氣曰溫其功則能入足厥陰肝經血分去風除痹通經利便下乳催生散癰腫拔竹刺與瞿麥同功則知氣味疏泄洵爾至極又安能有血而克止乎何書又言止血定痛能治金瘡似與行血之意又屬相悖頌曰張仲景治金瘡有王不留行貞元廣利方治諸風痓有王不留行湯皆最效詎知血瘀不行得此則行血出不止得此則止非故止也得其氣味以為通達則血不於瘡口長流而血自散各經以致其血自止其痛即定豈必以止為止哉意義彰明但古人表著治功多有如此立說以留後人思議不可不細審焉花如鈴鐸實如燈籠子殼五稜取苗子蒸漿水浸用天仙藤蔓草活血利水天仙藤專入肝脾即青木香馬兜鈴藤也味苦氣溫觀書所論主治止屬妊娠子腫始自兩足漸至喘悶似水足趾出水謂之子氣及腹痛風癆等症而於他症則未及焉即其所治之理亦不過因苦主於疏泄性溫得以通活故能活血通道而使水無不利風無不除血無不活痛與腫均無不治故也昔有天仙藤散天仙藤香附子陳皮甘草烏藥等分為末用木瓜生薑蘇葉煎湯服以治子腫其亦可以知其概矣葉似葛圓而小有白毛根有須四時不凋者是骨碎補石草破瘀逐血補骨骨碎補專入腎兼入心味苦而溫功專入腎補骨且能入心破血是以腎虛耳鳴耳屬腎久瀉腎司開合之權久瀉多責於腎跌僕損傷骨痛牙痛血出無不用此調治泄瀉研末入豬腎煨食牙痛炒黑為末擦牙折傷粥和末裹傷處俾其腎補骨堅破瘀生新而病即除至命其名曰骨碎補以其骨碎能補骨故耳雖與補骨脂相似然總不如補骨脂性專固腎通心而無逐瘀破血之治也去毛蜜拌蒸用桂心香木溫血分寒除冷止痛桂心專入心本於肉桂去外粗皮取當中心者為桂心味甘辛熱專溫營分之裡藥凡九種心痛九種一蟲二疰三風四悸五食六飲七冷八熱九去來痛後人又祖其義而亦別之有九曰飲曰食曰氣曰血曰冷曰熱曰悸曰蠱曰痓皆明邪乘手少陰之絡而成腹內冷痛痃癖等症皆能奏效以其所治在心故治亦在於里而不在於軀殼之外耳非若肉桂未去外層皮肉其治在於通經達絡以除風寒濕痹而不專入心腹之內也乳香香木入心行氣活血止痛乳香專入心兼入脾胃腎即書所云薰陸香者是也香竄性溫不潤諸書曷言於血有補詎知血因氣逆則血凝而不通以致心腹絞痛毒因氣滯則血聚而不散以致痛楚異常乳香香竄入心既能使血宣通而筋不伸楊瘦清云凡人筋不伸者敷藥宜加乳香其性能伸筋復能入腎溫補使氣與血互相通活俾氣不令血阻血亦不被氣礙故云功能生血究皆行氣活血之品耳非如沒藥氣味苦平功專破血散瘀止有推陳之力而無致新之妙是以書載乳香功能活血調氣托裡護心用入瘡孔能使毒氣外出不致內攻也生肌止痛治心腹諸痛口噤耳聾口噤燒煙以熏癰腫折傷癲狂治癲狂用靈仙辰砂乳香棗仁酒下恣飲沉醉聽睡或加人參內入名寧志膏但遇癰疽已潰及膿血過多者不可妄投恐其復開走泄之路其意已可見矣豈若當歸辛潤而為補血第一要藥也出諸番如乳頭明透者良惟黏難研水飛過用鉢坐熱水研之或用燈心同研則易細市人多以楓香僞售勿用酒造釀通經活脈闢穢酒專入脾胃與表性種類甚多然總由水穀之精熟谷之液醞釀而成故其味有甘有辛有苦有淡而性皆主熱弘景曰大寒凝海惟酒不冰明其性熱惟冠群物入胃則氣逆上壅滿胸則肝浮膽橫等於勇士不可遏矣若引經用為嚮導則其勢最速辛則通身達表引入至高巔頂之分火氣上炎者忌甘則緩中熱鬱寒滯者忌苦則降下氣衰血弱者忌淡則通利小便而速下也水衰血枯者忌熱酒傷中溫飲和胃怡神壯色通經活脈且霧露嵐瘴風寒暑濕邪穢得此亦可暫闢博物志云王肅張衡馬均三人冒霧晨行一人飲酒一人飽食一人空腹空腹者死飽食者病飲酒者健此酒勢辟惡勝於作食之效也若恣飲不節則損胃爍精動火生痰發怒助欲濕熱生病殆不堪言震亨曰本草止言酒熱而有毒不言其濕中發熱近於相火醉後振寒戰栗可見矣又性喜升氣必隨之痰鬱於上溺澀於下恣飲寒涼其熱內郁肺氣大傷其始也病淺或嘔吐或自汗或瘡疥或鼻齄或泄利或心脾痛尚可散而去之其久也病深或消渴或內疽或肺痿或鼓脹或失明或哮喘或癆瘵或癲癇或痔漏為難名之病非具眼未易處也至於夜飲更屬不宜蓋夜氣主收斂氣密則固若用酒宣發醉飲就枕熱壅三焦傷心損目亂其清明勞其脾胃停濕動火致病甚多至入藥共釀合姜則療厥逆客忤色紫則理瘛瘲偏風蔥豉則解煩熱而散風寒桑椹則益五臟以明耳目狗肉汁則大補元陽葡萄肉則甚消痰癖牛膝乾地則滋陰枸杞仙靈皮則扶陽痿等社酒指納嬰兒口中可令速語噴屋及壁則逐蚊蠅燒酒則散寒結然燥金涸血敗胃傷膽水酒藉曲釀醞其性則熱酒藉水成其質則寒少飲未至有損多飲自必見害如陰虛酷好其臟本熱加以酒熱內助其熱益增不致逼血妄出不止陽虛酷好其臟本寒加以酒寒內入其害益甚不致飽脹吞酸吐瀉不止此旨歷無發明惟景嶽於損傷篇內極說糟罨跌傷行瘀止痛亦驅蛇毒及盦凍瘡醇而無灰陳久者良畏枳椇葛花赤豆花緑豆粉鹹鹵得鹽則解以水制火意韭菜葷辛活血通滯韭菜專入肝腎腸胃味辛微酸氣溫無毒按辛則能散溫則能行滯氣客於腸胃則血因氣而益阻胃氣不通於五臟則腰膝冷而痃癖生肝主疏泄腎主閉藏肝腎虛則啓閉非時經曰足厥陰病則為遺尿及為白淫服此氣行血散肝補腎固而病安有不愈乎故書有云韭味最利病人凡一切血瘀氣滯等症俱能使之立效震亨曰心痛有食熱物及怒郁致死血留於胃口作痛者宜用韭汁桔梗加入藥中開提氣血有腎氣上攻以致心痛者宜用韭汁和五苓散為丸空心茴香湯下蓋韭性急能散胃口氣血滯也又反胃宜用韭汁二杯入薑汁牛乳各一杯細細溫服蓋韭汁消血薑汁下氣消痰和胃牛乳能解熱潤燥補虛也單方總録曰食不得入是有火食久反出是無火也士材又謂此不必拘但察脈大有力嘔吐酸臭當作熱治脈小無力嘔吐清水當作寒醫色之黃白而枯者為虛寒紅赤而澤者為實熱能合色脈庶乎無誤如犬蛇傷用此搗爛如泥加鹽少許作厚箍頻換則安被刑杖及打血凝薄敷運動即散久病下痢不止同鯽魚煮食即止但火甚陰虛用之為最忌焉忌蜜牛肉汪昂曰今人多以韭炒牛肉其味甚佳亦未見其作害又按經曰毒藥攻邪五穀為養五畜為益五菜為充五果為助氣味合而明之以補精益氣五菜韭薤蔥葵藿也五果桃李棗杏栗也使韭果忌牛肉則經何以又不言其有忌乎韭子功治略同但治遺精白濁更勝素問曰足厥陰病則遺尿思想無窮入房太甚發為筋痿及為白淫男隨溲而下女子綿綿而下韭子之治遺精漏泄小便頻數女人帶下者能入厥陰補下焦肝及命門之不足命門者藏精之府故同治云蒸暴炒研用救急易方煙燻蟲牙用瓦片煅紅安韭子數粒清油數點待煙起以筒吸引至痛處良久以溫水漱吐有小蟲出為效未盡再熏墨土止血宣滯墨專入肝腎曷能以止血以其色黑味辛氣溫而止之也蓋黑能勝紅紅見黑而即止以火不勝水者故耳辛能散血血散則血歸經而不外溢是以遇辛而即止也溫能行血血行則血周流經絡而血不聚於所傷之處是以得溫而即止也揭出行血止血義蘊故凡血熱過下如瘟疫鼻衄産後血暈崩脫金瘡並絲纏眼中皆可以治如止血則以苦酒送韭汁投消腫則以豬膽汁釅醋調並眼有絲纏則以墨磨雞血速點客忤中腹則磨地漿汁吞各隨病症所用而治之耳但瘟疫熱病初衄遽用此以止血則非所宜百草霜土治血止血殺蠱百草霜專入肝兼入腎即灶突上煙煤及釜里鍋煤也因燒雜草故名味辛氣溫觀其所主與伏龍肝相似凡血見黑即止蠱毒惡氣得辛溫則散故本經專主蠱毒中惡吐血血暈以酒或水或醋細研溫服亦塗金瘡止血生肌至於傷寒發斑斑有陽毒陰毒疸膈瘧痢咽喉口舌白禿諸瘡亦須用此以取火化從治之義兔屎獸除熱結毒積目翳兔屎專入肝即名望月沙者是也兔稟太陰之精復餌穀精草明目之藥是以屎能明目以除目中浮翳且癆瘵五疳痔漏蟲食痘瘡等症服之皆治亦由熱結毒積而成得此寒以解熱辛以散結圓以象目故能服之有功時珍曰兔屎能解毒殺蟲故治目疾疳癆瘡痔方中往往用之諸家本草並不言及亦缺漏也按沈存中良方云江陰萬融病癆四體如焚寒熱煩燥孫元規使人遺藥服之遂平叩之則明月丹也若陰氣上乘目障不清未可用焉兔肉另詳海螵蛸無鱗魚入肝活血入腎除寒逐濕海螵蛸專入肝兼入腎即烏賊魚骨稟水中之陽氣味鹹氣溫腹中有墨書字逾年乃滅常吐黑水自罩其身人即於黑水處取之凡諸血病因於寒濕而見陰戶腫痛丈夫陰腫下痢疳疾暨血瘕血崩血閉腹痛環臍目翳淚出聤耳出膿等症服此咸能走血溫能除寒逐濕則血脈通達而無諸血障害之弊矣故直入厥陰肝經血分活血時珍曰按素問云有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名曰血枯得之年少時有所大脫血或醉入房中氣竭肝傷故月事衰少不來治之以四烏鰂骨一藘茹為末丸以雀卵大如小豆每服五丸飲以鮑魚汁所以利腸中及傷肝也觀此則其厥陰血分無疑矣又云經閉有有餘不足二病有餘者血滯不足者肝傷烏鰂所主者肝傷血閉不足之病正與素問相合兼入少陰腎經以治寒濕歷觀諸書載用螵蛸同麝為末以治耳底出膿同冰片少許以治赤白目翳同干胭脂為末油調以治小兒臍瘡出血及膿同蒲黃等分為末以塗舌腫出血不止皆是宣通血分之滯無他術也取骨魚滷浸炙黃用惡附子白芨白蘞能淡鹽涼血血寒自當用溫血熱自當用涼若使血寒不溫則血益寒而不流矣血熱不涼則血益結而不散矣故溫血即為通滯活瘀之謂而涼血亦為通滯活瘀之謂也第書所載涼血藥味甚多然不辨晰明確則用多不合如血閉經阻治不外乎紅花毒閉不解治不外乎紫草此定法也然有心胃熱極症見吐血則又不得不用犀角心脾熱極症見喉痹不得不用射干肝胃熱極症見嘔吐血逆不得不用茅根腸胃熱極症見便血不得不用槐角地榆心經熱極症見驚惕不得不用辰砂且癰腫傷骨血瘀熱聚無名異宜矣毒盛痘閉乾紅晦滯豬尾血宜矣目盲翳障血積上攻夜明沙穀精草青魚膽宜矣瘀血內滯關竅不開發余宜矣肝木失制嘔血過多側柏葉宜矣火伏血中肺癰失理凌霄花宜矣肝胃血燥乳癰淋閉蒲公英宜矣至於腸紅脫肛血出不止則有炒卷柏可治血瘕疝痹經閉目赤則有赤芍藥可治諸血通見上溢不下則有生地黃可治心腎火熾血隨火逆則有童便可治肝腎火起骨蒸血結則有童便可治其他崩帶驚癇噎膈氣逆之有賴於代赭石濕熱下注腸胃痔漏之有賴於刺蝟皮血瘀淋滴短澀溺痛之有賴於琥珀心肝熱極惡瘡目翳之有賴於龍膽齒動須白火瘡紅髮之有賴於旱蓮草亦何莫不為通瘀活血之品但其諸藥性寒則凡血因寒起當知所避慎不可妄見血閉而即用以苦寒之味以理之也生地黃隰草涼血解熱生地黃專入心肝腎兼入小腸性未蒸焙掘起即用甘苦大寒故書皆載其性鮮補但入手少陰心足少陰腎足厥陰肝並足太陰脾手太陽小腸力專清熱瀉火涼血消瘀錢仲陽導赤散生地與木通同用能瀉丙丁之火別録治婦人崩中血不止及産後血上薄心胎動下血鼻衄吐血皆搗汁飲之故凡吐血咯血衄血畜血溺血崩中帶下審其症果因於熱成者無不用此調治血出於鼻是由清道血出於口是出濁道血出於咳於衄是由於肺血見於嘔是出於肝血見於吐是出於胃血由痰涎而帶是出於脾血見於咯是出於心血見於唾是出於腎血由耳出其名曰衈血由鼻出其名曰衄血由肌膚而出其名曰血汗血由口鼻俱出其名曰大衄皆當詳其虛實以治並或傷寒陽強痘症毒盛血燥與折跌傷筋而見血瘀血痹之症者無不採其同入以為活血生新之用第書有言服此長肉生肌止是熱除血活以後長養之語久服輕身不老止是病去身安力健之詞未可因此認為辟穀成仙屬實也若使血因寒滯而猶用以生地不更使寒益甚而血愈出不返乎掘生肥大者洗淨搗汁以飲或用酒製以免傷胃忌鐵紅花隰草涼血通瘀紅花專入心包肝辛苦而溫色紅入血為通瘀活血要劑血之下而清者營虛有熱血之下而濁者熱與濕蒸血色鮮者屬火發血色黑者屬血燥極血與泄物並下者屬有積或因脈絡受傷血從尿出者屬陰虛火動或因房勞過度營血妄行血色黑黯面色枯白尺脈沉遲者屬下元虛寒陽虛陰走嘔吐而見血色紫凝者屬熱甚銷鑠故見稠濁熱甚水化故血見黑而紫血從汗者屬火喜傷心喜則氣散故血隨氣以行血在糞前者為近血其血由於大腸血在糞後者為遠血其血自於肺胃由氣虛腸薄故血滲入而下出也血自口鼻上出為陽盛陰衰有升無降蓋血生於心包藏於肝屬於衝任一有外邪內侵則血滯而不行紅花汁與血類故凡血燥而見喉痹不通痘瘡不起肌膚腫痛因血熱血瘀作腫作痛經閉便難經閉本有血滯血枯之分但此止就血滯論血暈口噤子死腹中治當用此通活時珍曰紅花汁與之同類故能行男子血脈女子經水多則行血少則養血按養疴漫筆云新昌徐氏婦病産暈已死但胸膈微熱有名醫陸氏曰血悶也得紅花數十斤乃可活遂亟購得以大鍋煮湯盛二桶於窗格之下畀婦寢其上熏之湯冷再加少傾指動半日乃蘇但用不宜過多少用則合當歸能生多用則血能行過用則能使血下行不止而斃胭脂系紅花染出可治小兒聤耳紅藍花三錢半枯礬五錢為末以綿杖繳淨吹之無花則用枝葉一方去礬並解痘瘡毒腫有痘瘡挑破以油胭脂敷之良紫草山草入心包肝涼血解毒紫草專入心包肝甘鹹氣寒色紫質滑專入厥陰血分涼血血涼則九竅通二便利故凡血熱毒閉而見心腹急痛水腫不消五疸瘑癬惡瘡及痘瘡血熱毒盛二便閉澀者治當用此俾血得寒而涼得咸而降得滑而通得紫而入血涼毒消而二便因以解矣活幼書云紫草性寒小兒脾實者可用脾虛者反能作瀉奈世誤以為宣發之藥不論毒閉與否輒用殊失用藥意義矣瀉者忌服茸得陽氣之早用宜取茸為正酒洗用紫草去頭須本經云能補中益氣似非旱蓮草隰草入肝腎涼血旱蓮草專入肝腎即書所云鱧腸草金陵草者是也味甘而酸性平色黑功專入肝入腎為止血涼血要劑是以血痢煎膏用之其血即止須白汁塗變白為黑火瘡發紅其紅即退齒牙動搖擦之即固合冬青子名二至丸以補肝腎但性陰寒雖善涼血不益脾胃經疏若不同以薑汁椒紅相兼修服者必腹痛作瀉苗如旋覆實似蓮房斷之有汁須臾而黑熬膏良赤芍芳草瀉肝血熱赤芍專入肝與白芍主治略同但白則有斂陰益營之力赤則止有散邪行血之意白則能於土中瀉木赤則能於血中活滯故凡腹痛堅積血瘕疝痹經閉目赤邪聚外腎為疝腹內為瘕因於積熱而成者用此則能涼血逐瘀成無己曰白補而赤瀉白收而赤散酸以收之甘以緩之故酸甘相合用補陰血逆氣而除肺燥與白芍主補無瀉大相遠耳大明指為赤白皆補其說不切日華子指為赤能補氣白能治血其說尤不切耳不可不知至云産後忌用亦須審其脈症及臟偏勝若何耳不可盡拘如臟陽脈症俱實者雖在産後亦所不忌臟陰脈症俱虛即在産前不得妄施凡治病以能通曉脈症虛實為是惡芒硝石斛畏鱉甲小薊反藜蘆地榆山草清下焦血熱血崩地榆專入肝腸胃苦酸微寒性沉而澀諸書皆言因其苦寒則能入於下焦血分除熱俾熱悉從下解又言性沉而澀凡人症患吐衄崩中腸風血痢等症腸風下血清而色鮮四射如濺乃風性使然素問所謂久風入中則為腸風飧泄是也若肛門射血如線或點滴不已者乃五痔之血耳得此則能澀血不解按此不無兩岐詎知其熱不除則血不止其熱既清則血自安且其性主收斂既能清降又能收澀則清不慮其過泄澀亦不慮其或滯實為解熱止血藥也但血熱者當用虛寒者不宜用久病者宜用初起者不宜用作膏可貼金瘡搗汁可塗虎犬蛇蟲傷毒飲之亦可似柳根外黑裡紅取上截炒黑用梢反行血得發良惡麥冬卷柏苔生涼血炒止血卷柏專入肝原屬草部並非側柏生於石上形如拳卷故以卷名即俗所謂萬年松者是也氣堅質厚味甘性溫入足厥陰肝經血分其治有分生熟生則微寒力能破血通經故治癥瘕淋結等症炙則辛溫能以止血故治腸紅脫肛等症性與側柏葉懸殊治亦稍異側柏葉仗金氣以制木借炒黑以止血不可不辨鹽水煮半日井水煮半日焙用銀柴胡山草入腎涼血銀柴胡專入腎兼入胃味甘微寒無毒功用等於石斛皆能入胃而除虛熱但石斛則兼入腎澀氣固筋骨此則入腎涼血之為異耳故和劑局方用此治上下諸血及於虛癆方中參入同治如肝癆之必用此為主且不類於北胡蓋北胡能升少陽清氣上行升清發表必有外邪者方用此則氣味下達入腎涼血與彼迥不相符若用北胡以治虛癆則咳嗽發熱愈無寧日陰火愈升愈起可不辨而混用乎出銀州者良故以銀胡號之蒲公英柔滑消胃熱涼肝血療乳癰乳岩蒲公英專入胃肝即黃花地丁草也味甘性平能入陽明胃厥陰肝涼血解熱故乳癰乳岩為首重焉且能通淋淋症多屬熱結用此可以通解擦牙染須塗刺莖斷有白汁凡螳螂諸蟲遊諸物上必遺精汁干久則有毒人手觸之成疾名狐尿刺慘痛不眠百療難效取汁厚塗即愈千金方極言其功及解食毒疔毒緣乳頭屬肝乳房屬胃乳癰乳岩多因熱盛血滯用此直入二經外敷散腫臻效同忍冬煎入少酒服搗敷亦良內消須同夏枯貝母連翹白芷等藥同治況此屬土花黃故於食滯可解毒氣可散又能入腎涼血故於鬚髮可染獨莖一花者是有丫者非凌霄花蔓草瀉肝血熱凌霄花專入肝即紫葳花肝經血分藥也味甘而酸氣寒無毒凡人火伏血中而見腸結血閉風癢崩帶癥瘕一切由於血瘀血熱而成者所當用此調治蓋此專主瀉熱熱去而血自活也是以肺癰之藥多有用此為君凌霄為末和密陀僧唾調敷亦治酒渣妊娠用此克安者以其內有瘀積瘀去而胎即安之意也所云孕婦忌服者恐其瘀血既無妄用恐生他故也此為女科血熱必用之藥但當相症施治耳藤生花開五瓣黃赤有點不可近鼻聞傷腦槐角喬木除熱散結清火槐角專入胃大腸兼入肝即槐實味苦酸鹹氣寒無毒入手足陽明大腸胃及入足厥陰肝凡因肝經熱鬱而致風眩煩悶痔血腸風並陰瘡濕癢目淚不止者服此治無不效肛邊發露肉珠狀如鼠乳時出膿血曰牡痔肛邊腫痛生瘡突出腫至五六日自潰出膿血者曰牝痔肛邊生瘡顆顆發㿔癢而復痛更衣出清血者曰脈痔腸內結核痛而有血寒熱往來登廁脫肛者曰腸痔因便而清血隨下者曰血痔又因糞前有血名外痔糞後有血名內痔穀道胬肉名舉痔頭上有孔名痔漏瘡內有蟲名蟲痔大法用槐角地榆生地涼血芩蓮梔柏清熱防風秦艽祛風濕當歸人參和血生血枳殼寬腸升麻升提治腸風略同不宜專用涼須當兼補劑收功以其氣皆純陰為涼血要藥故能除一切熱散一切結清一切火也至書所云能疏肝經風熱者非是具有表性得此則疏實因熱除而風自息之意凡書所著治功多有如此立說不可不細體會而詳究耳去單子及五子者銅槌捶碎牛乳拌蒸十月上已採漬牛膽中干百日食後吞一枚明目補腦發白還黑腸風痔血尤宜服之槐花味苦獨勝其涼大腸血分更甚凡大小便血及目赤腫痛舌衄並皆用之舌衄炒研滲之若虛寒無火切忌陳者良側柏葉香木涼血止血側柏葉專入肺肝苦澀微寒書言養陰滋肺燥土然稟受西金堅徑不凋魏子才六書精蘊云萬木皆向陽而柏獨西指故字從白白者西方也陸佃埤雅云柏之指西猶針之指南也柏有數種入藥惟取葉扁而側生者故曰側柏寇宗奭曰豫官陝西登高望柏千萬樹皆一一西指蓋此木至堅不畏霜雪得木之正氣他木不及所以受金之正氣所制一一西指也服此大能伐胃雖有止血涼血之功而氣味與血分無情不過仗金氣以制木借炒黑以止血耳汪昂曰肢節大痛晝靜夜劇名白虎歷節風亦風寒濕所致別録稱為補益似屬未是但塗湯火傷損生肌殺蟲炙罨凍瘡汁染鬚髮最佳酒浸或炒或生用桂牡蠣為使惡菊花宜酒元旦飲椒柏酒以辟邪辰砂石清心熱鎮驚安神辰砂專入心即書所云丹砂硃砂者是也因砂出於辰州故以辰名體陽性陰外顯丹色內含真汞不熱而寒離中有坎也不苦而甘火中有土也嬰兒奼女交會於中故能入心解熱而神安魄定杲曰丹砂統陰納浮游之火而安神明凡心熱者非此不能除是以同滑石甘草則清暑同遠志龍骨則養心氣同丹參則養心血同地黃枸杞則養腎同厚朴川椒則養脾同南星川烏之類則祛風且以人參茯神濃煎調入丹砂則治離魂病夏子益奇疾方云凡人自覺本形作兩人並行並臥不辨真假者離魂病也類編云錢丕少卿夜多惡夢通宵不寐自慮非吉遇鄧州推官胡用之曰昔常如此有道土教戴辰砂如箭簇者涉旬即驗四五年不復有夢因解髻中一絳囊遺之即夕無夢神魂安靜以丹砂末一錢和生雞子黃三枚攪勻頓服則妊娠胎動即安胎死即出慎勿經火及一切烹煉則毒等於砒磠況此純陰重滯即未烹煉久服𤶭悶以其虛靈之氣被其鎮墜也辰砂明如箭簇者良惡磁石畏鹽水忌一切血頌曰鄭康成注周禮以丹砂石膽雄黃礬石磁石為五毒古人惟以攻瘡瘍而本經以丹砂為無毒故多煉治服食鮮有不為藥患者豈五毒之說勝乎當以為戒無名異石解熱活血無名異專入肝即俗所名乾子者是也味甘而咸微寒無毒諸書皆言能治癰腫損傷接骨金瘡合口其義何居以其咸有入血之能甘有補血之力寒能勝熱之義者故耳是以人於受杖時每服三五錢其於傷處不甚覺痛用醋磨塗腫處即消要皆外治之品非內服之味也生川廣小黑石子也一包數百枚豬尾血畜涼血活血豬尾血專入肝兼入心脾即豬尾尖之處剖刮而出者也凡人血燥不活用以辛溫以為搜剔則血益燥而不活矣按豬本屬陰物血亦更屬陰味以至陰之物而治至陰之血則熱自得陰化而熱以解然必得一活動以為疏剔則血不為熱凝惟豬通身皆窒食飽即臥其活止在一尾而尾尖則又活中之至活者也故吳費建中著有救偏瑣言治痘凡逢毒盛而見乾紅晦滯紫豔乾燥之象輕則用以桃仁地丁紅花赤芍重則用以豬尾尖血取一盞二盞入藥同投兼佐冰片開泄腠理通達內外誠發千古未發之奇祕也冀建中治痘血瘀氣滯用大黃一兩青皮一錢半桃仁四錢紅花錢半赤芍錢半木通八分荊芥錢半葛根錢半生地兩半牛蒡二錢白項地龍二十一條紫花地丁一兩五錢蟬蛻六分山楂一兩五錢蘆根三兩名必勝湯此是勢急之際用以大劑若毒勢未急或分作三劑以投若血瘀之極必加豬尾血大渴不已加石膏總在相症酌治耳瘀血一活則一身之血與之俱活凡治痘而見乾紅晦滯內症具備其可不藉此血以為通活之具乎但血因虛而燥因寒而凝而不用以辛溫辛熱以為通活則血愈見其有礙者矣取雄豬尾血者佳兔肉獸涼血解熱兔肉專入肝兼入大腸人言可治虛癆人多食而不忌不知兔肉性寒久食絶人血脈損元氣陽事令人痿黃故時珍載之以為涼血解熱利腸之劑藏器曰大抵久食絶人血脈損元氣陽事令人痿黃八月至十月可食余月傷人神氣兔死而眼合者殺人況虛癆一症脾腎兩虛即在醫者用藥挽救亦難兩全無弊若復加兔肉甘寒又安能力補脾腎而為虛癆要藥乎今人不察動用兔肉治療以致陽氣日虛而陰氣日竭余因先慈曾患虛癆服藥將愈後食兔肉而病復發故特拈出以為妄食兔肉者戒青魚膽魚涼肝血開目翳魚膽專入肝膽本屬苦寒可以點目去障以膽入膽故也至於青魚之膽氣味亦同且色青入肝開竅於目故膽有點目治鯁之功目睛生汁注眼能黑夜視物以其好啖螺蜆螺蜆能明目也又味苦氣寒能涼血熱故又主塗痔瘡擦火瘡吹喉痹功與熊膽相同臘月收陰乾夜明沙鼠入肝活血明目夜明沙專入肝即名天鼠屎也其屎因食蚊蟲而化蚊蟲善食人血是即蚊蟲之眼故能入肝經血分活血為治目盲障翳之聖藥肝之竅在目凡人目生障翳多緣肝有血積以致上攻於目其或見為驚疳瘧鬾血氣腹痛得此辛以散邪寒以勝熱則血自活而病無不可愈本草稱下死胎以其蚊善食血吳鶴皋曰古人每用虻蟲水蛭治血積以其善吃人血故耳故即可以食血者治其血耳加石決明豬肝煎名決明夜靈散治雞盲眼並能燒煙闢蚊同鱉甲燒是即以蚊治蚊之意淘淨焙用惡白薇白蘞血餘人涼血逐瘀血餘專入肝心兼入腎味苦微溫據書載能補腎壯氣然總不如地茱參耆為補精補氣之最耳素問曰腎之華在發王冰注云腎主髓腦者髓之海發者腦之華腦減則發素滑壽注云水出高源故腎華在發發者血之餘血者水之類也今方家叫發為血餘蓋本此也葉世傑草木子云精之榮以須氣之榮以眉血之榮以發類苑云發屬心稟火氣而上生須屬腎稟水氣而下生眉屬肝稟木氣而側生故男子腎氣外行而有須女子宦人則無須而眉發不異也又載功能療驚癇理咳嗽固崩帶止血暈血痢血淋舌血鼻血暨轉胞不通及塗瘡疥入膏敷毒治皆有效時珍曰發者血之餘埋之土中千年不朽煎之至枯復有液出誤食入腹變為瘕蟲煅治服餌令發不白此正神化之應驗也然總皆屬通關開竅涼血散瘀生新之品子母祕録治小兒斑疹用發灰飲服二錢治小兒兩角生瘡用發灰三錢飲汁服若胃虛用之多有吐瀉之弊皂莢洗煅用下血血為人身之寶安可言下然有血瘀之極積而為塊溫之徒以增熱涼之或以增滯惟取疏動走泄苦鹹烈毒之品以為驅逐則血自爾不凝按書所載破血下血藥類甚衆要在審症明確則於治方不謬如症兼寒兼熱內結不解則宜用以莪朮桃仁鬱金母草以為之破取其辛以散熱苦以降結之意也瘀氣結甚則宜用以斑蝥乾漆以為之降取其氣味猛烈得以驟解之意也寒氣既除內結滋甚則宜用以丹參郁李沒藥薑黃三七紫菀柴參貫衆以為之下取其苦以善降不令內滯之意也寒氣既除瘀滯不化則宜用以蒲黃蘇木以為之疏取其氣味宣泄不令鬱滯之意也至有借食人血以治血則有虻蟲水蛭可用借其鹹味引血下走則有茜草血竭瓦楞紫貝䗪蟲鱉甲可取借其質輕靈活不滯則有蓮藕花蕊石可投借其陰氣偏布可解則有螃蟹蚯蚓可啖借其酸澀咸臭以解則有皂礬五靈脂可入惟有苦溫而破則又更有劉寄奴等味但劉寄奴自然銅古文錢三七血竭沒藥䗪蟲則於跌僕損傷而用蚯蚓則於解毒而用丹參則於血瘀神志不安而用水蛭虻蟲桃仁則於蓄血而用花蕊石則於金瘡血出而用五靈脂益母草蒲黃則於婦人血滯而用茜草則於婦人經閉不解而用瓦楞子則為婦人塊積而用斑蝥則為惡瘡惡毒而用鬱金則為血瘀胞絡痰氣積聚而用莪朮則為血瘀積痛不解而用郁李仁則為下氣行水破血而用乾漆則為剷除老血蠱積而用紫貝則為血蠱水積而用貫衆則為時行不正而用鱉甲則為勞熱骨蒸而用紫參則為血痢癰腫而用薑黃則為脾中血滯而用蘇木則為表裡風起而用皂礬則為收痰殺蟲除濕而用生藕則為通調津液而用也至於斑蝥乾漆三七水蛭虻蟲䗪蟲螃蟹瓦楞子花蕊石尤為諸劑中下血敗血之最用之須當審顧不可稍有忽略以致損人元氣於不測中也三七山草入腸明厥陰血分化而為水三七專入肝胃兼入心大腸又名山漆時珍曰或云能合金瘡如漆黏物也甘苦微寒而溫世人僅知功能止血住痛殊不知痛因血瘀則痛作血因敷散則血止三七氣味苦溫能於血分化其血瘀試以諸血之中入以三七則血旋化為水矣此非紅花紫草類也故凡金刃刀剪所作及跌僕杖瘡血出不止嚼爛塗之或為末滲其血即止時珍曰受杖時先服一二錢則血不沖杖後尤宜服之且以吐血衄血下血血痢崩漏經水不止産後惡露不下俱宜自嚼或為末米飲送下即愈並虎咬蛇傷血出可治與血竭同此為陽明厥陰血分之藥故能治一切血病一種庭砌栽植者以苗搗敷腫毒即消亦取散血之意一種春生苗夏高三四尺葉似菊艾而徑厚有岐尖莖有赤稜夏秋開黃花蕊如金絲盤紐可愛而氣不香花干則吐絮如苦英絮根葉味甘治金瘡跌傷出血及上下血病甚效云是三七而根大如牛蒡根與南中來者不類恐是劉寄奴之屬甚易繁衍廣産形如人參者是時珍曰此藥近時出自南人軍中用為金瘡要藥云有奇功有節非研用良茜草蔓草入心包肝行血茜根可染茜草專入心包肝味酸鹹寒色赤功用略有似於紫草但紫草則止入肝涼血使血自為通活此則能入肝與心包使血必為走泄也故凡經閉風痹黃疸疸有黃疸谷疸酒疸黃汗女勞疸皆有寒濕熱濕之別此則專就蓄血以論大抵寒濕宜用茵陳附子茵陳四逆熱濕宜用梔子大黃血瘀宜用桃仁承氣之類因於瘀血內阻者服之固能使瘀下行如值吐崩尿血因於血滯而見艱澀不快者服之更能逐瘀血止總皆除瘀去血之品與於紫草血熱則涼之意貌同實異不可混也但血虛發熱者忌用根可染絳忌鐵紫參山草瀉肝血瘀紫參專入肝兼入胃膀胱又名牡蒙味苦而辛氣寒無毒功專入肝逐瘀破血兼入胃腑膀胱使血自為通利故凡寒熱血痢癰腫積塊心腹積聚因於血瘀阻滯而成者無不可以調治以其味苦則泄味辛入肝寒則勝熱而使血從二便出矣仲景治下痢腹痛而用紫參湯以除亦取散其積血之意聖惠方治吐血不止用紫參人參阿膠炒等分為末烏梅湯服一錢一方去人參加甘草以糯米湯服普濟用五參丸治面上酒刺用紫參丹參人參苦參沙參各一兩為末胡桃仁杵和為丸茶下但市人罕識其真用以紫菀為代雖其寒熱不同而其疏利則一反藜蘆古方治婦人腸覃病烏啄丸所用牡蒙即此物也鬱金芳草入心散瘀通滯鬱金專入心辛苦而平諸書論斷不一有言此屬純陰其論所治皆屬破氣下血之說有言性溫不寒其論所治則有療寒除冷之謂究之體輕氣竄其氣先上行而微下達凡有宿血凝積及有惡血不堪之物先於上處而行其氣若使其邪其氣其痰其血在於膈上而難消者須審宜溫宜涼同於他味兼為調治之震亨曰鬱金屬火與土其性輕揚上行治吐血衄血唾血血腥及經脈逆行並宜鬱金末加韭汁薑汁童尿同服其血自消痰中帶血者加竹瀝又鼻血上行者鬱金韭汁加四物服之如敗血衝心加以薑汁童便去心瘋癲明礬為丸硃砂為衣與受蠱毒加以升麻之類經驗方治失心癲狂用真鬱金七兩明礬三兩為末薄糊丸白湯下又婦人癲狂十年至人授此初服心胸間有物脫去神氣灑然再服而蘇此驚憂痰血絡聚心竅所致鬱金入心去惡血明礬化頑痰故也又範石湖文集云嶺南有挑生之害於飲食中行厭勝法魚肉能反生於人腹中而人以死則陰役其家初得覺胸腹痛次日刺人十日則生在腹中也凡胸膈痛即用升麻或膽礬吐之若膈下痛即以米湯調鬱金末二錢服即瀉出惡物或合升麻鬱金服之不吐則下若使惡血惡痰惡瘀惡淋惡痔在於下部而難消者俟其辛氣既散苦氣下行即為疏泄而無鬱滯難留之弊矣此藥本屬入心散瘀龐安常傷寒論方云斑痘始有白泡忽搐入腹紫黑無膿用鬱金一兩甘草二錢半水半杯煮乾去甘草切片焙研末入冰片五分每用一錢以生豬血五七滴新汲水下因瘀去而金得泄故命其名曰鬱金書云此藥純陰而寒者因性主下而言也有云是藥性溫而言者因氣味辛香主上而言也各有論說不同以致理難畫一耳因為辨論正之出川廣圓如蟬肚外黃內赤色鮮微香帶甘者真市人多以薑黃僞充莪朮芳草瀉肝氣分之血莪朮專入肝辛苦氣溫大破肝經氣分之血蓋人血氣安和則氣與血通血與氣附一有所偏非氣盛而血礙即血壅而氣滯三稜氣味苦平既於肝經血分逐氣莪朮氣味辛溫復於氣分逐血故凡氣因血窒而見積痛不解吐酸奔豚痞癖癥瘕等症者須當用此調治按之應手為症是因傷食所得假物成形為瘕是因傷血所得見於肌膚可見為痞是因傷氣所得結於隱癖不見為癖是因積聚所得五積肝積曰肥氣在左脅下形如覆杯有頭有足如龜鱉狀心積曰伏梁起於臍上大如手臂上至心下脾積曰痞氣在胃脘覆大如盤肺積曰息奔在右脅下覆如大杯腎積曰奔豚發於少腹上至心下如豚奔走之象或上或下亦無定時經曰大積大聚毒可犯也衰其大半而止過者死故去積須以甘溫調養又曰壯者氣行則已怯者則著而成病潔古云壯人無積惟虛人則有之故養正則邪自除俾氣自血而順而不致閉結不解矣但蓬朮雖屬磨積之味血積宜用桃仁山甲乾漆大黃虻蟲蓬朮瓦楞子痰積宜用半夏南星白朮枳實礞石硝石風化硝白芥子海石蛤粉水積宜用大戟甘遂蕘花芫花酒積宜用乾葛神麯砂仁豆蔻黃連乾薑甘遂牽牛茶積宜用薑黃茱萸椒姜癖積宜用三稜莪朮巴霜大黃肉積宜用山楂阿魏硝石蠱積宜用雄黃錫灰檳榔雷丸蕪荑使君子鶴蝨瘧積宜用桃仁鱉甲草果若虛人服之最屬可危須得參朮補助為妙大者為廣朮頌曰此物極堅硬難搗灰火煨透乘熱搗之或醋磨酒磨或煮熟用薑黃芳草破脾中氣血下行薑黃專入脾味辛而苦氣溫色黃功用頗類鬱金苦寒色赤三稜苦平皮黑肉白蓬朮味苦色黑延胡索辛苦色黃但鬱金入心專瀉心包之血莪朮入肝治氣中之血三稜入肝治血中之氣延胡索則於心肝血分行氣氣分行血此則入脾既治氣中之血復兼血中之氣耳陳藏器曰此藥辛少苦多藏器曰性熱不冷性氣過於鬱金破血立通下氣最速凡一切結氣積氣癥瘕瘀血血閉癰疽並皆有效以其氣血兼理耳時珍曰古方五痹湯用片子薑黃治風寒濕氣手臂痛戴原禮要訣云片子薑黃能入手臂治痛其兼理血中之氣可知若血虛腹痛臂痛而非瘀血凝滯者用之反劇蜀川産者色黃質嫩有須折之中空有眼切之分為兩片者為片子薑黃和劑方治胎寒腹痛啼哭吐乳大便色青狀若驚搐出冷汗薑黃一錢沒藥二錢乳香二錢為末蜜丸芡子大每服一丸鉤藤湯下經驗方心痛難忍用薑黃一兩桂三兩為末醋湯服一錢立效廣生者質粗形扁如乾薑僅可染色不可入藥服之有損無益蒲黃水草生用宣瘀通滯炒用止血蒲黃專入肝味甘氣平功用無他但以生用熟用炒黑分其治法耳以生而論則凡瘀血停滯腫毒積塊跌僕傷損風腫癰瘡溺閉不解服之立能宣泄解除時珍曰一婦舌脹滿口以蒲黃頻滲比曉乃愈宋度宗舌腫滿口御醫用蒲黃乾薑末等分搽之愈觀此則蒲黃之涼血可知矣蓋舌為心苗心包相火乃其臣使得乾薑是陰陽相濟也失笑散用此同五靈脂治血氣滯痛以熟焦黑則凡吐血下血腸風血尿血痢服之立能止血然此止屬外因可建奇功若內傷不足之吐衄則非此所能治者矣丹參山草破心包血瘀安神志四物湯亦有産前産後不得妄用為醫者勿拘死法可耳丹參專入心包絡兼入肝味苦色赤性平而降時珍曰五參五色配五臟故人參入脾曰黃參沙參入肺曰白參玄參入腎曰黑參牡蒙入肝曰紫參丹參入心曰赤參其苦參則右腎命門藥也古人舍紫參而稱苦參未達此義書載能入心包絡破瘀一語已盡丹參功效矣然有論其可以生新安胎調經除煩養神定志及一切風痹崩帶癥瘕目赤疝痛瘡疥腫痛等症時珍曰按婦人明理論云四物湯治婦人病不問産前産後經水多少皆可通用惟一味丹參散主治與之相同蓋丹參能破宿血補新血安生胎落死胎止崩中帶下調經脈其功大類當歸地黃芎藭芍藥故也總皆由其瘀去以見病無不除非真能以生新安胎養神定志也凡妊娠無故大便不實者切忌畏鹽水忌醋反藜蘆益母草隰草入心包肝逐瘀益母草專入心包肝一名茺蔚辛微苦寒功能入肝心包絡消水行血去瘀生新調經解毒為胎前胎後要劑是以無胎而見血淋血閉血崩帶下血痛帶下者因病生於帶脈之意也帶脈橫於腰間凡病人下白則為白帶屬氣虛宜補中益氣下赤則為赤帶屬血虛宜養血滋陰而兼調氣既胎而見胎漏臨産而見難産已産而見血暈疔腫乳癰等症服此皆能去瘀生新時珍曰益母草根莖花葉實並皆入藥若治肝經風熱明目益精調經則用子若治腫毒瘡瘍消水行血婦人胎産諸病則宜並用為良蓋因根莖花葉專於行血而子則行中有補也蓋味辛則於風可散血可活味苦則於瘀可消結可除加以氣寒則於熱可療並能臨症酌施則於母自有益耳外此番痧腹痛嘔之用此濃煎恣飲亦取能散惡血若其病非惡血則非所宜然氣味辛散瞳子散大者其切忌之益母子主治略同但行中有補非若益母草徒以消水行血為事也小暑端午及或六月六日採取良濟陰返魂丹六月六日採花葉實為末蜜丸治胎産百病近效方搗汁熬膏良忌鐵子微炒用劉寄奴隰草活血通瘀劉寄奴專入肝因何而有是名據書載是劉裕小字寄奴曾射一蛇目見童子搗藥問之答為寄奴所傷被裕罵而收藥每遇金瘡敷之即愈故以寄奴是名但此雖非屬真而藥味苦微溫多能破瘀通經除症下脹及止金瘡血出大小便血湯火傷毒緣血之在人身本貴通活滯而不行則血益滯而不出而癥瘕脹滿愈甚行而不止則血亦滯而不收而使血出益甚寄奴總為破血之品故能使滯者破而即通而通者破而即收也抉盡破血止血實義古書止言治功而不詳繹其義殊覺疏漏但性多走泄不可過服令人吐利不止莖葉花子皆可用蘇木喬木涼血破瘀蘇木專入心胃甘鹹辛涼功用有類紅花少用則能和血多用則能破血但紅花性微溫和此則性微寒涼也故凡病因表裡風起而致血滯不行暨産後血暈脹滿以死及血痛血瘕經閉氣壅癰腫跌撲損傷等症皆宜相症合以他藥調治如疏風則與防風同用行血則與乳香同用海藥方但性平疏泄産後惡露已盡大便不實者均應禁用出蘇方交愛交州愛州忌鐵沒藥香木入心破血宣瘀止痛沒藥專入心兼入肝苦平兼辛諸書亦載能補心膽與肝蓋謂瘀血不除則新血安生乳香氣味辛溫既能行氣活血又有沒藥之苦以破其瘀則推陳致新自有補益之妙宗奭曰沒藥大概通滯血血滯則氣壅瘀氣壅瘀則經絡滿急經絡滿急故痛且腫凡打撲跌皆傷經絡氣血不行瘀壅作腫痛也是以古方乳香必同沒藥兼施生肌散每每相兼而用謂其可止疼痛義由此也今人不明藥品氣味動以書載補益豈不誤甚出南香色赤類琥珀者良治同乳香郁李仁灌木入脾下氣行水破血郁李專入脾兼入膀胱大腸世人多合胡麻同用以為潤燥通便之需然胡麻功止潤燥暖中活血非若郁仁性潤其味辛甘與苦而能入脾下氣行水破血之劑也故凡水腫癃急便閉關格不通得此體潤則滑味辛則散味苦則降與胡麻實異而又可以相需為用者也按宋史錢乙傳云一乳婦因悸而病既已目張不得瞑乙曰煮郁李酒飲之使醉即愈所以然者目系內連肝膽恐則氣結膽橫不下郁李仁去結隨酒入膽結去膽下則目能瞑矣此蓋得肯綮之妙者也然此止屬治標之劑多服恐滲液而益燥結不解耳去皮尖蜜浸研乾漆喬木剷除老血久積伏蠱乾漆專入肝脾味辛氣溫有毒弘景曰生漆毒烈人以雞子和服之去蠱猶自齧腸胃也有降無升專破日久凝結之血及削年深堅結之積緣人感受風寒暑濕鬱而為病則中外不舒胃中有物留滯不消久而生蟲血積不化結而為瘀由是陽氣竭澤津液枯槁癱瘓風痹因之不免用此辛溫毒烈之性剷除瘀積中氣得復絶傷皆續而緩急和矣按血見漆化水故能化蠱破血千金三蠱方皆賴以之為君震亨曰漆性急而飛用之中節積滯去後補性內行人不知也本經言能輕身者以其蠱去而身自輕之謂也所謂中氣可復絶傷可續者亦因瘀去而中自復與傷自續之謂也但無積血者切忌以其傷營血損胃氣耳炒令煙盡為度試漆訣云微扇光如鏡懸絲急似鉤撼成琥珀色打著有浮漚若患漆瘡以生蟹汁紫蘇解之相感志云漆得蟹而成水蓋物性相制也凡人畏漆者嚼蜀椒塗口鼻則可免血竭香木入肝血分破瘀血竭專入肝系南番樹木之液猶人之膏脂者是味甘而咸性平色赤按五味惟甘主補咸主消血竭味甘雖能和血收口止痛生肌然味鹹則消卻能引膿性專入肝經血分破瘀故凡跌僕損傷氣血攪刺內傷血聚並宜同酒調服通氣乳香沒藥雖主血病而亦兼入血分此則專入血分而不兼及氣分者也但性最急迫引膿甚利不可多服的解凡血病無積瘀者不必用之以染透指甲燒灰不變色者佳藥肆僞造甚多有用松香同藥染成有以海母亂真真者絶少同衆藥搗用則作飛塵得密陀僧良桃仁五果入心包肝破血通瘀桃仁專入心包肝辛苦甘溫為厥陰心包肝血分主藥夫血者陰也有形者也周流乎一身一有凝滯則為癥瘕瘀血血閉或婦人月水不通或跌撲損傷積血及心下宿血堅痛皆從足厥陰受病以其為藏血之臟也苦能泄滯辛能散結甘溫通行而緩肝故並主之所以為蓄血必需之藥成無己曰肝者血之源血聚則肝氣燥肝苦急急食甘以緩之桃仁之甘以緩肝以散血故張仲景抵當湯用之以治傷寒八九日內有蓄血發熱如狂小腹滿痛小便自利者又有當汗失汗熱毒深入吐血及血結胸煩燥譫語者亦以此湯主之與虻蟲水蛭大黃同用且桃為五木之精能鎮闢不祥故主辟邪味苦而辛故能殺小蟲雖云苦能去滯甘能生辛但苦重甘微氣薄味厚沉而下降故瀉多補少散而不收用之不當及過用多用使血下不止損傷真陰不可不慎張璐曰大抵氣血喜溫而惡寒寒則泣不能流溫則消而去之此軒岐密旨但世之名於醫者一見血症每以寒涼濟陰為務其始非不應手而取效於一時屢發屢折而既病之虛陽愈衰必致嘔逆喘乏奪食泄瀉尚以藥力未逮猛進苦寒有陰不濟陽而上溢者尚為戈戟況陽不統陰而亡脫者尤為砒鴆蓋因陽藥性暴稍有不順下咽立見其害不若陰柔之性至死不知其誤而免旁人之譏謗也噫醫之弊僅可為知己道難為俗人言耳行血連皮尖生用潤燥去皮尖炒用俱研碎或燒存性用雙仁者有毒不可食香附為使詵曰能發丹石毒生者尤損人瑞曰桃與鱉同食患心腹痛服術人忌之蓮藕水藕入心脾血分消瘀清熱蓮藕專入心脾出瘀泥而不染其根通達諸竅聯綿諸絡允為交構黃宮通調津液之上品味甘性寒入心脾血分冷而不泄澀而不滯故凡産後血積煩悶酒後煩渴藕汁蜜和服盛怒血淋以灰髮二錢藕汁調服痛脹霍亂虛渴失血血痢並金瘡折傷酒毒蟹毒搗爛熱酒調服一切屬熱屬瘀服之立為解除若非熱非瘀服之增病以其有破血止熱之力也煮熟甘溫益胃補心實腸久服令人心歡並搗塗拆裂凍瘡熱搗塗患處孟詵曰産後忌生冷獨藕不忌謂其能散瘀血也散字作通字看不作表散言噤口痢服能止結糞自下胃氣自開者亦以熱除血解而言冷痢噤口者忌服熟服止瀉實腸者以其有溫補之力也益脾補心者以其味甘入胃多孔象心之謂也時珍曰藕生於卑汙而潔白自若質柔而穿堅居下而有節孔竅玲瓏絲綸內隱生於嫩弱而發為莖葉花實又復生芽以續生生之脈四時可食令人心歡可謂靈根矣故其所主者皆心脾血分之疾與蓮之功稍不同云弘景曰宋時太官作血䘓音勘庖人削藕皮誤落血中其血渙散不凝故醫家用以破血多效䘓者血羹也但世搗澄藕粉多以豆麥菱粉僞充真者絶少藕節味澀同生地汁童便善止一切吐衄血症忌鐵相感志云藕以鹽水俱食則不損口同油炸面米果食則無渣煮忌鐵器自然銅金散血瘀接骨止痛自然銅專入骨因何用能接骨蓋緣骨被折傷則血瘀而作痛得此辛以散瘀破氣則痛止而傷自和也而骨安有不接乎且性秉堅剛於骨頗類故能入骨而接是以有合乳香沒藥䗪蟲五銖古錢麻皮灰血竭胎骨作丸煎當歸地黃續斷牛膝丹皮紅花濃湯送下以治跌撲損傷最效但中病即已不可過服以致真氣走泄耳震亨曰自然銅世以為接骨之藥然此等方盡多大抵宜補氣補血補胃俗工惟在速效迎合病人之意而銅非煅不可用若産後血虛者忌服産銅坑中火煅醋淬七次細研新出火者其火毒金毒相煽挾香藥熱毒雖有接骨之功燥散之禍甚於刀劍甘草水飛用古文錢金破瘀開結散滯古文錢專入肝腎氣味辛涼雖曰屬銅有毒然歷久氣化其毒無多時珍曰古文錢但得五百年之外者即可用考其主治有曰能治目赤翳障婦人生産橫逆者是能開其血氣壅塞之路也宗奭曰豫少時常患赤目腫痛數日不能開客有教以生薑一塊洗淨去皮以古青銅錢刮汁點之初甚苦熱淚蔑面然終無損後有患者教之往往疑惑信士點之無不一點遂愈更不須再但作瘡者不可用也有曰能治心腹痛者是能散其血氣凝結之意也有曰能治月解不來者是能解其胞脈也有曰能治五淋者是能通其衝任熱壅也有曰能治跌撲損傷者火煅醋淬四十九次是能入其受傷凝滯之所而消其血瘀也故治目赤翳障則須用以生薑汁塗刮青點目生內障生花不用治婦人逆産五淋則須煮汁以服治便毒初起則與胡桃肉同嚼食二三枚即消以金伐木者故耳或煮湯或刮青或醋服各依本方制用花蕊石石通瘀止血花蕊石專入肝雖産硫黃山中號為性溫然究味酸而澀其氣亦平故有化血之功耳是以損傷諸血胎産惡血血暈並子死腹中胞衣不下服之體即疏通瘀血化為黃水金瘡血流敷即合口誠奇方也頌曰近世以合硫黃同煅研末敷金瘡其效如神人有倉卒金刃不及煅治者但刮末敷之亦效但此原屬劫藥時珍曰花蕊石嘗試其味酸澀其功專於止血能使血化為水酸以收之也東垣所謂胞衣不出澀劑可以下之蓋赤石脂亦能下胞胎與此義同下後止後須以獨參湯救補則得之矣若使過服則於肌血有損不可不謹以罐固濟頂火煅過出火毒研細水飛曬乾用皂礬石收痰除濕去毒殺蟲破血分積垢皂礬專入脾兼入肝即緑礬等於白礬味亦酸鹹而澀有收痰除濕去蠱殺蟲之功但力差於白礬而稍緩耳且此色緑味酸燒之則赤用以破血分之積垢其效甚速如金匱之治女勞黑疸硝石礬石丸專取皂礬以破積瘀之血且治喉痹用此以取酸湧化涎之力同米醋研食之咽汁立瘥惡瘡疥癬用以收燥濕解毒之功腸風瀉血用此以收消散濕熱之後又有收澀之功也然而諸治之外又善消積滯凡腹中堅積諸藥不能化者以紅礬同健脾消食藥為丸投之輒消按張三丰仙傳云治脾土衰弱肝木氣盛木來剋土心腹中滿或黃腫如土色宜伐木丸方用蒼朮二斤米泔水浸同黃酒面面四兩炒赤色皂礬一斤醋拌曬乾火煅為末醋糊丸每服三四十丸好酒米湯下日三服時珍常以此加平胃散治賤役中腹滿果驗但胃弱人不宜多用服此者終身忌食蕎麥犯之立斃青瑩淨者良煅赤用畏醋五靈脂原禽入肝行血破瘀止痛五靈脂專入心肝即北地寒號蟲鳥矢也時珍曰曷旦乃候時之鳥也五臺諸山甚多其狀如小雞四足有肉翅夏月毛採五色自鳴若曰鳳凰不如我至冬毛落如鳥雛忍寒而號曰得過且過其矢恆集一處氣甚臊惡粒大如豆採之有如糊者有黏塊如糖者人亦以砂石雜而貨之凡用以糖心潤澤者為真以其受五行之靈其矢狀如凝脂故有五靈脂之號其氣腥臭難聞其味苦酸而辛惟其腥穢難聞故能入血凝臭穢之處而療其病惟其味苦酸而辛故能入心與肝而泄其滯是以心中血氣刺痛婦人産後少腹兒枕塊痛及痰挾血成窠囊血凝作痛目翳往來不定等症皆為血分行氣必需之藥宗奭曰有人病目中翳往來不定此乃血所病也肝受血則能視目病不治血為背理也用五靈脂之藥而愈又有人被蛇毒所傷良久昏憒僧以酒調藥二錢灌之遂蘇仍以滓敷咬處少頃復灌二錢其苦皆去問之乃五靈脂一兩雄黃半兩同為末耳又李仲南云五靈脂治崩中非止治血之藥乃去風之劑風動物也衝任經虛治風傷襲營血以致崩中暴下與荊芥防風治崩義同方悟古人識見深遠如此此亦一說但未及肝血虛滯亦自生風之意按沖為血海任為胞胎任脈通衝脈盛則月事以時下無崩漏之患且易生子若女子血崩經水過多赤帶不止宜半生半炒酒調服之亦治氣逆癲癇及解蟲毒藥毒但此氣味俱厚辛膻不堪綱目指為甘溫張氏謂非正論改為性寒不為無見故僅可治有餘之滯若使氣血不足服之大損真氣腥更使人動吐所當避也酒飛去砂石曬乾入藥行血宜生止血宜炒惡人參瓦楞子蚌蛤瀉肝經血分積塊瓦楞子專入肝即今所謂蚶子殼者是也味鹹而甘性平故治多主消血化痰除積為婦人血塊癥瘕男子痰癖積聚要藥積者陰氣也五臟所生其始發有常處其痛不離其部上下有所終始左右有所窮處謂之積聚者陽氣也六腑所成其始發無根本上下無所留止其痛無常處謂之聚積聚之症非止根於偶爾食積不化之可用以化氣消導之劑緣經有言卒然飽食多飲則腸滿起居不節用力過度則絡脈傷傷於陽絡則血外溢血外溢則衄血傷於陰絡則血內溢血內溢則後血傷於腸胃之絡則血溢於腸外腸外有寒汁沫與血相搏則併合凝聚不得散而積成矣且以胃之大絡名曰虛里貫膈絡肺出於左乳之下其動應衣是即陽明宗氣所出之道凡人飲食不節漸以留滯而致痞積成於左脅膈膜之外者即此候也是以昔人有云此與鱉甲虻蟲同為一類皆能消瘧除積但虻蟲其性最迅此與鱉甲其性稍緩耳煅紅醋淬三次用斑蝥卵生破惡氣惡毒斑蝥專入下部最屬惡物聞人捕捉即於尾射出惡氣令人臭不可聞近人肌肉則潰入胎則墮其毒概可知矣神農本草經云春食芫花為芫青夏食葛花為亭長秋食豆花為斑蝥冬入地中為地膽按芫青青緑花尤毒亭長黑身赤頭斑蝥斑色地膽黑頭赤足其味辛其氣寒其性下走而不上專走下竅直至精溺之處蝕下敗物痛不可當故書言外用止可以蝕死肌敷疥癬惡瘡內治止可以破石淋拔瘰癧疔腫下犬傷惡毒而已取其以毒攻毒也然惟實者可用其拔瘰癧毒則以斑蝥法制使令毒根從便出如粉片血塊爛肉之形楊登甫曰瘰癧之毒莫不有根大抵治以斑蝥地膽為主制度如法能令其根從小便出如粉片血塊爛肉次以木通滑石燈心草輩導之但下犬毒之初先於患人頭上拔去血發二三莖以斑蝥七枚去翅足炙黃用蟾蜍搗汁服之瘡口於無風處嗍去惡血小便洗淨發炙敷之服後小便當有瘀毒泄出三四日當有狗肉三四十枚為盡如數少再服七枚若愈後忌聞鐘聲復發則不可治矣去頭足糯米炒熟生用則吐瀉人亦有用米取氣不取質者畏巴豆丹參惡甘草芫花水蛭卵生破血墮胎水蛭專入肝即馬黃蜞生於陰濕之處善食人血味鹹與苦氣平有毒與虻蟲功用相似通利水道破血墮胎故月閉血瘕積聚無子並腫毒惡瘡折傷皆能有效然煅之存性見水復能化生齧人臟腑破瘀之藥甚多何須用此如犯之者止用黃泥作丸吞之必入泥而出以土製水故也時珍曰昔有途行飲水及食水菜誤吞水蛭入腹生子為害啖咂臟血腸痛黃瘦者惟以田泥或擂黃土飲數升則必盡下出也蓋蛭在人腹得土氣而下耳凡用須預先熬黑七日置水中不活者方用畏石灰食鹽柯琴曰水蛭水物陰於食血虻蟲飛物猛於食血虻蟲化生破血墮胎虻蟲專入肝微苦微咸氣寒有毒善齧牛馬豬血因其性以為用故以之治一切血結諸病故凡病血蓄而見身黃脈結腹痛如狂小便利並堅瘕積塊瘧母九竅閉塞者服之自克有效以苦泄結咸走血故也且色青入肝服之宜入肝臟血分而散之矣河間云虻食血而治血因其性而為用也仲景合水蛭用此以治太陽蓄血如狂亦是此意但性屬惡毒以此治病是猶刑罰之治盜賊非得已也去翅足炒用惡麻黃䗪蟲化生涼血破積軟堅接骨䗪蟲專入肝即屬地鱉又名土鱉者是也味鹹性寒其物生於土中伏而不出善攻隙穴以刀斷之中有汁如漿鬥接即連復能行走故書載跌撲損傷續筋接骨義由此耳真奇物也且人陰血貫於周身雖賴陽和亦忌燥烈若熱氣內郁則陰陽阻隔而經絡不通因而寒熱頓生得此鹹寒入血軟堅則凡血聚積塊癥瘕靡不因是而除而血脈調和營衛暢達月事時至又安有血枯血閉而不見其生育者乎故又能治諸般血症而使挾孕而有子也是以古人用此以治跌撲損傷則多合自然銅龍骨血竭乳香沒藥五銖錢黃荊子麻皮灰狗頭骨以治下腹痛血痛血閉則合桃仁大黃以治頌曰張仲景治雜病方及久病積結有大黃䗪蟲丸又有大鱉甲丸及婦人藥並用之以其有破堅下血之功各隨病症所因而用之耳陰乾臨時研入畏皂莢菖蒲屋遊螃蟹龜鱉除血熱血滯化血為水螃蟹專入胃肝最屬陰寒故書所述利弊大令人駭如蟹與柿同食則令人泄瀉及發癥瘕與孕婦食則能使胎即下而爪尤甚以蟹燒煙則能集鼠於庭弘景曰以黑犬血灌蟹三日燒之諸鼠畢至同銀硃燒煙則能使臭蟲即斃蟹近於漆則能化漆為水筋骨損斷用蟹搗爛微炒納入瘡中則能使筋即連他如胸中熱結喎闢面腫及蓄血發黃婦人乳癰硬腫小兒顱解凡因熱結熱滯而成者無不用之立效其化血為水逐熱消瘀未有若是其神者矣總緣性屬鹹寒外骨內肉生青熟赤陽包陰象陰氣純布故克見其迅利耳若血因寒滯及腹中疼痛喜熱惡寒者其切忌焉醃蟹宜入蒜頭則不沙蔽中蟹毒者宜搗藕節熱酒調服宗奭曰此物極動風風疾人不可食屢見其事
