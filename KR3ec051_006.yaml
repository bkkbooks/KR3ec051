body:
  text: 卷六雜劑殺蟲病不外乎虛實寒熱治不越乎攻補表裡所以百病之生靡不根於虛實寒熱所致即治亦不越乎一理以為貫通又安有雜治雜劑之謂哉惟是虛實異形寒熱異致則或內滯不消而為傳尸鬼疰外結不散而為癰疽瘡瘍在蟲既有虛實之殊寒熱之辨而毒亦有表裡之異升降之別此蟲之所必殺而毒之所以必治也至於治病用藥尤須審其氣味沖和合於人身氣血相宜為貴若使辛苦燥烈用不審顧禍必旋踵謹於雜劑之中又將惡毒之品另為編帙俾人一覽而知庶於本草義蘊或已得其過半云又按蟲之生本於人之正氣虧損而成體實者其蟲本不易生即生亦易殄滅體虛者其蟲乘空內蓄蓄則即為致害害則非易治療考之方書所載治蟲藥品甚多治亦錯雜不一如黃連苦參黑牽牛扁蓄是除濕熱以殺蟲也大黃朴硝是除熱邪以殺蟲也苦楝子青黛藍子是除鬱熱以殺蟲也雷丸蘆薈蚯蚓是除熱積以殺蟲也貫衆是除時行熱毒以殺蟲也青葙子是除肝經風熱以殺蟲也故其為藥皆寒而不溫蒼耳子松脂密陀僧是除風濕以殺蟲也故其為藥稍溫而不涼川椒椒目是降寒濕水濕以殺蟲也故其為藥溫燥而不平蘇合香雄黃阿魏樟腦蛇蛻是除不正惡氣以殺蟲也故其為藥最辛最溫水銀銀硃輕粉鉛粉黃丹大楓子山茵陳五倍子百藥煎是除瘡疥以殺蟲也故其為藥寒熱皆有紫貝桃仁乾漆皂礬百草霜是除血瘀以殺蟲也故其藥亦多寒熱不一厚朴檳榔是除濕滿瘴氣以殺蟲也故其為藥苦溫而平谷蟲鶴蝨使君是除痰食積滯以殺蟲也故其為藥又溫而又寒獺肝是補肝腎之虛以殺蟲也故其藥味咸而氣溫至於棐實則能潤肺以殺蟲烏梅則能斂肺以殺蟲百部則能清肺散熱以殺蟲皆有不甚寒燥之虞且蟲得酸則止凡烏梅五倍子等藥非是最酸之味以止其蟲乎得苦則下凡大黃黃連苦楝根蘆薈苦參非是至苦之味以下其蟲乎得辛則伏凡川椒雄黃乾漆大楓子阿魏輕粉樟腦檳榔非是最辛之味以伏其蟲乎得甘則動凡用毒蟲之藥必加甘蜜為使非是用以至甘之味以引其蟲乎至於寒極生蟲可用薑附以為殺蟲欲上出可用藜蘆上湧以為殺熱閉而蟲不下可用芫花黑牽牛以為殺蟲食齲齒可用胡桐淚莨菪韭子蟾酥以為之殺蟲食皮膚而為風癬可用川槿皮海桐皮以為殺九蠱陰蝕之蟲可用青葙子覆盆葉以為之殺癆瘵之蟲可用敗鼓心虎糞骨獺爪鸛骨以為之殺但用多屬辛苦酸澀惟使君棐實治蟲按書偏以甘取義實有在自非精於醫道者所可與之同語也鶴蝨隰草入肝除瘀凝滯殺蟲鶴蝨專入肝氣味苦平即杜牛膝子功專入肝除逆故凡一身痰凝氣滯得此苦以疏泄則痰氣頓解而蟲自無安身之地矣況蟲得苦則伏如小兒蛔齧腹痛用以鶴蝨研末納於肥肉汁中投服其蟲自下蟲痛面白唇紅時作時止非其蟲因苦逐曷克有是但藥肆每以胡蘿蔔子代充不可不辨千金方曰人腹生蟲大率有九一曰伏蟲長四分為群蟲之主二曰蛔蟲長一尺生髮多則貫心而殺人三曰白蟲即寸蟲長一寸子孫相生其母轉大長至四五丈亦能殺人四曰肉蟲狀如爛杏令人煩滿五曰肺蟲狀如蠶令人咳嗽六曰胃蟲狀如蝦蟆令人嘔吐胃逆喜噦七曰弱蟲又名膈中狀如瓜瓣令人多唾八曰赤蟲狀如生肉令人長鳴九曰蟯蟲形極微細有如菜蟲居於廣腸之間多則為痔劇則為癩因人瘡痍即生癰疽癬瘻瘑疥齲蟲無所不為雷丸寓木除熱消積殺蟲雷丸專入胃味苦而咸性寒小毒本竹餘氣所結得霹靂而生故有雷丸之號功專入胃除熱消積化蟲故凡濕熱內郁癲癇狂走汗出惡風蟲積殆甚腹大氣脹蟲作人聲者服之即能有效蟲在肝令人恐怖眼中赤壅蟲在心令人心煩發燥在脾使人勞熱四肢腫急在肺使人咳嗽氣喘以其秉性純陰兼味至苦感其霹靂故能去其邪魅也所云惟利男子不利婦人亦以婦人屬陰故於陰物不宜耳志曰久服令人陰痿究之果屬腎熱亦又何礙但無蟲積不得妄用皮黑肉白者良若肉紫黑者殺人甘草水浸一宿酒拌蒸或泡用厚朴芫花為使惡葛根繡按綱目述楊勔腹有小聲應人後讀至本草雷丸不應知為應聲蟲害其説不無可疑蘆薈香木除熱殺蟲蘆薈專入肝兼入脾心即波斯國木脂大苦大寒功專殺蟲除疳安心明目最為小兒驚癇疳積上品蘆薈使君子等分為末米飲下且能吹鼻殺腦疳及除鼻癢劉禹錫傳信方云豫少年曾患癬初在頸項間後延上左耳遂成濕瘡浸淫用諸藥徒令蜇蠚其瘡轉甚偶遇楚州賣藥人教用蘆薈一兩炙甘草末半兩研末先以溫漿水洗癬拭淨敷之立干便瘥真神奇也然苦雖能殺蟲寒能療熱而氣甚穢惡氣血得香則順得臭則逆所當慎投僅可施之藜藿若胃虛少食人得之入口便大吐逆遂致奪食泄瀉因而羸瘦怯弱者多矣如黑錫味苦色緑者真阿魏香木入脾胃消痞除穢殺蟲阿魏專入脾胃出西番波斯國中阿虞木枝梗汁味辛氣平而溫且極臭烈故書載能殺蟲辟惡又其味既兼辛與溫則氣更活不滯故書載治痞闢穢是以溫瘧鬼魅蠱毒傳尸惡氣痞積等症服之最為得宜王璆百一選方治久瘧用真阿魏丹砂糊丸人參湯下但人血氣聞香則順遇臭則逆故胃虛氣弱之人雖有痞積但當溫胃和氣俾痞自消切勿用此臭烈以傷胃氣至辨真偽則但取少許安置銅器一宿沾處白如銀色者真以真最屬難得古人已有黃芩無假阿魏無真之説矣用鉢細研熱酒器上裛過入藥大楓子香木性熱殺蟲大楓子專入肝脾本屬毒藥耳按據諸書皆載味辛性熱其藥止可取油以殺瘡疥若用此以治大風病則先傷血而失明矣故以大楓子名故凡血燥之病宜用苦寒以勝縱有瘡疥宜辛宜熱而血有受損不更使病益劇乎即或效以驟成功以劫致然烈毒之性不可多服惟用外敷不入內治其功或不沒也凡入丸藥湯藥俱宜除油為妙棐實夷果潤肺殺蟲化水棐實專入肺甘澀微苦體潤而滑性平無毒按據諸書有言氣味苦寒能瀉濕熱為肺家之果又云性溫散氣能去腹中邪氣及殺諸蟲皆無定論余按棐實甘潤是其本質凡肺不潤而燥者得此則宜故有解燥除熱之功非書所云能除濕熱之意乎又其燥熱內擾則蟲自爾見蝕而五痔腹脹等症自爾悉形服此燥氣悉除腸胃頓清其氣自爾不結非書所謂溫能散氣之意乎又書有載有毒無毒在人食既無病又能以此療病毒何由見非書所云無毒之説乎又其苦澀兼備既能清燥潤肺復於蟲蝕性味不合令其即化為水非書所云有毒之説乎究之止屬潤肺解熱殺蟲之品其言有毒止是毒蟲之毒而非毒人之毒也其言無毒因非毒人之毒而為毒蟲之毒也故凡一切肺燥而見咳嗽不寧腹中不和五痔惡毒並小兒黃瘦便祕不解等症服之無不奏效好食茶葉面黃每日食棐子七枚以愈為度治寸白蟲日食棐子七枚滿七日蟲皆化為水昔東坡詩云驅除三彭蠱愈我心腹疾義正是矣但多食則有滑腸之虛炒食味即香酥甘美更有引火入肺大腸受傷之慮不可不細察耳忌鵝肉反緑豆能殺人物類相感志云棐煮素羹味更甜美豬脂炒棐黑皮自脫棐子同甘蔗食其渣自軟水銀石殺諸蟲瘡疥水銀走而不守從石中迸出者為石汞從丹砂中出者為朱里汞究皆丹砂液也性稟至陰辛寒有毒質重著而流利得鹽礬為輕粉加硫黃為銀硃煬成罐同硫黃打火升煉則為靈砂同皂礬則為升降靈丹藥之飛騰靈變無有過是故以之殺諸蟲疥瘡也然其陰之性近於男子陰器則必消痿無氣入耳能蝕人腦至盡頭瘡切不可用入肉令百節攣縮外敷尚防其毒之害內服為害不待言而可知矣今人有水銀燒成丹砂醫人不曉誤用不可不謹得棗肉入唾同研則散得鉛則凝得硫黃則結時珍曰水銀陰毒之物無似之者而大明言其無毒本經言其久服成仙甄權言其還丹元母抱朴子以為長生之藥六朝以下貪生者服食至成廢篤而喪厥軀不知若干人矣方士固不足道本草其可妄言哉水銀但不可服食耳而其治病之功不可掩也同黑鉛結砂則鎮墜又鉛同硫黃結砂則拯救危病此乃應變之兵在用者能得肯綮而執其樞要耳得紫河車則伏得川椒則收水銀失在地者以花椒茶末收之銀硃石殺蟲治瘡銀硃外治系水銀同煅煉成朱性燥味辛方書用以殺蟲治瘡亦是以毒解毒而已用以食服古人切戒謂其性悍烈良非所宜時珍曰功過與輕粉同且同蟹殼燒之則臭蟲絶迹和棗肉熏之則瘡疥頓枯於此可徵其概矣輕粉石殺蟲治疥卻瘀消積輕粉專入筋骨系水銀加鹽礬升煉而成水銀一兩白礬二兩食鹽一兩入鐵器內盆覆封固升煉又法水銀一兩皂礬七錢白鹽五錢同上升法一兩汞可升粉八錢按水銀金之魂魄緑礬鐵之精華二氣同根是煉製成粉無鹽則色不白也雖是化純陰而為辛燥然陰毒之性猶存故能殺蟲治瘡劫痰消積烈毒之性走而不守今人用治楊梅瘡毒雖能劫風痰濕熱從牙齦而出暫得寬解劉完素曰銀粉能傷牙齒蓋上下齒齦屬手足陽明之經毒氣感於腸胃而精神氣血水穀既不勝其毒則毒即循經上行而至齒齦嫩薄之分然毒氣竄入筋骨血液耗損久久發為結毒遂成廢人仍須用水銀升煉入三白丹引拔毒之藥同氣搜逐癘風醉仙丹通天再造散用以搜剔毒邪仍從齒縫而出再以錢氏利驚丸白餅子並用取痰積從大便而出矣時珍曰黃連土茯苓陳醬黑鉛可制其毒畏磁石石黃忌一切血本出於丹砂故也閨閣事宜作女人面脂用輕粉滑石杏仁去皮尖等分蒸過入腦麝為末以雞子清調勻名太真紅玉膏洗面畢敷之旬日色如紅玉谷蟲卵生消食積谷蟲專入腸胃味苦性寒出於糞中故仍取其入腹消積俾其不傷正氣也其法漂淨炙黃為末調服又用蝦蟆數十隻打死置於鐔內取谷蟲入內食盡然後淘除穢惡取谷蟲焙乾凡小兒疳積腹大腳弱翳膜遮睛及大人熱結譫語毒利作嘔並宜服之無不立效是以鼻齒疳瘡取此有尾者燒灰一錢同褐衣灰和勻頻吹最效與利骨取牙用白馬腦上肉一二斤待生蛆與烏骨白雞一隻食之取糞陰乾每一錢入硇砂一錢研勻用少許擦疼處片時即落皆取穢以入穢遇骨與肉鑽入之意無他義也發毒內經曰營氣不從逆於肉裡乃生癰腫又曰諸痛瘡癢皆屬心火又觀丹溪有言癰疽皆因陰陽相滯而生則是癰疽之發固合內外皆致而不僅於肉裡所見已也但其毒氣未深等於傷寒邪初在表其藥止宜升發而不遽用苦寒俾其毒從外發若稍入內為殃則毒勢纏綿不已而有毒氣攻心必死之候矣豫按發毒之藥品類甚多凡三陽升麻柴葛羌防白芷荊芥薄荷桔梗等藥何一不為發毒散毒之最山甲皂角等藥何一不為驅毒追毒之方至於蜈蚣則能驅風通瘀散結蛇蛻則能驅風辟惡野菊花則能散火逐氣王不留行則能行氣宣滯皆為祛散惡毒之劑外有蟾酥蟾蜍力能透拔風邪火毒象牙力能拔毒外脫楓香力能透毒外出人牙力能入腎推毒胡桐淚力能引吐熱毒在膈輕粉黃丹銀硃力能制外癰疽瘡疥螻蛄萆麻力能通水開竅拔毒外行若在芙蓉花則藥雖屬清涼而仍兼有表性是以用此以為敷毒箍毒之方余則治毒之劑審其性有苦寒之味者應另列於解毒之中不可入於發毒劑例俾人皆知毒從外發不得竟用內藥內陷云萆麻子毒草有收拔惡毒開竅通利之力萆麻子專入經絡諸竅甘辛有熱性味頗類巴豆既有收引拔毒之能復有開竅通利之力觀書所言搗膏以貼手臂腫痛一夜即效用此同羊脂麝香鯪鯉甲等藥煎作摩膏日摩數次子宮脫下用此研膏以塗頂心即入或搗仁貼丹田亦可胞衣不出用此研膏以塗腳心即下中風口眼喎斜偏左貼右手心偏右貼左手心即止至於口噤鼻塞耳聾喉痹舌脹用油煙熏即開水症浮腫用仁研服一頓即消壯人止可五粒針刺好肉用仁搗敷患處即拔瘰癧惡瘡用仁外敷立愈時珍曰鵜鶘油能引藥氣入內萆麻油能拔病氣外出凡此皆屬外用以奏奇功但不宜於服耳昔人有以汁點畜舌根下即不能食點畜肛門內即下血死並云服萆麻者一生不得服豆犯即脹死其毒可知鹽水煮去皮研取油用忌鐵芙蓉花灌木清肺涼血散熱解毒芙蓉花專入肺兼入肝為外科癰疽藥也凡清涼膏清露散鐵箍散即是此物蓋此味辛氣平質滑功專清肺涼血散熱止痛消腫排膿凡一切癰疽腫毒無論花葉及根皆可搗研為末調蜜塗四圍留中患處干則頻換初起者即覺清涼痛止腫消已成者即膿出已潰者即易斂或加赤小豆蒼耳子同入為末功效殊見然必毒輕不重用此方可若大毒陰毒其勢莫遏則非輕小平劑所能治矣此又不可不知也楓香香木透毒外出楓香專入肝脾系楓膏脂所成結而為香故曰楓香又曰白膠香按楓性最疏通故木易蛀外科用以透毒金瘡末敷即效筋斷即續齒頰腫痛燒灰揩牙甚工咳唾膿血同藥服之即止皆取透發病氣之意時珍曰楓香松脂皆可亂乳香其功雖次於乳香而亦倣佛不遠故能見其皆治也以齏水煮二十沸入冷水中揉扯數十次曬乾用象牙獸拔毒外脫象牙專入肌肉味甘性寒按象性主剛猛而牙則善脫故凡皮肉間有形滯物及邪魅驚悸風癇並惡瘡內有毒未拔者服之立能有效以其具有脫性故能以脫引脫耳是以癰腫不解用牙磨水服之並挫末蜜調塗之即效諸鐵竹木刺入肉刮削煎湯溫服即愈諸骨鯁入於喉刮下薄片頻服即吐不吐再服以吐出為度象皮味鹹氣溫專治金瘡不合用皮煅灰存性敷之亦可熬膏入散蟾酥隰生蟾酥拔風火熱毒之邪蟾蜍散熱瀉熱外拔內攻蟾酥專入肌肉即蟾蜍俗名癩蝦蟆眉間內有白汁者是也味辛氣溫有毒能拔一切風火熱毒之邪使之外出蓋邪氣著人肌肉鬱而不解則或見為疔腫發背陰瘡陰蝕疽癘惡瘡故必用此辛溫以治蓋辛主散溫主行使邪盡從汗發不留內入而熱自可以除矣但性有毒止可外治取效如發背未成者用活蟾蜍系瘡上半日蟾必昏憒置水中救其命再易一個三日則毒散矣勢重者剖蟾蜍合瘀上不久必臭不可聞再易二三次即愈慎勿以微物見輕也即或用丸劑亦止二三四釐而已多則能使毒人其用作丸投服亦宜雜他藥內入如牛黃明礬乳香沒藥之類毋單服也故書載拔諸毒只宜用酥一錢白麵二錢硃砂少許作錠諒病輕重酌與不可盡服又治背發無名等毒取酥三五分廣膠水化米醋入銚火化乘熱手刷不已以散為度刻玉塗之等於刻蠟房術用之更善總皆外科奪命之功一句括盡輕用爛人肌肉至若蟾蜍氣味辛寒凡癥瘕積塊風犬咬傷小兒疳積瘟疫發斑瘡疽發背用之與酥略同以其辛有發散之能寒有逐熱之功外敷固見神功內服除去頭足腹腸垢亦能去積除熱如風狗咬傷用蟾蜍後足搗汁生食先於患人頂心拔去血發三四莖於小便內見沫其毒即解發背初腫用活蟾數個更易繫於腫上法詳上則其毒亦散矣時珍曰蟾蜍土之精也上應月魄而性靈異穴土食蟲又伏山精制蜈蚣故能入陽明經退虛熱行濕氣而為疳病癰疽諸瘡要藥也總皆具有外拔內攻之力勿輕用也蟾酥以油單紙裹眉裂之酥出紙上陰乾用蟾蜍焙乾去皮爪酒浸去肉用人牙人入腎推毒外出人牙專入腎味鹹性溫功專治痘倒靨緣痘或出不快反見黑陷多因毒氣深入故須用此內發時珍曰齒者腎之標骨之餘也痘瘡則毒自腎出方長之餘外為風寒穢氣所冒腠理閉塞血澀不行毒不能出或變黑倒靨宜用此物以酒麝達之竄入腎經發出毒氣使熱令復行而瘡自紅活蓋劫劑也若伏毒在心昏冒不省人事及氣虛色白癢塌不能作膿熱痱紫泡之症止宜解毒補虛苟誤用此則鬱悶聲啞反成不救可不慎哉高武痘診管見云左仲恕言變黑歸腎者宜用人牙散夫既歸腎矣人牙豈能復治之乎煅退火毒用解毒毒雖見症於外而勢已傳於內則藥又當從內清解故解毒亦為治毒之方所不可缺也第人僅知金銀花牛蒡子甘草為解毒之品凡屬毒劑無不概投詎知毒因心熱而成者則有黃連連翹可解因於肺火而成者則有黃芩可解因於肝火而成者則有膽草青黛藍子可解因於胃火胃毒而成者則有石膏竹葉大黃可解因於腎火而成者則有黃柏知母可解且毒在於腸胃症見癰疽乳閉宜用漏蘆以通之症見消渴不止宜用緑豆煮汁以飲之症見腸澼便血宜用白頭翁以解之症見時行惡毒宜用金汁人中黃以利之至於楊梅症見多屬肝腎毒發宜用土茯苓以清之喉痹咽痛多屬痰火瘀結宜用射干以開之心腎火熾宜用山豆根以熄之鬼疰瘰癧潰爛流串多屬經絡及脾毒積宜用蚯蚓以化之口眼喎斜癰腸痔漏多屬經絡腸胃毒發宜用蝸牛以治之乳癰乳岩多屬肝胃熱起宜用蒲公英以療之惡瘡不斂多屬心肺痰結宜用貝母以除之無名疔腫惡瘡蛇虺瘰癧結核多屬毒結不化宜用山慈菰以治之毒勢急迫咳唾不止多屬中氣虛損宜用薺苨以緩之他如癰腫不消有用米醋同藥以治熱涎不除積垢不清有用皂白二礬以入癰疽焮腫胸熱不除有用甘草節以投皆有深意內存不可稍忽若在斑蝥鳳仙子惡毒之品要當審症酌治不可一毫稍忽於其中也牛蒡子隰草清肺風熱牛蒡子專入肺又名惡實又名鼠黏子辛苦冷滑今人止言解毒凡遇瘡瘍癰腫痘疹等症無不用此投治然尤未繹其義凡人毒氣之結多緣外感風寒營氣不從逆於肉裡故生癰毒牛蒡味辛且苦既能降氣下行復能散風除熱深得表裡兩解之義是以感受風邪熱毒而見面目浮腫咳嗽痰壅咽間腫痛瘡瘍斑疹及一切臭毒痧閉痘瘡紫黑便閉等症無不藉此表解里清但性冷滑利多服則中氣有損且更令表益虛矣至於脾虛泄瀉為尤忌焉實如葡萄而褐色酒拌蒸待有霜拭去用金銀花蔓草清肺熱解癰毒金銀花專入肺經冬不凋故又名忍冬味甘性寒無毒諸書皆言補虛養血又言入肺散熱能治惡瘡腸澼癰疽痔漏為外利治毒通行要劑按此似屬兩岐殊不知書言能補虛者因其芳香味甘性雖入內逐熱而氣不甚迅利傷損之意也書言能養血者因其毒結血凝服此毒氣頓解而血自爾克養之謂也究之止屬清熱解毒之品耳確斷是以一切癰疽等病無不藉此內入取其氣寒解熱力主通利至云能治五種尸疰事亦不虛飛尸遁尸風尸沉尸尸疰五疰病因不一但此專主風濕內結為熱而言又按精要云忍冬酒云治一切癰疽陋貧藥材難得須用忍冬藤生取一把以葉入砂盆研爛入生餅子酒少許稀稠得所塗於四圍中留一口泄氣其藤止用五兩木槌捶損不可犯鐵大甘草節生用一兩同入砂瓶內以水二盆文武火慢煎至一盆入無灰好酒一大碗再煎十數沸去渣分為三服一日一夜吃盡病勢重者一日二劑服至大小腸通利則藥力到如謂久服輕身延年益壽不無過諛凡古人表著藥功類多如是但在用藥者審認明確不盡為藥治效所惑也花與葉同功其花尤妙江浙地方以此代茶山豆根蔓草清心降火利咽山豆根專入心大苦大寒功專瀉心保肺及降陰經火逆解咽喉腫痛第一要藥緣少陰之脈上循咽喉咽喉雖處肺上而肺逼近於心故凡咽喉腫痛多因心火挾其相火交熾以致逼迫不寧耳治當用此以降上逆之邪俾火自上達下而心氣因爾以除且能以祛大腸風熱肺與大腸相表裡肺氣清則大腸風熱亦解及解藥毒殺小蟲井腹脹喘滿熱厥心痛火不上逆則心腹皆安並療人馬急黃熱去血行磨汁以飲五痔諸瘡服之悉平總賴苦以泄熱寒以勝熱耳但脾胃虛寒作瀉者禁用薺苨山草和中止嗽消渴解毒薺苨專入肺脾即甜桔梗似人參而體虛無心似桔梗而味甘不苦按據諸書有因味甘載能和中止嗽消渴然力專主解毒以毒性急迫甘以和之故也觀葛洪肘後方云一藥而解衆毒者惟薺苨汁濃飲一升或煮嚼之亦可作散服此藥在諸藥中毒皆自解也又張族馬朝野僉載云名醫言虎中藥箭食清泥而解野豬中藥箭豗薺苨而食物猶知解毒何況於人乎觀此洵為解毒之最且更能治強中精出消渴之後發為癰疽之症千金有薺苨丸豬腎薺苨湯方亦以取其清熱解毒之功無他義耳薺苨丸用薺苨大豆茯神磁石栝蔞根熟地黃地骨皮玄參石斛鹿茸各一兩人參沉香各半兩為末以豬肚洗淨煮爛杵和為丸空心鹽湯下豬腎薺苨湯用豬腎一具薺苨石膏各三兩人參茯苓磁石知母葛根黃芩栝蔞根甘草各二兩黑大豆一升水一斗半先煮豬腎大豆取汁一斗去滓下藥再煮三升分三服後人名為石子薺苨湯但市肆多取此苗以亂人參又有取此作為黨參者其性即屬薺苨不可不察白頭翁山草瀉腸胃熱毒白頭翁專入腸胃味苦性寒何書用此以治痢便膿血經云腎欲堅急食苦以堅之痢則下焦虛損故以純苦之劑以堅如仲景之治挾熱下痢之用白頭翁湯之屬是也湯用白頭翁黃連黃柏秦皮若使熱結不除則腎愈虛愈解而痢莫愈又書何以用此以治瘟瘧寒熱齒痛骨痛鼻衄禿瘡疝瘕等症亦因邪結陽明服此熱解毒清則腎不燥擾而骨固齒屬腎胃不受邪而齒安齦屬陽明毒不上侵而衄止熱不內結而疝與瘕皆卻疝用此搗敷風無熱熾而小兒頭禿得除矣總皆清解熱毒之力也近根有白茸得酒良漏蘆隰草解胃府熱毒並通乳汁漏蘆專入胃味苦而咸氣寒有毒凡苦則下泄咸則軟堅寒則勝熱漏蘆氣味俱備其性專入陽明胃經故凡癰疽背發乳汁不通及預解時行痘毒者咸須仗此以解毒邪俾邪盡從便出而解矣諸症非盡熱毒而起不得妄用然書又云遺精尿血能止亦因毒解熱除自止之意非因漏蘆寓有收澀之力也但氣虛瘡瘍不起及孕婦有病者切忌出閩中莖如油麻枯黑如漆者真甘草拌連翹為使山慈菰山草瀉熱散結治瘰癧等毒山慈菰專入肺味苦微辛氣寒微毒功專瀉熱消結解毒故凡症患癰疽無名疔腫癮疹惡瘡蛇虺齒傷瘰癧結核等症用此外敷醋磨塗固可解散內服亦可調治總為結毒散結之方普濟方治粉滓面皯用山慈菰夜塗旦洗但性寒涼不可過服根與慈蔥小蒜相類去毛殼用緑豆菽豆清腸胃熱毒緑豆專入腸胃味甘氣寒據書備極稱善有言能厚腸胃潤皮膚和五臟及資脾胃按此雖用參耆歸術不是過也第書所言能厚能潤能和能資者緣因毒邪內熾凡臟腑經絡皮膚脾胃無一不受毒擾服此性善解毒故凡一切癰腫等症無不用此奏效並解一切草木金石砒霜等毒煮汁則止消渴磨粉合以乳香丹砂則能護心使毒不入護心膏用此築枕夜臥則能明目疏風杖瘡疼痛則用雞子白調敷即愈皮尤涼於緑豆退翳明目如神粉撲痘潰尤妙一市民出行折一足僧授一方緑豆粉新銚炒柴胡井水調厚敷紙貼杉木扎定其效如神皆有除熱解毒之功而無補益滋助之力且與棐子相反同食則殺人蚯蚓濕生解伏熱除鬼疰蚯蚓專入脾經絡最屬寒味觀書所載甚明其言味鹹性寒無毒其論所治則云能主伏尸鬼疰傷寒伏熱狂謬熱病發狂血熱痘瘡斑多紫黑癥瘕黃疸損傷垂危瘰癧潰爛流串腎風腳氣備極熱毒形症皆能調治宗奭曰腎臟風下疰病不可缺也頌曰腳氣藥必須此物為使然亦有毒有人因腳病藥中用此果得奇效病愈服之不輟至二十餘日燥憒但欲飲水不已遂至頓委大抵攻病用毒藥中病即當止也則其氣味之寒不待言矣究其所以致治則因此物伏處窪處水濕鑽土飲泉是其本性故能除其鬼疰解其伏熱且味鹹主下處濕而以入濕為功故於濕熱之病濕熱之物遇之即化停症畜水觸著即消而使盡從小便而出時珍曰其性寒而下行故能解諸熱疾下行且利小便治足疾而通經絡也矧蚓本有鑽土之能化血之力而凡跌僕受傷血瘀經絡又安有任其停蓄而不為之消化乎但審認不確妄為投用良非所宜取老蚯蚓白頭者良搗汁井水調下入藥或曬乾為末汪昂云中其毒者鹽水解之張將軍病蚯蚓咬毒每夕濃煎鹽水洗身數過而愈或微炙或燒灰各隨本方用蝸牛濕生瀉風邪經絡腸胃熱毒蝸牛專入經絡大腸胃即帶殼大蜒蚰是也生下濕地陰雨即出性稟至陰味鹹小毒故古方用此以治真陰虧損腠理不密致風中於經絡而見口眼喎斜筋脈攣拘及風熱脫肛痔瘡腫痛癰疽發背疔腫等症皆能見效頌曰入嬰孩藥最勝總以取其鹹寒解其諸熱之性耳並解蜈蚣毒取形尖小緣桑木佳無殼名蜒蚰人中黃人瀉腸胃實熱人中黃專入腸胃是用甘草末入於竹筒塞孔冬月置於糞缸之內經春取出懸挂風處陰乾取用味甘性寒書載功專入胃解毒以其味甘故也甘入中其解五臟實熱以其氣寒故也寒勝熱又治溫疫諸毒斑狂及發瘡痘黑陷不起以其臭與不正相類故能以毒攻毒也然遇急難得可取坑垢以代毒物凡藥沖淡和平不寒不熱則非毒矣即或秉陽之氣為熱秉陰之氣為寒而性不甚過烈亦非毒矣至於陰寒之極燥烈之甚有失沖淡和平之氣者則皆為毒然毒有可法制以療人病則藥雖毒而不得以毒稱若至氣味燥迫並或純陰無陽強為制伏不敢重投者則其為毒最大而不可以妄用矣如砒霜硇砂巴豆鳳仙子草烏射罔鉤吻是熱毒之殺人者也水銀鉛粉木鱉蒟蒻是寒毒之殺人者也萆麻商陸狼牙是不寒不熱性非沖和寓有辛毒之氣而亦能以殺人者也然繡竊謂醫之治病凡屬毒物固勿妄投即其性非毒烈而審症不真辨脈不實則其為毒最大而不可以救矣況毒人之藥人所共知人尚知禁若屬非毒視為有益每不及防故余竊見人病常有朝服無毒之藥而夕見其即斃者職是故也因附記以為妄用藥劑一戒鳳仙子毒草攻堅破硬拔毒鳳仙子專入腎又名急性子是俗所謂金鳳花子是也其性急猛異常味苦氣溫小毒凡人病患頑痰積塊噎膈骨鯁服之立刻見效以其氣味急迫能於骨穴堅硬處所極力搜治是以勝金丹用之以治狂癡取其急領砒毒吐泄同砒以點牙疼即落同獨蒜搗汁以塗痞塊即消噎食不下用鳳仙花子酒浸三宿曬乾為末酒丸緑豆大每服八粒溫酒下不可多用即急性子也加麝香阿魏尤捷投子以煮硬肉即爛但此生不蟲蠹蜂蝶不近且多食則戟人喉似非無毒用之當細審量可耳巴豆喬木祛臟腑沉寒通大便寒結巴豆專入腸胃辛熱大毒據書所載生猛熟緩可升可降能行能止開竅宣滯去臟腑沉寒為斬關奪命之將夫既能宣滯通竅則藥能降能行何書又言能升能止耶此數字不無令人少疑究之書之所言降者因有沉寒痼冷積聚於臟深入不毛故欲去不能不去不得非無辛熱迅利斬關直入掃除陰霾推陳致新亦安能蕩滌而如斯哉是即書之所謂能降能行者耳至有久病溏泄服升提澀藥而瀉反甚脈滑而沉是明脾胃久傷冷積凝氣所致法當用以熱下則寒去利止而脈始得上升是即所謂能升能止者是也時珍曰一婦年六十餘溏泄五載犯生冷油膩肉食即作痛服升澀藥瀉反甚脈沉而滑此乃脾胃久傷積冷凝滯法當以熱下之用蠟匱巴豆丸五十粒服一二日不利而愈自是每用治泄痢愈者近百人耳夫醫理玄遠變化靡盡在人引伸觸類毋為書執則用藥不岐即如大黃亦屬開閉通便之品然惟腑病多熱者最宜若以臟病多寒而用大黃通利不亦自相悖謬乎故仲景治傷寒傳裡多熱者多用大黃東垣治五積屬臟者多用巴豆與大黃同服反不瀉人故曰誤用有推牆倒壁之虞善用有戡亂調中之妙元素曰世以治酒病膈氣而以巴豆辛熱通開腸胃鬱熱巴豆稟火烈之氣第鬱結雖通血液隨亡其陰虧損傷寒結胸膈小兒疳積用之不死亦危奈何庸人畏大黃而不畏巴豆以其性熱劑小耳試以少許輕擦皮膚須臾發泡況下腸胃能無潰灼熏爛之患乎即有急症不得已而用之汪昂曰纏喉急痹緩治則死用解毒丸雄黃一兩鬱金一錢巴豆十四粒去皮油為丸每用五分津咽下雄黃破結氣鬱金破惡氣巴豆下稠涎然系厲劑不可輕用或用紙捻蘸巴豆油燃火刺喉或搗巴豆綿裹隨左右納鼻中吐出惡涎紫血即寬壓去其油取霜少許入藥可也時珍曰巴豆緊小者為雌有稜及兩頭尖者是雄雄者更峻耳用之得宜皆有功力不去膜則傷胃不去心則作嘔或用殼用仁用油生用炒用醋煮燒存性用研去油名巴霜芫花為使畏大黃黃連涼水中其毒者以此解之或黑豆緑豆汁亦佳得火良砒石石熱毒殺人兼治哮瘧頑痰砒石專入腸胃出於信州故名信石即錫之苗故錫亦云有毒色白有黃暈者名金腳砒煉過者曰砒霜色紅最劣性味辛苦而咸大熱大毒煉砒霜時人立上風十餘丈其下風所近草木皆死毒鼠鼠死貓犬食亦死人服至一錢者立斃煙火家用少許則爆聲更大急烈之性可知矣若酒服及燒酒服則腸胃腐爛頃刻殺人雖緑豆冷水亦無解矣奈何以必死之藥治不死之病惟膈痰牢固為哮為瘧果因寒結不得已藉此酸苦湧泄吐之時珍曰凡痰瘧及齁喘用此真有劫病立起之效但須冷水吞之不可以飲食同投靜臥一日或一夜亦不作吐少物引發即作吐也一婦病心痛數年不愈一醫用人言半分茶葉一分白湯調下吐瘀血一塊而愈及殺蟲惡瘡砒石銅緑等分為末攤紙上貼之其效如神枯痔外敷畏醋緑豆冷水羊血硇砂石消肉食不化硇砂專入腸胃系滷液所結而成秉陰毒之氣含陽毒之精其味苦鹹與辛其性大熱五金八石俱能消磨本草言能化人心為血硬肉難化入砂即爛故治噎膈癥瘕肉積有殊功其性猛烈殆不堪言況人脆腸薄胃其堪用此消導乎第或藥與病對有非峻迫投治不能奏效時珍曰硇砂大熱有毒之物噎膈反胃積塊內瘕之病用之則有神功蓋此疾皆起於七情飲食所致痰氣鬱結遂成有形妨礙道路吐食痛脹非此物化消豈能去之如穀食不消則必用以曲柏魚鱉不消則必用以橘葉紫蘇生薑菜果不消則必用以丁香桂心水飲不消則必用以牽牛芫花至於肉食不消又安能捨此阿魏硇砂而不用乎第當詳其虛實審其輕重緩急以求藥與病當耳潔古云實中有積攻之而不可過況虛而有積者乎但謂壯實之人其在初時果有大積攻之自便若屬虛人縱有大積或應攻補兼施可耳如其置虛不問徒以實治似屬偏見未可法也如其審證不明妄為投治禍猶指掌不可不慎出西戎如牙硝光淨者良用水飛過醋煮乾如霜刮下用之忌羊血
