body:
  text: 卷七食物食物雖為養人之具然亦於人臟腑有宜不宜蓋物有寒有熱猶人臟腑有陰有陽臟陽而不得平性寒之物以為之協則臟其益陽矣臟陰而不得乎性熱之物以為之濟則臟其益陰矣臟有陰陽兼見之症而不得乎不寒不熱之物以為調劑則臟其益互雜而不平矣昔孔子觀頤之象而曰君子以慎言語節飲食則知食即於身有裨而亦有乎當節之理以為之寓矧於食物之中尚有宜此宜彼之別而可不為之考究於其中者乎奈人惟知以口是甘以腹是果而不計乎食之入口等於藥之治病同為一理合則於人臟腑有益而可卻病衛生不合則於人臟腑有損而即增病促死此食物所以見論於方書而與藥物而並傳也惟是食物之種不下數百姑節日用常食之物以為辨別如穀食之有面曲蠶豆豆油酒醋是谷之至溫者也若至蘆稷稻米粳米陳倉米黑豆黃豆白豆豌豆豇豆胡麻則稍平矣又至粟米黍稷蕎麥緑豆豆腐豆豉豆醬則性最寒而不溫矣此穀食之有分其寒熱也又如瓜菜之有姜蒜蔥韭芹菜胡荽茼蒿白芥胡蘿苩是性之溫而不寒者也若至山藥蕹菜匏瓠南瓜豈得謂之不平乎又至菘菜莧菜油菜菠薐苦菜菾菜白苣萵苣胡瓜苦瓜越瓜甜瓜絲瓜冬瓜西瓜醬瓜諸筍芋子茄子豈得謂之不寒乎此瓜菜又有分其寒熱也至於果品則如龍眼荔枝大棗飴糖沙糖白糖蓮肉葡萄蜂蜜胡桃肉楊梅木瓜橄欖青桃李子栗子是為至溫之性矣棐實黃精枇杷青梅花生是為至平之性矣梨子菱角蓮藕橘瓤烏芋百合甘蔗白果柿乾柿霜是為至寒之性矣但生李性溫則多生痰而助濕生桃性燥則多助熱而助毒此果品之有分其寒熱也若在木類石類則性之溫而熱者無若川椒胡椒性之平者無若香菌性之寒者無若木耳蘑菰食鹽茶葉是木類石類之有分其寒熱也以物禽獸論之如雞肉鴨肉山雉鷓鴣犬肉羊肉牛肉鹿肉鹿筋貓肉是至溫矣鴿肉燕窩斑鳩雁肉鵝肉鳧肉竹雞豬肉是至平矣兔肉麋肉麋筋是至寒矣但山雉雞肉鷓鴣性雖溫而不免有發風發毒之害豬肉性即平而不免有多食動痰之虞此禽獸之有分其寒熱也他如魚鱉龜介蟲類其在鯽魚鰱魚鰣魚鯇魚鱅魚鰷魚海蝦鱔魚是皆溫之屬也鯉魚鱖魚白魚青魚鯊魚鮫魚鮑魚鰍魚銀魚烏賊魚蟶肉是皆平之屬也鱧魚鰻鱺石斑魚海蛇田蛙螃蟹鱉肉龜肉田螺蛤蜊肉是皆寒之屬也但蝦鱔性燥則不免有動風助火之變石斑鱉蟹性寒有毒則不免有動氣破血之慮此魚鱉龜介蟲之有分其寒熱也再於諸味之中又細分其氣辛而葷則性助火散氣味重而甘則性助溫生痰體柔而滑則性通腸利便質硬而堅則物食之不化烹煉而熟則物服之氣壅要使等於用藥知其藥之溫涼寒熱合於人之病症虛實是否相符則於養生之道始得且勝於藥多多矣荀不此為審顧而但知服藥味食物日與藥反以至於死而不覺且或歸咎於醫是果誰之咎也乎噫謬矣面麻麥稻補虛澤膚壅氣助痰助濕面專入脾兼入肝雖由於小麥所出而性與麥大異味甘氣溫微毒藏器曰小麥秋種夏熟受四時氣足兼有寒熱溫涼故麥涼曲溫麩冷面熱宜其然也服能補虛養氣澤膚厚腸胃並敷癰腫損傷散血止痛止衄吐血以其體黏性濡故於諸虛能補而於中氣有助腸胃有厚肌肉傷損有益癰毒疼痛有賴也然多食亦能壅氣凡物升發則壅故北人傷寒用此同雞發散取其升發之義故書言此不能止煩升發之性多不止煩且致作渴氣升則煩渴俱有又於濕熱有助故書言此不能消熱且能助濕發熱也是以脾虛無濕無熱服之最宜而有濕有熱服之最忌脾虛無寒無濕食之得補而脾虛有寒有濕服之不能無害也陳者良偶談云面性雖熱而寒食日以袋盛懸風處數十年亦不壞則熱性皆去而無毒矣入藥尤良食宜略用醋入醋入則氣不發畏漢椒蘿苩稻米麻麥稻緩脾潤肺稻米專入脾兼入肺味甘性平按據諸書有言性溫性寒性涼之不同然究此屬陰物陰即寒聚故性黏滯而不爽也是以服之使人多睡身軟無力四肢不收發風昏昏且使小貓食之亦腳屈不能行馬食之足重難移妊婦雜肉食之令子不利使果性溫而熱則食自有溫和通活之妙何至陰凝膩滯如此哉如謂釀酒則熱熬糖尤甚且發癰疽瘡癤何謂不溫詎知性如大豆生亦性溫何以作豉則涼可知稻非性溫因於造釀則溫始有至書有云食之補中益氣及止虛寒泄瀉並縮小便收自汗發痘瘡皆是性黏不利留滯在中上壅不下之故非如參耆性主溫補仍兼通活而無如此陰滯之甚也凡物滯不甚溫溫不甚滯理道爾爾謂之緩中則可謂之溫中而熱豈其可乎謂之中虛宜服則可謂之虛寒宜服亦烏見其可乎凡老人小兒久病均忌稷稷粟蘆稷益氣和中黍稷清熱涼血解暑稷專入脾有蘆稷黍稷之分蘆稷者其形高如蘆實既香美性復中和所以為五穀之長而先王以之名官也味甘氣平故食可以益氣和中宣脾利胃煎湯以治霍亂吐瀉如神用此燒酒可治腹中沉疴啾唧若黍稷之稷形狀似粟但粟穗則叢聚攢簇黍稷之粒則疏散成枝黍與黍稷分別則黏者為黍而不黏者則為黍稷之稷昔人於此紛紛置辨而不畫一是亦未分二稷之說矣黍稷味甘性寒作飯疏爽香美可愛服之可以清熱涼血解暑止渴故書載治癰疽發背瘟疫之症但多食則有冷氣內發飲黍穰汁即瘥燒黍稷則瓠必死忌同附子服粟米稷粟養腎氣消胃熱粟米專入腎兼入脾胃味鹹氣寒時珍曰粟即粱也穗大而毛長粒粗者為粱穗小而毛短粒細者為粟苗俱似芽種類甚多功專入腎養氣及消胃熱凡人病因腎邪而見小便不利消渴泄痢與脾胃虛熱而見反胃吐食鼻衄不止者須當用此調治以寒能療熱咸能入腎淡能滲濕粟為穀類谷又能養脾胃故也千金方粟米粉丸納七粒治反胃吐食但此生者硬而難化得漿水即化熟者滯而難消故書言此雁食則有足重難飛之虞與杏仁同食則有吐瀉之慮不可不熟悉而明辨也陳者良黑大豆菽豆入腎祛風散熱利水下氣活血解毒黑大豆專入腎味甘性平色黑體潤按豆形象似腎本為腎谷而黑豆則尤通腎加以鹽引則豆即能直入於腎也時珍曰豆有五色惟黑豆屬水性寒腎為寒水之經故能治水消脹下氣制風熱而活血解毒所謂同氣相求也故書有言服此令人澤肌補骨止渴生津非其補腎之力歟身面浮腫水痢不止痘瘡濕爛得此則消非其入腎去水之力歟頭項強痛卒中失音得此則除非其制風之力歟此虛風也若純外風內中則不須此腳氣攻心胸脅卒痛單服此味則效非其下氣之力歟熱毒攻眼乳岩發熱得此則愈非其解熱之力歟便血赤痢折傷墮墜得此則良非其活血之力歟風癱瘡疥丹毒蛇蠱得此則化非其解毒之力歟然體潤性壅多服令人身重藏器曰大豆生平炒食極熱煮食甚寒作豉極冷造醬及生黃卷則平牛食之溫馬食之冷一體之中用之數變加甘草則解百藥毒黃大豆菽豆生則疏泄熟則作滯黃大豆專入脾按書既言味甘服多壅氣生痰動嗽又曰寬中下氣利大腸消水脹腫毒其理似屬兩岐詎知書言甘壅而滯是即炒熟而氣不泄之意也書言寬中下氣利腸是即生冷未炒之意也凡物生則疏泄熟則壅滯大豆其味雖甘其性雖溫然生則水氣未泄服之多有疏泄之害故豆須分生熟而治則有補瀉之為別耳藏器曰大豆生平炒食極熱是以書載誤食毒物須生搗研水吐之諸菌毒不得吐者濃煎汁飲試內癰及臭毒腹痛並與生黃豆嚼甜而不噁心者是即上部結有癰膿及中臭毒發痧之真候惟有痘後餘毒發癰炒黑研末以青油調敷之並痘後風癬以豆殼煎湯洗痘後生瘡黃豆燒黑研末香油調塗腫瘍背瘡等症生浸細磨和滓炒熱以敷則或煎湯炒黑為末以治用補則須假以炒熟然必少食則宜若使多服不節則必見有生痰壅氣動嗽之弊矣豆油辛甘而熱與豆氣味稍別能塗瘡疥解發疽蒿燒灰點惡痣去惡肉豆忌豬肉蠶豆菽豆疏利脾胃能治吞針蠶豆專入脾胃味甘性溫據書載此服多滯氣又曰誤吞鐵針用此即下蓋緣人受穀食必仗中氣以為運行若使中氣稍振雖服有形之物礙於腸胃用此合以溫藥同投即能以解積善堂方一女子誤吞針入腹諸醫不能治有人教令煮蠶豆同韭菜食之針自大便同出誤食金銀物者用之皆效可驗其性之利臟腑也如其中氣既餒稍服濡滯即能作脹況多食乎此蠶豆之所以有通有不通之說也但此既能通針其性疏利已見一斑與於陰潤之物遇人則滯絶不相同惟在臨症相人體氣及多食少食以別耳白豆菽豆通胃利腸活血及入腎以治鬼疰白豆專入腸胃腎即飯豆中小豆之白者也亦有土黃色者豆大如緑豆而長四五月種之苗葉似赤小豆而略大可食氣味甘平無毒按據書載腎病宜食並補五臟暖腸胃益氣和中兼調經脈蓋緣凡物質大則氣浮質小則氣沉味甘則中守味鹹則腎入白豆質小味甘故既能以入腎而治鬼疰入血調經復入大腸與胃而使中和氣益也然必假以炒熱則服始見有益若使僅以生投保無嘔吐泄瀉傷中之候乎須細詳之可耳豌豆菽豆利腸胃濕熱豌豆專入脾胃即寒豆也一名畢豆胡豆味甘氣平無毒故書載入脾胃利濕除熱凡人病因濕熱而見脹滿消渴溺閉寒熱熱中吐逆泄澼者服此最宜與病因濕熱而見痘疔紫黑而大或黑壞而臭或中有紫線用此治無不效牛御史四聖丹用豌豆四十九粒燒存性頭髮灰三分真珠十四粒研為末以油胭脂同杵成膏先以簪挑破痘疔嘔去惡血以少許點之即時變色紅活並或氣虛病脹用此同羊肉煮食亦能奏功蓋緣此豆屬土故治亦在脾胃之病但須假以佐使如治痘疔入肌活血必兼胭脂同投入脾與胃補氣必兼羊肉同入各有至理非僅豌豆一味所能施也出胡地大如杏仁者是豇豆菽豆安胃養腎豇豆專入腎兼入胃味甘而咸性平無毒考之時珍云豇豆可菜可果可谷備用最多乃豆中之上品又曰豇豆開花結莢必兩兩並垂有習坎之義豆象微曲有似人腎所謂豆為腎谷者宜此當之是以腎氣虛損必賴此為主治用豇豆入鹽少許食之甚效且此味甘而平入腎而更入胃故凡胃津不生胃渴不止吐逆泄痢小便頻數草莽毒中皆得甘以調劑而使諸症其悉平也袖珍方云中鼠莽毒者以豇豆煮汁飲即解欲試者先刈鼠莽苗以汁潑之便根爛不生書載諸疾無禁惟水腫忌補腎氣不宜多食耳豆腐造釀瀉胃火過服生寒動氣豆腐專入脾胃大腸經豆磨爛加以石膏及或滷汁內入而成其性非溫故書皆載味甘而咸氣寒微毒且謂寒能動氣凡服豆腐過甚而致腎中寒氣發動並生瘡疥頭風等症者須用萊蔔湯及或杏仁以解延壽書云有人好食豆中毒醫不能治作腐家言萊蔔入湯中則腐不成遂以萊蔔湯下藥而愈頌曰發腎氣瘡疥頭風杏仁可解惟有胃火衝擊內熱鬱蒸症見消混脹滿並休息久痢用白豆腐煎食赤眼腫痛用消風熱藥以服夜用鹽收豆腐片以貼酸漿者勿用杖瘡青腫用豆腐切片貼之頻易又或用燒酒煮腐以貼色紅即易燒酒醉死者心頭熱者用熱豆腐切片通身以貼冷即頻換則當用此以投至云能和脾胃正是火去熱除以後安和之語並非裡虛無熱無火溫補之謂也豆皮性同豆腐能除斑痘翳矇質輕故能除翳豆芽充蔬須防發疥動氣芽有生髮之義豆醬造釀解腎熱邪及諸食物豆醬專入腎本豆與面蒸罨加鹽與水曬成雖曰經火經日煎熬然味鹹性冷火不勝水仍為解熱解毒瀉火之劑耳是以書載一切魚肉菜蔬菌毒皆當用此以調蛇蟲蜂蠆犬咬湯火砒霜蠱毒皆當用此以解與夫手指掣痛用醬清和蜜溫熱浸之癧瘍風駁用醬清和石硫黃細末日日揩之大便不通用醬汁灌入孔中飛蟲入耳用醬滴灌耳中即出浸淫瘡癬用醬瓣和人尿以塗輕粉毒中用三年陳醬化水以漱身上乾燥用豆醬入藥以塗妊娠下血尿血等症下血用豆醬二升去汁取豆炒研服方寸匙尿血用豆醬煎乾生地二兩為末每服一錢米湯以下無不當用此以治但此氣咸性冷小兒過服則恐生痰動氣妊娠合雀肉以食則恐令兒面黑所當避也取豆醬陳久者佳小麥醬殺藥力不如豆醬芹菜葷辛芹菜辛多於苦則能以治寒濕苦多於辛則能以治熱毒芹菜專入肺胃肝地出有水有旱其味有苦有甘有辛有酸之類考之張璐有言旱芹得青陽之氣而生氣味辛竄能理胃中濕濁水芹得濕淫之氣而生氣味辛濁考之綱目有言旱芹氣味甘寒能除心下煩熱水芹氣味甘平能治女子赤沃兩說絶不相類詎知旱芹種類或有得於陽氣之厚故味多辛而燥得於陽氣之微故味苦而多濕水芹種類得於陽氣之最則氣雖濁而仍清得於陰氣之勝則味既苦而且濁不得謂水芹盡屬陰類旱芹盡屬陽類也惟察辛多於苦則芹多燥而不涼苦勝於辛則芹多寒而不溫辛勝於苦則治當如本經所云能治女子赤沃俾濁濕去胃氣清而精血有賴令人肥健嗜食苦勝於辛及質黏滑則治當如唐本所云能治癰腫馬毒又安能入脾以助食入陰以助精入肝以保血乎但芹在水須防有蟲在於葉間春夏之交多有蜥蠍虺蛇在於此處遺精視之不見令人為患面青手青腹滿如妊痛不可忍作蛟龍痛須服硬餳二三斤吐出便瘥其根白盈尺者曰馬斳食之令人發瘡疥以其濕熱之氣最盛也和醋食之損齒有鱉瘕人不可食胡蘿蔔葷辛治腸胃邪氣胡蘿蔔專入肺兼入脾始於元時胡地而至形似蘿蔔故以是名按書所列主治正是寬中下氣及散腸胃邪氣數種他則無有論及蓋因味辛則散味甘則和質重則降蘿蔔甘辛微溫其質又重故能寬中下氣而使腸胃之邪與之俱去也但書有言補中健食非是中虛得此則補中虛不食得此則健實因邪去而中受其補益之謂耳蒿不可食子可以作食料芥菜葷辛開肺胃痰氣閉塞芥菜專入肺胃兼入腎一食品耳何書載能通肺開胃利氣豁痰又載久食則人真氣有虧眼目昏暗並或發人瘡痔是明指其於目有害而書又有言能明目其故何居蓋緣芥性辛熱凡因陰濕內壅而見痰氣閉塞者服此痰無不除氣無不通故能使耳益聰而目益明也若使臟素不寒止因一時偶受寒濕而氣不得宣通初服得此稍快久則積溫成熱其目愈覺不明而諸痔瘡瘍靡不因是而至矣素問云辛走氣氣病無多食辛食則肉胝而唇蹇此之謂歟如其平素熱盛竟無濕閉寒閉等症其菜不必多服但此一入人口而凡燥熱等症無不因是即形又奚止便血發痔害目而已哉詵曰煮食動氣與風生食發丹石毒寧源曰有瘡瘍痔疾便血者忌之孫思邈曰同兔肉食成惡邪同鯽魚食發水腫至於食芥而淚即墮是亦淚為肝液木受辛克而液不克勝耳陸佃云望梅生津食芥墮淚五液之自外至也慕而垂涎愧而汗出五液之自內生也無他義也用此當細審辨可耳故寧以多食為戒芥子義詳溫散部內所當合參茼蒿葷辛通心化痰利水茼蒿專入心脾腸胃腎一名蓬蒿其味辛而且甘其性溫其氣濁凡相火內熾症見諸般燥候者服之令人氣滿頭昏目眩心煩舌強是即氣溫助火之一驗也若使素稟火衰則食又能消痰利水安脾和胃養心是即千金所言能安心氣之說也總之凡物辛溫施於陰臟無火則宜施於陽臟有火為大忌耳蕹菜柔滑通滑腸胃蕹菜專入腸胃按書別無所論惟言氣味甘平干柔如蔓中空如蔥以之橫地節節生根號為南方奇蔬又言專解野葛毒生搗服之尤良取汁滴野葛苗當時即死搗汁和酒服能治難産則其性氣通滑可知是以脾胃虛寒大便滑脫服最深忌但此其氣稍平較之菠薐莧菜菾菜為更勝耳凡平臟服之最宜油菜葷辛行血破氣油菜專入肺兼入肝脾一名蕓薹據書皆載氣味辛溫而大明獨指其性曰涼其義何居緣五味五氣於人氣血不甚傷損則或投以辛散而真氣不失自不得以涼名如其用辛破血審於真氣有礙則辛氣既投涼氣自至又曷能使辛為溫而其氣不得以涼名乎油菜氣味雖辛油菜道家號為五葷之一其用長於行血破氣如産後一切氣痛血痛並諸遊風丹毒熱腫瘡痔等症其咸用之與經水行後加入四物湯服之云能斷産並治小兒驚風貼其頂囟引氣上出婦人難産亦同歌云黃金花結粟米實細研酒下十五粒靈丹功效妙如神難産之時能救急而究氣行而氣無復血破而血莫生謂之為涼誰曰不宜是以書載下産須以藏久者為佳否則恐有泄瀉之虞又曰舊患腳氣者不宜食狐臭人不宜食食之加劇及或動疾發瘡使果是溫非涼亦曷為服之而有若是之症乎子打油善治癰疽及塗痔漏中蟲燻肉生蟲以此油塗即滅白菘菜葷辛利腸胃解煩熱白菘菜專入腸胃因何命名以其經冬不凋故以菘稱因色青白故以白號但菘有三一曰牛肚菘其葉最大而味甘一曰紫菘即蘆蔔一曰白菘根堅小而不可食三種南北通有時珍曰蘇恭言南北變種者蓋指蔓荊紫菘而言紫菘根似蔓荊而葉又不同耳而氣則一本草言其性溫大明言其性涼蓋涼則是而溫則非也時珍云氣虛胃冷人多食則噁心吐沫氣壯人則相宜詵曰發風冷內虛人不可食有熱人食不發病則其性冷又屬可知頌曰有小毒不可多食多則以生薑解之瑞曰夏至前食發氣動疾有足疾者忌之即據別録載能通利腸胃除胸中煩解渴蕭炳載能消食下氣治瘴氣止熱氣嗽冬汁尤佳寧源載能和中利大小便並列丹方載治小兒赤遊赤遊行於上下至心則死菘採搗敷即止飛絲入目白菜揉爛帕包滴汁二三點入目即出漆毒生瘡用白菘菜搗爛塗之即退亦何莫不是氣涼之故而能使其諸病悉除也後人不解其意反以味辛曰溫生則辛冷熟則甘寒嗟嗟性既溫矣安有止煩除渴消食下氣解熱之功乎於此可徵其概矣莧菜柔滑通陽利便莧菜專入腸胃味甘氣寒質滑按據諸書無不皆言其性冷利能治熱結血痢蠱毒之症恭曰赤莧辛寒弘景曰人莧細莧並冷利赤莧療赤下而不堪食震亨曰紅莧入血分善走故與馬莧同服能下胎或煮食之令人易産即人服之者亦無不謂其通腸利便是亦菜中最冷最滑之味也且又戒其多食則令人動氣煩悶又曰不可與鱉同食生鱉症按此事即未有而其氣味之寒氣味之冷與於龜鱉同為一類故有如此針規之詞矣豈止尋常冷利之味哉然果臟陽不陰及於暑時挾有真正熱候亦又何忌惟在食之者之能審其所用可耳子治肝經風熱上攻眼目赤痛生翳遮障不明青盲赤眼並宜服之為末每服方寸匙菠薐柔滑通利腸胃熱毒菠薐專入腸胃出自西域頗稜國誤呼菠薐何書皆言能利腸胃蓋因滑則通竅菠薐質滑而利凡人久病大便不通及痔漏閉塞之人宜咸用之又言能解熱毒酒毒蓋因寒則療熱菠薐氣味既冷凡因癰腫毒發並因酒濕成毒者須宜用此以服且毒與熱未有不先由胃而始及腸故藥多從甘入菠薐既滑且冷而味又甘故能入胃清解而使其熱與毒盡從腸胃而出矣然此服之過多為害不淺張璐云凡蔬菜皆能疏利腸胃而菠薐冷滑尤甚又曰多食令人腳弱發腰痛動冷氣與䱉魚同食發霍亂則知此即可以供蔬而用又當斟酌於其中也北人多食肉面食此則平南人多食魚鱉水米食此則冷苦菜柔滑解心胃大腸熱苦菜專入心胃大腸稟氣至陰故味苦寒而不溫而經所列病症有言能治五臟邪氣者邪熱客於心也胃痹渴熱中痰者熱在胃也腸澼者熱在大腸也惡瘡者熱瘀傷血肉也苦寒總除諸熱故主之也熱去則神自清故久服安心益氣聰明少臥也耐飢耐寒輕身不老者總言其熱去陰生心安氣益之神功也此與苦苣同為一物而形色稍異治與苦苣相同宗奭曰苦苣搗汁敷疔瘡殊驗青茵陰乾以備冬月為末水調敷之雜記云凡病痔者宜用苦苣菜或鮮或干煮至熟爛連湯置器中橫安一板坐之先熏後洗冷即止日洗數次屢用有效但脾胃虛人切忌張機曰野苣不可共蜜食令人作肉痔士良曰蠶蛾出時不可扴取令蛾子青爛蠶婦亦忌食之白苣柔滑開胸利膈通腸滑胃白苣專入腸胃有似萵苣葉有白毛折有白汁味苦氣寒無毒故治亦載開胸利膈通腸滑胃然冷氣人食之其氣益冷産後食之寒入小腸而痛甚迫與酪酥同食則能生蟲之為害耳萵苣柔滑除胸膈腸胃濕熱水道不通萵苣專入腸胃由於白萵國來故以萵名味苦氣冷微毒萵苣蟲不敢近蛇虺觸之則目瞑不見物人中其毒以薑汁解之紫萵苣有毒入燒煉用江南人鹽曬壓實以備方物名萵苣筍治專通經達絡利水通道解毒殺蟲凡人病因熱濕而見胸膈填脹眼目昏暗乳汁不通小便閉塞等症用此治無不效如乳汁不通則用萵苣菜煎酒以服小便不解及或尿血則用萵苣菜搗敷臍上沙蝨水毒則用萵苣菜搗汁以塗蚰蜒與蟲入耳則用萵苣菜搗汁以滴及或和雄黃等分為丸蘸油入耳以引之類凡此因其味苦苦則能以降氣因其氣寒寒則能以解熱故耳至書既言治能明目而又言其多食則使人目昏無非因其熱極傷目則目得此以明過服生寒而目不明則目又得因此而暗無他義也子能下乳利水並治陰腫痔漏下血傷損作痛功與萵苣菜略同菾菜柔滑解時行諸熱毒菾菜專入腸胃即俗所言莙薘菜者是也味苦而甘大寒體滑微毒禹錫曰氣平考書言此搗汁以飲能治時行壯熱及解風熱諸毒夏月以菜作粥及或搗汁亦能解熱治毒止痢止血生肌搗葉以敷禽獸諸傷灸瘡此皆以寒療熱之法耳若使脾虛人服之則有腹痛之患氣虛人服之則有動氣之憂與腸滑人服之則有泄瀉之虞至云治能補中理脾皆是書中語缺分闢徒以啓人妄用之階非實義也莖燒灰淋汁洗衣潔白如玉匏瓠瓜菜降氣利水通淋消疸解心肺熱邪匏瓠專入心胃大小腸兼入肺種類其形有大有小有長有短其味有甜有苦錦囊曰長大如東瓜者名瓠矮似西瓜者名匏腰細頭鋭者名葫蘆柄直底圓者名瓢子為菜瓠有苦甜二種甘者大苦者小又曰或以雞糞壅之甘或變為苦耳其性有平有寒甘多平苦多寒其用有利有害利則不但可作器用時珍曰壺匏之屬既可烹曬又可以為器大者可為甕蓋小者可為瓢樽為腰舟可以浮水為笙可以奏樂膚瓠可以養豕犀瓣可以澆燭其利溥矣且能下水降氣利水通道以治淋閉疸黃面目浮腫之症腹脹黃腫用亞腰壺蘆連子燒存性每服一個食前溫酒下不飲酒者白湯下十餘日見效又用汁滴鼻內即來黃水入心與肺以除煩熱消渴之症服丹石人最宜燒灰存性研末以擦腋下癭瘤之症長柄葫蘆最佳搗葉為茹孫思邈稱其甘平可以耐飢花須陰乾李時珍指其煎湯可以解毒稀痘經驗方七八月取壺蘆須如環子腳者陰乾於除夜煎湯浴小兒可以免痘至子則能入腎以治諸般齒病及或目翳鼻塞齒齦或腫或露齒搖疼痛用八兩同牛膝四兩每服五錢煎水含漱日三四次鼻塞血翳胬肉用子煎汁以治此皆有利之處蓋天生此一物以為暑時必用之需也其言有害之處亦復不少扁鵲云患虛脹者不得食之食則患永不瘥苦者尤傷胃氣不可輕試凡苦寒藥皆能伐胃不獨此也本經治大小浮腫又云下水令人吐大傷中氣今人治黃疸水氣大小便不通或浸火酒飯上蒸或實糖霜煅存性必暴病實病庶可劫之若久病胃虛誤服必致吐利不止往往致斃可不慎歟南瓜瓜菜助濕脹脾滯氣南瓜專入脾胃腸味甘氣溫體潤質滑食則令人氣脹濕生故書載此品類之賤食物之所不屑凡人素患腳氣於此最屬不宜服則濕生氣壅黃疸濕痹用此與羊肉同食則病尤見劇迫惟有太陰濕土口渴舌乾服差見其有益耳至經有言補中益氣或是津枯燥涸得此津回氣復以為補益之自乎否則於理其有不合矣茄子瓜菜解熱散血寬腸利氣茄子專入腸胃性稟地陰外假陽火皮赤肉白陽包乎陰花實香紫故書載治寒熱臟癆並或散血止痛寬腸利氣然味甘氣寒質滑而利服則多有動氣生瘡損目腹痛泄瀉之虞孕婦食之尤見有害此瓜菜中無益之物也李延飛曰秋後食此損目生生編云女人服此能傷子宮宗奭曰冷人食此動氣發瘡及痼疾蒂治腸風下血及擦癜風時珍曰治癜風用茄蒂燒灰同硫黃末擦之取其滲血也花治金瘡牙痛燒灰塗痛處根及枯根葉皆治凍瘡皴裂煮湯漬之胡瓜瓜菜清暑熱利水道胡瓜專入脾胃大腸氣味甘寒服此止能清熱利水別無裨益故北人坐炕用此以為席珍南人值暑用此以為供蔬並或咽喉腫痛用此入藥以為吹消用老黃瓜去子以芒硝填滿陰乾為末每以少許吹之枚瘡火眼用此納硝刮粉以為點搽湯火傷灼用此掐碎入瓶取水以為刷敷水病肚脹用此連子醋煮空心以為投服小兒熱痢用此同蜜以為投治皆以取其甘寒解毒之意然使臟寒氣陰復則能以動氣發熱作瘧且髮腳氣生瘡小兒過服尤易作瀉生疳不可不慎葉則苦平小毒能治小兒閃癖一歲用一葉生挼攪汁服得吐下良苦瓜瓜菜生用苦寒解心肺煩熱苦瓜專入心肝肺即錦荔枝其種有長有短何書載言用長宜取青皮去子煮肉充蔬蓋謂生則性寒熟則性溫用此生青性寒以為除熱解煩清心明目之品何書又言用短宜待熟赤取子為食蓋謂其子苦甘內藏真火用此性熱以為壯陽益氣之功共此一味而生熟不同寒熱迥別故其所用其亦各有別如此越瓜瓜菜解毒利便通腸助冷越瓜專入腸胃即稍瓜以瓜本生於越故以越名今湖州等處亦有服之於人無益但取味甘性寒能解酒毒利小便燒灰敷吻瘡及陰莖熱瘡而已若多食之則令人心痛腹痛泄瀉癥結腳弱不能以行並天行病後食之能以發病與於胡瓜之性恍惚相似皆為通腸助冷之品也小兒尤不可食甜瓜蓏解暑熱內伏作痢甜瓜專入心胃暑月解止渴之品也味甘性寒有毒凡人因於暑熱內伏症見膿血惡痢痛不可忍須以水浸甜瓜數枚食之即愈若瓜經日曝其寒尤甚故書有言瓜寒於曝油冷於煎即是此意但此陽氣素盛亦宜少食若使脾胃素冷服之則有瘧痢疸黃動氣反胃陰下生癢生瘡發熱作脹之變須用鹽花少許麝香與酒則解腳氣症癖食之患永不除瓜蒂專主湧吐已詳吐散部內但有兩鼻兩蒂者殺人皮可取收作羹或蜜收曬為果絲瓜瓜菜解風寒瀉熱蠱毒留滯經絡絲瓜專入經絡兼入腸胃性屬寒物味甘體滑其瓜經絡貫串房隔連屬凡人風痰濕熱蠱毒血積留滯經絡發為癰疽瘡瘍崩漏腸風水腫等症者服之立能有效以其通經達絡無處不至小兒痘出不快用此近蒂三寸連皮燒灰存性為末沙糖水調服並可以敷腳腫鼻淵時流濁水用此瓜藤近根三寸燒灰存性為末酒服方寸匙亦效小兒預防出痘於立冬後用小絲瓜煅入硃砂服之亦應皆以借其寒滑通達之性耳但過服亦能滑腸作泄故書有言此屬菜中不足食之當視臟氣以為可否也葉搗汁生服可解一切蛇傷之毒滓盦患處亦佳冬瓜瓜菜利水消腫解熱冬瓜專入腸胃味雖甘淡性甚冷利故書所述治效多是消腫定喘楊氏家藏方治十種水氣浮腫用大冬瓜一枚切蓋去瓤以赤小豆填滿蓋合簽定以紙筋泥固濟乾用糯糠兩大籮入瓜在內煨至火盡取出切片同赤小豆焙乾為末糊丸每服七十丸煎冬瓜子湯下日三服小便利為度止渴及治癰腫熱毒切片敷上熱則易之壓丹石毒然惟臟腑有熱者最宜若虛寒腎冷久病滑泄及水衰氣弱體瘦服之則水氣益泄而有厥逆滑脫燥渴之虞矣汪昂既言性能止渴消腫而又謂性不走服甚宜人是何自相豫盾耶子能補肝明目凡藥中所用瓜子者即是此物瓜皮可作面脂以色白故醬瓜造釀解腎熱消腸胃燥瓜本寒物即菜瓜別種其形如枕生時剖開醃曬藏以供蔬熟則肉鬆不肥故不可作蔬食經醬醃曬專入腸胃兼入腎氣不甚溫按書有言味鹹而甘性寒有毒治利腸胃止消渴不可多食其說非謬蓋以醬經蒸罨濕熱內積毒自克有瓜性甘寒加以醬入則寒反得下達是以渴熱之症得此則消腸胃之燥得此則潤且其長於利口而致日服不厭則濕又得內積而成而寒又得因是而生故又戒其宜節而不可以多食以致病生於不測中也芋子柔滑潤腸胃澤肌膚芋子專入腸胃種類甚多芋有六種青芋紫芋真芋白芋連禪芋野芋野芋名老芋形葉相似如一根有大毒並殺人不可食一名土芝一名蹲鴟有水旱二種水種者味勝其莖作羹甚美浙人取羹作餳名曰烏花餳時珍曰芋不開花或七八月有開者抽莖生花黃色旁有一長萼護之如半邊蓮花之狀也據書述其功能有言生用則可以治腹中癖氣用生芋子一斤壓破酒五斤漬二七日空腹每飲一斗神良頭上軟癤用大芋搗敷即干熟用則充飢澤膚十月後曬乾收之冬月食不發病但有小毒須以姜同煮過換水再煮方可食之解毒稀痘小兒食之良冷啖則能止渴生津癢熱除煩通腸開結和血食則能下氣寬中煮汁産婦食則能破血通瘀及浴身上游風燒灰則能以治瘡冒風邪腫痛用芋燒灰敷之干即易然此生則蘞喉熟則滑滯性滑則可以下石毒故書載此多食則不免有動氣發冷泄瀉及難克化之弊矣若在芋葉與莖味辛冷滑功能除煩止瀉療妊娠心煩迷悶胎動不安並敷蛇蟲癰腫毒痛痘瘡潰爛成瘡用莖燒灰敷痘瘡無瘢用芋苗曬乾燒存性研搽慎微曰沈括筆談云處士劉陽隱居王屋山見一蜘蛛為蜂所螫墜地腹鼓欲裂徐即入草齧破芋梗以瘡就齧處磨之良久腹消如故自後用治蜂螫有驗由此野芋形葉與芋相似芋種三年不採成梠亦能殺人食之宜用土漿糞汁大豆汁以飲諸筍柔滑諸筍解腸胃熱毒及化皮裡膜外痰諸筍專入腸胃味甘微寒無毒按筍雖載品類甚多如䈽竹筍即中母筍能治消渴風熱等症淡竹筍氣味甘寒能除痰熱狂燥頭痛頭風顛仆驚悸等症桃竹筍有小毒出廣中皮滑而黃犀絞瘦骨四寸骨節可以為席能治六畜瘡中蛆等症刺竹筍時珍曰生交廣中叢生大者圍二尺枝節皆有刺夷人種以為城伐竹為弓根大如車輻一名芭竹氣味甘苦微有小毒食之令人落髮酸筍出粵南筍大如臂摘至用沸湯泡去苦水投冷井水中浸二三日取出縷如絲繩醋煮可食好事者提入中州成罕物云氣味苦涼無毒食之令人止渴解酲利膈蘆筍氣味甘溫能治噎膈煩悶不食等症然總多食助冷動氣以甘則氣壅而寒則發人冷症惟素患有痰疾在於皮裡膜外者得此則愈如竹瀝同姜可以治人痰疾之意他筍其味皆甘惟苦竹筍則苦食之可以治人氣逆而不作壅以苦主於下氣故也況筍初食難化而脾虛尤甚一小兒食干筍三寸許噎於喉中壯熱喘粗如驚服驚藥不效後吐出筍諸症乃定其難化也如此久食則腸受刮時珍曰贊寧筍譜云筍雖甘美而滑利大腸無益於脾俗謂之刮腸篦惟用生薑麻油始可以解蘄州等處竹筍氣味苦韌食尤不美如蘄州叢竹匡廬扁竹澧州方竹嶺南𥯨竹簩竹月竹之類但世猥用竹筍以發痘瘡其害匪輕筍味多蘞最戟人喉服須先以灰湯煮過再煮乃良或以薄荷數片同煮亦去蘞味惟有冬筍生冬而土不出陽氣未泄故食則能通脈利竅凡吐血衄血血滯不通之症皆可授服痘瘡不出取尖同米煮粥食之良泄瀉者忌筀筍性味亦然干筍淡片利水豁痰消腫李五果斂骨節間癆熱不治李專入肝兼入腎以李名多子故也時珍曰李木其子大者如杯如卵小者如彈如櫻其味有甘酸苦澀數種其色有青緑紫朱黃赤縹綺紫灰胭脂青皮之殊其形有牛心馬肝奈李杏李水李離核合核無核匾縫之異其産有武陵房陵諸李早則四月熟遲則十月十一月熟故味甘而酸或苦而澀而性微溫苦澀者不可食不沉水有毒不可食素問言李味屬肝故治多在於肝正思邈所謂肝病宜食李之意也中有痼熱不調骨節間有癆熱不治得此酸苦性入則熱得酸則斂得苦則降而能使熱悉去也且書既言除熱而書又言多食令人臚脹及發虛熱蓋因凡物生則難化熟則易消李屬生硬之物多食則物在胃不克故又轉為臚脹發熱之病矣推之書言溫暑食李則能以發痰瘧合雀肉與蜜食則能以損五臟合漿水以食則能以化霍亂並服術人不可與食無非李屬濕物少食則宜多食則痰與熱俱聚單食而不雜以濕熱之物猶可多食而更合以濕熱之物則食烏見其有可乎故但指其勿食正以使人自思可耳青桃五果生熱發毒青桃專入肺肺家果耳然卻列此為下以桃味甘而酸性熱微毒故書皆載食則使人發熱生癰作瀉膨脹成淋及發丹石之毒與鱉同食則使人心痛不休與服白朮人則忌究其主治止有作脯可益顏色一語他無有及則知桃性固熱生食而桃不化其熱益甚安得有利無害而不見有滿脹發熱發毒生瘡之病乎冬桃差勝可解癆熱青梅五果開胃通膽生津止渴青梅專入肝膽胃花開於冬而熟於夏張璐謂此得木全氣故其味最酸而入膽耳人之舌下有四竅兩竅可通膽液食則通膽使液外出類相感也酸主收故治皆主酸收之病如本經所言下氣除熱煩滿安心止肢體痛是已然惟藏久則佳若青梅則凝澀滯氣非偏枯不仁等症所宜用也梅之種類甚多惟榔梅最勝相傳真武折梅枝插榔樹株而誓曰吾道若成花開果實其種從均州太和山來即榆樹中之一種其梅如杏而鬆脆異常故近世謂之消梅食之開胃生津清神安睡乃榔樹之本性也然多食亦能凝血滯氣當細審食可耳楊梅山果楊梅專入心兼入肝脾心胞體赤入心味酸入肝及甘入脾故書載為心家血分之果兼入肝脾心胞又載性溫而熱張璐曰溫銑曰熱能治心煩口渴消熱解毒且於鹽藏則能止嘔除吐燒灰則能斷痢若或多食則有損傷動血致衄之虞緣人陰虛熱浮氣血不歸清之固屬不能表之更屬不得惟藉此為酸收則於浮熱可除煩渴可解並或因其過食而致見有損傷動血之變矣設使熱從實致則食此味必不能效熱果因於清涼可解則食此味必不見燥又曷為而有燥熱損傷之戒乎性熱之說於此可徵根皮煎湯能解砒毒燒灰油調塗湯火傷核仁療腳氣然須多食以桶漆拌核爆即自裂也栗五果溫腎固胃寬腸栗專入腎兼入腸胃腎之果也味鹹性溫體重而實故能入腎而補氣凡人胃氣虧損而見腰腳軟弱並胃氣不充而見腸鳴泄瀉服此治無不效弘景曰相傳有人患腰腳弱往栗樹下食數升便能起行此是補腎之義然須風乾連液吞咽為佳時珍曰風乾之栗勝於日曝而火煨油炒勝於蒸煮作粉為食勝於菱芡若使栗不風乾或生水氣未除食則助濕發氣生蟲蒸煮炒熟食則壅氣滯膈而於風水之人尤忌小兒多食令齒不生栗楔系栗中瓣能療筋骨風痛冷積疾癖生齧可罨惡刺出箭頭敷瘰癧腫毒痛栗荴即肉上薄皮燒灰存性能治骨鯁在喉吹入即下栗殼煮汁能治反胃消渴栗球即外刺包煮汁洗火丹毒腫栗花能治瘰癧栗樹皮煮汁可洗沙蝨溪毒並丹毒瘡毒栗根酒煎能治偏墜腎氣皆以取其下氣解毒之功耳橄欖夷果入肺胃生津止渴解酒魚諸毒橄欖專入肺胃稟受土陽其味先酸後甘氣溫無毒肺胃家果也性能生津止渴酒後嚼之最宜故書載能以解酒毒人服河豚魚肝及子迷悶至死取此煮汁即解故書又載能解諸魚之毒魚食橄欖渣即斃又用橄欖木作楫其魚撥著即皆浮出及治魚骨之鯁橄欖嚼汁即下無橄欖用核研末急流水調下亦效至於痘瘡不起並痘抓碎成瘡煮食托瘡解毒磨汁塗滅瘡痕腸風下血橄欖燒灰存性研末每服二錢米飲調下耳足凍瘡橄欖木研末油調以塗初生胎毒集效方小兒落地時用橄欖一個燒研硃砂五分和勻嚼生脂麻一口吐唾和藥絹包如棗核大安兒口中待咂一個時辰方可與乳此藥取下腸胃穢毒令兒少疾及出痘稀少也唇裂生瘡橄欖炒研豬脂和塗牙齒風疳膿血有蟲用橄欖研入麝香少許貼之下部疳瘡用橄欖燒存性研末油調敷之或加孩兒茶等分陰腎㿗腫等症橄欖核荔枝核山楂核等分燒存性研末每服二錢空心茴香湯送下無不用此皆效以其具有溫行酸斂之性耳但此性專搜滌胎毒過服則有嘔吐泄瀉之虞性專聚火澀氣寒嗽用之得宜熱嗽則不免有熱氣上蒸之弊也枇杷山果潤肺下氣和脾枇杷專入脾肺兼入肝脾家果也味甘而酸色黃據書載其極熟則有止渴下氣潤五臟之功生食則有助肝伐脾之力食之令人中滿泄瀉且指其性曰平曰溫又指其性曰寒皆屬有意緣此稟受雖溫而質多挾水濕於熟時取食則內水氣漸消熱氣漸平而有下氣潤臟之功若使未至熟取而即用此為食則物水氣未化而有寒中脹滿泄瀉之虞與酸氣未收而有扶肝抑脾之害此書之所謂既溫而又謂其性平性寒者是也但於席品之中用其極熟佐此以解酒熱最為得宜若使中寒氣壅雖曰佐以解酒則又當知所忌耳葉另詳於上篇花生蔓草舒脾潤肺花生專入脾肺味甘而辛體潤氣香性平無毒按書言此香可舒脾辛可潤肺果中佳品誠佳品也然云炒食無害論亦未周蓋此氣味雖純既不等於胡桃肉之熱復不類烏芋菱角之涼食則清香可愛適口助茗最為得宜第此體潤質滑施於體燥堅實則可施於體寒濕滯中氣不運恣啖不休保無害脾滑腸之弊乎仍當從其體氣以為辨別則得之矣烏芋水果破肝腎堅積及毀銅器烏芋專入肝腎大腸止一水果即荸薺何書皆言力能毀銅銅錢同烏芋嚼之其錢即化破積攻堅金鎖丸中治五膈用黑三稜者即此物也止血大便下血用荸薺搗汁大半鍾好酒半鍾空心溫服三日見效治痢下痢赤白五月五日取完好荸薺洗淨於瓶中入好燒酒浸之封固遇患取一二枚細嚼空心酒下住崩鳧茈一歲一個燒存性研末酒服之擦瘡小兒口瘡用此燒灰末滲解毒發痘痘瘡乾紫不能起發同地龍搗爛入白酒釀紋服即起清聲醒酒其效若是之多蓋以味甘性寒則於在胸實熱可除而諸實脹滿可消體黑則以力善下行而諸血痢血毒可祛是以冷氣勿食食則令人每患腳氣熱嗽勿用用則於人有集火氣之為害耳橘穰山果生痰助氣解熱橘穰專入肺胃與皮共屬一物而性懸殊橘皮味辛而苦而橘穰則變味甘而酸也皮有散痰開痰理氣之功而穰則更助痰作飲及有滯氣之害也進賢縣胥簡章之女秀英忽氣喘促至極眼翻手握已有莫主之勢繡診其脈右關浮滑而弦知有痰氣與寒內結姑以老薑取汁先投不逾時而胸即開氣即平後詢其故知食橘穰起也至書有言能治消渴開胃併除胸中膈氣此為內熱亢極胃氣不寒者而言若使水虧脾弱發為咳嗽而日用此恣啖保無生痰助氣之弊乎今之虛癆好食此物類多受害人特習而不察耳但用蜜煎作果佳菱角水果生止胃渴熟滯腸胃菱角專入腸胃種類雖多汪昂曰有三角四角老嫩之殊武陵記曰三角四角者為菱兩角者為薐薐花隨月而轉氣滯則一即書有言安中消水止渴解酒療瘧治痢及有紅瀉白補生降熟升之說然亦止供食品而於治療則無且於過食則有腹滿填脹損陽痿莖之虞必取麝香生薑吳茱萸作湯及或沉香磨汁以導是亦味甘性寒助濕增滯之一證也乎性平之說似不足信香菌芝楊益胃進食香菌專入胃食中佳品凡菰稟土熱毒惟香菌味甘性平大能益胃助食及理小便不禁蓋此本於桑楮諸木所出得受桑楮餘澤而成也有種出於深山爛楓木上小於菌而薄黃黑色味甚香美然此性極滯濡中虛服之有益中寒與滯食之不無滋害取冬産肉厚細如錢大者良木耳芝楊解腸胃熱毒成痔木耳專入大腸胃生非一木良枯莫辨權曰菌耳古槐桑樹上者良柘木者次之其餘樹木多動風氣發痼疾令人肚下急損經絡背膊悶人藏器曰木耳從下過者有毒楓木上生者令人笑不止採歸色變者有毒夜有光欲爛不生蟲者並有毒須生搗冬瓜蔓汁解之據書所載能治痔瘡焮腫崩中漏下用此炒黑為末酒調方寸匙服眼流冷淚用木耳燒存性木賊一兩為末每用二錢以清米泔煎服血注腳瘡用桑耳楮耳牛屎菰各五錢胎髮灰男用女女用男三錢研末油和塗之或干塗血痢下血用木耳炒研五錢酒服一切牙痛等症用荊芥等分煎湯頻洗然性稟陰濕生於枯木徒有衰精冷腎之害而無溫脾益胃之功也本經言其益氣不飢輕身強志恐譽詞耳豈真謂哉蘑菰芝楊清膈化痰蘑菰專入腸胃肺本於桑楮諸木埋於土中澆以米泔而生味甘氣寒正要曰有毒李時珍曰無毒色白柔軟中空狀如未開玉簪花品又有形如羊肚蜂窠眼故又有別其名曰羊肚菜味甘如雞故又有別其名曰雞腿菰皆與香菌諸菰同為一類但香菌色白而平蘑菰則色白而寒也香菌能益胃氣不飢及治小便不禁蘑菰則能理氣化痰而於腸胃亦有功也然皆體潤性滯多食均於內氣有阻而病多發不獨蘑菰然也雉原禽治蟻瘻下痢然終有毒害人雉專入心兼入胃由異氣所感靈蛇所變不得山川之氣遂其飛騰則得滄溟之氣恣其吞吐是與虹霓出沒無異時珍云雉屬離雞屬巽故凡雞煮則冠變雉煮則冠紅飛必先鳴食多蟲蟻此雖食品之貴食可補中益土雉應胃土及治蟻瘻下痢然終性熱有毒故書言其八九兩月可食春夏不可食者以其雉食蟲蟻及與蛇交變化有毒也發痔發瘡發痢與家雞子同食令人發疰周身疼痛者謂其雉食蟲蟻有毒兼性暴烈有火也但書既言發痢發痔而書又曰可治蟻瘻與痢亦以雉素好食蟻故可以制蟻瘻而治其毒耳雁水禽通利血氣雁專入肺兼入肝腎狀考之時珍謂有蒼白二種今人以白而小者為雁大者為鴻蒼者為野鵝亦曰鴚鳥爾雅謂之鵱鷜也雁有四德寒則自北而南止於衡陽熱則自南而北歸於雁門其信也飛則有序而前鳴後和其禮也失偶不再配其節也夜則群宿而一奴巡更晝則銜蘆以避繪繳其智也而捕者豢之為媒以誘其類是則一愚矣故雁謂之信鳥人不宜食道家謂之天厭味甘氣平其性通利血氣故能補癆瘦逐風攣取肉炙熟以貼多服長毛髮生須久服壯筋骨助氣昔黃帝制指南於雁脛骨空中制針取其能定南北但覓之不易後人於鯉魚腦中制之以其性專伏土定南北不移可定水土之方向也今又傳用午時稻花水煮子時荷花水煮以定南北取雁南來時瘦不可食北向時乃肥可取之鵝水禽膩滯壅發之品鵝專入脾兼入肝肺肉按書有言味甘性平有言味辛性涼有言氣味俱厚而毒有言服則解熱解毒有言服則發風發瘡發毒持論不同臆見各一究之味甘不補味辛不散體潤而滯性平而涼人服之則可以解五臟之熱及於服丹之人最宜者因其病屬體實氣燥得此甘平以解之也煮汁能止渴者以其肉多肥膩而壅不渴之意也發風發瘡發毒因其病多濕熱得此濕勝氣壅外發熱出者意也是以鵝體之潤在膏與臎臎即鵝尾之肉可以潤皮膚而合面脂灌孔耳而治卒聾塗皺裂而消癰毒在涎可以入喉而治谷芒一皆體潤和燥之力即卵氣味甘溫可以補中益氣而猶有多食發疾之戒非性屬膩滯曷為其有是乎血兼熱飲可治血膈吐逆不食病根非是以血引血之意乎血與毛可治射工之毒異物志云雍州蠻人選鵝腹毳毛為衣被絮柔暖而性冷嬰兒尤宜之能闢驚癇非鵝能食此蠱以物制物之意乎弘景曰東川多溪毒養鵝以闢之又曰鵝未必食射工蓋以威相制耳禽經云鵝飛則蜮沉蜮即射工也屎可以治小兒鵝口瘡自內生出可治自外生入不可治治用食草白鵝下清糞濾汁入沙糖少許搽之或用雄雞糞眠倒者燒灰入麝香少許搽之並效及敷蛇咬之毒非藉穢以入穢解毒之意乎膽可以解熱毒痔瘡白鵝膽二三枚取汁入熊膽二分片腦半分研勻磁器密封勿令泄氣用則手指塗之立效非其鵝性不溫而膽亦能潤燥之意乎凡此所見治略皆有義存不可僅執是溫是冷之說以致忘其主腦也藏器曰蒼鵝食蟲主射工毒為良白鵝不食蟲止渴為勝鳧水禽補中利水鳧專入脾胃兼入肺腎即野鴨又類鴻雁夏藏冬見群飛蔽日味甘氣平無毒其肉肥而不脂美而易化凡滯下泄瀉喘咳上氣失血産後之症服此最宜以其具有補中利水之功也但在九月以後立春以前服之味美他時不及血吐挑生蠱毒可服以血引血之故同氣相應之義也鷓鴣原禽解溫瘧蠱毒仍防烏頭半夏苗鷓鴣專入脾胃心性畏於露早晚稀出夜棲於木葉蔽其身其性好潔時珍常食烏頭半夏苗故書載其氣味甘溫但有小毒食之者須防咽喉頭腦腫痛犯此宜用生薑甘草解之類說云楊玄之通判廣州歸楚州因多食鷓鴣遂病咽喉間生癰潰而膿血不止寢食俱廢醫者束手適楊吉老赴郡邀診之曰但先啖生薑一斤乃可投藥初食覺甘香至半斤覺稍寬盡一斤覺辛辣粥食入口了無滯礙此鳥好啖半夏毒發耳故以薑製之也又丞相馮延己苦腦痛不已太醫吳廷詔曰公多食山雞鷓鴣其毒發也故以甘草湯而愈而其功用又言服此能解嶺南野葛菌子並溫瘧久病欲死蠱氣欲死或是無毒得此則犯有毒得此則解之意也乎蠱亦畏鷓鴣至書有言服此能利五臟益心力令人聰明猶是冗統之辭未有確指無足信也脂膏塗凍瘡令不龜裂自死者勿食同竹筍食則小腹脹竹雞原禽殺蟲解毒竹雞專入心脾肝狀如小雞無尾性好食蟻又食半夏苗故諺有言家有竹雞啼白蟻化為泥又唐小說有言崔魏公暴亡太醫梁新診之曰中食毒僕曰好食竹雞新曰竹雞多食半夏苗命搗薑汁抉齒灌之遂蘇則知竹雞其味雖甘其性雖平而亦有食半夏之毒耳究其主治止言煮食可以殺蟲並治野雞毒他無有取則知竹雞治毒或是以毒攻毒與蟲畏雞之意不爾曷為其有是耶無毒之說似不足信斑鳩林禽溫補腎肺斑鳩專入肺腎雖屬野味然味甘性平治能補腎明目補肺益氣與於家鴿氣味治功恍惚相似是以範汪治目則有斑鳩丸總録治目則有錦鳩丸惟賢則謂斑鳩明目是即補腎腎補而目始明時珍又謂斑鳩因於益氣故能目明不獨補腎已也又云古者仲春羅氏獻鳩以養國老仲秋授老者以鳩杖云鳩性不噎食之且復助氣則知鳩之明目是即補腎補氣之治驗矣鳩血熱飲可以解毒屎同夜明沙等分為末以吹聤耳出膿疼痛諸疾貓獸治鼠瘻幽僻鬼怪之疾貓專入肝腎一捕鼠小獸耳何書開載治療甚多謂肉作羹則能以治鼠瘻蠱毒鼠瘻不論已潰未潰服之皆驗蠱毒亦少食貓肉則蠱不能為害頭骨則能以治痘瘡倒靨倒靨用人貓豬犬四頭骨以治並多年瘰癧不愈用貓頭蝙蝠各一個俱撒上黑豆同燒存性為末滲之干則油調內服五香連翹湯取效走馬牙疳對口毒發心下鱉瘕俱用黑貓頭燒灰存性以服小兒陰瘡鼠咬瘡痛俱用貓頭燒灰敷之即瘥腦用紙上陰乾同莽草等分則能以治瘰癧鼠瘻潰爛納於孔中貓睛貓舌貓涎貓皮與毛則能以治瘰瀝鼠瘻如用睛以治瘰癧鼠瘻則燒灰合井華水服方寸匙用涎治瘰癧則刺破以塗用毛治瘰癧潰爛則取肚下毛鉗鍋內煅令存性而毛尤能以治鬢邊生癤貓頭上毛豬頸上毛各一把鼠屎一粒燒研油塗敷之並鬼舐頭瘡用貓兒毛燒灰膏以敷鼻擦破瘡鼠咬成瘡等症皆取貓兒毛燒灰入麝香少許唾和以封貓肝則能以治癆瘵用黑貓肝一具生曬研末遇朔望五更酒調服之貓胞衣則能以治反胃吐食燒灰入硃砂末少許壓舌下少許甚妙貓尿用姜蒜擦貓鼻即出則能以治諸蟲入耳貓屎則能以治痘瘡倒陷不發寒熱鬼瘧鼠咬蠱疰惡瘡等症俱用屎燒灰水調以搽或瘰癧潰爛可用貓屎以陰陽瓦合鹽泥封固煅過研末油調以塗鼠咬成瘡用貓尿揉之即愈蠍螫作痛用貓屎塗之即瘥總以取其貓善搜穴捕鼠故凡病屬鼠類有在幽僻鬼怪之處而藥難以入者無不藉此以為主治猶之虎嘯風生風痹腫痛之症必賴虎骨以治之意張璐謂貓性稟陰賦機竊地支故其目夜視精明而隨時收放其睛可定時子午卯酉如一線寅申巳亥如滿月辰戌丑未如棗核也其鼻端常冷惟夏至一日則暖畏寒而不畏暑善跳躍而嗜腥生能畫地卜食隨月旬上下齧鼠首尾皆與虎同陰類之相符如此不熟食而能消化生物一皆風火用事故書謂其性溫而味則甘而酸用以鼠瘻虛損則可用以鼠瘻內實則能助濕發熱若使病從濕至縱云鼠瘻猶當審顧未可書言能治而不竟為分別也取尾長腰短目如金銀及上腦多稜者良鰣魚魚溫補脾肺鰣魚專入脾肺生江中者大而色青味極甘美生海中者小而色赤味則稍薄皆為席中所尚置於暗室之中則能生光血非常魚可比性溫無毒食能補中益氣而無發毒之慮較之於鰱則性稍和然惟夏時則有余月則無多食亦發疳痼鱗用香油熬塗湯火傷效鰱魚魚溫補脾鰱魚專入脾肺性最急迫開水即跳與諸魚性絶不相同味甘性熱且食諸魚之遺故書載能補中益氣而又載其多食則有助長濕熱變生渴熱疥瘡之病也魚有皂白二種大者頭大白者腹腴皆與鱔魚之性相似而非食品之所共貴者矣鱅魚魚溫胃益人鱅魚專入胃形狀似鰱而究實不相同蓋鰱首細而白而鱅則首大而黑也鰱則水動而躍而鱅則水即動而不躍也且鰱之美在腹而鱅之美在頭鰱之性動而燥而鱅之性則稍亞於鰱也時珍曰鱅為魚之下品故有庸常之號究其所論主治在鰱謂能補中益氣鰱性跳躍而上氣主上出故於氣分則補而鱅謂能溫胃益人並其所論多食之戒則亦有動風發瘡發熱之虞豈鱅鰱二物同為一類之性乎否則何其適相合矣藏器曰只可供食品別無功用鯇魚魚鯇魚專入脾胃食品味長江湖與池皆有以草為飼常與青鰱混雜故名曰鯇又名曰鯤時珍曰鯇因其性舒緩而名第在池中則味甘溫無毒時珍言其暖中和胃即是此物若在江湖所蓄則飼非盡青草常有穢惡混食故書又言食能發瘡但魚性多溫無論在池在湖施於陽臟之人則自發熱動燥施於陰臟之人不惟其燥全無且更鮮有溫和之力矣食物之宜當先視人臟氣以為轉移非獨鯇魚然也膽味苦寒能治一切竹木刺在喉中以酒化二三枚溫服取吐即出鰷魚魚溫胃止泄鰷魚專入腸胃心江湖小魚耳時珍曰長僅數寸形狹如扁狀似柳葉鱗細而整潔白可愛性愛群遊洵小魚中之最善者也味甘性溫無毒據書言其主治有曰暖胃止瀉是其性溫之力又曰煮食已憂得非性愛群遊而能使人之憂自已乎於此可見食物之助矣鱖魚魚治癆瘵血蠱鱖魚專入脾胃即俗所云桂魚者是也味甘性平小毒按書言此性最疏利凡腹內聚有惡血水蠱服此最屬有效故於癆瘵最宜昔有邵氏年十八病瘵纍年不愈偶服鱖魚而痊非其性最疏利能治惡血蟲蠱之意乎但此有鬐刺十二以應十二月之數若人誤受鯁害則惟取欖核磨水以解以魚最畏橄欖故也尾貼小兒軟癤佳膽治骨鯁竹木刺入咽喉不拘大人小兒或入腹刺痛服之皆出臘月收大鱖魚膽懸北檐下陰乾遇鯁者用皂子大酒碎溫服得吐則鯁隨涎出未出再服以出為度酒隨量飲無不出者如無鱖魚膽鯇魚青魚膽鯽魚膽亦用白魚魚利肺水開胃氣白魚專入肺胃兼入肝味甘氣平形窄腹扁鱗細頭尾向上肉有細刺武王白魚入舟即此功專入肺利水開胃下氣故金匱治淋每用白魚同滑石以投名曰滑石白魚散取其長以治水兼助亂髮以破血血氣通調而淋澀止矣但此性亦滑利故同棗食脾腎受泄必致腰有痛楚脾胃過食不溫必致飽脹不快惟有炙食差可乃或醃或糟以為食耳至書有言補肝明目調五臟理十二經絡者時珍亦謂此屬溢美之辭未足深信當以開寶之注為正青魚魚利水除腳氣目昏青魚專入肝兼入脾味甘性平色青頌曰狀似鯇而背青故書載能入肝通氣入脾利水凡人因於濕熱下注而見腳氣疼腫濕熱上蒸而見眼目不明皆當用此調治以此好啖蜆螺蜆螺則能利水故此亦能利水以除腳氣目昏之病也服術人忌之然治腳氣服此必須兼以韭白同投則內始有溫和之力矣所當合參鮓味與服石人相反不可合生胡荽生葵菜豆藿麥醬同食頭中枕骨狀如琥珀磨水可治心腹卒痛亦可作篦作飲器解蠱眼睛汁治注目能夜視膽另詳於涼血部內所當合參鯊魚魚暖中益氣鯊魚專入脾胃即南方溪澗中之小魚非海中鯊魚也海中鯊魚本名鮫魚溪澗沙鰮因居沙溝吹沙而遊咂沙而食故以沙名味甘氣平無毒究其主治止曰暖中益氣因其味甘性平而然服之可使中氣溫和無有虧損非雲中氣虛極必得此魚以作治療也銀魚魚養中和胃銀魚專入脾胃即書所云鱠殘魚者是也氣味甘平不入治療據書止言出於蘇松浙江大者不過三四寸身圓無鱗潔白如銀小者尤勝鮮食最美曝乾亦佳作羹食之可以寬中健胃而無油膩傷中之患石斑魚魚服之有毒令人頭痛泄石斑魚專入屬毒物凡服之者無不謂患頭痛作泄蓋此生於南方溪澗水石之處長數寸白鱗黑斑浮游水面聞人聲則剨然深入其魚有雌無雄二三月與蜥蠍合於水上其胎毒人南方有土蜂土人殺此魚標於樹上引鳥食而土蜂盡退是以服之而致見有諸病之作耳但肉食之差可而子及腸尤甚今時捕魚多雜此魚賣與人食須宜慎之鰍魚無鱗魚治經終風邪兼補肝腎之氣強筋壯骨鰍魚專入經絡兼入肝腎稟土陽氣以生性善穿穴力堅而鋭無足能竄與蛇同性時珍曰南人鱔肆中以缸貯水畜數百頭夜以燈照其鱔有花者必項下有白點通身浮水上即棄之或以蒜瓣投於缸中則群鱔跳擲不已亦物性相制也故書皆載通經達絡能治十二經風邪並耳目諸竅之病如風中血脈口眼喎斜用尾血同麝少許右喎塗左左喎塗右止即洗去千金云鱉血雞冠血和伏龍肝並治口喎耳痛鼻衄痘後目翳用血滴點即愈用血主之從其類也臁瘡蛀爛用鱔打死香油抹腹抹於鱔腹繫於瘡上候痛取下看鱔有蟲上入即去未盡更作後以人脛骨灰油調搽之産後惡露淋滴腸鳴濕痹用此煮食即除老人虛痢不止用此曝乾煅灰存性調服即絶且能通力壯筋故大力丸取此同熊筋虎骨當歸人參等分以進用大鱔魚重斤余者取肉酒蒸同藥為丸空腹酒下兩許陽道不長不能續嗣用此血同蛤蚧等藥以入方見蛤蚧內皆以借其性力相助但此味甘性熱其力能補若病屬虛熱及時行病後陰虛火爍食則必有氣弱動風與氣之變不可不慎鮫魚無鱗魚補脾利水鮫魚專入脾即海中之鯊魚者是也生於南海背皮粗錯可飾刀把其肉作膾鮮活切片沃以五味生食為膾能補五臟功亞於鯽蓋鯽補脾利水想此亦屬利水之品故有功亞於鯽之說也皮治尸疰蠱毒燒灰解鯸鮧魚毒烏賊魚無鱗魚入肝補血入腎滋水烏賊魚專入肝兼入腎肉按書止言氣味酸平又言其味珍美食則動風與氣其治載能益氣強志及通婦人月經可知其性屬陰故能入肝補血入腎滋水強志而使月事以時而下也又考書言烏賊魚既能吸波噀墨令水溷黑自衛以防人害又能日浮水上詐死以啄烏是其性陰而險固不待言且其腹中血出與膽有如墨黑手染色變書字則逾年跡滅惟存空紙已爾是其色黑入腎又不待言是以陰臟服之則能動風與氣泄瀉腹痛陽臟服之則能斂陰祕陽故在其骨名為螵蛸亦能以治血枯氣竭肝傷之病也惟是其肉久不入食故義亦不甚明今則南北通用覺血枯陰燥服則有益無損而血衰氣寒服反見害豈非性陰不燥之義歟柔魚無骨形質與氣皆與烏賊骨魚肉相若但味勝於烏賊魚越人重之鱔魚無鱗魚溫潤脾胃鱔魚專入脾即泥鰍伏於泥中得土陰氣以養性動而侵故能入土以補脾書言暖中益氣者義根是也得水則浮而出涸則入泥而不見故能下入而治病書言同米粉煮羹下入而收痔者義由斯也他魚水涸即斃惟鰍常自染涎以自養伏泥而不涸故人服之而津生書言醒酒消渴者義亦由茲起也消渴用泥鰍十頭陰乾去頭尾燒灰乾荷葉等分為末每服二錢新汲水調下日二服名沃焦散烏須揩牙泥鰍槐蕊狼把草各一兩雄燕子一個酸石榴皮半兩搗成團入瓦罐內鹽泥固濟先文後武燒炭十斤取研日用一月以來白者皆黑陽事不起泥鰍煮食之如何用之立應以其筋強力鋭故能入骨以烏須入腎與肝以起陽也牛狗羸瘦用鰍一二枚從口鼻送入立肥如何用無不效以其具有補土之能故能使之而立肥也若在喉中骨哽用此入喉牽拽而出用鰍魚線縛其頭以尾先入喉中牽拽出之此則人之所易知者矣但不可合白犬血食鮑魚無鱗魚通肝瘀滌腸穢鮑魚專入肝兼入腸考之長洲張璐有言其魚腥穢止可淡曝而不可煮鹽干則形如塊肉性溫無毒專取腥穢以滌一切瘀積同氣相感也入肝散血煮汁送四烏鰂一藘茹丸治女子血枯經閉內經以療傷肝利腸而不傷伐元氣惜乎世罕用之今庖人用以煮肉則脂沫盡解滌除垢膩之驗也昔秦皇死沙丘會暑尸腐令轀車載鮑魚以亂其臭始皇本呂不韋萌孽溷廁宮幃非取其滌除遺臭之義歟鰻鱺魚無鱗魚祛肝腎竅穴風熱殺蟲鰻鱺魚專入肝腎兼入穴竅類有分闊嘴者為鰻尖嘴者為鱺皆稟土中陰氣以生味甘氣寒其形類蛇常與水蛇同穴故其性有小毒力善走竄鑽穴故書謂能祛風殺蟲按蟲由於風生故風字從蟲如骨蒸癆瘵五痔瘡瘻陰戶蝕瘡濕痹風搔虛損等症人常食之為有益也虛損癆瘵多用蟲蝕有病瘵者相染已死數人乃取病者釘之棺中棄於流水永絶傳染漁人異之開視見一女子尚活取置漁舍多食鰻鱺病愈遂以為妻聖惠方用鰻鱺淡炙食治諸蟲心痛多吐冷氣上攻滿悶張鼎云此以骨燒煙則可以闢蚊蠓熏屋竹木則可以斷蛀置骨於衣箱中則可以斷蠹惟脾胃虛泄並孕婦食之則大忌耳性滑氣寒故凡昂頭行水及重三四斤者腹下有黑斑背上有點者皆為有毒切不可食海䖳無鱗魚清肝腎血瘀熱毒海䖳專入肝腎俗曰海蜇即廣所云水母者是也按書言此生於東海狀如血䘓大者如床小者如斗無眼目腹胃以蝦為目蝦動䖳沉故曰水母目蝦又曰水母形渾然凝結其色紅紫無口眼腹下有物如懸絮群蝦附之咂其涎沫浮沉如飛為潮所擁則嚇去而䖳不得歸人因割取浸以灰礬去其血汁而色遂白厚為䖳頭其味更勝究其主治大約多能下血消瘀清熱解毒而氣亦不甚溫蓋緣此屬血類血味多咸咸則能以入腎血藏於肝海䖳形如血䘓則䖳多入於肝䖳産於水腎屬水則䖳又多入腎故也是以勞損積血得此則消小兒丹疾火傷得此則除河魚之疾得此則療但忌白糖同淹則䖳隨即消化而不能以久藏以土剋水者故耳無他義也蟶蚌蛤解胸中煩熱蟶專入腎兼入肝乃海中小蚌耳與江湖蚌蛤相類閩人以田種之候潮泥壅沃謂之蟶田其肉可為蟶腸干淡以充海錯蟶生海泥中二三寸大如指兩頭開味甘性平煮食可治胸中邪熱煩悶飯後食之與服丹石人適合並治婦人産後虛熱可知性體屬陰故能解熱滌煩然惟水衰火盛者則宜若使脾胃素冷服之必有動氣泄瀉之虞矣書言可治冷痢似屬巧說未可深信蛙濕生清熱利水閉氣蛙專入膀胱腸胃與螺蚌皆産於水其味雖甘而性則寒故能清熱利水解毒如水蠱腹大用干青蛙二枚以酥炒乾螻蛄七枚炒苦葫蘆半兩為末空心酒服三錢即愈通身水腫以青蛙一二枚去皮炙熟食之即治毒痢噤口以水蛙一個並肚腸搗碎瓦焙入麝香五分作餅貼臍上即通時行面赤項腫瘟毒用金線搗汁水調空腹頓服即效然肉雖寒而骨善跳則熱性雖動而氣善蓄則閉食之令人作淋及或多食令人尿閉臍下痠痛治須擂以車前頓水或燒酒行氣之類以解臟熱者須用車前臟寒者須用燒酒以通至於孕婦食尤有忌令子壽夭不可不知鱉肉龜鱉涼肝血熱鱉肉專入肝止有雌無雄與蛇與黿為匹形多變幻故書有言鱉有三足赤足者不宜食獨目者不宜食頭足不縮者不宜食目凹陷者不宜食腹下有王字卜字文蛇文者不宜食生於山上者名旱鱉不宜食腹赤如血者名朱鱉不宜食此有毒殺人不宜食鱉之說也又言鱉合雞子莧菜食則令人生鱉同豬兔鴨食則能損人同芥子食則生惡瘡同薄荷食則能殺人此合他味同食之有見害於人也至於冷癆食之則能發冷水病須合蔥與椒姜同煮並銼鱉甲少許以入可知鱉性冷故須假以姜椒以為之制鱉肉聚故須假以鱉甲之散以為之佐耳鱉項下有軟骨如龜形者食之令人患水病須去之然惟婦人素挾血熱症見血瘕血漏並瘧痢諸症服之得宜若使中氣有虧謂可補中益氣縱出別録亦屬膚語不足信也
