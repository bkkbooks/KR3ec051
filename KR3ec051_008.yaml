body:
  text: 卷八主治上臟腑病症主藥繡按人生疾苦非屬外感有餘即屬內傷不足然究其要總不越乎臟氣偏勝以為致害蓋人臟氣不明藥性不知無論病症當前宜涼宜熱根蒂全然不曉即其藥之或功或過亦不知其奚自而起矣考之瀕湖綱目所論臟腑虛實標本藥式其間分門別類補母瀉子與夫補氣補血非不既詳且盡但惜尚有未清之處如白朮不言能補脾氣反云能補肝氣脾血砂仁不言能溫胃氣反云能補腎氣當歸不言能補心血反云能補命門相火澤瀉不言能除膀胱濕熱反云能補心氣沒藥血竭不言能破肝血反云能補肝血之類是也且其所論三焦實火宜瀉則梔連芩柏似可指引而書偏指麻黃瓜蒂以為瀉火之要三焦實熱宜解則麻桂硝黃似可列入而書止舉梔連芩柏為解熱之劑顛倒錯亂實不可解以致後學漫無指歸是篇採集用藥主治皆從藥中正理考核不以反借反說敷衍間有正論既抒旁意應明亦必疏暢殆盡斷不牽引混指以致有誤後學云肝足厥陰乙木肝屬木木為生物之始故言肝者無不比類於木凡藥色青味酸氣臊性屬木者皆入足厥陰肝足少陽膽肝與膽相為表裡膽為甲木肝為乙木謂其肝氣勃勃猶於百木之挺植肝血之灌注猶於百木之敷榮昔人云肝無補非無補也實以肝氣過強則肝血不足補之反為五臟害故以無補為貴詎知肝氣不充是猶木之體嫩不振而折甚易肝氣不充猶木體軟不振非不用以山茱萸杜仲續斷雞肉壯氣等藥以為之補烏能以制夭折之勢乎肝血既竭是猶木之鮮液而槁在即肝血不足猶不枯槁不榮非不用以地黃山藥枸杞以滋其水肝以腎為子經曰虛則補母當歸首烏阿膠菟絲人乳以生其血血燥則急經曰肝苦急急食甘以緩之其何以制乾燥之害乎肝氣冷而不溫是猶木之遇寒而凍肝冷不溫猶木遇寒而凍非不用以肉桂鹿茸以暖其血川芎香附艾葉吳茱萸以溫其氣其何以制嚴寒之威而抒發生之象乎肝氣鬱而不舒是猶木受濕熱之蒸歷久必黃必萎肝鬱不舒猶木受鬱而萎非不用以茯苓赤苓天仙藤以滲其濕木香香附柴胡川芎以疏其氣靈脂蒲黃歸尾鱉甲桃仁母草以破其血其何以舒其鬱而去其熱乎若使肝氣既浮而症已見目赤發熱口渴則宜用以龍骨棗仁白芍烏梅木瓜之類以為之收是猶木氣過泄日久必有強直之害肝氣過浮猶木強直不屈不治不足以折其勢也木以斂為瀉經曰以酸瀉之肝挾風熱內侮而症見有諸風眩暈僵仆驚癇則宜用以桂枝羌活烏附荊芥鉤藤薄荷川芎以除其風木喜條達經曰肝欲散急食辛以散之散即是補故經又曰以辛補之黃芩膽草青黛青蒿前胡以瀉其火以除其熱紅花地榆槐角紫草茅根赤芍生地以涼其血甘草以緩其勢肝以心為子經曰實則寫其子是猶木之值於風感厥厥動搖日久必有摧折之勢肝受風侮猶木遇風而搖不治不足以制其暴也肝氣過盛而脾肺皆虧症見咳嗽喘滿驚悸氣逆則宜用以金銀薄青皮鐵粉密陀僧側柏葉以平其肝三稜枳實以破其氣是猶木之叢林茂蔚值此斧不可加土不可載日久必有深藏不測之虞不如是不足以制其害也肝風過盛猶木茂蔚剋土侮金凡此肝氣之盛衰實與木氣之強弱如一肝血之榮枯實與木液之膏竭相等使不比類以觀而但謂其肝盛宜制嗚呼制則制矣盍亦思其肝有虛怯果能受此摧殘剝落否耶經曰肝苦急血燥則急急食甘以緩之如人乳甘草之類肝欲散木喜條達急食辛以散之如桂枝羌活川芎薄荷之類以辛補之肝以辛為補故川芎薄荷能以補肝以酸瀉之肝以斂為瀉故白芍赤芍烏梅皆曰瀉肝補肝氣杜仲山茱萸雞肉續斷補肝血荔枝阿膠桑寄生何首烏狗脊麋茸獺肝紫河車菟絲人乳疏肝氣木香香附柴胡芎藭平肝氣金銀薄青皮鐵粉密陀僧雲母石珍珠龍骨龍齒破肝氣三稜枳實斂肝氣龍骨酸棗仁炒白芍龍齒烏梅木瓜散肝風荊芥鉤藤蛇蛻蒺藜蟬蛻浮萍王不留行全蠍桂枝白花蛇石南藤蜈蚣川烏附樟腦散肝風濕桑寄生羌活側附子狗脊松脂蒼耳子豨蘞草威靈仙茵芋海桐皮秦艽五加皮散肝風熱木賊蕤仁冰片決明子爐甘石青葙子散肝風氣芎藭麝香薄荷蘇合香散肝風痰南星皂角烏尖附白芥子天麻散肝風寒痰蔓荊子殭蠶山甲散肝血穀精草石灰祛肝寒肉桂桂心吳茱萸艾葉大茴香小茴香滲肝濕茯苓土茯苓天仙藤瀉肝濕龍膽草連翹珍珠皂礬白蘞瀉肝痰滯前胡鶴蝨磁石溫肝血蟲白蠟肉桂續斷芎藭香附荊芥伏龍肝延胡索爐甘石蒼耳子海螵蛸酒百草霜沙糖兔屎王不留行澤蘭韭菜墨劉寄奴大小薊天仙藤海狗腎蒺藜鹿茸鹿角艾葉涼肝血生地黃代赭石蒲公英青魚膽紅花地榆白芍槐角槐花側柏葉卷柏無名異凌霄花豬尾血紫草夜明沙兔肉旱蓮草茅根蜈蚣山甲琥珀芙蓉花赤芍醋熊膽破肝血莪朮紫貝五靈脂紫參益母草蒲黃血竭蓮藕古文錢皂礬歸尾鱉甲貫衆茜草桃仁敗肝血乾漆三七虻蟲螃蟹瓦楞子水蛭花蕊石止肝血炙卷柏伏龍肝墨炒艾葉炒蒲黃花蕊石青黛百草霜炒側柏石灰劉寄奴王不留行散肝熱決明子野菊花夏枯草木賊瀉肝熱代赭石石南葉琥珀車前子牛黃前胡秦皮空青銅青蒙花石決明珍珠凌霄花生棗仁蘆薈瀉肝熱痰磁石前胡牛黃吐肝熱痰膽礬瀉肝火鉤藤熊膽女貞子羚羊角青黛熊膽草人中白黃芩大青青蒿草散肝毒蜈蚣蛇蛻野菊花王不留行解肝毒土茯苓蒲公英芙蓉花皂礬連翹醋藍子拔肝毒青黛輕粉心手少陰丁火心有拱照之明凡命門之水與三焦分布之火無不悉統於心而受其裁故曰君火凡藥色赤味苦氣焦性屬火者皆入手少陰心手太陽小腸經心與小腸為表裡小腸為丙火心為丁火第心無氣不行無血不用有氣以運心則心得以堅其力有血以運心則心得以神其用是以補心之氣心氣虛無有過於龍眼肉補心之血心血虛無有過於當歸柏子仁龜板食鹽經曰心欲軟急食鹹以軟之心而挾有沉寒痼冷心寒則有宜於桂心之燥及或加以延胡索乳香骨碎補安息香之類以為之卻心或散而不收心氣散則有宜於五味子之酸以為之斂經曰心苦緩急食酸以收之又按五味子雖屬肺腎專藥然亦具有苦性可以通用心而挾有痰濕心挾痰濕則有宜於半夏茯神燈心萱草以為之滲心而挾有內濕內熱心挾熱濕則有宜於代赭石木通瞿麥牛黃天竺黃連翹山梔西瓜黃連辰砂百合鬱金蓮鬚貝母鉤藤珍珠土貝母川楝子之屬以為之瀉心而挾有血瘀不解心有血瘀則有宜於丹參沒藥鬱金桃仁茜草蘇木益母草蓮藕童便血餘之屬以為之破以為之軟經曰心欲耎急食鹹以軟之又曰以咸補之至心挾有熱邪內起心有熱邪則有燈草竹葉熊膽羚羊角山豆根童便麥冬萱草生地梔子犀角木通黃連等藥可選心挾熱痰內起心有熱痰則有牛黃貝母等藥可用心氣不通則有菖蒲遠志桑螵蛸薰香雄黃胡荽等藥可進蓋心以通為主心通則思無所窒而運用靈猶火必空而後發也心又以氣為要氣足則事歷久而不墮猶火必薪而始永也心又以血為需血足則心常存而不離猶燈必膏繼而後光也合此三者以治則心拱照自若庶績咸熙又何有病之克生乎經曰心苦緩緩則散逸急食酸以收之如五味子之類按五味子雖屬肝腎專藥然亦具有苦性可以通用心欲耎急食鹹以軟之如童便血餘之類以咸補之心以咸為主以甘瀉之補心氣龍眼肉補心血當歸柏子仁食鹽龜板通心氣菖蒲遠志桑螵蛸薰香安息香雄黃胡荽卻心寒桂心散心濕熱香薷散心痰濕半夏菖蒲滲心濕茯神燈心萱草瀉心熱代赭石木通瞿麥牛黃天竺黃連翹西瓜黃連山梔子辰砂百合鬱金蓮鬚貝母鉤藤珍珠土貝母川楝子瀉心濕熱木通黃連連翹梔子珍珠苦楝子瞿麥溫心血延胡索安息香骨碎補桂心乳香涼心血犀角射干童便血餘紅花辰砂紫草熊膽生地黃破心血丹參沒藥鬱金桃仁茜草蘇木益母草蓮藕解心毒射干貝母連翹山豆根黃連瀉心火燈草竹葉熊膽羚羊角山豆根童便麥冬萱草生地梔子犀角木通黃連鎮心怯禹餘糧鐵粉代赭石珍珠辰砂瀉心熱痰牛黃貝母脾足太陰己土土有長養萬物之能脾有安和臟腑之德取脾味甘配土理適相合凡藥色黃味甘氣香性屬土者皆入足太陰脾足陽明胃經脾與胃相表裡胃為戊土脾為己土是以古之治脾每借土為比喻蓋謂脾氣安和則百病不生脾土缺陷則諸病叢起張元素曰五臟更相平也一臟不平所勝平之故云安穀則昌絶谷則亡水去則營散谷消則衛亡神無所居故血不可不養衛不可不溫血溫氣和營衛乃行長有天命經曰土不及則卑監當補之培之治當用以白朮之苦以補其缺土虧宜補經曰脾苦濕急食苦以燥之然有寒痰與食凝結胸口滯而不消則術又當暫停如寒則有宜於乾薑生薑痰則宜於半夏滯則宜於砂仁白蔻木香之類使猶用以白朮不更以增其滯乎亦有補散兼施但須看其邪氣微甚以酌因應權變之宜火氣內結而土燥涸不潤則土當以水制土燥宜潤如地黃山藥枸杞甘草之類經曰以甘補之使猶用以白朮不更以增其燥乎脾濕滑而不固而症見有泄瀉則土當以澀制土滑宜宣如蓮子芡實肉豆蔻之類使徒用以白朮不更使脫難免乎白朮當兼澀藥同投土受偶爾寒濕不伸而症見有嘔吐噁心心痛則土當以疏泄土滯宜宣如木香甘松藿香菖蒲大蒜紅豆蔻胡荽之類使猶用以白朮不更以增其窒乎亦有白朮與諸散藥同用須看邪微甚以分先後治法土因濕熱內蒸而症見有溺閉便祕腳痛惡毒等症則土當以清解土雜宜清如白蘚皮薏苡仁木瓜蚯蚓紫貝皂白二礬商陸郁李之類使猶用以白朮不更以增其熱乎若使水勝於熱而症見有腫脹溺澀日久必有浸淫傾覆之害則治當以滲投如茯苓芡實澤蘭扁豆山藥浮萍鴨肉鯽魚之類使或用以白朮其何以止傾蕩之勢乎土因寒氣栗烈而凍而症見有四肢厥逆不解則藥當以熱投土寒而濕如附子肉桂乾薑之類使僅用以白朮其何以除寒厥之症乎如四逆湯姜附湯之類至於土敦而厚土高而阜是為熱實內結宜用苦寒以下土高土厚而下宜削如枳實大黃朴硝之類經曰以苦瀉之使猶用以白朮不更使敦而至腹滿莫救使阜而致喘逆殆甚乎脾土既虧生氣將絶是猶土崩而解治當用以升固土崩而固如參耆白朮甘草升麻之類經曰脾欲緩急食甘以緩之使僅用以白朮而不合以參耆以為升補其何以固崩解之勢乎如補中益氣湯之類凡此雖非以補為要而補脾之理無不克寓要使土氣安和不寒不熱不燥不濕不升不降不厚不薄則於臟氣適均又奚必拘拘於所補為是而以不補為非哉是可只其用補之妙法耳經曰脾苦濕急食苦以燥之如白朮之類脾欲緩舒和意急食甘以緩之如甘草之類以甘補之甘緩脾故以甘為補以苦瀉之苦燥濕故以苦為瀉補脾氣白朮緩脾氣炙甘草合歡皮健脾白朮白蔻砂仁肉豆蔻蓮子溫脾龍眼大棗荔枝犬肉牛肉飴糖熟蜜潤脾山藥黃精羊肉人乳豬肉醒脾氣木香甘松藿香菖蒲大蒜紅豆蔻胡荽寬脾氣烏藥藿香神麯升脾氣蒼朮消脾氣山楂橘皮郁李神麯薑黃破脾氣枳實郁李斂脾氣木瓜散脾濕蒼朮松脂蒼耳子防風厚朴排草散脾濕痰半夏橘皮神麯石菖蒲吐脾濕熱痰白礬皂礬燥脾濕白朮蛇床子密陀僧松脂石灰橘皮蕪荑伏龍肝蒼朮紅豆蔻川椒鯉魚燥脾濕痰烏尖附附子乾薑滲脾濕茯苓芡實澤蘭扁豆山藥浮萍鴨肉鯽魚清脾濕痰白蘚皮薏苡仁木瓜蚯蚓紫貝皂礬白礬商陸郁李清脾熱石斛白芍竹葉瀉脾火石斛白芍降脾痰白礬皂礬射干密陀僧消脾積砂仁木香使君子山楂神麯阿魏橘皮殺脾蠱松脂使君子蕪荑雄黃萹蓄紫貝蚯蚓皂礬白礬阿魏烏梅百草霜蒼耳子密陀僧石灰溫脾血蟲白蠟伏龍肝百草霜天仙藤涼脾血射干破脾血郁李仁紫貝薑黃蓮藕皂礬蚯蚓止脾血百草霜石灰解脾毒蚯蚓射干白礬肺手太陰辛金肺為清肅之臟處於至高不容一物故經以此配金謂其稟氣肅烈臟適與之相均也凡藥味辛色白氣腥性屬金者皆入手太陰肺手陽明大腸經肺與大腸為表裡大腸為庚金肺為辛金惟是肺主於秋秋主收而惡燥故肺常以清涼為貴猶之金氣燥烈忽得涼氣以解則金堅強不軟然使寒之過極則鐵精華盡失必致受鏽而敗肺雖以涼為貴而亦恐其過寒以致氣不克伸金寒而鏽仍當治以溫和如燕窩飴糖甘菊胡桃肉之類是也若使胃氣素虛肺金失養咳聲漸少步武喘鳴與夫足痿莫行是猶金之燥烈而痿金燥而痿治當亟補肺陰兼滋腎水如補肺則當用以葳蕤人乳阿膠胡麻熟蜜棐實之類滋水則當用以枸杞熟地菟絲山藥之類是也心火挾其相火上克於肺則肺受爍之極是猶金之被爍而熔金爍而熔治當審其火勢稍微則當用以生地梔子天冬麥冬桑白皮薏苡仁百部百合之類火勢與熱稍甚則當用以栝蔞花粉馬兜鈴青木香竹茹黃芩之類是也至於肺氣久泄逆而不收是猶金之鋒利太過則當急為收藏金鋭而泄如粟殼木瓜烏梅訶子五味子蜊粉之屬是也經曰肺欲收急食酸以收之以酸補之肺有寒痰與氣內塞而聲不能以發是為金實不鳴治當相其所實以治大約實在於寒寒實不散則有桔梗麻黃紫蘇蔥管黨參白蔻生薑薰香馬兜鈴紫白二英紅豆蔻川椒冬花百部丁香杏仁等藥可散實在風濕痰熱風痰濕熱不開則有甘菊葳蕤五倍子百藥煎辛夷牛子白前蕪荑皂角可解實在於氣不得降下氣實不降則有馬兜鈴青木香旋覆花栝蔞花粉葶藶蘇子枇杷葉杏仁萊蔔子補骨脂可降經曰肺苦氣上逆急食苦以瀉之實在肺氣不宜宣通氣塞不通則有薰香安息香可去實在肺氣不得疏泄則有丁香冬花牽牛白前橘皮女菀可除經曰以辛泄之實在中有濕熱不得滲泄氣有濕熱不泄則有黑牽牛黃芩石葦車前子通草薏苡仁葶藶可滲若使肺氣空虛而肺自嗽不已是為金空而鳴肺氣衰弱而氣不得上升以勝是為金衰而鈍皆當用以人參黃耆桔梗以為振拔或兼白朮補土以生金惟有肺氣內傷聲啞不開是為金破不鳴治當滋水清肺如熟地山藥枸杞阿膠天冬麥冬人參之類余則看症酌施然要肺屬嬌臟寒熱皆畏故治當酌所宜而不可有過寒過熱之弊耳經曰肺苦氣上逆火旺剋金急食苦以瀉之如青木香葶藶子之類肺欲收急食酸以收之如五味子烏梅之類以酸補之酸能收氣不散故以酸為補以辛泄之如牽牛之類補肺氣人參黃耆溫肺燕窩飴糖甘菊胡桃肉潤肺葳蕤人乳阿膠胡麻熟蜜棐實升肺氣桔梗通肺氣薰香安息香泄肺氣丁香冬花牽牛白前橘皮女菀降肺氣馬兜鈴青木香旋覆花栝蔞花粉葶藶蘇子枇杷葉杏仁萊蔔子補骨脂破肺氣枳殼斂肺氣粟殼木瓜烏梅訶子五味蛤蜊粉散肺寒桔梗麻黃紫蘇青蔥杏仁白豆蔻生薑薰香馬兜鈴白石英紫石英紅豆蔻川椒款冬花百部丁香宣肺風甘菊皂角宣肺風濕葳蕤五倍子百藥煎白前宣肺風熱辛夷牛子燥肺濕川椒滲肺濕茯苓桑白皮姜皮瀉肺濕熱牽牛黃芩石葦車前子通草薏苡仁葶藶散肺暑濕紫蘇瀉肺熱馬兜鈴青木香五倍子百藥煎通草車前子貝母牽牛石葦牛子金銀花山梔子白薇知母沙參薏苡仁百部百合黃芩芙蓉花柿霜柿乾土貝母竹茹梨蛤蜊粉瀉肺火黃芩栝蔞花粉竹茹桑白皮羚羊角地骨皮枇杷葉沙參麥冬生地天冬梔子涼肺血生地紫菀澀肺血白芨散肺毒野菊花解肺毒金銀花芙蓉花牛子貝母黃芩降肺痰栝蔞花粉貝母生白果旋覆花杏仁土貝母訶子腎足少陰癸水書曰腎藏志屬水為天一之源凡色黑味鹹氣腐性屬水者皆入足少陰腎足太陽膀胱經腎與膀胱相表裡膀胱為壬水腎為癸水主聽主骨主二陰又曰諸寒厥逆皆屬於腎又曰腎中之水則能行脊至腦而為髓海泌其津液注之於脈以榮四末內注臟腑以應刻數上達皮毛為汗為涕為唾下濡膀胱為便為液周流一身為血則是腎中之水實為養命之源生人之本惟是腎無水養則腎燥而不寧水無火生則水窒而不化繡常即腎以思其水之涸竭而不盈者水涸不盈固不得不賴熟地枸杞山茱萸菟絲以為之補若使水寒而凍火不生水水反凝結如土如石水寒不溫則補不在於水而在於火是有宜於附桂硫黃細辛之味矣經曰腎苦燥急食辛以潤之水因食積寒滯而聚水聚不散則補不在於水而先在於疏泄滲利是有宜於茯苓香砂乾薑之味矣水因火衰而水上逆是謂之泛水因水衰而水上逆是謂之沸水逆不下治當審其火衰則有宜於附桂加於地黃之內火盛則有宜於知柏之苦經曰腎欲堅急食苦以堅之加於地黃之中是皆補水之味矣經曰以苦補之若使水鬱而熱不化而致症變多端水蓄不泄其在輕劑則有茯苓桑螵蛸土茯苓烏賊骨以為之滲重劑則有防己木瓜苦參海蛤文蛤琥珀以為之瀉再重則有海藻海帶昆布以為之代經曰以咸瀉之此又以滲以瀉為補者也若使水藏於下而性反逆於上是為腎氣不藏水氣不收肝氣佐使審其氣自寒成當以枝核烏藥沉香補骨脂硫黃青皮吳茱萸以為之治氣因熱至當以枳實黑鉛等藥以為之治此又以降以破為補者也若使腎氣不充而水順流而下絶無關閉症見遺尿精滑泄瀉水脫不固則又當用補骨脂覆盆蓮鬚金櫻子山茱萸龍骨牡蠣沉香靈砂秦皮石斛桑螵蛸芡實訶子石鐘乳五味子菟絲等藥分別以治經曰腎欲堅急食苦以堅之使之以救其水而固其泄經曰以苦泄之此又以固為補者也總之治水之道法不一端然大要則在使水與火相稱而不致有或偏之為害耳經曰腎苦燥指寒燥言急食辛以潤之如細辛附桂之類腎欲堅堅固則無搖蕩之患急食苦以堅之如黃柏之類以苦補之火去而水自安故以苦為補以咸瀉之如海藻之類滋腎冬青子燕窩桑寄生枸杞龜板龜膠胡麻冬葵子榆白皮黑鉛桑螵蛸楮實磁石食鹽阿膠火麻生地黃溫腎蓯蓉鎖陽巴戟天續斷菟絲熟地黃覆盆子狗脊鹿膠紫河車犬肉獺肝靈砂海狗腎山茱萸葡萄白蒺藜海螵蛸川膝胡桃肉麋茸燥腎附子肉桂鹿茸沉香陽起石仙茅胡巴淫羊藿蛇床子硫黃遠志石鐘乳蛤蚧蝦雄蠶蛾阿芙蓉川椒胡椒益智補骨脂丁香固腎胡桃肉菟絲子覆盆子補骨脂蓮鬚金櫻子山茱萸五味子葡萄阿芙蓉沒石子龍骨牡蠣沉香靈砂秦皮石斛桑螵蛸芡實訶子石鐘乳散腎寒細辛附子燥腎寒肉桂陽起石仙茅胡巴補骨脂川椒艾葉胡椒降腎氣沉香補骨脂黑鉛硫黃靈砂寬腎氣荔枝核烏藥引腎氣川牛膝五味子祛腎風濕熱白花蛇石南藤川烏附獨活桑寄生蛇床子巴戟天冰片淫羊藿五加皮天雄蔓荊子細辛滲腎濕茯苓桑螵蛸土茯苓海螵蛸鯉魚瀉腎濕防己木瓜苦參海蛤文蛤琥珀寒水石伐腎海藻海帶昆布茯苓軟腎堅海狗腎牡蠣海藻海帶昆布食鹽青鹽蛤蜊粉海石白梅瀉腎熱琥珀防己青鹽秋石寒水石龍膽草食鹽童便地骨皮瀉腎火玄參黃柏茶茗丹皮胡黃連青蒿草暖腎血陽起石續斷韭菜骨碎補海狗腎墨鹿茸涼腎血童便地骨皮血餘銀柴胡蒲公英生牛膝旱蓮草赤石脂破腎血自然銅古文錢止腎血墨黑姜炒黑艾炙卷柏炒梔子象皮灰消腎痰海石命門火居兩腎之中為人生命生物之源但人僅知腎之所藏在水而不知其兩腎之中七節之間更有火寓吳鶴皋曰此火行於三焦出入肝膽聽命於天君所以溫百骸養臟腑充九竅皆此火也為萬物之父故曰天非此火不能生物人非此火不能有生此火一息猶萬物無父故其肉衰而瘦血衰而枯骨衰而齒落筋衰而肢倦氣衰而言微矣此火衰之說也火衰氣寒是以補火之味則有宜於附子肉桂鹿茸硫黃陽起石仙茅胡巴淫羊藿蛇床子遠志蛤蚧雄蠶蛾川椒益智補骨脂丁香之類但須相其形症以施不可一概妄投若使火炎而燥火燥氣熱審其火自下起則當以清為要如丹皮黃柏知母玄參茶茗胡連青蒿草之屬是也火挾上見則當兼心與肺同瀉如麥冬黃連梔子知母黃芩之類是也火因水涸則當滋水制火如熟地黃山茱萸山藥枸杞之類是也書曰壯水之主以鎮陽光至於火浮而散此非腎火內熾乃是陰盛於下逼火上浮火淫不歸宜用沉香補骨脂黑鉛硫黃靈砂等藥以為之降牛膝五味子以為之引經曰以酸收之火空而發則火不在於補不在於清惟在塞中以緩其勢則火自熄如甘草麥門冬人參五味子合歡皮之類是也火伏不發則火已有告盡之勢其症必見惡寒厥逆舌卷囊縮唇甲皆青在火因於寒鬱不出則當用以麻細升葛解表之劑以為之發因於熱鬱不出則當用以三黃石膏知母清裡之劑以為之發經曰以苦發之若使泥以厥逆而猶用以附桂峻補是與操刀殺人無異其為敗也必矣治之者可不審其所因以定其治乎補腎火附子肉桂鹿茸沉香陽起石仙茅胡巴淫羊藿蛇床子硫黃遠志石鐘乳蛤蚧蝦雄蠶蛾阿芙蓉川椒胡椒益智補骨脂丁香補脾火白朮白蔻縮砂密肉豆蔻使君子蓮子補胃火大棗韭菜肉豆蔻草豆蔻草果白豆蔻縮砂密丁香檀香益智山奈良薑炮姜使君子神麯川椒胡椒大蒜蓽茇補肺火人參黃耆飴糖補大腸火韭菜補心火龍眼肉桂心菖蒲遠志薰香安息香胡荽雄黃補小腸火小茴橘核補肝火杜仲山茱萸雞肉續斷瀉腎火玄參黃柏茶茗丹皮胡黃連青蒿草瀉脾火大黃白芍瀉胃火茶茗茅根石膏瀉肺火黃芩栝蔞花粉竹茹天冬桑白皮羚羊角地骨皮枇杷葉沙參麥冬生地梔子瀉心火燈草竹葉熊膽羚羊角山豆根童便麥冬萱草生地梔子犀角木通黃連瀉肝火鉤藤熊膽女貞子羚羊角青黛龍膽草人中白黃芩大青青蒿草瀉膽火龍膽草青黛大青瀉膀胱火人中白童便瀉三焦火青蒿草梔子散火柴胡升麻葛根薄荷香附羌活白芷水萍緩火甘草麥冬葳蕤合歡皮滋火地黃山茱萸枸杞引火肉桂附子五味子斂火白芍烏梅三焦手少陽經書曰上焦如霧中焦如漚下焦如瀆又曰三焦為相火之用分布命門主氣升降出入遊行上下總領五臟六腑營衛經絡內外上下左右之氣號中清之府上主納中主化下主出觀此氣雖分三而實連為一氣通領上下不可令有厚薄偏倚輕重之分矣玩書所論三焦瀉熱大約汗則宜於麻黃柴胡葛根荊芥升麻薄荷羌活防風吐則宜於瓜蒂萊蔔子藜蘆食鹽梔豉下則宜於大黃芒硝此瀉熱之味也所論瀉火大約上則宜於連翹梔子黃芩黃連生地知母中則宜於龍膽青黛白芍石斛石膏下則宜於黃柏知母丹皮青蒿草此瀉火之味也至於所論補虛大約上則宜於參耆桂心當歸龍眼中則宜於白朮炙草淮山首烏山茱萸下則宜於附桂硫黃沉香補骨脂地黃枸杞菟絲子此補虛之味也蓋此統領一身名為決導之官其氣不可偏勝偏則其病立見三焦之藥不可混用用則其害立生明其三焦之義以平三焦之氣則氣上下適均無輕無重隨遇而安因地自得又安有偏倚不平之憾者乎汪昂曰十二經中惟手厥陰心包手少陽三焦經無所主其經通於足厥陰少陽厥陰主血諸藥入肝經血分者併入心包少陽主氣諸藥入膽經氣分者併入三焦命門相火散行於膽三焦心包絡故入命門者併入三焦用汗解熱麻黃柴胡葛根荊芥升麻薄荷羌活防風用吐解熱瓜蒂萊蔔子藜蘆食鹽梔子豆豉用下解熱大黃芒硝瀉上火連翹梔子黃芩黃連生地知母瀉中火龍膽草青黛白芍石斛石膏瀉下火黃柏知母丹皮青蒿草補上虛人參黃耆桂心當歸龍眼肉補中虛白朮炙草淮山首烏山茱萸阿膠補下虛附子肉桂硫黃沉香補骨地黃枸杞菟絲子膽足少陽甲木膽為中正之官居於表裡之界凡邪由於太陽陽明入於是經自非麻桂升葛並硝朴大黃之所可施惟取柴胡辛苦微寒以引邪氣左轉上行黃芩氣味苦寒以清裡邪未深所以寒熱往來口苦耳聾頭痛脅痛等症靡不用以柴胡為主且肝開竅於目肝與膽為表裡其色青凡風熱邪傳於膽未有不纍於目而致目赤障翳其藥必雜木賊同入以其能散肝經風熱也又用空青緑青銅青熊膽青魚膽膽礬同入以其能瀉膽經熱邪也若使有熱而更見有痰氣症見身熱咳嗽則又當用前胡而不可以柴胡治矣蓋柴胡性主上升前胡性主下降凡水虧血涸火起柴胡切忌有用柴胡熱愈盛者義實基此凡水虧血燥切忌至於膽經有火其瀉亦不越乎膽草大青青黛以其氣味形色皆與膽類故即以此治膽可耳若其膽氣過寒症見不眠則又當用棗仁半夏以溫膽氣過怯則又當用龍骨等藥以鎮凡此皆當審視明確則用自不致有所誤散膽熱柴胡散膽風熱木賊瀉膽熱空青緑青銅青熊膽青魚膽膽礬前胡瀉膽熱痰前胡瀉膽火龍膽草青黛大青溫膽棗仁半夏鎮膽龍骨胃足陽明戊土胃為水穀之海凡水穀入胃必賴脾為健運蓋脾得升則健健則水穀入胃而下降矣胃以得降為和和則脾益上升而健運矣但世僅知脾胃同為屬土皆宜升提補益詎知太陰濕土得陽則運陽明陽土得陰始安故脾主於剛燥能運而胃主於柔潤能和也是以胃氣不協治多宜於陳倉米人乳大棗以為之溫使之胃氣衝和嘗以氣不過勝為貴若使胃氣過潤則胃多寒不溫而血亦寒而滯治當用以韭菜爐甘石等藥以為之理爐甘石必兼目疾方用胃濕不爽當以白豆蔻草蔻草果肉蔻砂仁丁香檀香益智山奈良薑炮姜使君神麯川椒胡椒大蒜蓽茇等藥以為之疏胃有風濕不除胃挾風濕當以防風秦艽白芷以為之祛胃有風痰內結胃挾風痰當以白附等藥以為之散胃有暑濕不清胃挾暑濕當以香薷以為之解胃有寒痰濕滯不消胃挾寒痰濕滯當以半夏肉蔻草蔻白蔻砂仁丁香草果檀香益智山奈良薑炮姜使君神麯川椒胡椒大蒜蓽茇紅豆蔻以為之燥以為之溫胃有濕熱不化輕則備有冬葵子榆白皮神麯茅根陳倉米鴨肉鯉魚萆薢等藥可採重則備有扁豆白蘚皮木瓜苦參茵陳刺蝟皮白薇寒水石續隨子蕘花等藥可選至於胃有積熱及火則有雪水柿蒂大黃竹茹竹葉玄明粉梨汁西瓜珍珠白薇蘆根犀角粳米石膏柿乾柿霜雷丸朴硝刺蝟皮茶茗可以相症通治胃有血熱血積則有地榆槐角槐花蘇木三七乾漆等藥可涼可通胃有毒氣不消則有土茯苓漏蘆白頭翁金汁緑豆蝸牛蒲公英人中黃可選他如胃熱在經止宜用以升葛以為之散而不可妄清胃有蠱積則當用以使君乾漆五倍子百藥煎阿魏雷丸谷蟲厚朴以為之殺胃氣內結不消則有枳實枳殼蕎麥等藥以為之破胃積不化則有山楂使君砂仁神麯麥芽等藥以為之消胃氣不開則有烟草通草大蒜雄黃以為之通胃氣窄狹則有藿香神麯等藥以為之寬胃散不收則有木瓜以為之斂胃虛不固則有蓮子訶子赤石脂禹餘糧肉豆蔻粟谷烏梅龍骨粳米以為之澀然此止就胃之補瀉大概立說至於臨症施治又當細為參考喻嘉言曰脾之土體陰而用陽胃之土體陽而用陰兩者和同不剛不柔穀氣運行水道通調灌注百脈相得益大其用斯美觀此是真得乎論胃之要而不失乎治胃之方也矣養胃陳倉米大棗人乳溫胃韭菜爐甘石固胃氣蓮子訶子赤石脂禹餘糧肉豆蔻粟殼龍骨粳米斂胃氣木瓜升胃氣乾葛升麻檀香白附通胃氣烟草通草大蒜雄黃寬胃氣藿香神麯蕎麥破胃氣枳實山甲蕎麥續隨子消胃積砂仁使君子山楂神麯麥芽蕎麥雷丸谷蟲阿魏朴硝硇砂丁香沙糖殺胃蟲使君子乾漆五倍子百藥煎阿魏雷丸谷蟲厚朴祛胃風濕白芷秦艽防風散胃風痰白附散胃濕熱痰香薷濕熱半夏濕痰燥胃寒痰濕肉豆蔻草豆蔻白豆蔻砂仁草果丁香檀香益智山奈良薑炮姜使君子神麯川椒胡椒大蒜蓽茇紅豆蔻滲胃濕石鐘乳冬葵子榆白皮神麯土茯苓茅根陳倉米鴨肉鯉魚萆薢瀉胃濕熱扁蓄白蘚皮木瓜苦參茵陳刺蝟皮白薇寒水石續隨子蕘花散胃熱乾葛升麻瀉胃熱雪水柿蒂大黃竹薷竹葉玄明粉漏蘆白頭翁人中黃金汁梨西瓜珍珠白薇蘆根犀角蒲公英粳米石膏柿干柿霜雷丸朴硝緑豆刺猥皮貫衆涼胃血地榆槐角槐花破胃血蘇木三七乾漆吐胃痰毒胡桐淚解胃毒土茯苓漏蘆白頭翁金汁緑豆蝸牛蒲公英人中黃茶茗茅根石膏大腸手陽明庚金腸以通利為尚與胃宜於降下之意相同故凡腸閉不解用藥通調亦當細為審量不可一概混施如腸枯而結潤之為便凡胡麻冬葵子榆白皮枸杞花生蓯蓉肉鎖陽油當歸蜂蜜等藥是即潤之之劑也腸冷而結溫之疏之為便凡硫黃巴豆大蒜蔥白川椒半夏等藥是即溫之疏之之味也腸熱而結開之瀉之為便凡大黃黃柏朴硝食鹽豬膽汁是即瀉之開之之劑也腸積不化消之為便凡蕎麥谷蟲硇砂厚朴是即消之之味也腸毒不清清解為便凡緑豆白頭翁蝸牛是即解之之劑也至於血積不除則有乾漆以破之血熱內結則有石脂地榆槐角槐花刺蝟皮以涼之腸氣不消則有枳實枳殼蕎麥豆朴陳皮以破之腸蟲內蝕則有雷丸谷蟲硇砂厚朴烏梅等藥以殺之外此腸風內熾症見鮮血四射則有皂角等藥以祛之濕熱內積症見蝕肛內痔則有防己白蘚皮蓮子訶子赤石脂禹餘糧肉豆蔻粟殼烏梅以為之清以為之收氣陷不舉則有升麻乾葛以為之升但須辨其寒熱及病與藥相投以服不可謂其宜用而即概為之治也收澀蓮子訶子赤石脂禹餘糧肉豆蔻粟殼烏梅龍骨粳米溫補韭菜潤燥胡麻冬葵子榆白皮枸杞花生蓯蓉油當歸鎖陽蜂蜜祛腸風皂角開腸寒結硫黃巴霜大蒜蔥白川椒半夏開腸熱結大黃朴硝食鹽豬膽汁瀉腸熱白頭翁人中黃生地朴硝大黃黃芩緑豆蝸牛玄明粉除腸濕石鐘乳除腸濕熱防己白蘚皮苦參刺蝟皮黃連玄明粉升陽氣升麻乾葛寬腸氣蕎麥消腸積蕎麥氣雷丸熱谷蟲食硇砂食厚朴濕殺腸蟲雷丸谷蟲硇砂厚朴烏梅涼腸血石脂地榆槐角槐花刺蝟皮破腸血乾漆解大腸毒白頭翁蝸牛緑豆小腸手太陽丙火小腸接於胃口之下連於膀胱大腸之上凡胃挾有寒熱未清靡不轉入小腸以為之病是以治此之藥亦不越乎治胃之法以推且小腸與心相為表裡凡心或有寒熱未清皆得移入小腸玩書有用小茴橘核荔枝以治小腸之氣者是即寒氣內入之意也有用海金沙赤小豆木通生地赤苓黃芩川楝子防己以治淋閉不解者是即熱氣內入之意也有用冬葵子榆白皮以治小便不通者是即濕氣內入之意也凡此所因不同治各有別惟在深於醫者之能知其所因而為之治耳寬小腸氣小茴橘核荔枝核滲小腸濕冬葵子榆白皮瀉小腸濕熱海金沙赤小豆木通生地赤苓黃芩川楝子防己膀胱足太陽壬水經曰膀胱者州都之官津液藏焉氣化則能出矣內景圖說曰胃之下口曰幽門傳於小腸至小腸下口曰闌門泌別其汁精者滲出小腸而滲入膀胱滓穢之物則轉入大腸膀胱赤白瑩淨上無入竅止有下口出入全假三焦之氣化施行氣不能化則關格不通而為病入氣不化則水歸大腸而泄瀉出氣不化則閉塞下竅而為癃腫矣觀此膀胱州都出入全在真氣充足故能化其津液而不致有泄瀉癃腫之患是以小便不通審其真氣虧損熱症全無須用肉桂以為之開以肉桂味辛性熱色紫故能直入血分補其真氣而化液也若使真氣既微寒氣內結而見疝痛等症則於荔枝核最宜如其是經非府寒犯太陽膀胱而見頭痛發熱惡寒無汗則當用以麻黃有汗則當用以桂枝風犯太陽膀胱而見頭痛發熱身痛則又當用藁本羌活防風以治以太陽本屬寒水之經不溫不足以散之也然過溫則恐於熱於火有助故凡熱盛而見閉溺等症則有豬苓澤瀉地膚子茵陳黃柏黃芩龍膽草川楝子田螺滑石等藥可採火盛而見溺閉等症則有人中白童便可入其餘症非膀胱寒熱而見溺閉不解則又當審別因而不可僅於膀胱拘也補膀胱氣肉桂散膀胱氣荔枝核瀉膀胱熱豬苓澤瀉地膚子茵陳黃柏黃芩龍膽草川楝子瀉膀胱濕熱豬苓澤瀉地膚子黃柏田螺川楝子滑石祛膀胱風藁本羌活防風表膀胱寒麻黃瀉膀胱火人中白童便
