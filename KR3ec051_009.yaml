body:
  text: 卷九主治下六淫病症主藥繡按病自內成則七情固為致病之根病自外成則六淫更為致病之由凡人衣被不慎寒暑不謹則六淫俱能致害而症見有肌膚灼熱身痛骨痛並或類於內傷而致症見體瘦骨蒸神昏氣倦痞滿不食苟以補劑混投則邪得補愈熾況邪襲人肌膚始雖及於經絡終則深入臟腑症類異形流派百出非不從一體會則病根底莫曉是篇統論藥性既以臟腑主治諸藥冠列篇首復以六淫主治諸藥並氣血等藥縱橫臚列載於篇末俾令藥性通達而無臨症岐亡之弊云風經曰風為百病長其變無常非無常也實以風隨四時之氣而乃變耳喻嘉言曰風在冬為觱發之寒風在春為調暢之溫風在夏為南薰之熱風在秋為淒其之涼風則知風隨時易其變靡定是以風在於肝其風為熱風在於脾於腎其風為寒為濕風在於胃於肺其風為燥風在於脾於肝其風為痰為濕隨其臟腑氣候以分則風愈變愈多而莫測矣考古有言風在於肝肝風宜用荊芥鉤藤蛇蛻蒺藜蟬蛻全蠍浮萍虎骨蜈蚣豨蘞草海桐皮木賊蕤仁決明子芎藭南星天麻蕪荑薄荷五加皮殭蠶以治風在於脾脾風宜用萆薢以治風在於腎宜用獨活蛇床子巴戟淫羊藿附子細辛以治風在於胃宜用白附蝸牛以治風在於肺肺風宜用甘菊葳蕤辛夷牛子杏仁白前以治風在經絡關竅經絡風宜用白花蛇麝香皂角山甲茵芋蘇合香樟腦萆麻子以治風在膀胱膀胱經風宜用藁本羌活以治風在肝腎肝腎風宜用白花蛇石南藤川烏附桑寄生狗脊以治風在肝脾肝脾風宜用蒼耳子爐甘石秦艽以治風在肺胃肺胃風宜用五倍子百藥煎以治風在於衛肌表風宜用桂枝以治經曰以辛散之此治風之有分其經絡臟腑之異也至於風以寒見寒風其藥則有杏仁淫羊藿之類風以熱見熱風其藥則有辛夷木賊蕤仁冰片決明子爐甘石牛蒡子青葙子之類風以濕見濕風其藥則有羌活獨活葳蕤桑寄生蛇床子巴戟狗脊白芷松脂茵芋蒼耳子豨蘞草五倍子百藥煎萆薢靈仙海桐皮秦艽防風之類風與痰見風痰其藥則有南星皂角烏尖附白芥子白附天麻白前之類風與濕熱皆見其藥則有蕪荑蝸牛之類風與熱氣並見其藥則有薄荷之類經曰風淫於內治以辛涼風與寒濕並見其藥則有五加皮天雄蔓荊子殭蠶細辛之類但風性急莫御用辛宜以甘制經曰以甘緩之且此止屬論藥大概至其臨症施治則又在人心通化裁而不為藥所拘是真得乎用藥之妙法矣經曰風淫於內治以辛涼佐以苦甘以甘緩之以辛散之風屬木辛屬金金能勝木故治以辛涼過辛恐傷真氣故佐以苦甘苦勝辛甘益氣也木性急故以甘緩之木喜條達故以辛散之五運厥陰司天巳亥厥陰在泉寅申祛風荊芥肝鉤藤肝蛇蛻肝蒺藜肝蟬蛻肝浮萍肝全蠍肝王不留行肝虎骨肝蜈蚣肝白花蛇肝腎川烏附肝腎石南藤肝腎甘菊肺腎蒿本膀胱桂枝衛祛風濕海桐皮肝豨蘞草肝蒼耳子肝脾松脂肝脾桑寄生肝腎狗脊肝腎巴戟天腎獨活腎側附子腎蛇床子腎葳蕤肺白芷胃萆薢胃百藥煎肺胃五倍子肺胃秦艽肝胃防風膀胱胃羌活膀胱肝茵芋關節威靈仙十二經祛風熱辛夷肺牛蒡子肺木賊肝膽決明子肝蕤仁冰片骨髓爐甘石肝脾祛風寒杏仁肺淫羊藿腎祛風氣芎藭肝麝香關竅祛風痰南星肝天麻肝白前肺白附子胃皂角肝肺大腸白芥子脅祛風熱濕蕪荑肝蝸牛經絡腸胃祛風熱氣薄荷肝祛風寒濕細辛腎天雄腎五加皮肝腎殭蠶肝肺胃蠶沙肝肺胃蔓荊子筋骨頭面通關諸藥皂角山甲蜈蚣白花蛇茵芋蘇合香樟腦細辛萆麻子麝香冰片全蠍川烏附寒風為六淫之長而寒亦居其次故漢仲景專以傷寒立論凡風寒由於背俞而入次第傳變則為傳經傷寒其邪止在於表而不在裡若不由經傳變直入三陰有寒無熱者則為直中傷寒其邪在裡而不在表且有表症全無厥氣內生寒戰不已者則為火衰內虛真寒而表切禁更有火熱內閉火不得泄外顯種種厥象者則為假寒症見又非溫藥表藥可治是以寒初在表邪未深入或止偶爾感傷輕寒薄冷用以紫蘇桔梗蔥白生薑一藥可愈如其次第傳變在太陽膀胱則當用以麻黃在陽明則當用以升葛在少陽則當用以柴胡此治表寒寒邪在三陽之大概也經曰以辛潤之至有中氣素虛其寒或兼有痰有氣有濕寒兼諸邪則當用以蓽茇白蔻薑黃紅豆蔻乾薑薰香川椒冬花百部紫白二英馬兜鈴等類以治寒兼有風則當用以杏仁淫羊藿等藥以治寒兼風濕則當用以五加皮天雄蔓荊子殭蠶蠶沙細辛以治寒兼痰壅則當用以生薑以治然亦不失散藥之類若使內寒之極真寒內見在胃則有草豆蔻草果白檀香益智丁香可逐但丁香則合肺腎而皆治在腎則有仙茅胡巴肉桂川椒補骨脂陽起石可入在肝則有吳茱萸艾葉大小茴可進在大腸則有巴豆可通在心則有桂心可投經曰寒淫於內治以甘熱佐以苦辛若更兼有痰濕則又無若附子胡椒此逐寒之大概也若使寒止假見則為內熱灰伏假寒外見有非燥藥可愈在表宜以輕劑疏散使熱外發在裡宜以苦鹹下降如三黃石膏知母黃柏朴硝經曰以咸瀉之以苦堅之使熱除而寒自不見矣但世僅知以寒治寒而不知寒有真僞則治又當變活而不可僅以寒拘耳經曰寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之土能制水熱能勝寒故治以甘熱苦而辛亦熱品也傷寒內熱者以咸瀉之內燥者以辛潤之苦能瀉熱而堅腎瀉中有補也五運太陽司天辰戌太陽在泉丑未散寒桔梗肺紫蘇肺蔥白肺紫石英肺白豆蔻肺馬兜鈴肺黨參肺白石英肺紅豆蔻肺冬花肺百部肺麻黃膀胱蓽茇胸腹良薑胃薰香肺心乾薑脾胃散寒風杏仁肺淫羊藿腎荷葉膽散寒風濕五加皮肝腎天雄腎細辛腎蔓荊子筋骨血脈殭蠶肝肺胃蠶沙肝肺胃散寒痰生薑肺逐血寒肉桂肝腎桂心心逐寒陽起石腎胡巴腎仙茅腎補骨脂腎川椒腎巴豆腎吳茱萸肝大茴香肝小茴香肝艾葉脾肝腎草果胃白檀香胃益智胃丁香肺胃腎大蒜諸竅草豆蔻胃口上逐寒痰胡椒胃腎附子腎砒石腸胃暑書曰靜而得之為中暑動而得之為中熱又曰暑症有二一曰陰暑一曰陽暑陰暑者因暑受寒之謂陽暑者因暑受熱之意可知陰暑即為中暑陽暑即為中熱也玩書所載治暑藥類甚多而其確實以指治暑之藥其數有限蓋暑必挾有濕如書所言能散暑中濕氣暑濕其藥止有紫蘇以疏肺受暑邪厚朴以消胸腹暑脹大蒜以開暑塞竅穴扁豆以舒脾中暑郁蒼朮以發脾中濕鬱也又暑必挾有熱如書所言能散暑中熱氣暑熱其藥止有香薷以除上下熱氣熏蒸木瓜以收濕熱耗損之氣也至於濕熱傷胃而渴暑濕熱則有雪水西瓜石膏可除傷腑而見溺閉則有滑石可解他則無有論及惟於症治之內或言暑有宜於參耆白朮是因暑能傷氣暑傷氣氣補則於暑可除矣有言宜用黃柏黃連是因暑挾有熱熱除則於暑克除矣有言宜用豬苓澤瀉是因暑濕不利濕利則於暑更可除矣有言宜用姜附肉桂是因暑挾沉寒暑寒寒去則於暑無不去矣有言宜於草果砂仁是因暑濕傷中暑傷中中治則於暑無不治矣有言宜於乾葛升麻是因暑傷於胃暑傷中氣而氣不升氣升則於暑無不消矣有言宜於烏梅甘草是因暑熱傷津津和而暑無不和矣有言宜於生地赤芍阿膠是因暑傷血燥血和而暑無不和矣若使意義不明徒以書載香薷以為治暑要劑無論是虛是實是陰是陽概為投服且令朝夕代茶保無有傷元氣之害乎噫誤矣散暑濕紫蘇肺厚朴胸腹大蒜諸竅蒼朮脾扁豆脾散暑濕熱木瓜脾香薷肺胃心散暑熱雪水胃石膏胃滑石中下西瓜心包胃補氣治暑人參黃耆白朮清熱治暑黃柏黃芩黃連利濕熱除暑豬苓澤瀉祛寒治暑乾薑附子消滯治暑草果砂仁升胃氣治暑乾葛升麻養津治暑烏梅甘草養血治暑赤芍生地阿膠濕經曰諸濕脹滿皆屬於脾則濕當以理脾為主又書有曰濕因於寒為寒濕濕因於熱為熱濕濕因於風為風濕濕因於燥為燥濕則濕當視所因以治又曰濕在上宜散濕在中宜燥濕在下宜清然亦未可盡拘如濕有宜於散其濕挾寒而至者則當以寒為治散寒濕如蔓荊細辛天雄之屬是也因於熱者則當以熱為治散熱濕如香薷木瓜之屬是也因於風者則當以風為治散風濕如白芷羌活獨活威靈仙海桐皮秦艽葳蕤桑寄生側附子蛇床子巴戟狗脊松脂茵芋爐甘石蒼耳子豨蘞草五倍子百藥煎萆薢防風之屬是也因於燥者則當以燥為治散燥濕如葳蕤桑寄生巴戟狗脊之屬是也至於中寒而濕不去則有疑於燥矣燥寒濕中凡白朮伏龍肝橘皮紅豆蔻川椒草豆蔻蛇床子密陀僧皆屬燥類經曰濕淫於內治以苦熱又曰以苦燥之腎寒而濕不化則有宜於滲矣滲寒濕在腎其滲宜以熱施凡肉桂鍾乳附子皆屬熱類若使中下皆熱瀉熱濕在中下在中輕則宜以芡實木瓜木通神麯扁豆山藥陳倉米浮萍等藥以為採擇經曰佐以酸淡又曰以淡滲之重則宜以滑石赤小豆扁蓄白蘚皮苦參茵陳刺蝟皮豬苓皂白二礬商陸紫貝郁李膽草以為選入在下輕則宜以地膚子文蛤苦楝子澤瀉琥珀重則宜以海帶海藻昆布田螺以為審用總之濕症雖多而要不外寒濕熱濕兩種寒濕者宜以去寒燥濕補火為要熱濕者宜以清熱利濕滋陰為尚若概用以清利及僅知其蒼朮為上下治濕要藥不惟效不克臻且更變見多端矣可不慎於所用乎經曰濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之濕為土氣苦熱皆能燥濕淡能利竅滲濕用酸者木能制土也五運太陰司天丑未太陰在泉辰戌散濕蒼朮脾厚朴胸腹排草肌散濕風豨蘞草肝海桐皮肝松脂肝脾蒼耳子肝脾桑寄生肝腎狗脊肝腎巴戟腎獨活腎側附子腎蛇床子腎葳蕤肺白芷胃萆薢胃百藥煎肺胃五倍子肺胃秦艽肝胃防風膀胱胃羌活膀胱肝茵芋關節威靈仙十二經散濕風寒細辛腎天雄腎五加皮肝腎殭蠶肝肺胃蠶沙肝肺胃蔓荊子骨頭面散濕熱風蕪荑肝散濕熱香薷肺胃心散濕痰半夏脾胃膽心燥濕白朮脾石灰脾草豆蔻脾伏龍肝肝脾橘皮肺脾川椒肺胃紅豆蔻胃草豆蔻胃燥濕風蛇床子腎燥濕熱密陀僧脾滲濕茯神心萱草心山藥脾浮萍脾扁豆脾澤蘭脾鯽魚脾芡實脾鴨肉脾海螵蛸腎桑螵蛸腎椒目腎桑白皮肺姜皮肺石鐘乳腸胃冬葵子腸胃榆白皮腸胃神麯腸胃土茯苓肝腎肉桂膀胱天仙藤肝鯉魚胃腎通草肺胃瀉濕熱白礬脾蚯蚓脾苦參腸胃茵陳腸胃刺蝟皮腸胃扁蓄腸胃木瓜脾胃筋骨石燕脾胃肝小腸瞿麥心燈草心黃連心白蘚皮腸脾胃黑牽牛肺黃芩肺石葦肺車前子肺海蛤腎文蛤腎琥珀腎豬苓膀胱澤瀉膀胱龍膽草肝赤苓小腸赤小豆小腸白薇肺胃寒水石胃腎薏苡仁脾肺白蘞肝脾皂礬肝脾連翹心肝珍珠心肝木通小腸心滑石中下苦楝子心胞小腸膀胱伐水海藻腎海帶腎昆布腎郁李脾商陸脾葶藶肺田螺膀胱紫貝肝脾甘遂經隧大戟臟腑芫花裡外續隨子胃腑濕滯萆麻子經絡螻蛄諸水燥燥為六淫之一何肺多以燥見以肺處於高源而燥故肺獨以燥名也然肺燥烈不潤則脾自必見枯血亦自必見槁精亦自必見竭腸亦自必見涸又安有肺燥而不與之俱燥哉是以治燥而在於肺則有葳蕤人乳阿膠熟蜜棐實以潤之矣治燥而在於脾脾燥則有山藥黃精羊肉人乳豬肉以潤之矣治燥而在於肝肝燥則有荔枝阿膠桑寄生何首烏狗脊麋茸獺肝紫河車兔屎以潤之矣治燥而在於腎腎燥則有冬青子燕窩桑寄生枸杞龜板龜膠胡麻冬葵子榆白皮黑鉛桑螵蛸楮實磁石以潤之矣治燥而在於心心燥則有柏子仁龜板食鹽以潤之矣治燥而在於大腸大腸燥則有胡麻枸杞花生蓯蓉油當歸鎖陽蜂蜜以潤之矣至於因風而燥風燥則有羌活秦艽防風因火而燥火燥則有黃芩麥冬因熱而燥則有石膏知母生地大黃朴硝經曰以苦下之然此人所皆知其有水極而燥水燥寒極而燥寒燥人絶不曉蓋水衝擊橫溢血氣不周上下隔絶而症有不燥乎寒凍不解津無氣化而症有不燥乎如大便祕結症果屬熱用以大黃以下其燥自開症果屬燥用以胡麻火麻以潤其燥亦開若使燥屬於寒在表表寒則當用以麻桂羌防細辛以開其鬱在裡裡寒則當用以硫黃巴豆半夏以開其結在中中寒則當用以香砂姜半以通其滯經曰燥淫於內治以苦溫佐以甘平水燥而溺不通在寒水燥因寒則當用以苓桂在熱水燥因熱則當用以知柏若使寒熱皆見水燥寒熱俱見則治又當用以四苓至於燥氣結極而有塊硬不消燥極成塊則治又當用以食鹽芒硝海藻等藥以為之軟其燥無有不化易曰燥萬物者莫熯乎火治燥必兼治火然苟如此通活則遇燥皆識治無不效又奚必僅以所見之燥為拘哉經曰燥淫於內治以苦溫佐以甘辛以苦下之燥屬金苦屬火火能勝金故治以苦溫甘能緩辛能潤苦能下故以為佐也五運陽明司天卯酉陽明在泉子午通燥胡麻冬葵子榆白皮蓯蓉肉鎖陽熟蜜通寒燥硫黃巴豆大蒜蔥白半夏通熱燥大黃豬膽汁食鹽軟堅海狗腎腎牡蠣腎海帶腎昆布腎食鹽腎青鹽腎蛤蜊粉腎海石腎白梅腎芒硝腸胃䗪蟲肝紫貝肝脾鳳仙子骨穴硬處火火有在於外者宜散失於不治則即變為鬱火火有因於虛者宜補宜滋宜緩火有因於實者宜瀉宜清火有根於裡虛上浮者宜引火有因於表虛外浮者宜斂此治火之大概也但人止知梔連芩柏為瀉火要劑經曰以苦發之詎知火鬱於表宜散是即麻黃桂枝升麻乾葛柴胡輕可去實之意也火燥於裡宜滋是即六味補精化氣壯水鎮陽之意也火虛於中宜補宜緩是即參耆甘術甘溫能除大熱之意也火實於裡宜瀉宜清是即三黃石膏朴硝知母熱不遠寒之意也經曰火淫於內治以鹹冷因於裡虛上浮者火浮宜引是即川膝車前五味補骨脂附桂八味引陽歸陰之意也因於表虛者宜斂是即參耆白芍棗仁龍骨牡蠣斂陰祕陽之意也經曰以酸收之至其瀉火之味考之本草所載雖多然究其要脾不外乎石斛白芍肺不外乎黃芩桑皮心不外乎黃連梔子膽不外乎膽草青黛腎不外乎黃柏知母余則按症酌增但須審症明確則所投皆應自無牽制悖謬之弊矣李時珍曰燥甚則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地涸此六淫見勝之義也經曰火淫於內治以鹹冷佐以苦辛以酸收之以苦發之相火腎火也故治以鹹冷辛能滋潤酸能收斂苦能泄熱或從其性而升發之也五運少陽司天寅申少陽在泉巳亥散火麻黃桂枝升麻乾葛柴胡香薷滋火地黃枸杞淮山藥首烏阿膠菟絲子補火人參黃耆白朮附子肉桂乾薑緩火甘草合歡皮人乳黃精麥冬葳蕤瀉火黃柏黃芩黃連石膏知母膽草引火五味補骨脂附子肉桂熟地黃牛膝收火人參黃耆白芍龍骨棗仁牡蠣熱附熱者寒鬱內成之意因其平素有火加以寒鬱而熱成矣臟陽生熱為真熱若臟氣素陰則寒雖入而熱不生在初惟見無熱惡寒至夜方有熱見且有平素無熱因於火虛而陽上浮其症有似於熱又或中有食滯上下氣不宣泄而身時見熱作皆非真正純熱之謂臟陰或熱為假熱所以治熱須分表裡陰陽及有積熱伏熱熱毒似熱之異也但世僅知苦寒解熱而不知其邪初在表熱未內結其可不用升麻乾葛柴胡秦艽及或夏枯草之類以散之乎熱挾有風而症見有鼻淵目翳其可不用辛夷木賊蕤仁冰片決明子薄荷爐甘石青葙子之類以解之乎熱挾有濕而症見有面垢不仁肌膚痿痹其可不用香薷蕪荑以解之乎熱挾有痰不散而症見有目翳痘癰其可不用海石以散之乎血瘀不散而症見有肝虛目翳瘡瘍惡毒其可不用石灰穀精草以治之乎熱不在經而在於膈而症見有欲吐不吐其可不用木鱉栝蔞膽礬等藥以治之乎此散表熱之大概也若熱已在於里法當用瀉然瀉脾則不外乎石斛白芍瀉胃則不外石膏朴硝大黃瀉肺則不外乎黃芩知母瀉大腸則不外乎黃芩生地瀉心則不外乎連翹山梔黃連瀉肝則不外乎膽草青黛瀉膽則不外乎前胡瀉腎則不外乎童便食鹽經曰熱淫於內治以鹹寒瀉膀胱則不外乎豬苓澤瀉黃柏余則看症酌增此瀉裡熱之大概也若熱久伏不發其熱最深其藥亦不越乎知連芩柏經曰以苦發之但總不得妄行升發以助其勢如春溫夏熱之有禁用乾葛升麻麻黃桂枝柴胡之類是已此瀉伏熱之大概也至於熱挾有濕藥亦不外清利之味然亦須分病症輕重輕則用以通草茯苓等藥以滲重則用以澤瀉木通車前燈草扁蓄萆薢海金沙防己茵陳地膚子豬苓滑石等藥以為瀉再重則有大戟芫花甘遂等藥以為之伐此瀉濕熱之大概也他如熱入於血血熱而症見有蓄血便血等症則當按其破血涼血之劑以進久積而熱不化積熱則當用以黃芩黃柏知母之類以投久積久毒不解熱毒則當用以連翹牛蒡緑豆金銀花蒲公英金汁人中黃之類以治惟有真陰素虧真陽失守無根之火浮溢於表外極似熱而內則無真正熱症熱脈可據假熱惟當用以附子理中及或附桂八味方可回生凡此皆屬治熱之品但不可盡以熱屬內實而概用以苦寒以傷其胃也經曰熱淫於內治以鹹寒佐以苦甘以酸收之以苦發之水勝火故治以鹹寒甘勝咸佐之所以防其過必甘苦者防咸之過而又以瀉熱氣作實也熱淫故以酸收之熱結故以苦發之五運少陰司天子午少陰在泉卯酉散熱決明子肝