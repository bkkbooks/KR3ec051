胞小腸膀胱熱鬱貫衆肝胃熱毒雷丸胃熱積蘆薈肝沖熱結蚯蚓脾熱積青葙子肝風熱蒼耳子肝脾風濕松脂肝脾風濕密陀僧脾濕川椒脾肺腎寒濕椒目腎寒濕乾薑胃寒附子命門寒硫黃命門寒巴豆腎寒雄黃脾肺肝惡寒蘇合香諸竅惡氣阿魏脾胃臭惡樟腦諸竅惡氣蛇蛻肝惡毒犀角胃蟲毒川槿皮肝風癬海桐皮肝風癬水銀外疥輕粉筋骨疥鉛粉腎疥黃丹血疥大楓子肝脾疥石膏皮膚骨肉血熱濕山茵陳膀胱胃口瘡五倍子肺胃疥百藥煎肝胃疥紫貝肝脾瘀桃仁肝瘀乾漆肝胃瘀皂礬肝胃瘀百草霜肝瘀厚朴腸胃濕瘴檳榔肝濕瘴谷蟲腸胃滯鶴蝨肝痰滯使君子脾胃積滯棐實肺燥烏梅肺脾大腸酸收百部肺清熱甘蜜脾肺引蠱藜蘆肺胃上湧相思子肺胃上湧芫花脾肺腎水積胡桐淚胃齒蟲莨菪齒蟲韭子肝腎齒蟲蟾酥肌肉齒蟲覆盆葉陰蝕蟲獺肝肝癆瘵獺爪肝癆瘵敗鼓心癆瘵鸛骨癆瘵虎糞骨肝癆瘵痛痛者血氣不通之意考之內經有言是病多因寒氣內客而熱絶少又考諸書所論痛有因寒因熱因風因濕因滯因血因氣因火因蟲之分豫嘗按書細考大約痛屬於寒於濕於滯於血則多守而不走痛屬於風於火於熱於氣於蟲則多走而不守痛屬於濕於滯則多腫脹高起痛屬於寒則多毛骨聳直痛屬於熱則多神氣不失痛屬於氣則痛必見腫突其腫時脹時消痛屬於滯則痛得食則增痛屬於虛則痛得食則減且痛屬寒屬虛則喜熱手揉按屬熱屬火屬實則最忌手揉擦痛之大概如斯是以風痛之症多見周身骨節疼痛故藥有不離乎羌活防風桂枝獨活山甲白花蛇烏蛇白附子石南藤川烏附天雄但須分其上下里外以治寒痛之症多見手足厥逆飲食不思痛喜熱手揉按並或發熱惡寒無汗脈緊故藥有不離乎麻黃細辛附子乾薑良薑蓽茇吳茱萸大茴小茴川椒肉桂艾葉但須分其在表在裡寒症以治濕痛之症多見腫脹痞滿手足痠軟麻痹其痛守而不移故藥有不越乎蒼朮半夏南星豬苓澤瀉木通車前薏苡但須分其寒多熱多以治熱通之症其痛多見口渴發熱痛則手不可近故藥有不越乎石膏知母山梔子黃芩大黃朴硝但須分其熱勢輕重上下以治火痛之症其症必見面赤唇焦口燥舌乾脈則洪數有力痛則拒手揉按故藥有不外乎黃芩黃柏黃連天冬麥冬沙參元參白芍但須分其火勢微甚以投氣痛之症其痛必見上下無常面青目赤故多治以厚朴枳殼檳榔烏藥陳皮青皮香附木香等藥但須分其上下左右以投血痛之症其痛多見一定不移脈則芤澀不長故治多以薑黃乳香沒藥元胡索五靈脂益母草桃仁紅花三七虻蟲水蛭槐花地榆等藥但須分其痛處緩急病症以進滯痛之症其痛必見不食則減得食則增故治多以木香神麯山楂麥芽砂仁等藥但須分其滯勢久暫以施蟲痛之症其痛多見氣上衝心口吐白沫時痛時止故治多以川椒烏梅棐實雷丸苦楝根苦參等藥但須分其挾寒挾熱以治凡此痛皆屬實若使痛屬中虛虛痛則以耆術為要痛屬血虛則以芎歸為要痛屬精虛則以地茱為要痛屬火衰則以附桂為要然要皆有虛症虛脈可據若以實症道虛補劑妄投其殺人也慘矣風痛羌活防風桂枝山甲白花蛇烏蛇白附子石南藤川烏附天雄獨活寒痛麻黃細辛附子乾薑良薑蓽茇吳茱萸大茴小茴川椒肉桂艾葉濕痛蒼朮半夏南星豬苓澤瀉木通車前薏苡熱痛石膏梔子知母大黃黃芩朴硝火痛黃芩黃柏黃連天冬麥冬沙參元參白芍氣痛厚朴枳殼檳榔烏藥陳皮青皮香附木香血痛薑黃乳香沒藥元胡索五靈脂益母草桃仁紅花三七虻蟲水蛭槐花滯痛木香神麯山楂麥芽蟲痛川椒烏梅棐實雷丸苦楝根苦參虛痛人參氣白朮氣黃耆氣當歸血地黃精山藥精附片火肉桂火消渴消渴之症按書有言三焦火起而渴蓋人津液有限火勝則水必竭猶之釜里火猛穀食皆焚水必竭澤而燥而渴以生是謂火渴有言表裡熱盛而渴蓋以氣以衛外血以營內表裡邪閉津受煎熬猶之地氣上升天氣閉塞人物皆煩而渴應見是謂熱渴有言表裡寒盛而渴蓋以人身陽勝則陰微陰勝則陽弱陽氣既微於中陰氣復增於內則身中外皆寒而氣不溫猶之堅冰既至滴點全無而渴應有是謂陰渴寒渴有謂食滯中宮而渴蓋以人身上下本貴通活一有物滯則上不克下下不克上津液斷絶兩不相接滯渴猶之穀食在釜內有物閉氣實不空津不克上而渴應生是為滯渴有謂津藉精生精虛則津無由而布猶之天雨不降地無醴泉而渴以成是謂水衰而渴有謂津賴火充火衰而氣不化精不附氣猶之釜里無薪鍋蓋干灼而渴應見是謂火衰而渴有謂津藉氣布氣實則氣充而津生氣衰則氣餒而津竭猶之天氣既降地氣不升而渴應有是謂氣衰而渴凡此火不外於三黃石膏知母熱不外於大黃朴硝花粉貝母寒不越乎麻桂升葛姜附丁桂滯不越乎香附川朴枳殼至於渴屬精虛則六味有不可離渴屬火衰則八味必不可棄渴屬氣薄則參耆白朮自必見用毋謂渴皆屬實虛症全無而悉可用苦寒之味也火渴大黃黃柏黃芩黃連石膏知母熱渴大黃朴硝花粉石膏知母寒渴麻黃外寒桂枝外風升麻外寒乾葛外寒乾薑內寒附子內寒丁香內寒肉桂內寒滯渴香附川朴枳殼木香虛渴人參白朮黃耆當歸山藥熟地附子肉桂
