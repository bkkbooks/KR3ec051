body:
  text: 卷十總義藥有五味張元素曰凡藥酸入肝苦入心甘入脾辛入肺鹹入腎此明五味之義辛主散酸主收甘主緩苦主堅咸主軟統論五味之用辛能散結潤燥致津液通氣酸能收緩斂散甘能緩急調中苦能燥濕堅軟咸能軟堅淡能利竅復明五味之用藥有陰陽陰陽之氣平則無病不平則病生陰陽應象論曰陰味出下竅陽氣出上竅清陽發腠理清之清者濁陰走五臟濁之清者清陽實四肢清之濁者濁陰歸六腑濁之濁者味厚者為陰薄者為陰中之陽氣厚者為陽薄者為陽中之陰味厚則泄降瀉薄則疏通滲利氣薄則發泄發散厚則發熱溫燥辛甘發散為陽酸苦湧泄為陰鹹味通泄為陰淡味滲泄為陽六者或收或散或緩或急或潤或燥或軟或堅以所利而行之調其氣使之平也此明陰陽之義宗奭曰生物者氣也成之者味也寒氣堅故其味可用以軟熱氣軟故其味可用以堅風氣散故其味可用以收燥氣收故其味可用以散土者沖氣之所生沖氣則無所不和故其味可用以緩氣堅則壯故苦可以養氣脈軟則和故咸可以養脈骨收則強故收可以養骨筋散則不攣故辛可以養筋肉緩則不壅故甘可以養肉堅之而後可以軟收之而後可以散故緩則用甘不欲則弗用用之太過亦病矣古之養生治疾者必先通乎此否則能愈人之疾者鮮矣藥有氣味升降浮沉李杲曰味薄者升而生象春如甘平辛平辛微溫微苦平之藥是也氣薄者降而收象秋如甘寒甘涼甘淡寒涼酸溫酸平鹹平之藥是也氣厚者浮而長象夏如甘熱辛熱之藥是也味厚者沉而長象冬如苦寒鹹寒之藥是也氣味平者化而成象土如甘平甘溫甘涼甘辛平甘微苦平之藥是也汪昂曰氣厚味薄者浮而升味厚氣薄者沉而降氣味俱厚者能浮能沉氣味俱薄者可升可降李時珍曰酸鹹無升辛甘無降寒無浮熱無沉其性然也而升者引之以鹹寒則沉而直達下焦沉者引之以酒則浮而上至巔頂一物之中有根升梢降生升熟降者是升降在物亦在人也此統明升降浮沉之義藥有根梢上中下元素曰凡藥根之在土中者中半以上氣脈之上行也以生苗者為根中半以下氣脈之下行也以入土者為梢病在中焦與上焦者用根在下焦者用梢根升梢降人之身半以上天之陽也用頭中焦用身身半已下地之陰也用梢乃述類象形者汪昂曰凡藥之為枝者達四肢為皮者達皮膚為心為乾者內行臟腑質之輕者上入心肺重者下入肝腎中空者發表內實者攻裡枯燥者入氣分潤澤者入血分此上下內外各以其類相從也藥有五傷五傷篇曰酸傷筋辛勝酸苦傷氣咸勝苦甘傷肉酸勝甘辛傷皮毛苦勝辛咸傷血甘勝咸此五行相剋之義藥有五走五走篇曰酸走筋筋病毋多食酸多食令人癃酸氣澀收胞得酸而縮綣故水道不通也苦走骨骨病毋多食苦多食令人變嘔苦入下脘三焦皆閉故變嘔也甘走肉肉病毋多食甘多食令人悗心甘氣柔潤胃柔則緩緩則蟲動故悗心也辛走氣氣病毋多食辛多食令人洞心辛走上焦與氣俱行久留心下故洞心也咸走血血病毋多食鹹多食令人渴血與咸相得則凝凝則胃汁注之故咽路焦而舌本干此五病之所禁藥有五過五過篇曰味過於酸肝氣以津脾氣乃絕肉胝傷脗而唇揭味過於苦脾氣不濡胃氣乃厚皮槁而毛拔味過於甘心氣喘滿色黑腎氣不平骨痛而發落味過於辛筋脈阻絕精神乃失筋急而爪枯味過於咸大骨氣勞肌短心氣抑脈凝澀而變色此五味之所傷藥有子母相生汪昂曰人之五臟應五行金木水火土子母相生經曰虛則補母實則瀉子又曰子能令母實如腎為肝母心為肝子故入肝者併入腎與心肝為心母脾為心子故入心者併入肝與脾心為脾母肺為脾子故入脾者併入心與肺脾為肺母腎為肺子故入肺者併入脾與腎肺為腎母肝為腎子故入腎者併入肺與肝此五行相生子母相應之義也藥有形性氣質汪昂曰藥之為物各有形性氣質其入諸經有因形而相類者如連翹似心而入心荔枝核似睪丸而入腎之類有因性相從者如屬木者入肝屬水者入腎潤者走血分燥者入氣分本天者親上本地者親下之類有因氣相求者如氣香入脾氣焦入心之類有因質相同者如藥之頭入頭干入身枝入肢皮行皮紅花蘇汁似血而入血之類又藥有以形名者如人參狗脊之類有以色名者如黃連黑參之類有以氣名者如豨薟香薷之類有以味名者如甘草苦參之類有以質名者如石膏石脂歸身歸尾之類有以時名者如夏枯草款冬花之類有以能名者如何首烏骨碎補之類此自然之理可以意會也藥有佐使惡畏反殺時珍曰藥有七情獨行者單方不用輔也相需者同類不可離也如人參甘草黃柏知母之類相使者我之佐使也相惡者奪我之能也相畏者受彼之制也相反者兩不相合也相殺者制彼之毒也古方多有用相惡相反者蓋相須相使同用者帝道也相畏相殺同用者王道也相惡相反同用者霸道也有經有權用者識悟耳製藥貴適中嘉謨曰製藥貴適中不及則功效難求太過則氣味反失火制四煅炮炙炒也水制三漬泡洗也水火共制蒸煮二者焉酒製升提薑製發散入鹽走腎而軟堅用醋注肝而住痛童便制除劣性而降下米泔制去燥性而和中乳制潤枯生血蜜制甘緩益元陳壁土製藉土氣以補中州麵煨面制抑酷性勿傷上膈烏豆湯甘草湯漬瀑並解毒致令平和羊酥油豬脂油塗燒咸滲骨容易脆斷去穰者免脹抽心者除煩大概具陳初學熟玩
